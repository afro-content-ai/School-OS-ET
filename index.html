          if (!store.subjectsCache || store.subjectsCache.length === 0) {
            dal.listSubjects().then(subs2 => {
              store.subjectsCache = subs2;
              const filtered = dal.getSubjectsForGrade(grade);
              if (subjectsEl) {
                subjectsEl.innerHTML = filtered.length > 0
                  ? filtered.map(s => `<span class="badge badge-muted" style="margin:2px;">${_rsSafe(s.name ?? s.subjectId)}</span>`).join('')
                  : '<span class="text-muted text-sm">No subjects found for this grade.</span>';
              }
            }).catch(() => {});
          } else {
            subjectsEl.innerHTML = '<span class="text-muted text-sm">No subjects found for this grade.</span>';
          }
        }
      }
    };

    window.__rsStep2Next = function __rsStep2Next() {
      const errorEl = document.getElementById('rs-s2-error');
      if (errorEl) errorEl.textContent = '';
      const ecYear  = store.config?.currentEcYear ?? String(EC.todayEc().year);
      const grade   = document.getElementById('rs-s2-grade')?.value   ?? '';
      const section = document.getElementById('rs-s2-section')?.value ?? '';

      if (!grade)   { if (errorEl) errorEl.textContent = 'Grade is required.';   return; }
      if (!section) { if (errorEl) errorEl.textContent = 'Section is required.'; return; }

      _rsForm.grade    = grade;
      _rsForm.section  = section;
      _rsForm.classKey = `${grade}${section}_${ecYear}`;

      // Capture subjectIds for the grade
      const subs = dal.getSubjectsForGrade(grade);
      _rsForm.subjectIds = subs.map(s => s.subjectId);

      _rsForm.step = 3;
      _rsRenderFormStep();
    };

    // ── Step 3: Parent linking ────────────────────────────────────────────────
    //
    // Two flows, both fully Spark-plan-compatible (no Cloud Functions, no
    // Admin SDK, no admin session disruption):
    //
    //   (1) LINK EXISTING PARENT (recommended/primary flow)
    //       Search /users where role == 'parent', filter client-side by
    //       name/email as the registrar types (debounced 300ms — see
    //       _rsWireParentSearch). On selection, the link itself is deferred
    //       to Step 4's confirm action (dal.updateUser(parentUid,
    //       { childKeys: arrayUnion(studentId) })) so nothing is written
    //       until the registrar actually confirms the whole registration.
    //
    //   (2) INVITE NEW PARENT (Spark-safe flow for parents with no account)
    //       We can't call createUserWithEmailAndPassword() here without
    //       signing the registrar out (that call immediately signs in the
    //       NEW account — see the identical problem/comment in
    //       adminUsersView's __umSubmit). So instead of creating the Auth
    //       account ourselves, we create a /parentInvites/{inviteId}
    //       document (dal.createParentInvite) and hand the registrar a
    //       shareable link. The parent opens that link on their OWN device
    //       and self-registers via the public #/accept-invite/:inviteId/:token
    //       route below — at which point createUserWithEmailAndPassword()
    //       is safe to call, because the parent has no existing session to
    //       lose. This is the standard Spark-tier workaround for "let
    //       someone else create their own Auth account."

    let _rsParentSearchTimeout = null;
    let _rsParentSearchResults = [];

    function _rsStep3Html() {
      const selectedHtml = _rsForm.parentUid ? `
        <div class="reg-parent-selected">
          <div>
            <div class="reg-parent-selected-name">✅ ${_rsSafe(_rsForm.parentName)}</div>
            <div class="reg-parent-selected-email">${_rsSafe(_rsForm.parentEmail)}</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="window.__rsClearParent()">✕ Remove</button>
        </div>` : '';

      // ── Invite-sent confirmation card ──
      // Shown once dal.createParentInvite() has succeeded. The registrar
      // copies the link from here; "Remove" lets them back out and either
      // pick an existing parent instead or send a fresh invite.
      const inviteSentHtml = _rsForm.inviteSent ? `
        <div class="reg-parent-selected" style="align-items:flex-start;">
          <div style="min-width:0;">
            <div class="reg-parent-selected-name">✉️ Invite created for ${_rsSafe(_rsForm.inviteEmail)}</div>
            <div class="reg-parent-selected-email" style="margin-block-end:var(--sp-2);">
              Expires in 7 days · status: pending
            </div>
            <div class="um-invite-box" id="rs-s3-invite-link" style="word-break:break-all;">${_rsSafe(_rsForm.inviteLink)}</div>
            <button
              class="btn btn-ghost btn-sm mt-2"
              onclick="window.__rsCopyInviteLink()">
              📋 Copy Invite Link
            </button>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="window.__rsClearInvite()">✕ Remove</button>
        </div>` : '';

      // ── Invite form (email only — no password, no UID to paste) ──
      const inviteFormHtml = _rsForm.showInviteForm ? `
        <div class="reg-notice" style="margin-block-start:var(--sp-3);">
          <strong>✉️ Invite New Parent — Spark-safe.</strong><br>
          We can't create the parent's account from here without signing
          you out, so instead we generate a secure invite link. Send it to
          the parent via WhatsApp or SMS — they'll set their own password
          and the account links to this student automatically.
        </div>
        <div class="input-group span-2" style="margin:0;">
          <label class="label" for="rs-s3-invite-email">Parent's email address *</label>
          <input id="rs-s3-invite-email" class="input" type="email" placeholder="parent@example.com" autocomplete="off" />
        </div>
        <div id="rs-s3-invite-error" class="input-error mt-3" role="alert"></div>
        <div style="margin-block-start:var(--sp-3);display:flex;gap:var(--sp-2);flex-wrap:wrap;">
          <button class="btn btn-primary btn-sm" onclick="window.__rsSendInvite()">
            ✉️ Create Invite Link
          </button>
          <button class="btn btn-ghost btn-sm" onclick="window.__rsCancelInvite()">Cancel</button>
        </div>` : '';

      const showSearch = !_rsForm.parentUid && !_rsForm.inviteSent && !_rsForm.showInviteForm;

      return `
        <div class="reg-form-card">
          <div class="reg-form-title">Step 3 — Link Parent / Guardian</div>
          <p class="text-muted text-sm" style="margin-block-end:var(--sp-3);">
            Search for an existing parent account (recommended) or invite a new
            parent to self-register. You can also skip this step and link a
            parent later.
          </p>

          ${selectedHtml}
          ${inviteSentHtml}

          ${showSearch ? `
          <!-- (1) Link Existing Parent — primary flow -->
          <div class="input-group" style="margin-block-end:var(--sp-2);">
            <label class="label" for="rs-s3-search">Search parent by name or email</label>
            <div class="search-bar">
              <span class="search-icon" aria-hidden="true">🔍</span>
              <input id="rs-s3-search" class="input" type="search"
                placeholder="Type to search parent users…"
                autocomplete="off" />
            </div>
          </div>
          <div id="rs-s3-results" style="margin-block-end:var(--sp-3);"></div>
          <button class="btn btn-ghost btn-sm" onclick="window.__rsShowInviteForm()">
            ✉️ Invite New Parent
          </button>` : ''}

          ${inviteFormHtml}

          <div id="rs-s3-error" class="input-error mt-3" role="alert"></div>
          <div class="reg-form-actions">
            <button class="btn btn-ghost" onclick="window.__rsFormBack()">← Back</button>
            <button class="btn btn-primary" onclick="window.__rsStep3Next()">
              Next: Review →
            </button>
          </div>
        </div>`;
    }

    // ── (1) Link Existing Parent ──────────────────────────────────────────────

    // _rsWireParentSearch()
    //   Attaches the debounced (300ms) input listener to the search box.
    //   Re-attached every time _rsStep3Html() re-renders the DOM node, since
    //   innerHTML replacement destroys any previously bound listener.
    function _rsWireParentSearch() {
      const searchEl = document.getElementById('rs-s3-search');
      if (!searchEl) return;

      searchEl.addEventListener('input', () => {
        clearTimeout(_rsParentSearchTimeout);
        const q = searchEl.value.trim();
        if (q.length < 2) {
          const res = document.getElementById('rs-s3-results');
          if (res) res.innerHTML = '';
          return;
        }
        _rsParentSearchTimeout = setTimeout(() => _rsSearchParents(q), 300);
      });
    }

    // _rsSearchParents(query)
    //   Queries /users where('role','==','parent') via dal.listUsers('parent'),
    //   then filters client-side by displayName/email substring match. This
    //   keeps the query itself Spark-friendly (no composite/text-search
    //   indexes to maintain) at the cost of reading every parent doc on each
    //   search — acceptable at school scale (dozens to low hundreds of
    //   parents) and budget-tracked like any other dal.listUsers() call.
    async function _rsSearchParents(query) {
      const resEl = document.getElementById('rs-s3-results');
      if (!resEl) return;

      resEl.innerHTML = `<div class="text-sm text-muted">Searching…</div>`;

      try {
        const allParents = await dal.listUsers('parent');
        const q = query.toLowerCase();
        _rsParentSearchResults = allParents.filter(u =>
          (u.displayName ?? '').toLowerCase().includes(q) ||
          (u.email ?? '').toLowerCase().includes(q)
        ).slice(0, 8);

        if (_rsParentSearchResults.length === 0) {
          resEl.innerHTML = `
            <div class="text-sm text-muted">
              No parent accounts found matching "<em>${_rsSafe(query)}</em>".
              Try <a href="#" onclick="event.preventDefault();window.__rsShowInviteForm();" style="color:var(--primary);font-weight:600;">inviting a new parent</a> instead.
            </div>`;
          return;
        }

        resEl.innerHTML = `
          <div class="reg-parent-results">
            ${_rsParentSearchResults.map((u, i) => `
              <div class="reg-parent-result-item" onclick="window.__rsSelectParent(${i})">
                <div>
                  <div class="reg-parent-result-name">${_rsSafe(u.displayName ?? '—')}</div>
                  <div class="reg-parent-result-email">${_rsSafe(u.email ?? '—')}</div>
                </div>
                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();window.__rsSelectParent(${i})">
                  Select
                </button>
              </div>`).join('')}
          </div>`;
      } catch (err) {
        resEl.innerHTML = `<div class="text-sm" style="color:var(--danger);">Search failed: ${_rsSafe(err.message)}</div>`;
      }
    }

    // window.__rsSelectParent(idx)
    //   Selects a parent from the last search result set. Does NOT write to
    //   Firestore yet — dal.updateUser(parentUid, { childKeys: arrayUnion(...) })
    //   only happens once the registrar confirms the full registration in
    //   Step 4 (see window.__rsConfirmRegister below), so backing out of the
    //   form before that point leaves no trace.
    window.__rsSelectParent = function __rsSelectParent(idx) {
      const u = _rsParentSearchResults[idx];
      if (!u) return;
      _rsForm.parentUid   = u.uid ?? '';
      _rsForm.parentName  = u.displayName ?? '';
      _rsForm.parentEmail = u.email ?? '';
      const content = document.getElementById('rs-step-content');
      if (content) { content.innerHTML = _rsStep3Html(); _rsWireParentSearch(); }
    };

    window.__rsClearParent = function __rsClearParent() {
      _rsForm.parentUid   = '';
      _rsForm.parentName  = '';
      _rsForm.parentEmail = '';
      const content = document.getElementById('rs-step-content');
      if (content) { content.innerHTML = _rsStep3Html(); _rsWireParentSearch(); }
    };

    // ── (2) Invite New Parent ─────────────────────────────────────────────────

    window.__rsShowInviteForm = function __rsShowInviteForm() {
      _rsForm.showInviteForm = true;
      const content = document.getElementById('rs-step-content');
      if (content) content.innerHTML = _rsStep3Html();
    };

    window.__rsCancelInvite = function __rsCancelInvite() {
      _rsForm.showInviteForm = false;
      const content = document.getElementById('rs-step-content');
      if (content) { content.innerHTML = _rsStep3Html(); _rsWireParentSearch(); }
    };

    // window.__rsClearInvite()
    //   Backs out of an already-created invite card so the registrar can
    //   search for an existing parent instead, or send a different invite.
    //   Does NOT delete the /parentInvites document already written — the
    //   invite stays valid for 7 days even if the registrar changes their
    //   mind about showing the link here; it can still be sent manually if
    //   they have it copied, or simply expires unused.
    window.__rsClearInvite = function __rsClearInvite() {
      _rsForm.inviteSent  = false;
      _rsForm.inviteEmail = '';
      _rsForm.inviteId    = '';
      _rsForm.inviteLink  = '';
      const content = document.getElementById('rs-step-content');
      if (content) { content.innerHTML = _rsStep3Html(); _rsWireParentSearch(); }
    };

    // window.__rsSendInvite()
    //   Validates the email, then calls dal.createParentInvite() to write
    //   the /parentInvites/{inviteId} document. studentId must already be
    //   set (Step 1 collects it), since the invite is tied to one student.
    window.__rsSendInvite = async function __rsSendInvite() {
      const errorEl = document.getElementById('rs-s3-invite-error');
      if (errorEl) errorEl.textContent = '';

      const email = document.getElementById('rs-s3-invite-email')?.value.trim() ?? '';

      if (!email) { if (errorEl) errorEl.textContent = 'Email address is required.'; return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        if (errorEl) errorEl.textContent = 'Please enter a valid email address.';
        return;
      }
      if (!_rsForm.studentId) {
        if (errorEl) errorEl.textContent = 'Student ID is missing — go back to Step 1.';
        return;
      }

      const sendBtn = document.querySelector('#rs-s3-invite-email')?.closest('.reg-form-card')
        ?.querySelector('.btn-primary');
      if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = '⏳ Creating…'; }

      try {
        const { inviteId, inviteLink } = await dal.createParentInvite(
          email,
          _rsForm.studentId,
          store.user.uid,
        );

        _rsForm.inviteSent     = true;
        _rsForm.inviteEmail    = email;
        _rsForm.inviteId       = inviteId;
        _rsForm.inviteLink     = inviteLink;
        _rsForm.showInviteForm = false;

        const content = document.getElementById('rs-step-content');
        if (content) { content.innerHTML = _rsStep3Html(); _rsWireParentSearch(); }

        // Best-effort auto-copy so the registrar can paste straight into
        // WhatsApp/SMS without an extra tap; the visible "Copy Invite Link"
        // button (window.__rsCopyInviteLink) covers browsers/contexts where
        // this silent attempt is blocked (e.g. no user-gesture clipboard
        // permission on some mobile browsers).
        try {
          await navigator.clipboard.writeText(inviteLink);
          showToast('Invite link copied — send this to the parent via WhatsApp or SMS.', 'success');
        } catch (_clipErr) {
          showToast('Invite link created — tap "Copy Invite Link" to share it.', 'success');
        }
      } catch (err) {
        if (errorEl) errorEl.textContent = err.message;
        showToast('Failed to create invite: ' + err.message, 'error');
        if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '✉️ Create Invite Link'; }
      }
    };

    // window.__rsCopyInviteLink()
    //   Copies the already-created invite link to the clipboard. Separate
    //   from the auto-copy attempt in __rsSendInvite() so the registrar can
    //   re-copy at any time (e.g. if they navigated away from WhatsApp and
    //   came back) without re-creating the invite document.
    window.__rsCopyInviteLink = async function __rsCopyInviteLink() {
      try {
        await navigator.clipboard.writeText(_rsForm.inviteLink);
        showToast('Invite link copied — send this to the parent via WhatsApp or SMS.', 'success');
      } catch (err) {
        const box = document.getElementById('rs-s3-invite-link');
        if (box) box.style.outline = '2px solid var(--accent)';
        showToast('Could not access clipboard — copy the link manually.', 'error');
      }
    };

    window.__rsStep3Next = function __rsStep3Next() {
      // Parent is optional — allow skipping (no existing parent linked and
      // no invite sent is a valid state; the student can be linked later).
      _rsForm.step = 4;
      _rsRenderFormStep();
    };

    // ── Step 4: Review & confirm ──────────────────────────────────────────────

    function _rsStep4Html() {
      return `
        <div class="reg-form-card">
          <div class="reg-form-title">Step 4 — Review & Confirm</div>
          <p class="text-muted text-sm" style="margin-block-end:var(--sp-4);">
            Review the information below before registering this student.
          </p>

          <div class="reg-review-section">
            <div class="reg-review-section-title">Student Information</div>
            <div class="reg-review-row"><span class="reg-review-key">Student ID</span><span class="reg-review-val">${_rsSafe(_rsForm.studentId)}</span></div>
            <div class="reg-review-row"><span class="reg-review-key">Full Name (EN)</span><span class="reg-review-val">${_rsSafe(_rsForm.fullName)}</span></div>
            ${_rsForm.fullNameAm ? `<div class="reg-review-row"><span class="reg-review-key">Full Name (አማ)</span><span class="reg-review-val">${_rsSafe(_rsForm.fullNameAm)}</span></div>` : ''}
            <div class="reg-review-row"><span class="reg-review-key">Gender</span><span class="reg-review-val">${_rsSafe(_rsForm.gender)}</span></div>
            ${_rsForm.dobEc ? `<div class="reg-review-row"><span class="reg-review-key">D.O.B (EC)</span><span class="reg-review-val">${_rsSafe(_rsForm.dobEc)}</span></div>` : ''}
          </div>

          <div class="reg-review-section">
            <div class="reg-review-section-title">Class Assignment</div>
            <div class="reg-review-row"><span class="reg-review-key">Grade</span><span class="reg-review-val">${_rsSafe(_rsForm.grade)}</span></div>
            <div class="reg-review-row"><span class="reg-review-key">Section</span><span class="reg-review-val">${_rsSafe(_rsForm.section)}</span></div>
            <div class="reg-review-row"><span class="reg-review-key">Class Key</span><span class="reg-review-val"><span class="reg-id-chip">${_rsSafe(_rsForm.classKey)}</span></span></div>
            ${_rsForm.subjectIds.length > 0 ? `
            <div class="reg-review-row">
              <span class="reg-review-key">Subjects</span>
              <span class="reg-review-val" style="display:flex;flex-wrap:wrap;gap:4px;">
                ${_rsForm.subjectIds.map(sid => `<span class="badge badge-muted">${_rsSafe(sid)}</span>`).join('')}
              </span>
            </div>` : ''}
          </div>

          <div class="reg-review-section">
            <div class="reg-review-section-title">Parent / Guardian</div>
            ${_rsForm.parentUid
              ? `<div class="reg-review-row"><span class="reg-review-key">Name</span><span class="reg-review-val">${_rsSafe(_rsForm.parentName)}</span></div>
                 <div class="reg-review-row"><span class="reg-review-key">Email</span><span class="reg-review-val">${_rsSafe(_rsForm.parentEmail)}</span></div>`
              : _rsForm.inviteSent
              ? `<div class="reg-review-row"><span class="reg-review-key">Invite sent to</span><span class="reg-review-val">${_rsSafe(_rsForm.inviteEmail)}</span></div>
                 <div class="reg-review-row"><span class="reg-review-key" style="grid-column:1/-1;">Parent will be linked automatically once they accept the invite.</span></div>`
              : `<div class="reg-review-row"><span class="reg-review-key" style="grid-column:1/-1;">No parent linked — can be linked later.</span></div>`
            }
          </div>

          <div id="rs-s4-error" class="input-error mt-3" role="alert"></div>

          <div class="reg-form-actions">
            <button class="btn btn-ghost" onclick="window.__rsFormBack()">← Back</button>
            <button
              id="rs-confirm-btn"
              class="btn btn-accent"
              onclick="window.__rsConfirmRegister()">
              ✅ Register Student
            </button>
          </div>
        </div>`;
    }

    window.__rsFormBack = function __rsFormBack() {
      if (_rsForm.step > 1) {
        _rsForm.step--;
        _rsRenderFormStep();
      }
    };

    window.__rsConfirmRegister = async function __rsConfirmRegister() {
      const errorEl = document.getElementById('rs-s4-error');
      const btn     = document.getElementById('rs-confirm-btn');
      if (errorEl) errorEl.textContent = '';
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Registering…'; }

      try {
        const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);

        const studentData = {
          studentId:       _rsForm.studentId,
          fullName:        _rsForm.fullName,
          fullNameAm:      _rsForm.fullNameAm,
          dobEc:           _rsForm.dobEc,
          gender:          _rsForm.gender,
          currentClassKey: _rsForm.classKey,
          subjectIds:      _rsForm.subjectIds,
          status:          'active',
          tuitionOwed:     0,
          // If an existing parent was linked (Step 3, flow 1), seed
          // parentUids now. If an invite was sent instead (flow 2), this
          // starts empty — the link happens later, when the invited parent
          // accepts (see dal.acceptParentInvite / __aiSubmit's
          // dal.updateStudent(studentId, { parentUids: arrayUnion(newUid) })).
          parentUids:      _rsForm.parentUid ? [_rsForm.parentUid] : [],
          enrolledEcYear:  ecYear,
        };

        // 1. Create student document
        await dal.createStudent(studentData);

        // 2. Add student to class roster
        try {
          await dal.updateClass(_rsForm.classKey, { studentIds: arrayUnion(_rsForm.studentId) });
        } catch (classErr) {
          // Class may not exist yet — show a warning but don't abort the registration
          console.warn('[RS] updateClass failed (class may not exist yet):', classErr.message);
          showToast(`Student registered, but class "${_rsForm.classKey}" was not found. Create the class first.`, 'warning');
        }

        // 3. Link student to parent
        if (_rsForm.parentUid) {
          try {
            await dal.updateUser(_rsForm.parentUid, { childKeys: arrayUnion(_rsForm.studentId) });
          } catch (parentErr) {
            console.warn('[RS] updateUser (parent) failed:', parentErr.message);
          }
        }

        // 4. Update local list
        _rsAllStudents.unshift(studentData);
        _rsFilteredList = [..._rsAllStudents];

        showToast(`✅ ${_rsForm.fullName} registered successfully.`, 'success');

        // Reset form and switch to students tab
        Object.assign(_rsForm, {
          step: 1, studentId: '', fullName: '', fullNameAm: '', dobEc: '', gender: '',
          grade: '', section: '', classKey: '', subjectIds: [],
          parentUid: '', parentName: '', parentEmail: '',
          showInviteForm: false,
          inviteSent: false, inviteEmail: '', inviteId: '', inviteLink: '',
        });

        window.__rsSetTab('students');

      } catch (err) {
        if (errorEl) errorEl.textContent = err.message;
        showToast('Registration failed: ' + err.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '✅ Register Student'; }
      }
    };

    // ─── Utility helpers ──────────────────────────────────────────────────────

    function _rsSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function _rsEsc(str) {
      return String(str ?? '').replace(/'/g,"&#39;").replace(/"/g,'&quot;');
    }
    // ── END REGISTRAR STUDENT REGISTRY VIEW ──────────────────────────────────


    // ═══════════════════════════════════════════════════════════════════════════
    // REGISTRAR TUITION PAYMENTS VIEW  (#/registrar/payments)
    // ── requireRole (guardRoute): 'admin', 'registrar'
    //
    // Architecture:
    //   1. Student search — text input filtering a client-side list (loaded
    //      once via dal.listStudents per class is too narrow, so this view
    //      pulls the same "all active students for the current EC year"
    //      list that registrarStudentsView uses, filtered by studentId or
    //      fullName/fullNameAm). Selecting a result shows fullName,
    //      currentClassKey, and tuitionOwed prominently (ETB, comma-formatted).
    //   2. Record Payment form — amount, semester (1-4), ecYear (defaults to
    //      store.config.currentEcYear), method, reference. Submits via
    //      dal.recordPayment(...), then refreshes the balance display and
    //      payment history table without a full re-render.
    //   3. Payment history table — dal.listPayments(studentId), newest first.
    //      Dates are stored as serverTimestamp() and rendered in EC format
    //      via EC.formatEc() after a defensive Timestamp→Date conversion
    //      (same _rpTimestampToDate pattern as _annTimestampToDate /
    //      _promoTimestampToDate elsewhere in this file). recordedBy is a
    //      raw uid; resolved to a displayName via dal.getUser(), cached in
    //      _rpUserCache so repeat renders cost 0 extra reads.
    //   4. Bulk Tuition Report (admin only) — class select sourced from
    //      dal.listClasses(currentEcYear), "Load" fetches dal.listStudents
    //      (classKey) then dal.listPayments(studentId) per student to sum
    //      this year's payments client-side (listPayments has no year
    //      filter server-side, so the ecYear match happens here). Rows are
    //      color-coded via the existing .table .row-success/.row-warning/
    //      .row-danger classes; a totals row sums tuitionOwed/paid/outstanding.
    // ═══════════════════════════════════════════════════════════════════════════

    // Module-level state for the registrar payments view.
    let _rpAllStudents   = [];   // all active students for the current EC year (search source)
    let _rpSelectedId    = null; // currently selected student's studentId
    let _rpSelectedStu   = null; // currently selected student doc (cached)
    let _rpPayments      = [];   // payment history for the selected student
    let _rpUserCache     = {};   // { [uid]: userDoc } — recordedBy display-name lookups
    let _rpBulkClassKey  = '';   // class select value in the Bulk Tuition Report
    let _rpBulkRows      = null; // last loaded bulk report rows, or null if not yet loaded

    // ─── Main view builder ────────────────────────────────────────────────────

    function registrarPaymentsView() {
      setTimeout(_rpMountView, 0);

      const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);
      const isAdmin = store.userDoc?.role === ROLES.ADMIN;

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">💳 Tuition Payments</h1>
            <p class="page-subtitle">${EC.formatEcAm(new Date())} · EC ${ecYear}</p>
          </div>
        </div>

        <!-- Student search -->
        <div class="card card-lg mb-5">
          <div class="card-header">
            <span class="card-title">🔍 Find Student</span>
          </div>
          <div class="search-bar" style="margin-block-end:var(--sp-3);">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input
              id="rp-search"
              type="search"
              class="input"
              placeholder="Search by Student ID or name…"
              autocomplete="off"
              aria-label="Search students" />
          </div>
          <div id="rp-search-results" class="rp-search-results"></div>
          <p id="rp-search-status" class="text-sm text-muted" style="margin:0;">
            <span class="spinner spinner-sm"></span> Loading students…
          </p>
        </div>

        <!-- Selected student info + payment form + history (hidden until a student is picked) -->
        <div id="rp-student-area"></div>

        <!-- Bulk Tuition Report (admin only) -->
        ${isAdmin ? `
        <div class="card card-lg card-accented mb-5" id="rp-bulk-card">
          <div class="card-header">
            <span class="card-title">📊 Bulk Tuition Report</span>
          </div>
          <div class="row" style="gap:var(--sp-3);flex-wrap:wrap;">
            <div class="input-group" style="margin:0;flex:1 1 220px;">
              <label class="label" for="rp-bulk-class">Class</label>
              <select id="rp-bulk-class" class="input">
                <option value="">— Loading classes… —</option>
              </select>
            </div>
            <button
              id="rp-bulk-load-btn"
              class="btn btn-primary"
              style="align-self:flex-end;"
              onclick="window.__rpLoadBulkReport()">
              📥 Load
            </button>
          </div>
          <div id="rp-bulk-area" style="margin-block-start:var(--sp-4);"></div>
        </div>` : ''}
      `;
    }

    // ─── Mount ────────────────────────────────────────────────────────────────

    async function _rpMountView() {
      if (!document.getElementById('rp-search')) return;

      // Reset per-mount state that shouldn't persist across navigations away
      // from and back to this route (selected student stays cleared; bulk
      // report rows are cleared too since the class list could change).
      _rpSelectedId  = null;
      _rpSelectedStu = null;
      _rpPayments    = [];
      _rpBulkRows    = null;

      const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);

      try {
        _rpAllStudents = await _rpFetchAllActiveStudents(ecYear);
        const statusEl = document.getElementById('rp-search-status');
        if (statusEl) {
          statusEl.innerHTML = `<strong>${_rpAllStudents.length}</strong> active student${_rpAllStudents.length !== 1 ? 's' : ''} loaded — start typing to search.`;
        }
      } catch (err) {
        const statusEl = document.getElementById('rp-search-status');
        if (statusEl) {
          statusEl.innerHTML = `<span style="color:var(--danger);">Failed to load students: ${_rpSafe(err.message)}</span>`;
        }
        showToast('Failed to load students: ' + err.message, 'error');
      }

      _rpWireSearch();

      // Populate the bulk-report class select (admin only — panel isn't
      // rendered for registrars, so guard against a missing element).
      const bulkSelect = document.getElementById('rp-bulk-class');
      if (bulkSelect) {
        try {
          const classes = await dal.listClasses(ecYear);
          classes.sort((a, b) => {
            const gA = _gradeNumFromClassKey(a.classKey ?? '') ?? 99;
            const gB = _gradeNumFromClassKey(b.classKey ?? '') ?? 99;
            if (gA !== gB) return gA - gB;
            return String(a.classKey).localeCompare(String(b.classKey));
          });
          if (classes.length === 0) {
            bulkSelect.innerHTML = `<option value="">— No classes for EC ${ecYear} —</option>`;
          } else {
            bulkSelect.innerHTML = classes.map(cls => {
              const ck    = cls.classKey ?? '';
              const gNum  = _gradeNumFromClassKey(ck);
              const label = `${gNum !== null ? 'Grade ' + gNum : ck}${cls.section ? ' — Section ' + cls.section : ''} (${ck})`;
              return `<option value="${_rpEsc(ck)}">${_rpSafe(label)}</option>`;
            }).join('');
            _rpBulkClassKey = classes[0].classKey ?? '';
          }
        } catch (err) {
          bulkSelect.innerHTML = `<option value="">— Failed to load classes —</option>`;
          showToast('Failed to load classes: ' + err.message, 'error');
        }
      }
    }

    // _rpFetchAllActiveStudents(ecYear)
    //   Same query shape as registrarStudentsView's _rsFetchAllActiveStudents:
    //   up to 200 students with status === 'active', filtered client-side to
    //   those whose currentClassKey ends with `_${ecYear}`.
    async function _rpFetchAllActiveStudents(ecYear) {
      const q = query(
        collection(db, 'students'),
        where('status', '==', 'active'),
        limit(200),
      );
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);

      const suffix = `_${ecYear}`;
      return snap.docs
        .map(d => d.data())
        .filter(s => !ecYear || (s.currentClassKey ?? '').endsWith(suffix));
    }

    // ─── Search wiring ──────────────────────────────────────────────────────────

    function _rpWireSearch() {
      const input = document.getElementById('rp-search');
      if (!input || input._rpWired) return;
      input._rpWired = true;
      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        _rpRenderSearchResults(q);
      });
    }

    function _rpRenderSearchResults(q) {
      const area = document.getElementById('rp-search-results');
      if (!area) return;

      if (!q) {
        area.innerHTML = '';
        return;
      }

      const matches = _rpAllStudents.filter(s =>
        (s.studentId ?? '').toLowerCase().includes(q) ||
        (s.fullName ?? '').toLowerCase().includes(q) ||
        (s.fullNameAm ?? '').toLowerCase().includes(q)
      ).slice(0, 12);

      if (matches.length === 0) {
        area.innerHTML = `<p class="text-sm text-muted" style="padding:var(--sp-2) 0;">No students match "${_rpSafe(q)}".</p>`;
        return;
      }

      area.innerHTML = matches.map(s => `
        <div class="rp-search-result" onclick="window.__rpSelectStudent('${_rpEsc(s.studentId ?? '')}')">
          <div>
            <div class="reg-name-line">${_rpSafe(s.fullName) || '<em class="text-muted">—</em>'}</div>
            <div class="text-sm text-muted">${_rpSafe(s.studentId ?? '—')} · ${_rpSafe(s.currentClassKey ?? '—')}</div>
          </div>
          <span class="${Number(s.tuitionOwed ?? 0) > 0 ? 'reg-tuition-owed' : 'reg-tuition-clear'}">
            ${Number(s.tuitionOwed ?? 0) > 0 ? 'ETB ' + fmtNum(Number(s.tuitionOwed ?? 0)) : '✓ Clear'}
          </span>
        </div>
      `).join('');
    }

    // __rpSelectStudent(studentId)
    //   Selects a student from the search results, clears the search box,
    //   and loads their detail panel (balance + payment form + history).
    window.__rpSelectStudent = async function __rpSelectStudent(studentId) {
      _rpSelectedId = studentId;
      const input = document.getElementById('rp-search');
      if (input) input.value = '';
      const resultsArea = document.getElementById('rp-search-results');
      if (resultsArea) resultsArea.innerHTML = '';

      await _rpLoadSelectedStudent();
    };

    // _rpLoadSelectedStudent()
    //   Re-fetches the currently selected student's doc fresh from
    //   Firestore (rather than trusting the possibly-stale _rpAllStudents
    //   cache) so the balance shown is always current, then loads their
    //   payment history and renders the full detail panel.
    async function _rpLoadSelectedStudent() {
      const area = document.getElementById('rp-student-area');
      if (!area || !_rpSelectedId) return;

      area.innerHTML = `
        <div class="card card-lg mb-5">
          <div class="reg-loading">
            <div class="spinner spinner-lg" style="margin:0 auto var(--sp-3);"></div>
            <p>Loading student…</p>
          </div>
        </div>`;

      try {
        const [student, payments] = await Promise.all([
          dal.getStudent(_rpSelectedId),
          dal.listPayments(_rpSelectedId),
        ]);

        if (!student) {
          area.innerHTML = `
            <div class="card card-lg mb-5">
              <p style="color:var(--danger);">Student '${_rpSafe(_rpSelectedId)}' not found.</p>
            </div>`;
          return;
        }

        _rpSelectedStu = student;
        _rpPayments    = payments;

        // Pre-fetch any recordedBy display names not already cached.
        const uncachedUids = [...new Set(payments.map(p => p.recordedBy).filter(Boolean))]
          .filter(uid => !Object.prototype.hasOwnProperty.call(_rpUserCache, uid));
        if (uncachedUids.length > 0) {
          const fetched = await Promise.all(uncachedUids.map(uid => dal.getUser(uid)));
          uncachedUids.forEach((uid, i) => { _rpUserCache[uid] = fetched[i]; });
        }

        _rpRenderStudentArea();
      } catch (err) {
        area.innerHTML = `
          <div class="card card-lg mb-5">
            <p style="color:var(--danger);">Failed to load student: ${_rpSafe(err.message)}</p>
          </div>`;
        showToast('Failed to load student: ' + err.message, 'error');
      }
    }

    // _rpRenderStudentArea()
    //   Renders the balance card, Record Payment form, and payment history
    //   table for the currently selected student (_rpSelectedStu / _rpPayments).
    function _rpRenderStudentArea() {
      const area = document.getElementById('rp-student-area');
      if (!area || !_rpSelectedStu) return;

      const s     = _rpSelectedStu;
      const owed  = Number(s.tuitionOwed ?? 0);
      const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);

      const balanceClass = owed > 0 ? 'rp-balance-owed' : 'rp-balance-clear';
      const balanceText  = owed > 0
        ? `ETB ${fmtNum(owed)}`
        : (owed < 0 ? `ETB ${fmtNum(owed)} (credit)` : '✓ Paid in full');

      area.innerHTML = `
        <!-- Selected student summary -->
        <div class="card card-lg mb-5">
          <div class="card-header">
            <span class="card-title">👤 ${_rpSafe(s.fullName) || s.studentId}</span>
            <button class="btn btn-ghost btn-sm" onclick="window.__rpClearSelection()">✕ Clear</button>
          </div>
          <div class="reg-detail-grid">
            <div class="reg-detail-item">
              <div class="reg-detail-label">Student ID</div>
              <div class="reg-detail-value">${_rpSafe(s.studentId ?? '—')}</div>
            </div>
            <div class="reg-detail-item">
              <div class="reg-detail-label">Current Class</div>
              <div class="reg-detail-value">${_rpSafe(s.currentClassKey ?? '—')}</div>
            </div>
            <div class="reg-detail-item">
              <div class="reg-detail-label">Tuition Owed</div>
              <div class="reg-detail-value ${balanceClass}" id="rp-balance-value" style="font-size:1.3rem;font-weight:700;">
                ${balanceText}
              </div>
            </div>
          </div>
        </div>

        <!-- Record Payment form -->
        <div class="card card-lg card-primary mb-5">
          <div class="card-header">
            <span class="card-title">➕ Record Payment</span>
          </div>
          <div id="rp-form-error" class="input-error" role="alert" aria-live="polite"></div>
          <div class="grid-2" style="gap:var(--sp-3);margin-block-end:var(--sp-4);">
            <div class="input-group" style="margin:0;">
              <label class="label" for="rp-amount">Amount (ETB) *</label>
              <input id="rp-amount" class="input" type="number" min="0.01" step="0.01" placeholder="e.g. 2500" />
            </div>
            <div class="input-group" style="margin:0;">
              <label class="label" for="rp-method">Method *</label>
              <select id="rp-method" class="input">
                <option value="Telebirr">Telebirr</option>
                <option value="Cash">Cash</option>
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="grid-3" style="gap:var(--sp-3);margin-block-end:var(--sp-4);">
            <div class="input-group" style="margin:0;">
              <label class="label" for="rp-semester">Semester *</label>
              <select id="rp-semester" class="input">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
            </div>
            <div class="input-group" style="margin:0;">
              <label class="label" for="rp-ec-year">EC Year *</label>
              <input id="rp-ec-year" class="input" type="text" value="${_rpSafe(ecYear)}" maxlength="4" placeholder="e.g. 2017" />
            </div>
            <div class="input-group" style="margin:0;">
              <label class="label" for="rp-reference">Reference No.</label>
              <input id="rp-reference" class="input" type="text" placeholder="e.g. TX-839201" />
            </div>
          </div>
          <button id="rp-submit-btn" class="btn btn-accent" onclick="window.__rpSubmitPayment()">
            💾 Record Payment
          </button>
        </div>

        <!-- Payment history -->
        <div class="card card-lg" style="padding:0;overflow:hidden;">
          <div class="card-header" style="padding:var(--sp-4) var(--sp-4) 0;">
            <span class="card-title">📜 Payment History</span>
          </div>
          <div id="rp-history-area">
            ${_rpRenderHistoryTable(_rpPayments)}
          </div>
        </div>`;
    }

    // _rpRenderHistoryTable(payments)
    //   Builds the payment-history <table> markup as a string. Pulled into
    //   its own function so __rpSubmitPayment() can refresh just the table
    //   after a successful submission without re-rendering the whole panel.
    function _rpRenderHistoryTable(payments) {
      if (!payments || payments.length === 0) {
        return `
          <div class="reg-empty">
            <div style="font-size:2rem;margin-block-end:var(--sp-3);opacity:.4;">📜</div>
            <p>No payments recorded yet for this student.</p>
          </div>`;
      }

      const rows = payments.map(p => {
        const date = _rpTimestampToDate(p.createdAt);
        const dateStr = date ? EC.formatEc(date) : '—';
        const recordedByDoc = p.recordedBy ? _rpUserCache[p.recordedBy] : null;
        const recordedByName = recordedByDoc?.displayName
          ?? (p.recordedBy ? p.recordedBy.slice(0, 8) + '…' : '—');

        return `
          <tr>
            <td>${_rpSafe(dateStr)}</td>
            <td class="num">ETB ${fmtNum(Number(p.amount ?? 0))}</td>
            <td>${_rpSafe(p.semester ?? '—')}</td>
            <td>${_rpSafe(p.method ?? '—')}</td>
            <td>${_rpSafe(p.reference) || '<span class="text-muted">—</span>'}</td>
            <td>${_rpSafe(recordedByName)}</td>
          </tr>`;
      }).join('');

      return `
        <div class="table-wrapper" style="border:none;border-radius:0;">
          <table class="table">
            <thead>
              <tr>
                <th>Date (EC)</th>
                <th>Amount</th>
                <th>Semester</th>
                <th>Method</th>
                <th>Reference</th>
                <th>Recorded By</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    // __rpClearSelection() — deselects the current student and clears the panel.
    window.__rpClearSelection = function __rpClearSelection() {
      _rpSelectedId  = null;
      _rpSelectedStu = null;
      _rpPayments    = [];
      const area = document.getElementById('rp-student-area');
      if (area) area.innerHTML = '';
    };

    // __rpSubmitPayment()
    //   Reads the Record Payment form, calls dal.recordPayment(...), then
    //   refreshes the balance display and payment history table in place.
    window.__rpSubmitPayment = async function __rpSubmitPayment() {
      const errorEl = document.getElementById('rp-form-error');
      const btn     = document.getElementById('rp-submit-btn');
      if (errorEl) errorEl.textContent = '';
      if (!_rpSelectedId) return;

      const amount    = document.getElementById('rp-amount')?.value ?? '';
      const semester  = document.getElementById('rp-semester')?.value ?? '';
      const ecYear    = document.getElementById('rp-ec-year')?.value.trim() ?? '';
      const method    = document.getElementById('rp-method')?.value ?? '';
      const reference = document.getElementById('rp-reference')?.value.trim() ?? '';

      if (!amount || Number(amount) <= 0) {
        if (errorEl) errorEl.textContent = 'Enter a payment amount greater than 0.';
        return;
      }
      if (!ecYear || !/^\d{4}$/.test(ecYear)) {
        if (errorEl) errorEl.textContent = 'EC Year must be a 4-digit year (e.g. 2017).';
        return;
      }

      if (btn) { btn.disabled = true; btn.textContent = '⏳ Recording…'; }

      try {
        const newBalance = await dal.recordPayment(
          _rpSelectedId, Number(amount), Number(semester), ecYear, method, reference
        );

        // Update local state so the balance card and student list reflect
        // the new total without a full reload.
        if (_rpSelectedStu) _rpSelectedStu.tuitionOwed = newBalance;
        const cached = _rpAllStudents.find(s => s.studentId === _rpSelectedId);
        if (cached) cached.tuitionOwed = newBalance;

        const balanceEl = document.getElementById('rp-balance-value');
        if (balanceEl) {
          const owed = Number(newBalance);
          balanceEl.className = `reg-detail-value ${owed > 0 ? 'rp-balance-owed' : 'rp-balance-clear'}`;
          balanceEl.style.fontSize  = '1.3rem';
          balanceEl.style.fontWeight = '700';
          balanceEl.textContent = owed > 0
            ? `ETB ${fmtNum(owed)}`
            : (owed < 0 ? `ETB ${fmtNum(owed)} (credit)` : '✓ Paid in full');
        }

        // Reset the form fields (keep method/semester/ecYear as-is for
        // quick repeat entry — only clear amount and reference).
        const amountEl = document.getElementById('rp-amount');
        const refEl    = document.getElementById('rp-reference');
        if (amountEl) amountEl.value = '';
        if (refEl)    refEl.value    = '';

        // Refresh payment history.
        _rpPayments = await dal.listPayments(_rpSelectedId);
        const uncachedUids = [...new Set(_rpPayments.map(p => p.recordedBy).filter(Boolean))]
          .filter(uid => !Object.prototype.hasOwnProperty.call(_rpUserCache, uid));
        if (uncachedUids.length > 0) {
          const fetched = await Promise.all(uncachedUids.map(uid => dal.getUser(uid)));
          uncachedUids.forEach((uid, i) => { _rpUserCache[uid] = fetched[i]; });
        }
        const historyArea = document.getElementById('rp-history-area');
        if (historyArea) historyArea.innerHTML = _rpRenderHistoryTable(_rpPayments);

        showToast('Payment recorded successfully.', 'success');
      } catch (err) {
        if (errorEl) errorEl.textContent = err.message;
        showToast('Failed to record payment: ' + err.message, 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '💾 Record Payment'; }
      }
    };

    // ─── Bulk Tuition Report (admin only) ───────────────────────────────────────

    // __rpLoadBulkReport()
    //   Fetches every student in the selected class (dal.listStudents),
    //   then their payment history (dal.listPayments) in parallel to sum
    //   this EC year's payments client-side, and renders a color-coded
    //   table with a totals row.
    window.__rpLoadBulkReport = async function __rpLoadBulkReport() {
      const select = document.getElementById('rp-bulk-class');
      const area    = document.getElementById('rp-bulk-area');
      const btn     = document.getElementById('rp-bulk-load-btn');
      if (!select || !area) return;

      const classKey = select.value;
      if (!classKey) {
        showToast('Choose a class first.', 'error');
        return;
      }

      const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);

      if (btn) { btn.disabled = true; btn.textContent = '⏳ Loading…'; }
      area.innerHTML = `
        <div class="reg-loading">
          <div class="spinner spinner-lg" style="margin:0 auto var(--sp-3);"></div>
          <p>Loading class roster…</p>
        </div>`;

      try {
        const students = await dal.listStudents(classKey);

        if (students.length === 0) {
          area.innerHTML = `
            <div class="reg-empty">
              <div style="font-size:2rem;margin-block-end:var(--sp-3);opacity:.4;">📊</div>
              <p>No students found in this class.</p>
            </div>`;
          _rpBulkRows = [];
          return;
        }

        // Fetch payment history per student in parallel; sum only the
        // entries matching this EC year (listPayments has no server-side
        // year filter, so the match happens here).
        const paymentsByStudent = await Promise.all(
          students.map(s => dal.listPayments(s.studentId))
        );

        const rows = students.map((s, i) => {
          const owed = Number(s.tuitionOwed ?? 0);
          const paidThisYear = paymentsByStudent[i]
            .filter(p => p.ecYear === ecYear)
            .reduce((sum, p) => sum + Number(p.amount ?? 0), 0);
          return {
            studentId:   s.studentId,
            fullName:    s.fullName ?? '—',
            tuitionOwed: owed,
            paid:        paidThisYear,
            outstanding: owed,
          };
        });

        _rpBulkRows = rows;
        _rpRenderBulkTable(rows, classKey, ecYear);
      } catch (err) {
        area.innerHTML = `<p style="color:var(--danger);">Failed to load report: ${_rpSafe(err.message)}</p>`;
        showToast('Failed to load bulk report: ' + err.message, 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '📥 Load'; }
      }
    };

    // _rpRenderBulkTable(rows, classKey, ecYear)
    //   Renders the color-coded bulk tuition report table plus totals row.
    //   Row color: green (row-success) = tuitionOwed ≤ 0 (paid in full);
    //   red (row-danger) = nothing paid this year and balance still owed;
    //   yellow (row-warning) = partial payment made, balance still owed.
    function _rpRenderBulkTable(rows, classKey, ecYear) {
      const area = document.getElementById('rp-bulk-area');
      if (!area) return;

      const bodyRows = rows.map(r => {
        let rowClass;
        if (r.tuitionOwed <= 0) {
          rowClass = 'row-success';
        } else if (r.paid > 0) {
          rowClass = 'row-warning';
        } else {
          rowClass = 'row-danger';
        }
        return `
          <tr class="${rowClass}">
            <td>${_rpSafe(r.fullName)}<div class="text-sm text-muted">${_rpSafe(r.studentId)}</div></td>
            <td class="num">ETB ${fmtNum(r.tuitionOwed)}</td>
            <td class="num">ETB ${fmtNum(r.paid)}</td>
            <td class="num">ETB ${fmtNum(r.outstanding)}</td>
          </tr>`;
      }).join('');

      const totals = rows.reduce((acc, r) => ({
        tuitionOwed: acc.tuitionOwed + r.tuitionOwed,
        paid:        acc.paid + r.paid,
        outstanding: acc.outstanding + r.outstanding,
      }), { tuitionOwed: 0, paid: 0, outstanding: 0 });

      area.innerHTML = `
        <p class="text-sm text-muted" style="margin-block-end:var(--sp-3);">
          ${rows.length} student${rows.length !== 1 ? 's' : ''} in <strong>${_rpSafe(classKey)}</strong> · EC ${_rpSafe(ecYear)} ·
          <span style="color:var(--success);">■</span> paid in full &nbsp;
          <span style="color:#7a4f00;">■</span> partial &nbsp;
          <span style="color:var(--danger);">■</span> nothing paid
        </p>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Student</th>
                <th>Tuition Owed</th>
                <th>Paid This Year</th>
                <th>Outstanding</th>
              </tr>
            </thead>
            <tbody>${bodyRows}</tbody>
            <tfoot>
              <tr style="font-weight:700;background:var(--surface2);">
                <td>Total</td>
                <td class="num">ETB ${fmtNum(totals.tuitionOwed)}</td>
                <td class="num">ETB ${fmtNum(totals.paid)}</td>
                <td class="num">ETB ${fmtNum(totals.outstanding)}</td>
              </tr>
            </tfoot>
          </table>
        </div>`;
    }

    // ─── Utility helpers ──────────────────────────────────────────────────────

    function _rpSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function _rpEsc(str) {
      return String(str ?? '').replace(/'/g,"&#39;").replace(/"/g,'&quot;');
    }
    // _rpTimestampToDate(value) — defensive Firestore Timestamp → Date
    // conversion (same pattern as _annTimestampToDate / _promoTimestampToDate):
    // a freshly-written serverTimestamp() can still be a pending sentinel in
    // the local cache for one tick before the server value resolves, so this
    // falls back to null instead of throwing.
    function _rpTimestampToDate(value) {
      if (!value) return null;
      if (typeof value.toDate === 'function') {
        try { return value.toDate(); } catch (_) { return null; }
      }
      if (value instanceof Date) return value;
      return null;
    }
    // ═══════════════════════════════════════════════════════════════════════════
    // REPORT CARD VIEW  (#/report-card/:studentId/:ecYear/:semester)
    // ── requireRole (guardRoute): 'admin', 'registrar', 'teacher'
    //
    // Architecture:
    //   1. Route params: studentId, ecYear, semester.
    //   2. On mount: validate access:
    //        - admin / registrar: always allowed.
    //        - teacher: allowed only if homeroomOf includes student.currentClassKey.
    //   3. Fetch /students/{studentId} (1 read) and
    //      /students/{studentId}/academicYears/{ecYear} (1 read).
    //   4. If semester data missing or not finalized → error card.
    //   5. Render a print-optimized report card layout.
    //   6. Print CSS injected into <head> on mount, removed on unmount.
    // ═══════════════════════════════════════════════════════════════════════════

    // _rcPrintStyleEl — reference to the dynamically-injected <style media="print">
    // element. Stored so it can be removed when navigating away.
    let _rcPrintStyleEl = null;

    // _rcInjectPrintStyle() — injects print-specific CSS into <head>.
    function _rcInjectPrintStyle() {
      _rcRemovePrintStyle(); // idempotent
      const style = document.createElement('style');
      style.id = 'rc-print-style';
      style.media = 'print';
      style.textContent = `
        /* ── SchoolOS Report Card — print styles ── */
        @page { size: A4; margin: 12mm 14mm; }

        /* Hide all navigation chrome */
        #nav,
        #sidebar,
        #sidebar-overlay,
        #toasts,
        .bottom-nav,
        .no-print,
        .rc-action-bar,
        .page-header { display: none !important; }

        /* Remove shell padding / offsets */
        #main {
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Show and size the report card container */
        #report-card-print {
          display: block !important;
          width: 182mm !important;   /* A4 content width: 210mm - 2×14mm margins */
          margin: 0 auto !important;
          font-size: 11pt !important;
          font-family: 'Segoe UI', Arial, sans-serif !important;
          color: #000 !important;
          background: #fff !important;
        }

        /* Avoid breaking inside the results table */
        .rc-table { page-break-inside: avoid !important; }

        /* Bulk: page break between students */
        .rc-bulk-separator { page-break-after: always !important; }

        /* Force black text on colored elements for ink economy */
        .rc-school-name   { color: #000 !important; }
        .rc-school-name-am{ color: #b8860b !important; }
        .rc-table th      { background: #1a3c5e !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .rc-table .rc-summary-row td { background: #f5e9c8 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      `;
      document.head.appendChild(style);
      _rcPrintStyleEl = style;
    }

    // _rcRemovePrintStyle() — removes the injected print style on unmount.
    function _rcRemovePrintStyle() {
      const existing = document.getElementById('rc-print-style');
      if (existing) existing.remove();
      _rcPrintStyleEl = null;
    }

    // _rcSafe / _rcEsc — same escaping convention as every other view.
    function _rcSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function _rcEsc(str) {
      return String(str ?? '').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    }

    // _rcGradeLetter(pct) — A/B/C/D/F from 0-100 percentage.
    function _rcGradeLetter(pct) {
      if (pct >= 90) return 'A';
      if (pct >= 80) return 'B';
      if (pct >= 70) return 'C';
      if (pct >= 60) return 'D';
      return 'F';
    }

    // _rcRemarkFor(pct) — English remark for the grade band.
    function _rcRemarkFor(pct) {
      if (pct >= 90) return 'Excellent / እጅግ ጥሩ';
      if (pct >= 80) return 'Very Good / ጥሩ';
      if (pct >= 70) return 'Good / ደህና';
      if (pct >= 60) return 'Satisfactory / አጥጋቢ';
      return 'Needs Improvement / ማሻሻያ ያስፈልጋል';
    }

    // _rcRenderCard(student, yearData, ecYear, semester, schoolName)
    //   Pure rendering function — returns the inner HTML of one report card.
    //   Used both by reportCardView() and reportCardBulkView().
    function _rcRenderCard(student, yearData, ecYear, semester, schoolName) {
      const semData = (yearData.semesters ?? {})[String(semester)] ?? {};
      const subjects = semData.subjects ?? {};
      const att      = semData.attendance ?? {};
      const remarks  = semData.remarks ?? '';

      const schoolNameDisplay   = schoolName || store.config?.schoolName || 'SchoolOS';
      const schoolNameAmDisplay = store.config?.schoolNameAm || schoolNameDisplay;

      // ── Subject rows ────────────────────────────────────────────────────────
      let totalScore = 0, totalMax = 0, subjectCount = 0;
      const subjectEntries = Object.entries(subjects);

      const subjectRows = subjectEntries.map(([subjectId, subj], idx) => {
        const score = Number(subj.score ?? subj.total ?? 0);
        const max   = Number(subj.maxScore ?? subj.max ?? 100);
        const pct   = max > 0 ? Math.round((score / max) * 100) : 0;
        const grade = _rcGradeLetter(pct);
        const remark = _rcRemarkFor(pct);
        totalScore  += score;
        totalMax    += max;
        subjectCount++;

        const subjectName   = _rcSafe(subj.name   ?? subjectId);
        const subjectNameAm = _rcSafe(subj.nameAm ?? subj.name ?? subjectId);

        return `
          <tr>
            <td class="num" style="width:36px;color:var(--text-muted);font-size:0.78rem;">${idx + 1}</td>
            <td>
              <div style="font-weight:600;">${subjectName}</div>
              <div style="font-size:0.8rem;color:#555;">${subjectNameAm}</div>
            </td>
            <td class="num">${_rcSafe(String(score))}</td>
            <td class="num">${_rcSafe(String(max))}</td>
            <td class="num">${_rcSafe(String(pct))}%</td>
            <td style="text-align:center;">
              <span class="rc-grade-pill rc-grade-${grade}">${grade}</span>
            </td>
            <td style="font-size:0.78rem;color:#555;">${_rcSafe(remark)}</td>
          </tr>`;
      }).join('');

      // ── Overall average row ──────────────────────────────────────────────────
      const overallPct   = totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : 0;
      const overallGrade = _rcGradeLetter(overallPct);
      const rank         = semData.rank ?? semData.classRank ?? '—';
      const classSize    = semData.classSize ?? semData.totalStudents ?? '—';
      const summaryRow   = subjectCount > 0 ? `
        <tr class="rc-summary-row">
          <td colspan="2" style="font-weight:700;">Overall Average / አጠቃላይ አማካይ</td>
          <td class="num" style="font-weight:700;">${_rcSafe(String(totalScore))}</td>
          <td class="num" style="font-weight:700;">${_rcSafe(String(totalMax))}</td>
          <td class="num" style="font-weight:700;">${_rcSafe(String(overallPct))}%</td>
          <td style="text-align:center;">
            <span class="rc-grade-pill rc-grade-${overallGrade}">${overallGrade}</span>
          </td>
          <td style="font-size:0.78rem;font-weight:700;">${_rcSafe(_rcRemarkFor(overallPct))}</td>
        </tr>` : '';

      // ── Rank row ─────────────────────────────────────────────────────────────
      const rankRow = `
        <tr class="rc-summary-row">
          <td colspan="2" style="font-weight:700;">Class Rank / የክፍል ቅደም ተከተል</td>
          <td colspan="5" style="font-weight:700;text-align:center;">
            ${_rcSafe(String(rank))} / ${_rcSafe(String(classSize))}
          </td>
        </tr>`;

      // ── Attendance strip ─────────────────────────────────────────────────────
      const attPresent = Number(att.present ?? att.daysPresent ?? 0);
      const attAbsent  = Number(att.absent  ?? att.daysAbsent  ?? 0);
      const attLate    = Number(att.late    ?? att.daysLate    ?? 0);
      const attHtml = (attPresent + attAbsent + attLate) > 0 ? `
        <div class="rc-att-strip">
          <span class="rc-att-chip present">✓ Present / ተገኝቶ: ${attPresent}</span>
          <span class="rc-att-chip absent">✗ Absent / ርቆ: ${attAbsent}</span>
          <span class="rc-att-chip late">⏱ Late / ዘግይቶ: ${attLate}</span>
        </div>` : '';

      // ── Remarks / comments box ───────────────────────────────────────────────
      const remarksHtml = remarks
        ? `<div class="rc-remarks-text">${_rcSafe(remarks)}</div>`
        : `<div style="height:40px;border-block-end:1px dashed #bbb;margin-block:var(--sp-2);"></div>
           <div style="height:40px;border-block-end:1px dashed #bbb;"></div>`;

      // ── EC print date ────────────────────────────────────────────────────────
      const printDateEc = EC.formatEc(new Date());

      return `
        <!-- School Header -->
        <div class="rc-school-header">
          <div class="rc-school-name">${_rcSafe(schoolNameDisplay)}</div>
          <div class="rc-school-name-am">${_rcSafe(schoolNameAmDisplay)}</div>
          <div class="rc-report-title">Student Report Card &nbsp;·&nbsp; የተማሪ ሪፖርት ካርድ</div>
        </div>

        <!-- Student Meta -->
        <div class="rc-meta-grid">
          <div class="rc-meta-item">
            <div class="rc-meta-label">Full Name / ሙሉ ስም</div>
            <div class="rc-meta-value">${_rcSafe(student.fullName ?? '—')}</div>
            ${student.fullNameAm ? `<div style="font-size:0.82rem;color:#555;">${_rcSafe(student.fullNameAm)}</div>` : ''}
          </div>
          <div class="rc-meta-item">
            <div class="rc-meta-label">Student ID / የተማሪ መ.ቁ</div>
            <div class="rc-meta-value" style="font-family:monospace;">${_rcSafe(student.studentId ?? '—')}</div>
          </div>
          <div class="rc-meta-item">
            <div class="rc-meta-label">Class / ክፍል</div>
            <div class="rc-meta-value">${_rcSafe(student.currentClassKey ?? '—')}</div>
          </div>
          <div class="rc-meta-item">
            <div class="rc-meta-label">Academic Year (EC) / ትምህርት ዘመን</div>
            <div class="rc-meta-value">${_rcSafe(String(ecYear))}</div>
          </div>
          <div class="rc-meta-item">
            <div class="rc-meta-label">Semester / ሴሚስተር</div>
            <div class="rc-meta-value">${_rcSafe(String(semester))}</div>
          </div>
          <div class="rc-meta-item">
            <div class="rc-meta-label">Gender / ጾታ</div>
            <div class="rc-meta-value">${_rcSafe(student.gender ?? '—')}</div>
          </div>
        </div>

        <!-- Results Table -->
        <div class="rc-table-wrap">
          <table class="rc-table">
            <thead>
              <tr>
                <th style="width:36px;">No.</th>
                <th>Subject / ትምህርት</th>
                <th class="num">Score / ያገኘ</th>
                <th class="num">Max / ከፍ.</th>
                <th class="num">% </th>
                <th style="text-align:center;width:52px;">Grade</th>
                <th>Remark / አስተያየት</th>
              </tr>
            </thead>
            <tbody>
              ${subjectRows || `<tr><td colspan="7" style="text-align:center;color:#888;padding:var(--sp-4);">No subject scores recorded.</td></tr>`}
              ${summaryRow}
              ${rankRow}
            </tbody>
          </table>
        </div>

        <!-- Attendance -->
        ${attHtml ? `
        <div>
          <div class="rc-meta-label" style="margin-block-end:var(--sp-2);">
            Attendance Summary / የቀን ፈታሪ ማጠቃለያ
          </div>
          ${attHtml}
        </div>` : ''}

        <!-- Remarks -->
        <div class="rc-remarks-box">
          <div class="rc-remarks-label">Remarks / አስተያየቶች</div>
          ${remarksHtml}
        </div>

        <!-- Signatures -->
        <div class="rc-sig-row">
          <div class="rc-sig-item">
            <div class="rc-sig-line"></div>
            <div class="rc-sig-label">Class Teacher / የክፍል መምህር</div>
          </div>
          <div class="rc-sig-item">
            <div class="rc-sig-line"></div>
            <div class="rc-sig-label">Principal / ርዕሰ ትምህርት</div>
          </div>
          <div class="rc-sig-item">
            <div class="rc-sig-line"></div>
            <div class="rc-sig-label">Parent / Guardian</div>
            <div class="rc-sig-label-am">ወላጅ / አሳዳሪ</div>
          </div>
        </div>

        <!-- Footer -->
        <div class="rc-footer">
          ${_rcSafe(schoolNameDisplay)} &nbsp;·&nbsp;
          Printed: ${_rcSafe(printDateEc)} (EC) &nbsp;·&nbsp;
          Powered by SchoolOS
        </div>`;
    }

    // reportCardView({ studentId, ecYear, semester })
    //   Route: #/report-card/:studentId/:ecYear/:semester
    //   Allowed: admin, registrar, teacher (homeroom of student's class only).
    function reportCardView({ studentId, ecYear, semester }) {
      // Remove any lingering print styles from a previous report card visit.
      _rcRemovePrintStyle();

      // Render a loading skeleton first; _rcMountView fills it async.
      setTimeout(() => _rcMountView(studentId, ecYear, semester), 0);

      return `
        <div class="no-print">
          <div class="page-header">
            <div>
              <h1 class="page-title">🖨️ Report Card</h1>
              <p class="page-subtitle">EC ${_rcSafe(ecYear)} · Semester ${_rcSafe(semester)}</p>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="history.back()">← Back</button>
          </div>
        </div>

        <div id="rc-view-root">
          <div class="empty-state" style="padding-block:var(--sp-6);">
            <div class="spinner spinner-lg" style="margin:0 auto var(--sp-3);"></div>
            <p>Loading report card…</p>
          </div>
        </div>

        <!-- The printable container — filled async -->
        <div id="report-card-print"></div>`;
    }

    // _rcMountView — async mount for reportCardView.
    async function _rcMountView(studentId, ecYear, semester) {
      const rootEl  = document.getElementById('rc-view-root');
      const printEl = document.getElementById('report-card-print');
      if (!rootEl || !printEl) return;

      const role     = store.userDoc?.role;
      const isAdmin  = role === ROLES.ADMIN || role === ROLES.REGISTRAR;

      try {
        // ── Fetch 1: student doc ──────────────────────────────────────────────
        dal.budgetTrack(1, 0, 1);
        const studentSnap = await getDoc(doc(db, 'students', studentId));
        if (!studentSnap.exists()) {
          rootEl.innerHTML = `
            <div class="card card-danger" style="margin-block:var(--sp-4);">
              <div class="empty-state">
                <div class="empty-icon">❌</div>
                <p style="font-weight:700;color:var(--danger);">Student not found.</p>
                <button class="btn btn-ghost mt-4" onclick="history.back()">← Back</button>
              </div>
            </div>`;
          return;
        }
        const student = studentSnap.data();

        // ── Teacher homeroom check ────────────────────────────────────────────
        if (!isAdmin) {
          const homeroomOf = store.userDoc?.homeroomOf ?? [];
          if (!homeroomOf.includes(student.currentClassKey ?? '')) {
            rootEl.innerHTML = `
              <div class="card card-danger" style="margin-block:var(--sp-4);">
                <div class="empty-state">
                  <div class="empty-icon">🔒</div>
                  <p style="font-weight:700;color:var(--danger);">403 — Access Denied</p>
                  <p class="text-sm text-muted">You are not the homeroom teacher for this student's class.</p>
                  <button class="btn btn-ghost mt-4" onclick="history.back()">← Back</button>
                </div>
              </div>`;
            return;
          }
        }

        // ── Fetch 2: academic year sub-document ───────────────────────────────
        dal.budgetTrack(1, 0, 1);
        const yearSnap = await getDoc(doc(db, 'students', studentId, 'academicYears', ecYear));

        // ── Finalization check ────────────────────────────────────────────────
        const yearData  = yearSnap.exists() ? yearSnap.data() : null;
        const semData   = (yearData?.semesters ?? {})[String(semester)];
        if (!yearData || !semData || semData.finalized !== true) {
          rootEl.innerHTML = `
            <div class="card card-warning" style="margin-block:var(--sp-4);">
              <div class="empty-state">
                <div class="empty-icon">⚠️</div>
                <p style="font-weight:700;color:var(--warning);">
                  Report card not available — semester not finalized.
                </p>
                <p class="text-sm text-muted">
                  EC ${_rcSafe(ecYear)}, Semester ${_rcSafe(semester)} for
                  ${_rcSafe(student.fullName ?? studentId)} has not been finalized yet.
                  Finalize all gradebooks for this semester first.
                </p>
                <button class="btn btn-ghost mt-4" onclick="history.back()">← Back</button>
              </div>
            </div>`;
          return;
        }

        // ── Inject print CSS ──────────────────────────────────────────────────
        _rcInjectPrintStyle();

        const schoolName = store.config?.schoolName ?? 'SchoolOS';

        // ── Render the printable card ─────────────────────────────────────────
        const cardHtml = _rcRenderCard(student, yearData, ecYear, semester, schoolName);
        printEl.innerHTML = `<div class="rc-card">${cardHtml}</div>`;

        // ── Render the screen action bar ──────────────────────────────────────
        rootEl.innerHTML = `
          <div class="rc-screen-wrapper">
            <div class="rc-action-bar no-print">
              <button class="btn btn-primary" onclick="window.print()">
                🖨️ Print Report Card
              </button>
              <a href="#/registrar/students" class="btn btn-ghost no-print">← Student Registry</a>
            </div>
            <p class="text-sm text-muted no-print" style="margin-block-end:var(--sp-4);">
              Preview below — click <strong>Print Report Card</strong> to send to printer / save PDF.
            </p>
            <!-- Screen preview mirrors printEl -->
            <div class="rc-card" style="border:2px dashed var(--border);padding:var(--sp-5);">
              ${cardHtml}
            </div>
          </div>`;

        // Wire up navigation-away cleanup to remove the print style.
        window.addEventListener('hashchange', _rcRemovePrintStyle, { once: true });

      } catch (err) {
        rootEl.innerHTML = `
          <div class="card card-danger" style="margin-block:var(--sp-4);">
            <div class="empty-state">
              <div class="empty-icon">❌</div>
              <p style="font-weight:700;color:var(--danger);">Failed to load report card.</p>
              <p class="text-sm">${_rcSafe(err.message)}</p>
              <button class="btn btn-ghost mt-4" onclick="history.back()">← Back</button>
            </div>
          </div>`;
        showToast('Failed to load report card: ' + err.message, 'error');
      }
    }


    // ═══════════════════════════════════════════════════════════════════════════
    // REPORT CARD BULK VIEW  (#/report-card-bulk/:classKey/:ecYear/:semester)
    // ── requireRole (guardRoute): 'admin', 'registrar'
    //
    // Fetches all students in the class, renders each as a report card
    // separated by a page-break-after:always div, then triggers window.print().
    // ═══════════════════════════════════════════════════════════════════════════

    function reportCardBulkView({ classKey, ecYear, semester }) {
      _rcRemovePrintStyle();
      setTimeout(() => _rcMountBulkView(classKey, ecYear, semester), 0);

      return `
        <div class="no-print">
          <div class="page-header">
            <div>
              <h1 class="page-title">🖨️ Print All — Class ${_rcSafe(classKey)}</h1>
              <p class="page-subtitle">EC ${_rcSafe(ecYear)} · Semester ${_rcSafe(semester)}</p>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="history.back()">← Back</button>
          </div>
        </div>

        <div id="rc-bulk-root">
          <div class="empty-state" style="padding-block:var(--sp-6);">
            <div class="spinner spinner-lg" style="margin:0 auto var(--sp-3);"></div>
            <p>Loading class roster…</p>
          </div>
        </div>

        <!-- All report cards rendered here for printing -->
        <div id="report-card-print"></div>`;
    }

    async function _rcMountBulkView(classKey, ecYear, semester) {
      const rootEl  = document.getElementById('rc-bulk-root');
      const printEl = document.getElementById('report-card-print');
      if (!rootEl || !printEl) return;

      try {
        // ── Fetch class doc to get roster ─────────────────────────────────────
        const classDoc = await dal.getClass(classKey);
        if (!classDoc) {
          rootEl.innerHTML = `
            <div class="card card-danger">
              <div class="empty-state">
                <div class="empty-icon">❌</div>
                <p style="font-weight:700;color:var(--danger);">Class "${_rcSafe(classKey)}" not found.</p>
                <button class="btn btn-ghost mt-4" onclick="history.back()">← Back</button>
              </div>
            </div>`;
          return;
        }

        const studentIds = classDoc.studentIds ?? [];
        if (studentIds.length === 0) {
          rootEl.innerHTML = `
            <div class="card card-warning">
              <div class="empty-state">
                <div class="empty-icon">👤</div>
                <p>No students enrolled in class ${_rcSafe(classKey)}.</p>
                <button class="btn btn-ghost mt-4" onclick="history.back()">← Back</button>
              </div>
            </div>`;
          return;
        }

        // ── Fetch each student doc + their academic year doc in parallel ───────
        rootEl.innerHTML = `
          <div class="empty-state" style="padding-block:var(--sp-4);">
            <div class="spinner spinner-lg" style="margin:0 auto var(--sp-3);"></div>
            <p>Fetching ${studentIds.length} student records…</p>
          </div>`;

        const schoolName = store.config?.schoolName ?? 'SchoolOS';

        const results = await Promise.all(studentIds.map(async sid => {
          try {
            dal.budgetTrack(2, 0, 2); // student doc + academic year doc
            const [sSnap, ySnap] = await Promise.all([
              getDoc(doc(db, 'students', sid)),
              getDoc(doc(db, 'students', sid, 'academicYears', ecYear)),
            ]);
            const student  = sSnap.exists()  ? sSnap.data()  : null;
            const yearData = ySnap.exists()   ? ySnap.data()  : null;
            return { sid, student, yearData };
          } catch (err) {
            return { sid, student: null, yearData: null, error: err.message };
          }
        }));

        // ── Filter to finalized semesters only ────────────────────────────────
        const finalized = results.filter(r => {
          if (!r.student || !r.yearData) return false;
          const semData = (r.yearData.semesters ?? {})[String(semester)];
          return semData && semData.finalized === true;
        });

        const skipped = results.length - finalized.length;

        // ── Build combined print HTML ─────────────────────────────────────────
        _rcInjectPrintStyle();

        const cardsHtml = finalized.map((r, idx) => {
          const isLast = idx === finalized.length - 1;
          const card = _rcRenderCard(r.student, r.yearData, ecYear, semester, schoolName);
          return `
            <div class="${isLast ? '' : 'rc-bulk-separator'}">
              <div class="rc-card">${card}</div>
            </div>`;
        }).join('');

        printEl.innerHTML = cardsHtml;

        // ── Screen summary + print trigger ─────────────────────────────────────
        rootEl.innerHTML = `
          <div class="rc-screen-wrapper">
            <div class="rc-action-bar no-print">
              <button class="btn btn-primary" onclick="window.print()">
                🖨️ Print All ${finalized.length} Report Cards
              </button>
              <a href="#/registrar/students" class="btn btn-ghost no-print">← Student Registry</a>
            </div>
            <div class="card card-accented no-print">
              <p class="text-sm">
                <strong>${finalized.length}</strong> finalized report cards ready.
                ${skipped > 0 ? `<span class="text-muted"> · ${skipped} student${skipped !== 1 ? 's' : ''} skipped (semester not finalized).</span>` : ''}
              </p>
            </div>
          </div>`;

        window.addEventListener('hashchange', _rcRemovePrintStyle, { once: true });

      } catch (err) {
        rootEl.innerHTML = `
          <div class="card card-danger">
            <div class="empty-state">
              <div class="empty-icon">❌</div>
              <p style="font-weight:700;color:var(--danger);">Failed to load bulk report cards.</p>
              <p class="text-sm">${_rcSafe(err.message)}</p>
