        (groups[key] ??= []).push(hw);
      });

      const sortedKeys = Object.keys(groups).sort((a, b) => {
        if (a === '') return 1;
        if (b === '') return -1;
        return a < b ? -1 : (a > b ? 1 : 0);
      });

      return sortedKeys.map(key => {
        const groupLabel = key ? _hwFormatEcDateStr(key) : (isAm ? 'ቀነ ገደብ ያልተገለጸ' : 'No due date set');
        const itemsHtml = groups[key].map(hw => {
          const title = isAm && hw.titleAm ? hw.titleAm : hw.title;
          const titleAlt = isAm ? hw.title : hw.titleAm;
          const desc  = isAm && hw.descriptionAm ? hw.descriptionAm : hw.description;
          const subjId = hw.subjectId ?? '';
          const cached  = store._subjectDocCache?.[subjId];
          const subjLabel = cached
            ? (isAm && cached.nameAm ? cached.nameAm : cached.name)
            : subjId;
          return `
            <div class="pd-hw-item">
              <div class="pd-hw-item-title">${_pdSafe(title || hw.homeworkId || '—')}</div>
              ${titleAlt ? `<div class="text-sm text-muted">${_pdSafe(titleAlt)}</div>` : ''}
              ${subjLabel ? `<div class="text-xs text-muted mt-1">📚 ${_pdSafe(subjLabel)}</div>` : ''}
              ${desc ? `<div class="text-sm mt-2" style="white-space:pre-wrap;">${_pdSafe(desc)}</div>` : ''}
            </div>`;
        }).join('');

        return `
          <div class="pd-hw-group-label">📅 ${_pdSafe(groupLabel)}</div>
          ${itemsHtml}`;
      }).join('');
    }

    // _pdChildTabLabel(student)
    //   Short label for the child-switcher tab: full name (active
    //   language, falling back to English), or the studentId if neither
    //   name field is set.
    function _pdChildTabLabel(student) {
      const isAm = store.lang === 'am';
      const name = isAm && student?.fullNameAm ? student.fullNameAm : student?.fullName;
      return name || student?.studentId || '—';
    }

    // _pdRenderChildContent(studentId)
    //   Renders the full per-child dashboard body for an already-cached
    //   child. Returns a loading placeholder if the child hasn't finished
    //   loading yet (the caller, parentDashboardView(), kicks off
    //   _pdLoadChild() and relies on the store mutation it ends with to
    //   trigger a re-render once data is ready).
    function _pdRenderChildContent(studentId) {
      const cached = store.childCache?.[studentId];

      if (!cached) {
        return skeletonCard(4);
      }

      if (cached.error) {
        return `
          <div class="card card-lg">
            <p style="color:var(--danger);">
              ${store.lang === 'am' ? 'መረጃ መጫን አልተቻለም።' : 'Could not load this child\u2019s data.'}
            </p>
          </div>`;
      }

      const { student } = cached;
      const isAm   = store.lang === 'am';
      const owed   = Number(student.tuitionOwed ?? 0);
      const balanceClass = owed > 0 ? 'pd-owed' : 'pd-clear';
      const balanceText  = owed > 0
        ? `ETB ${fmtNum(owed)}`
        : (owed < 0 ? `ETB ${fmtNum(owed)} (${isAm ? 'ክሬዲት' : 'credit'})` : `✓ ${t('tuitionPaidInFull')}`);

      // Ensure the exam-schedule subscription is scoped to this child's
      // class/grade (re-subscribes only if the scope actually changed).
      // grade is resolved from the classes/{classKey} doc — see
      // _pdLoadChild() — not from the student doc, which doesn't carry it.
      const myClassKey = student.currentClassKey ?? '';
      const myGrade    = cached.grade;
      _pdEnsureExamSub(myClassKey, myGrade);
      const relevantExams = (store.examSchedules ?? []).filter(e =>
        e.classKey === '' || e.classKey === myClassKey || e.grade === myGrade
      );

      // Real-time "today's attendance marked" notification for this child
      // (see § DAL dal.subscribeStudentAttendance / _pdEnsureAttendanceNotify
      // above) — subscribes once per studentId per session.
      const childDisplayName = _pdChildTabLabel(student);
      _pdEnsureAttendanceNotify(studentId, childDisplayName);

      return `
        <!-- Summary card -->
        <p style="font-size:0.62rem;font-weight:800;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-muted);margin-block-end:12px;padding-inline-start:4px;">STUDENT PROFILE</p>
        <div class="card card-lg mb-5" style="border-top:2px solid #2E7D32;">
          <div class="card-header">
            <span class="card-title">👤 ${_pdSafe(student.fullName) || student.studentId}</span>
          </div>
          ${student.fullNameAm ? `<div class="text-sm text-muted mb-4">${_pdSafe(student.fullNameAm)}</div>` : ''}
          <div class="reg-detail-grid">
            <div class="reg-detail-item">
              <div class="reg-detail-label">${t('currentClass')}</div>
              <div class="reg-detail-value">${_pdSafe(student.currentClassKey ?? '—')}</div>
            </div>
            <div class="reg-detail-item">
              <div class="reg-detail-label">${t('tuitionOwedLabel')}</div>
              <div class="reg-detail-value ${balanceClass}" style="font-size:1.2rem;font-weight:700;">
                ${balanceText}
              </div>
            </div>
          </div>
        </div>

        <!-- Recent attendance -->
        <p style="font-size:0.62rem;font-weight:800;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-muted);margin-block-end:12px;padding-inline-start:4px;">RECENT ATTENDANCE</p>
        <div class="card card-lg mb-5" style="border-top:2px solid var(--success);">
          <div class="card-header">
            <span class="card-title">✅ ${t('recentAttendance')}</span>
            <button class="btn btn-ghost btn-sm" onclick="router.navigate('#/parent/attendance/${_pdEsc(studentId)}')">
              📅 ${t('viewFullCalendar')}
            </button>
          </div>
          ${_pdRenderAttendanceStrip(cached)}
        </div>

        <!-- Latest grades -->
        <p style="font-size:0.62rem;font-weight:800;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-muted);margin-block-end:12px;padding-inline-start:4px;">ACADEMIC PERFORMANCE</p>
        <div class="card card-lg mb-5" style="border-top:2px solid var(--primary-light);">
          <div class="card-header">
            <span class="card-title">📊 ${t('latestGrades')}</span>
            <span class="badge badge-muted">${t('semester')} ${store.config?.currentSemester ?? 1}</span>
          </div>
          ${_pdRenderGrades(cached)}
        </div>

        <!-- Homework due -->
        <p style="font-size:0.62rem;font-weight:800;letter-spacing:0.10em;text-transform:uppercase;color:var(--text-muted);margin-block-end:12px;padding-inline-start:4px;">HOMEWORK DUE</p>
        <div class="card card-lg mb-5" style="border-top:2px solid var(--warning);">
          <div class="card-header">
            <span class="card-title">📖 ${t('homeworkDue')}</span>
            <span class="badge badge-muted">${(cached.homework ?? []).length}</span>
          </div>
          ${_pdRenderHomework(cached)}
        </div>

        <!-- Upcoming exams -->
        <div class="card card-lg card-success mb-5">
          <div class="card-header">
            <span class="card-title">📅 ${t('upcomingExams')}</span>
            <span class="badge badge-muted">${relevantExams.length}</span>
          </div>
          ${_renderExamList(relevantExams, false)}
        </div>

        <!-- Announcements -->
        <div class="card card-lg">
          <div class="card-header">
            <span class="card-title">📢 ${t('announcements')}</span>
            <span class="badge badge-muted">${(store.announcements ?? []).length}</span>
          </div>
          ${_annRenderList(store.announcements)}
        </div>`;
    }

    // window.__pdSwitchChild(studentId) — child-switcher tab click handler.
    window.__pdSwitchChild = function __pdSwitchChild(studentId) {
      if (studentId === _pdSelectedChildId) return;
      _pdSelectedChildId = studentId;
      _pdLoadChild(studentId); // no-ops instantly if already cached; either
                                // way, re-render now to show the new tab as
                                // active and either cached data or a spinner.
      render();
    };

    // parentDashboardView()
    //   #/parent/dashboard — requireRole('parent') via guardRoute().
    //   Renders the child switcher (tabs, reusing .reg-tabs/.reg-tab) plus
    //   the full dashboard body for whichever child is currently selected.
    function parentDashboardView() {
      // Announcements arrive via the shared dal.subscribeAnnouncements()
      // listener (already role/grade-filtered against the signed-in
      // parent — see § DAL) — start it here if no other view has already.
      // Reuses the same _annSubscribed guard adminAnnouncementsView() uses
      // so the two views can't both open a duplicate listener.
      if (store.user && !_annSubscribed) {
        _annSubscribed = true;
        dal.subscribeAnnouncements().catch(err => {
          _annSubscribed = false;
          showToast('Failed to load announcements: ' + err.message, 'error');
        });
      }

      const childKeys = store.userDoc?.childKeys ?? [];

      if (childKeys.length === 0) {
        return `
          <div class="page-header">
            <div>
              <h1 class="page-title">🏠 ${t('dashboard')}</h1>
              <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
            </div>
          </div>
          <div class="card card-lg">
            <div class="empty-state">
              <div class="empty-icon">👶</div>
              <p>${t('noChildrenLinked')}</p>
            </div>
          </div>`;
      }

      // Default to the first child on first visit, or if the previously
      // selected child is no longer in childKeys (e.g. unlinked).
      if (!_pdSelectedChildId || !childKeys.includes(_pdSelectedChildId)) {
        _pdSelectedChildId = childKeys[0];
      }

      // Kick off the load for the selected child if it isn't cached yet.
      // _pdLoadChild() ends with a store.childCache re-assignment, which
      // triggers a fresh render() once the data lands.
      if (!store.childCache || !Object.prototype.hasOwnProperty.call(store.childCache, _pdSelectedChildId)) {
        _pdLoadChild(_pdSelectedChildId);
      }

      // Tab strip — one tab per child. Cached children show their real
      // name; not-yet-loaded children fall back to the studentId until
      // their own _pdLoadChild() call resolves (each tab triggers its own
      // load on first click via __pdSwitchChild, so names fill in lazily
      // rather than requiring every child to be fetched up front).
      const tabs = childKeys.map(id => {
        const cached = store.childCache?.[id];
        const label = cached?.student ? _pdChildTabLabel(cached.student) : id;
        const isActive = id === _pdSelectedChildId;
        return `
          <button
            class="reg-tab ${isActive ? 'active' : ''}"
            role="tab"
            aria-selected="${isActive}"
            onclick="window.__pdSwitchChild('${_pdEsc(id)}')">
            👶 ${_pdSafe(label)}
          </button>`;
      }).join('');

      return `
        <div style="background:linear-gradient(135deg,#2E7D32 0%,#1B5E20 100%);border-radius:28px;padding:48px 32px;color:#fff;position:relative;overflow:hidden;margin-block-end:32px;box-shadow:0 16px 48px rgba(46,125,50,0.28);">
          <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 85% 20%,rgba(255,255,255,0.07) 0%,transparent 70%);pointer-events:none;"></div>
          <div style="position:relative;z-index:1;">
            <p style="font-size:0.62rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-block-end:8px;">Parent Portal</p>
            <h1 style="font-size:1.65rem;font-weight:900;letter-spacing:-0.03em;line-height:1.15;color:#fff;margin-block-end:8px;">${t('dashboard')}</h1>
            <p style="font-size:0.80rem;color:rgba(255,255,255,0.65);font-weight:500;">${EC.formatEcAm(new Date())} · ${childKeys.length} ${childKeys.length === 1 ? (store.lang === 'am' ? 'ልጅ' : 'child') : (store.lang === 'am' ? 'ልጆች' : 'children')}</p>
          </div>
        </div>

        ${childKeys.length > 1 ? `
          <div class="reg-tabs" role="tablist" aria-label="${t('myChildren')}" style="margin-block-end:24px;">
            ${tabs}
          </div>` : ''}

        ${_pdRenderChildContent(_pdSelectedChildId)}`;
    }

    // ── END PARENT DASHBOARD ──────────────────────────────────────────────────

    // ══════════════════════════════════════════════════════════════════════════
    // PARENT SEMESTER HISTORY VIEW  (#/parent/history/:studentId)
    // ── requireRole: 'parent'
    //
    // Validation: store.userDoc.childKeys.includes(studentId) — else 403.
    //
    // Data strategy (read-budget-conscious):
    //   • On mount: fetch /students/{studentId}/academicYears/{currentEcYear}
    //     (1 read). Cached in store.childCache[studentId].academicYears[year].
    //   • Previous year: only loaded on explicit user request (lazy load).
    //     Cached in same slot on first load.
    //
    // Features:
    //   1. Semester selector — pill tabs (Sem 1 … Sem 4).
    //   2. Per-semester: summary row (average %, rank, class size); subject
    //      table (name EN/AM, total score, max possible, %, grade letter,
    //      remark); attendance summary row.
    //   3. Bar chart of subject scores drawn via pure Canvas 2D API —
    //      drawBarChart(canvasId, labels, values, maxValue). Bars colored by
    //      grade letter (A=green, B=blue, C=yellow, D=orange, F=red).
    //   4. "Compare Semesters" button: loads all semesters' averages and draws
    //      a line chart via pure Canvas 2D API.
    // ══════════════════════════════════════════════════════════════════════════

    // ── Module-level state ────────────────────────────────────────────────────
    let _phStudentId    = null;  // currently viewed student
    let _phSelectedSem  = 1;     // active semester tab (1–4)
    let _phShowCompare  = false; // compare panel visible
    let _phPrevYearKey  = null;  // previous ecYear string when loaded

    // _phSafe / _phEsc — same pattern used by all other views.
    function _phSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function _phEsc(str) {
      return String(str ?? '').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    }

    // _phGetCache(studentId) — returns the childCache entry for this student,
    // creating the skeleton object if it doesn't exist yet.
    function _phGetCache(studentId) {
      const existing = store.childCache?.[studentId];
      if (existing) return existing;
      return null;
    }

    // _phEnsureAcademicYears(studentId, ecYear)
    //   Makes sure store.childCache[studentId].academicYears[ecYear] is
    //   populated. Returns true if already cached, false if a fetch was started.
    async function _phFetchAcademicYear(studentId, ecYear) {
      // Initialise the outer entry if absent.
      const outer = store.childCache?.[studentId];
      const years = outer?.academicYears ?? {};

      if (Object.prototype.hasOwnProperty.call(years, ecYear)) return; // cached

      // Fetch 1 read.
      try {
        const data = await dal.getStudentAcademicYear(studentId, ecYear);
        const updated = {
          ...(store.childCache ?? {}),
          [studentId]: {
            ...(store.childCache?.[studentId] ?? {}),
            academicYears: {
              ...((store.childCache?.[studentId]?.academicYears) ?? {}),
              [ecYear]: data,  // null means doc doesn't exist (no grades yet)
            },
          },
        };
        store.childCache = updated; // triggers render()
      } catch (err) {
        showToast((store.lang === 'am' ? 'ውጤት ማምጣት አልተሳካም: ' : 'Failed to load academic year: ') + err.message, 'error');
      }
    }

    // ── Pure Canvas chart functions ───────────────────────────────────────────

    // drawBarChart(canvasId, labels, values, maxValue)
    //   Draws a vertical bar chart to the <canvas id=canvasId> element.
    //   Bars are colored by grade letter derived from each value/maxValue %.
    //   A=green, B=blue, C=yellow, D=orange, F=red.
    function drawBarChart(canvasId, labels, values, maxValue) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      // Resolve DPR for sharp rendering on HiDPI screens.
      const dpr = window.devicePixelRatio || 1;
      const W   = canvas.offsetWidth  || 360;
      const H   = canvas.offsetHeight || 220;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;

      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // Layout constants.
      const PAD_TOP    = 28;
      const PAD_BOTTOM = 48;
      const PAD_LEFT   = 44;
      const PAD_RIGHT  = 16;
      const chartW = W - PAD_LEFT - PAD_RIGHT;
      const chartH = H - PAD_TOP - PAD_BOTTOM;

      // Background.
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      const n = labels.length;
      if (n === 0) return;

      const barW   = Math.max(12, Math.floor((chartW / n) * 0.6));
      const gap    = (chartW - barW * n) / (n + 1);

      // Y axis grid lines (0, 25, 50, 75, 100).
      const gridLines = [0, 25, 50, 75, 100];
      ctx.strokeStyle = '#e9ecef';
      ctx.lineWidth   = 1;
      ctx.setLineDash([4, 4]);
      gridLines.forEach(pct => {
        const y = PAD_TOP + chartH - (pct / 100) * chartH;
        ctx.beginPath();
        ctx.moveTo(PAD_LEFT, y);
        ctx.lineTo(PAD_LEFT + chartW, y);
        ctx.stroke();
        // Y label.
        ctx.setLineDash([]);
        ctx.fillStyle   = '#6c757d';
        ctx.font        = `${10 * dpr / dpr}px "Segoe UI", system-ui, sans-serif`;
        ctx.textAlign   = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(pct) + '%', PAD_LEFT - 6, y);
        ctx.setLineDash([4, 4]);
      });
      ctx.setLineDash([]);

      // Bar color by grade.
      function barColorForPct(pct) {
        if (pct >= 90) return '#27ae60'; // A — green
        if (pct >= 80) return '#2d6a9f'; // B — blue
        if (pct >= 70) return '#f39c12'; // C — yellow/amber
        if (pct >= 60) return '#e67e22'; // D — orange
        return '#c0392b';                 // F — red
      }

      // Draw bars.
      labels.forEach((label, i) => {
        const rawVal = Number(values[i]) || 0;
        const safeMax = Number(maxValue) > 0 ? Number(maxValue) : 100;
        const pct = Math.min(100, (rawVal / safeMax) * 100);
        const barH = (pct / 100) * chartH;
        const x = PAD_LEFT + gap * (i + 1) + barW * i;
        const y = PAD_TOP + chartH - barH;

        // Bar fill.
        ctx.fillStyle = barColorForPct(pct);
        ctx.beginPath();
        // Rounded top corners.
        const r = Math.min(4, barW / 2, barH / 2);
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + barW - r, y);
        ctx.arcTo(x + barW, y, x + barW, y + r, r);
        ctx.lineTo(x + barW, y + barH);
        ctx.lineTo(x, y + barH);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
        ctx.fill();

        // Value label on top of bar.
        ctx.fillStyle   = '#212529';
        ctx.font        = `700 ${10 * dpr / dpr}px "Segoe UI", system-ui, sans-serif`;
        ctx.textAlign   = 'center';
        ctx.textBaseline = 'bottom';
        if (barH > 14) {
          ctx.fillText(rawVal.toString(), x + barW / 2, y - 2);
        }

        // X-axis label (abbreviated to 8 chars).
        const shortLabel = (label.length > 8) ? label.slice(0, 7) + '…' : label;
        ctx.fillStyle    = '#6c757d';
        ctx.font         = `${10 * dpr / dpr}px "Segoe UI", system-ui, sans-serif`;
        ctx.textBaseline = 'top';
        ctx.fillText(shortLabel, x + barW / 2, PAD_TOP + chartH + 6);
      });

      // Axes.
      ctx.strokeStyle = '#dee2e6';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(PAD_LEFT, PAD_TOP);
      ctx.lineTo(PAD_LEFT, PAD_TOP + chartH);
      ctx.lineTo(PAD_LEFT + chartW, PAD_TOP + chartH);
      ctx.stroke();
    }

    // drawLineChart(canvasId, labels, values)
    //   Draws a single-series line chart (average trend across semesters).
    //   values are percentages (0–100 or computed averages).
    function drawLineChart(canvasId, labels, values) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const dpr = window.devicePixelRatio || 1;
      const W   = canvas.offsetWidth  || 360;
      const H   = canvas.offsetHeight || 180;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;

      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      const PAD_TOP    = 24;
      const PAD_BOTTOM = 40;
      const PAD_LEFT   = 48;
      const PAD_RIGHT  = 20;
      const chartW = W - PAD_LEFT - PAD_RIGHT;
      const chartH = H - PAD_TOP - PAD_BOTTOM;

      // Background.
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      const n = labels.length;
      if (n === 0) return;

      const allVals  = values.map(Number).filter(v => !isNaN(v));
      const maxVal   = allVals.length ? Math.max(100, ...allVals) : 100;

      // Grid lines.
      const gridSteps = [0, 25, 50, 75, 100];
      ctx.strokeStyle = '#e9ecef';
      ctx.lineWidth   = 1;
      ctx.setLineDash([4, 4]);
      gridSteps.forEach(v => {
        const y = PAD_TOP + chartH - (v / maxVal) * chartH;
        ctx.beginPath();
        ctx.moveTo(PAD_LEFT, y);
        ctx.lineTo(PAD_LEFT + chartW, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle    = '#6c757d';
        ctx.font         = `${10}px "Segoe UI",system-ui,sans-serif`;
        ctx.textAlign    = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(v + '%', PAD_LEFT - 6, y);
        ctx.setLineDash([4, 4]);
      });
      ctx.setLineDash([]);

      // Points.
      const pts = values.map((v, i) => ({
        x: PAD_LEFT + (n === 1 ? chartW / 2 : (i / (n - 1)) * chartW),
        y: PAD_TOP + chartH - (Number(v) / maxVal) * chartH,
        v: Number(v),
      }));

      // Fill under line.
      if (pts.length >= 2) {
        const grad = ctx.createLinearGradient(0, PAD_TOP, 0, PAD_TOP + chartH);
        grad.addColorStop(0, 'rgba(26,60,94,0.18)');
        grad.addColorStop(1, 'rgba(26,60,94,0)');
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(pts[pts.length - 1].x, PAD_TOP + chartH);
        ctx.lineTo(pts[0].x, PAD_TOP + chartH);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
      }

      // Line.
      if (pts.length >= 2) {
        ctx.beginPath();
        ctx.strokeStyle = '#1a3c5e';
        ctx.lineWidth   = 2.5;
        ctx.lineJoin    = 'round';
        ctx.lineCap     = 'round';
        ctx.moveTo(pts[0].x, pts[0].y);
        pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.stroke();
      }

      // Dots + value labels.
      pts.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#1a3c5e';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle    = '#212529';
        ctx.font         = `700 11px "Segoe UI",system-ui,sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(isNaN(p.v) ? '—' : p.v.toFixed(1) + '%', p.x, p.y - 8);
      });

      // X-axis labels.
      pts.forEach((p, i) => {
        ctx.fillStyle    = '#6c757d';
        ctx.font         = `11px "Segoe UI",system-ui,sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(labels[i], p.x, PAD_TOP + chartH + 6);
      });

      // Axes.
      ctx.strokeStyle = '#dee2e6';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(PAD_LEFT, PAD_TOP);
      ctx.lineTo(PAD_LEFT, PAD_TOP + chartH);
      ctx.lineTo(PAD_LEFT + chartW, PAD_TOP + chartH);
      ctx.stroke();
    }

    // ── View renderer helpers ─────────────────────────────────────────────────

    // _phGradeClass(letter) → CSS modifier class for grade pill.
    function _phGradeClass(letter) {
      const map = { A: 'ph-grade-A', B: 'ph-grade-B', C: 'ph-grade-C', D: 'ph-grade-D', F: 'ph-grade-F' };
      return map[letter] ?? 'ph-grade-dash';
    }

    // _phSemesterData(academicYearDoc, semNum)
    //   Extracts the per-subject, per-semester records from the academicYears doc.
    //   Shape: doc.subjects[subjectKey].semester{N}
    //   Returns array of { subjectKey, totalScore, maxPossible, percentScore,
    //                      grade, remark, rank, nameEn, nameAm }
    function _phSemesterData(yearDoc, semNum) {
      if (!yearDoc?.subjects) return [];
      const semKey = `semester${semNum}`;
      const rows   = [];
      Object.entries(yearDoc.subjects).forEach(([subjectKey, semData]) => {
        const record = semData[semKey];
        if (!record) return;
        // Subject names — look up from store._subjectDocCache (warm from parent dashboard).
        const subDoc = store._subjectDocCache?.[subjectKey];
        const nameEn = subDoc?.name   ?? subjectKey;
        const nameAm = subDoc?.nameAm ?? '';
        rows.push({
          subjectKey,
          totalScore:   Number(record.totalScore   ?? 0),
          maxPossible:  Number(record.maxPossible  ?? 100),
          percentScore: Number(record.percentScore ?? 0),
          grade:        record.grade  ?? '—',
          remark:       record.remark ?? '',
          rank:         record.rank   ?? null,
          nameEn,
          nameAm,
        });
      });
      return rows.sort((a, b) => a.nameEn.localeCompare(b.nameEn));
    }

    // _phAttendanceForSemester(studentData, semNum)
    //   Attendance per semester is NOT directly tracked in the academicYears doc
    //   (it's per-day in /students/{id}/attendance/{dateKey}). We surface
    //   whatever is stored in the yearDoc's optional 'attendance.semester{N}'
    //   sub-object, or fall back to a dash state so the UI never errors.
    //   If the school writes attendance summaries into the academicYears doc
    //   under doc.attendance.semester{N} = { present, absent, late }, we use it.
    function _phAttendanceForSemester(yearDoc, semNum) {
      const semKey = `semester${semNum}`;
      const att = yearDoc?.attendance?.[semKey] ?? yearDoc?.attendance?.[`semester${semNum}`];
      if (att) return att;
      return null; // no semester-level summary available
    }

    // _phRenderSemesterContent(yearDoc, semNum, isAm)
    //   Returns the HTML for the subject table, charts, and attendance.
    function _phRenderSemesterContent(yearDoc, semNum, isAm) {
      const rows = _phSemesterData(yearDoc, semNum);

      if (rows.length === 0) {
        return emptyState('📊', t('no_data'), 'Grades not yet finalized for this semester.', null, null);
      }

      // Compute overall average for this semester.
      const totalPct    = rows.reduce((s, r) => s + r.percentScore, 0);
      const avgPct      = rows.length > 0 ? totalPct / rows.length : 0;
      const overallGrade = gradeLetterFor(avgPct);

      // Rank: use rank from any row (they're written by same finalize call,
      // same rank). Use the minimum (best) rank if subjects have different ranks.
      const ranks = rows.map(r => r.rank).filter(r => typeof r === 'number');
      const displayRank = ranks.length > 0 ? Math.min(...ranks) : null;

      // Total students — stored nowhere per-se; we don't have it without an
      // extra read of the class doc. Leave as '—' unless a future write adds it.
      const classSize = yearDoc?.classSize ?? null;

      // Attendance summary from yearDoc.
      const att = _phAttendanceForSemester(yearDoc, semNum);

      // Build subject table rows.
      const tableRows = rows.map(r => {
        const pctStr  = r.maxPossible > 0 ? (r.percentScore).toFixed(1) + '%' : '—';
        const nameDisplay = (isAm && r.nameAm) ? `${_phSafe(r.nameAm)}<br><span class="text-xs text-muted">${_phSafe(r.nameEn)}</span>` : _phSafe(r.nameEn);
        return `
          <tr>
            <td>${nameDisplay}</td>
            <td class="num">${r.totalScore}</td>
            <td class="num">${r.maxPossible}</td>
            <td class="num">${pctStr}</td>
            <td class="num">
              <span class="ph-grade-pill ${_phGradeClass(r.grade)}">${_phSafe(r.grade)}</span>
            </td>
            <td>${_phSafe(r.remark)}</td>
          </tr>`;
      }).join('');

      // Bar chart IDs (unique per render).
      const barCanvasId  = `ph-bar-${semNum}`;
      const barLabels    = rows.map(r => (isAm && r.nameAm) ? r.nameAm : r.nameEn);
      const barValues    = rows.map(r => r.totalScore);
      const barMaxValue  = rows.reduce((m, r) => Math.max(m, r.maxPossible), 0) || 100;

      // Attendance row HTML.
      const attHtml = att ? `
        <div class="card-header" style="margin-block-start:var(--sp-4);">
          <span class="card-title">✅ ${t('attendanceSummary')}</span>
        </div>
        <div class="ph-att-row">
          <span class="ph-att-chip present">✓ ${att.present != null ? fmtNum(att.present) : _phSafe('—')} ${t('daysPresent')}</span>
          <span class="ph-att-chip absent">✕ ${att.absent != null ? fmtNum(att.absent) : _phSafe('—')} ${t('daysAbsent')}</span>
          <span class="ph-att-chip late">! ${att.late != null ? fmtNum(att.late) : _phSafe('—')} ${t('daysLate')}</span>
          ${(att.total ?? att.present + att.absent + att.late) != null
            ? `<span class="ph-att-chip total">📅 ${fmtNum(att.total ?? (att.present + att.absent + att.late))} ${t('totalDays')}</span>`
            : ''}
        </div>` : '';

      // Schedule the canvas draws after the HTML is in the DOM.
      setTimeout(() => {
        drawBarChart(barCanvasId, barLabels, barValues, barMaxValue);
      }, 0);

      return `
        <!-- Summary tiles -->
        <div class="ph-summary-grid">
          <div class="ph-stat-tile is-accent">
            <span class="ph-stat-val">${avgPct.toFixed(1)}%</span>
            <span class="ph-stat-lbl">${t('averageScore')}</span>
          </div>
          <div class="ph-stat-tile">
            <span class="ph-stat-val ${_phGradeClass(overallGrade).replace('ph-grade-','ph-stat-').replace('A','is-success').replace('B','').replace('C','').replace('D','').replace('F','is-danger').replace('dash','')}">${overallGrade}</span>
            <span class="ph-stat-lbl">${t('gradeLetter')}</span>
          </div>
          ${displayRank !== null ? `
          <div class="ph-stat-tile">
            <span class="ph-stat-val">#${displayRank}</span>
            <span class="ph-stat-lbl">${t('classRank')}</span>
          </div>` : ''}
          ${classSize !== null ? `
          <div class="ph-stat-tile">
            <span class="ph-stat-val">${classSize}</span>
            <span class="ph-stat-lbl">${t('classSize')}</span>
          </div>` : ''}
        </div>

        <!-- Subject results table -->
        <div class="table-wrapper ph-subjects-table" style="margin-block-end:var(--sp-4);">
          <table class="table">
            <thead>
              <tr>
                <th>${t('subjectName')}</th>
                <th>${t('totalScore')}</th>
                <th>${t('maxPossible')}</th>
                <th>${t('percentage')}</th>
                <th>${t('gradeLetter')}</th>
                <th>${t('remark')}</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>

        <!-- Bar chart of subject scores -->
        <div class="card-header" style="margin-block-end:var(--sp-3);">
          <span class="card-title">📊 ${t('subjectScores')}</span>
        </div>
        <div class="ph-chart-wrap" style="margin-block-end:var(--sp-4);">
          <canvas id="${barCanvasId}" class="ph-canvas"
            style="width:100%;height:220px;"
            aria-label="Bar chart of subject scores for semester ${semNum}">
          </canvas>
        </div>

        <!-- Attendance -->
        ${attHtml}`;
    }

    // _phRenderComparePanel(allYearDocs, currentEcYear, isAm)
    //   Collects all semesters that have data across loaded years and renders
    //   the average-trend line chart.
    function _phRenderComparePanel(allYearDocs, currentEcYear, isAm) {
      // Build { label, average } pairs, one per semester that has data.
      const points = [];
      const yearKeys = Object.keys(allYearDocs).sort();

      yearKeys.forEach(yr => {
        const yearDoc = allYearDocs[yr];
        if (!yearDoc) return;
        [1, 2, 3, 4].forEach(sem => {
          const rows = _phSemesterData(yearDoc, sem);
          if (rows.length === 0) return;
          const avg = rows.reduce((s, r) => s + r.percentScore, 0) / rows.length;
          const isCurrentYear = yr === String(currentEcYear);
          const prefix = isCurrentYear ? '' : `${yr}/`;
          points.push({ label: `${prefix}${t('semTab')}${sem}`, avg: Number(avg.toFixed(1)) });
        });
      });

      if (points.length === 0) {
        return `<div class="empty-state"><p>${t('noDataToCompare')}</p></div>`;
      }

      const trendCanvasId = 'ph-trend-canvas';
      setTimeout(() => {
        drawLineChart(trendCanvasId, points.map(p => p.label), points.map(p => p.avg));
      }, 0);

      return `
        <div class="ph-chart-wrap">
          <canvas id="${trendCanvasId}" class="ph-canvas"
            style="width:100%;height:180px;"
            aria-label="${t('avgTrend')}">
          </canvas>
        </div>
        <p class="ph-trend-label">${t('avgTrend')}</p>`;
    }

    // ── Main view function ────────────────────────────────────────────────────

    // parentSemesterHistoryView({ studentId })
    //   #/parent/history/:studentId — guarded by guardRoute('parent') +
    //   explicit childKeys check (403 if not own child).
    function parentSemesterHistoryView({ studentId }) {
      // ── Role + ownership guard ──────────────────────────────────────────────
      const childKeys = store.userDoc?.childKeys ?? [];
      if (!studentId || !childKeys.includes(studentId)) {
        return `
          <div class="page-header">
            <div>
              <h1 class="page-title">🔒 ${t('accessDenied403')}</h1>
            </div>
          </div>
          <div class="card card-lg">
            <div class="empty-state">
              <div class="empty-icon">🔒</div>
              <p>${t('accessDenied403')}</p>
              <button class="btn btn-ghost mt-4" onclick="router.navigate('#/parent/dashboard')">
                ← ${t('back')}
              </button>
            </div>
          </div>`;
      }

      // ── Track current student; reset semester tab on student change ─────────
      if (_phStudentId !== studentId) {
        _phStudentId   = studentId;
        _phSelectedSem = 1;
        _phShowCompare = false;
        _phPrevYearKey = null;
      }

      const isAm          = store.lang === 'am';
      const todayEc       = EC.todayEc();
      const currentEcYear = store.config?.currentEcYear ?? String(todayEc.year);
      const prevEcYear    = String(Number(currentEcYear) - 1);

      // ── Initiate data load on mount (no-ops if already cached) ─────────────
      const cache     = store.childCache?.[studentId] ?? {};
      const yearCache = cache.academicYears ?? {};

      if (!Object.prototype.hasOwnProperty.call(yearCache, currentEcYear)) {
        // Fire-and-forget; render() will be called again once data arrives.
        _phFetchAcademicYear(studentId, currentEcYear);
      }

      const currentYearDoc = yearCache[currentEcYear]; // undefined = loading, null = not found
      const isLoading = !Object.prototype.hasOwnProperty.call(yearCache, currentEcYear);

      // Student display name from childCache (loaded by parent dashboard).
      const studentDoc  = cache.student;
      const displayName = studentDoc
        ? ((isAm && studentDoc.fullNameAm) ? studentDoc.fullNameAm : studentDoc.fullName) ?? studentId
        : studentId;

      // ── Build semester tabs ─────────────────────────────────────────────────
      const semTabs = [1, 2, 3, 4].map(n => {
        const isActive = n === _phSelectedSem;
        return `
          <button
            class="ph-sem-tab ${isActive ? 'active' : ''}"
            onclick="window.__phSelectSem(${n})"
            aria-selected="${isActive}"
            role="tab">
            ${t('semTab')} ${n}
          </button>`;
      }).join('');

      // ── Semester content ────────────────────────────────────────────────────
      let semContent;
      if (isLoading) {
        semContent = skeletonTable(5, 4);
      } else if (!currentYearDoc) {
        semContent = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <p>${t('noResultsThisSem')}</p>
          </div>`;
      } else {
        semContent = _phRenderSemesterContent(currentYearDoc, _phSelectedSem, isAm);
      }

      // ── Previous year section ───────────────────────────────────────────────
      const prevYearLoaded = Object.prototype.hasOwnProperty.call(yearCache, prevEcYear);
      const prevYearDoc    = prevYearLoaded ? yearCache[prevEcYear] : null;

      const prevYearSection = prevYearLoaded
        ? (prevYearDoc
            ? `<div class="card card-lg mb-5">
                 <div class="card-header">
                   <span class="card-title">📅 EC ${_phSafe(prevEcYear)} — ${t('prevYearLabel')}</span>
                 </div>
                 <div class="ph-sem-tabs" role="tablist">
                   ${[1,2,3,4].map(n => `
                     <button class="ph-sem-tab ${_phSelectedSem===n?'active':''}"
                       onclick="window.__phSelectSem(${n})"
                       role="tab" aria-selected="${_phSelectedSem===n}">
                       ${t('semTab')} ${n}
                     </button>`).join('')}
                 </div>
                 ${_phRenderSemesterContent(prevYearDoc, _phSelectedSem, isAm)}
               </div>`
            : `<div class="card mb-5">
                 <div class="empty-state">
                   <div class="empty-icon">📋</div>
                   <p>EC ${_phSafe(prevEcYear)}: ${t('noResultsThisSem')}</p>
                 </div>
               </div>`)
        : `<div class="card mb-5" style="text-align:center;padding:var(--sp-4);">
             <button class="btn btn-ghost" onclick="window.__phLoadPrevYear('${_phEsc(studentId)}','${_phEsc(prevEcYear)}')">
               📂 ${t('loadPrevYear')} (EC ${_phSafe(prevEcYear)})
             </button>
           </div>`;

      // ── Compare panel ───────────────────────────────────────────────────────
      let comparePanel = '';
      if (_phShowCompare) {
        const allYearDocs = {};
        if (currentYearDoc) allYearDocs[currentEcYear] = currentYearDoc;
        if (prevYearLoaded && prevYearDoc) allYearDocs[prevEcYear] = prevYearDoc;
        comparePanel = `
          <div class="card card-lg mb-5 ph-compare-panel">
            <div class="card-header">
              <span class="card-title">📈 ${t('avgTrend')}</span>
              <button class="btn btn-ghost btn-sm" onclick="window.__phToggleCompare()">✕</button>
            </div>
            ${_phRenderComparePanel(allYearDocs, currentEcYear, isAm)}
          </div>`;
      }

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">📊 ${t('semesterHistory')}</h1>
            <p class="page-subtitle">
              ${_phSafe(displayName)} · EC ${_phSafe(currentEcYear)} · ${EC.formatEcAm(new Date())}
            </p>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="history.back()">
            ← ${t('back')}
          </button>
        </div>

        <!-- Compare button -->
        <div style="margin-block-end:var(--sp-4);">
          <button
            class="btn ${_phShowCompare ? 'btn-primary' : 'btn-ghost'}"
            onclick="window.__phToggleCompare()">
            📈 ${t('compareSemesters')}
          </button>
        </div>

        ${comparePanel}

        <!-- Current year -->
        <div class="card card-lg mb-5">
          <div class="card-header">
            <span class="card-title">🎓 EC ${_phSafe(currentEcYear)}</span>
          </div>
          <div class="ph-sem-tabs" role="tablist" aria-label="${t('selectSemester')}">
            ${semTabs}
          </div>
          ${semContent}
        </div>

        <!-- Previous year -->
        ${prevYearSection}`;
    }

    // ── Window-bound handlers ─────────────────────────────────────────────────

    // __phSelectSem(n) — semester tab click.
    window.__phSelectSem = function __phSelectSem(n) {
      if (_phSelectedSem === n) return;
      _phSelectedSem = n;
      render();
      // Redraw charts after re-render.
    };

    // __phToggleCompare() — show/hide the compare panel.
    window.__phToggleCompare = function __phToggleCompare() {
      _phShowCompare = !_phShowCompare;
      render();
    };

    // __phLoadPrevYear(studentId, prevEcYear) — lazy load previous year.
    window.__phLoadPrevYear = async function __phLoadPrevYear(studentId, prevEcYear) {
      _phPrevYearKey = prevEcYear;
      await _phFetchAcademicYear(studentId, prevEcYear);
      // store.childCache re-assignment triggers render().
    };

    // ── END PARENT SEMESTER HISTORY VIEW ─────────────────────────────────────


    // ══════════════════════════════════════════════════════════════════════════
    // PARENT ATTENDANCE DETAIL VIEW  (#/parent/attendance/:studentId)
    // ── requireRole (guardRoute): 'parent'
    //
    // Validation: store.userDoc.childKeys.includes(studentId) — else 403,
    // same convention as parentSemesterHistoryView() above.
    //
    // Features:
    //   1. Full monthly calendar heatmap for the currently-viewed EC month —
    //      a 7-column grid of every day in the month, color-coded
    //      present=green / absent=red / late=yellow / no-record=gray.
    //   2. Read-aloud EC month-nav header (reused from Step 27's
    //      ecDatePicker() visual language — see § COMPONENTS) with
    //      left/right arrows to navigate prev/next EC month, and a speaker
    //      button that reads the month name + year aloud via the Web
    //      Speech Synthesis API (bilingual: en-US / am-ET, driven by
    //      store.lang, with a graceful no-op if the browser lacks
    //      speechSynthesis support).
    //   3. Monthly summary (Present N · Absent N · Late N) below the grid.
    //
    // Data strategy (read-budget-conscious):
    //   • dal.getStudentAttendance(studentId, monthStartKey, monthEndKey)
    //     — exactly 1 query per EC month visited.
    //   • _paMonthCache holds every month already fetched THIS session,
    //     keyed by 'studentId|year-month' — navigating to a month that's
    //     already in the cache re-renders instantly with 0 additional
    //     reads; navigating to a month never seen before fires exactly 1
    //     new dal.getStudentAttendance() call. This cache is a plain
    //     module-level object (not a store property) — like _phStudentId/
    //     _phSelectedSem above, it's page-local UI state, so mutating it
    //     doesn't need to go through the store Proxy; the loader calls
    //     render() directly once the fetch resolves (same pattern as
    //     window.__pdSwitchChild's explicit render() call).
    // ══════════════════════════════════════════════════════════════════════════

    // ── Module-level state (reset on student change) ────────────────────────
    let _paStudentId  = null; // currently viewed student
    let _paViewYear   = null; // EC year currently displayed
    let _paViewMonth  = null; // EC month currently displayed (1–13)
    let _paIsSpeaking = false; // true while speechSynthesis is reading the
                                // month label aloud — drives the speaker
                                // button's pulse animation

    // _paMonthCache: { [studentId]: { ['year-month']: docs[] | 'loading' } }
    const _paMonthCache = {};

    // _paSafe / _paEsc — same escaping convention as every other view
    // (_pdSafe/_pdEsc, _phSafe/_phEsc, _taAttSafe, …).
    function _paSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function _paEsc(str) {
      return String(str ?? '').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    }

    // _paDaysInEcMonth(ecYear, ecMonth) — 1–12 = 30 days; month 13
    // (Pagumē) = 5 days, or 6 in an Ethiopian leap year (ecYear % 4 === 3).
    // Same rule ecDatePicker()'s internal daysInEcMonth() uses (§ COMPONENTS).
    function _paDaysInEcMonth(ecYear, ecMonth) {
      if (ecMonth === 13) return (ecYear % 4 === 3) ? 6 : 5;
      return 30;
    }

    // _paDateKey({year,month,day}) → zero-padded 'YYYY-MM-DD' EC date-key
    // string — same format dal.markAttendance()/dal.getStudentAttendance()
    // expect (see _pdDateKey()/_taAttDateKey_() for the same convention).
    function _paDateKey({ year, month, day }) {
      return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }

    // _paMonthCacheKey(ecYear, ecMonth) → cache key for _paMonthCache, e.g. '2017-3'.
    function _paMonthCacheKey(ecYear, ecMonth) {
      return `${ecYear}-${ecMonth}`;
    }

    // _paNavigateMonth(ecYear, ecMonth, delta) — wraps month 13 (Pagumē)
    // → month 1 of the next year, and month 1 → month 13 of the previous
    // year, in either direction. Same wrap logic as ecDatePicker()'s
    // internal navigateMonth().
    function _paNavigateMonth(ecYear, ecMonth, delta) {
      let y = ecYear, m = ecMonth + delta;
      if (m > 13) { m = 1; y += 1; }
      if (m < 1)  { m = 13; y -= 1; }
      return { year: y, month: m };
    }

    // _paMonthName(ecMonth) — bilingual EC month name, driven by store.lang.
    function _paMonthName(ecMonth) {
      const names = store.lang === 'am' ? EC.ecMonthsAm : EC.ecMonths;
      return names[ecMonth - 1] || String(ecMonth);
    }

    // _paEnsureMonthLoaded(studentId, ecYear, ecMonth)
    //   Fires dal.getStudentAttendance() for this EC month if (and only if)
    //   it isn't already cached — exactly 1 query per never-before-seen
    //   month. monthStartKey/monthEndKey are the first/last day's dateKeys
    //   for the month, computed via _paDaysInEcMonth() so Pagumē's 5/6-day
    //   length (rather than assuming 30) bounds the query correctly.
    //   Calls render() directly once the fetch resolves — see the module
    //   header comment above for why this is a plain object rather than a
    //   store property.
    async function _paEnsureMonthLoaded(studentId, ecYear, ecMonth) {
      const cacheKey = _paMonthCacheKey(ecYear, ecMonth);
      const studentCache = _paMonthCache[studentId] ?? (_paMonthCache[studentId] = {});

      if (Object.prototype.hasOwnProperty.call(studentCache, cacheKey)) {
        return; // already cached (or currently loading) — 0 additional reads
      }

      studentCache[cacheKey] = 'loading';

      const dim          = _paDaysInEcMonth(ecYear, ecMonth);
      const monthStartKey = _paDateKey({ year: ecYear, month: ecMonth, day: 1 });
      const monthEndKey   = _paDateKey({ year: ecYear, month: ecMonth, day: dim });

      try {
        const docs = await dal.getStudentAttendance(studentId, monthStartKey, monthEndKey);
        studentCache[cacheKey] = docs;
      } catch (err) {
        delete studentCache[cacheKey]; // allow retry on next render
        showToast((store.lang === 'am' ? 'የመገኘት መረጃ ማምጣት አልተሳካም፦ ' : 'Failed to load attendance: ') + err.message, 'error');
      }
      render();
    }

    // _paRenderNav(ecYear, ecMonth)
    //   The read-aloud EC month-nav header — prev/next arrows flanking a
    //   centered "MonthName Year" label, plus a 🔊 speaker button that
    //   reads the label aloud. Visually reuses ecDatePicker()'s header
    //   styling (.ec-picker-nav → .pa-nav-arrow is the same pill-button
    //   treatment on a primary-colored bar) — see § COMPONENTS Step 27.
    function _paRenderNav(ecYear, ecMonth) {
      const label = `${_paMonthName(ecMonth)} ${ecYear}`;
      const isAm  = store.lang === 'am';
      return `
        <div class="pa-nav">
          <button
            type="button"
            class="pa-nav-arrow"
            aria-label="${isAm ? 'ቀደም ያለ ወር' : 'Previous month'}"
            onclick="window.__paNavMonth(-1)">‹</button>
          <div class="pa-nav-center">
            <span class="pa-nav-label">${_paSafe(label)}</span>
            <button
              type="button"
              class="pa-nav-speak ${_paIsSpeaking ? 'is-speaking' : ''}"
              aria-label="${isAm ? 'ወሩን ጮክ ብሎ አንብብ' : 'Read month aloud'}"
              onclick="window.__paSpeakMonth('${_paEsc(label)}')">🔊</button>
          </div>
          <button
            type="button"
            class="pa-nav-arrow"
            aria-label="${isAm ? 'የሚቀጥለው ወር' : 'Next month'}"
            onclick="window.__paNavMonth(1)">›</button>
        </div>`;
    }

    // _paRenderCalendar(studentId, ecYear, ecMonth)
    //   The heatmap grid for one EC month. Loading state shows a spinner;
    //   otherwise builds one cell per day (plus leading blank cells for the
    //   first week's offset), color-coded by that day's attendance status.
    //   Days after today (within the currently-viewed month) render as a
    //   neutral "future" cell rather than gray no-record, so a parent
    //   browsing the live month doesn't read "absent-colored gray" into
    //   days that simply haven't happened yet.
    function _paRenderCalendar(studentId, ecYear, ecMonth) {
      const cacheKey = _paMonthCacheKey(ecYear, ecMonth);
      const cached = _paMonthCache[studentId]?.[cacheKey];

      if (cached === undefined || cached === 'loading') {
        return `
          <div class="empty-state" style="padding-block:var(--sp-6);">
            <div class="spinner spinner-lg" style="margin:0 auto var(--sp-3);"></div>
            <p>${t('loading')}</p>
          </div>`;
      }

      const byKey = {};
      cached.forEach(a => { byKey[a.dateKey] = a.status; });

      const today    = EC.todayEc();
      const isAm     = store.lang === 'am';
      const weekdays = isAm
        ? ['እሑ','ሰኞ','ማክ','ረቡ','ሐሙ','አር','ቅዳ']
        : ['Su','Mo','Tu','We','Th','Fr','Sa'];

      const dim  = _paDaysInEcMonth(ecYear, ecMonth);
      const gc1  = EC.toGc(ecYear, ecMonth, 1);
      const startWd = gc1.getUTCDay(); // 0=Sun … 6=Sat, weekday of day 1

      const isCurrentMonth = ecYear === today.year && ecMonth === today.month;

      let cells = '';
      for (let i = 0; i < startWd; i++) {
        cells += `<div class="pa-cal-cell is-empty"></div>`;
      }

      for (let d = 1; d <= dim; d++) {
        const dateKey  = _paDateKey({ year: ecYear, month: ecMonth, day: d });
        const status   = byKey[dateKey];
        const isToday  = isCurrentMonth && d === today.day;
        const isFuture = isCurrentMonth && d > today.day;

        let statusClass, dotLabel;
        if (isFuture && !status) {
          statusClass = 'is-future';
          dotLabel = '';
        } else {
          const map = {
            present: { cls: 'st-present', label: t('present') },
            absent:  { cls: 'st-absent',  label: t('absent')  },
            late:    { cls: 'st-late',    label: t('late')     },
          };
          const entry = map[status] ?? { cls: 'st-none', label: t('noAttendanceRecord') };
          statusClass = entry.cls;
          dotLabel = entry.label;
        }

        cells += `
          <div
            class="pa-cal-cell ${statusClass} ${isToday ? 'is-today' : ''}"
            title="${_paSafe(_paMonthName(ecMonth))} ${d}, ${ecYear}${dotLabel ? ' — ' + _paSafe(dotLabel) : ''}">
            <span class="pa-cal-daynum">${d}</span>
          </div>`;
      }

      return `
        <div class="pa-cal-weekdays">
          ${weekdays.map(w => `<div class="pa-cal-weekday">${_paSafe(w)}</div>`).join('')}
        </div>
        <div class="pa-cal-grid">
          ${cells}
        </div>
        <div class="pa-legend">
          <span class="pa-legend-item"><span class="pa-legend-swatch present"></span>${t('present')}</span>
          <span class="pa-legend-item"><span class="pa-legend-swatch absent"></span>${t('absent')}</span>
          <span class="pa-legend-item"><span class="pa-legend-swatch late"></span>${t('late')}</span>
          <span class="pa-legend-item"><span class="pa-legend-swatch none"></span>${t('noAttendanceRecord')}</span>
        </div>`;
    }

    // _paRenderSummary(studentId, ecYear, ecMonth)
    //   Present N / Absent N / Late N tally for the currently-viewed
    //   month, computed from the same cached docs the calendar grid uses
    //   — 0 additional reads.
    function _paRenderSummary(studentId, ecYear, ecMonth) {
      const cacheKey = _paMonthCacheKey(ecYear, ecMonth);
      const cached = _paMonthCache[studentId]?.[cacheKey];

      if (cached === undefined || cached === 'loading' || !Array.isArray(cached)) {
        return ''; // calendar's own spinner covers the loading state
      }

      const counts = { present: 0, absent: 0, late: 0 };
      cached.forEach(a => { if (counts.hasOwnProperty(a.status)) counts[a.status]++; });

      return `
        <div class="pa-summary-grid">
          <div class="pa-summary-stat present">
            <div class="pa-summary-num">${fmtNum(counts.present)}</div>
            <div class="pa-summary-label">${t('daysPresent')}</div>
          </div>
          <div class="pa-summary-stat absent">
            <div class="pa-summary-num">${fmtNum(counts.absent)}</div>
            <div class="pa-summary-label">${t('daysAbsent')}</div>
          </div>
          <div class="pa-summary-stat late">
            <div class="pa-summary-num">${fmtNum(counts.late)}</div>
            <div class="pa-summary-label">${t('daysLate')}</div>
          </div>
        </div>`;
    }

    // ── Main view function ────────────────────────────────────────────────────

    // parentAttendanceDetailView({ studentId })
    //   #/parent/attendance/:studentId — guarded by guardRoute('parent') +
    //   explicit childKeys ownership check (403 if not own child), same
    //   convention as parentSemesterHistoryView() above.
    function parentAttendanceDetailView({ studentId }) {
      // ── Role + ownership guard ──────────────────────────────────────────
      const childKeys = store.userDoc?.childKeys ?? [];
      if (!studentId || !childKeys.includes(studentId)) {
        return `
          <div class="page-header">
            <div>
              <h1 class="page-title">🔒 ${t('accessDenied403')}</h1>
            </div>
          </div>
          <div class="card card-lg">
            <div class="empty-state">
              <div class="empty-icon">🔒</div>
              <p>${t('accessDenied403')}</p>
              <button class="btn btn-ghost mt-4" onclick="router.navigate('#/parent/dashboard')">
                ← ${t('back')}
              </button>
            </div>
          </div>`;
      }

      // ── Track current student; reset to the current EC month on
      //    student change (matches _phStudentId's reset-on-switch pattern
      //    in parentSemesterHistoryView() above). ──
      const todayEc = EC.todayEc();
      if (_paStudentId !== studentId) {
        _paStudentId  = studentId;
        _paViewYear   = todayEc.year;
        _paViewMonth  = todayEc.month;
        _paIsSpeaking = false;
      }

      // ── Fire-and-forget load for the currently-viewed month (no-ops if
      //    already cached or in flight) — exactly 1 query per new month. ──
      _paEnsureMonthLoaded(studentId, _paViewYear, _paViewMonth);

      // Student display name from childCache (loaded by parent dashboard).
      const cache       = store.childCache?.[studentId] ?? {};
      const studentDoc  = cache.student;
      const isAm        = store.lang === 'am';
      const displayName = studentDoc
        ? ((isAm && studentDoc.fullNameAm) ? studentDoc.fullNameAm : studentDoc.fullName) ?? studentId
        : studentId;

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">📅 ${t('recentAttendance')}</h1>
            <p class="page-subtitle">
              ${_paSafe(displayName)} · ${EC.formatEcAm(new Date())}
            </p>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="history.back()">
            ← ${t('back')}
          </button>
        </div>

        <div class="card card-lg mb-5" style="padding:0;overflow:hidden;">
          ${_paRenderNav(_paViewYear, _paViewMonth)}
          ${_paRenderCalendar(studentId, _paViewYear, _paViewMonth)}
        </div>

        <div class="card card-lg">
          <div class="card-header">
            <span class="card-title">📊 ${t('attendanceSummary')}</span>
          </div>
          ${_paRenderSummary(studentId, _paViewYear, _paViewMonth)}
        </div>`;
    }

    // window.__paNavMonth(delta) — prev/next month arrow click handler.
    // Each call moves exactly one EC month and lets
    // parentAttendanceDetailView()'s next render kick off
    // _paEnsureMonthLoaded() for the new month (1 fresh query if that
    // month was never cached, 0 if the parent already browsed it earlier
    // this session).
    window.__paNavMonth = function __paNavMonth(delta) {
      const next = _paNavigateMonth(_paViewYear, _paViewMonth, delta);
      _paViewYear  = next.year;
      _paViewMonth = next.month;
      render();
    };

    // window.__paSpeakMonth(label) — read-aloud button handler. Uses the
    // browser's Web Speech Synthesis API to speak the currently-displayed
    // "MonthName Year" label, in the active UI language (am-ET when
    // store.lang === 'am', else en-US). No-ops silently (rather than
    // throwing) on browsers without speechSynthesis support — this is a
    // supplementary accessibility affordance, not a required one.
    window.__paSpeakMonth = function __paSpeakMonth(label) {
      if (typeof window.speechSynthesis === 'undefined' || typeof SpeechSynthesisUtterance === 'undefined') {
        showToast(store.lang === 'am' ? 'ይህ መሣሪያ ድምፅ ማሰማት አይደግፍም።' : 'Speech is not supported on this device.', 'info');
        return;
      }

      window.speechSynthesis.cancel(); // stop anything already speaking

      const utterance = new SpeechSynthesisUtterance(label);
      utterance.lang = store.lang === 'am' ? 'am-ET' : 'en-US';
      utterance.rate = 0.9;

      _paIsSpeaking = true;
      render();

      utterance.onend = () => { _paIsSpeaking = false; render(); };
      utterance.onerror = () => { _paIsSpeaking = false; render(); };

      window.speechSynthesis.speak(utterance);
    };

    // ── END PARENT ATTENDANCE DETAIL VIEW ─────────────────────────────────────


    // ── Step 31: Student Exam Schedule Dashboard ──────────────────────────────
    //   Read-only view for students. Venue, examType label, and time range
    //   always visible. Cards styled with accent border.
    function studentExamScheduleView() {
      const exams = store.examSchedules ?? [];
      const currentEcYear = store.config?.currentEcYear ?? String(EC.todayEc().year);

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">📅 ${t('upcomingExams')}</h1>
            <p class="page-subtitle">${EC.formatEcAm(new Date())} · ${currentEcYear}</p>
          </div>
        </div>
        <div class="card card-lg card-accented">
          <div class="card-header">
            <span class="card-title">📋 ${t('upcomingExams')}</span>
            <span class="badge badge-accent">${exams.length}</span>
          </div>
          ${_renderExamList(exams, false)}
        </div>`;
    }

    // ══════════════════════════════════════════════════════════════════════════
    // Step 32: STUDENT DASHBOARD  (#/student/dashboard)
    // ── requireRole (guardRoute): 'student'
    //
    // A student's own single-child view of exactly the same data the parent
    // dashboard builds for one of their children — so this view is a thin
    // wrapper around the Step 28 parent-dashboard machinery rather than a
    // parallel implementation: it calls the very same _pdLoadChild(),
    // _pdRenderAttendanceStrip(), _pdRenderGrades(), _pdRenderHomework(),
    // _renderExamList(), and _annRenderList() helpers, just scoped to
    // store.userDoc.studentId instead of a parent-selected child.
    //
    // Data flow (identical cost to one parent-dashboard child load):
    //   1. dal.getStudent(studentId)                                — 1 read
    //   2. dal.getStudentAttendance(studentId, start7dKey, todayKey) — 1 query
    //   3. dal.getStudentAcademicYear(studentId, currentEcYear)      — 1 read
    //   4. dal.getHomeworkForStudent(classKey, studentId)            — 1 query
    //   5. dal.getSubject(subjectId) per graded subject               — cached
    // All five already budget-track themselves inside the DAL (see
    // dal.budgetTrack() calls in each), and _pdLoadChild() short-circuits
    // to 0 additional reads once store.childCache[studentId] is populated
    // — exactly the same caching contract the parent dashboard relies on.
    // ══════════════════════════════════════════════════════════════════════════

    // studentDashboardView()
    //   #/student/dashboard — requireRole('student') via guardRoute().
    function studentDashboardView() {
      // Same shared announcement listener the parent dashboard starts —
      // dal.subscribeAnnouncements() already filters to the signed-in
      // user's own role/grade (myRole = store.userDoc.role = 'student'
      // here), so no separate student-specific subscriber is needed.
      if (store.user && !_annSubscribed) {
        _annSubscribed = true;
        dal.subscribeAnnouncements().catch(err => {
          _annSubscribed = false;
          showToast('Failed to load announcements: ' + err.message, 'error');
        });
      }

      const studentId = store.userDoc?.studentId;

      if (!studentId) {
        return `
          <div class="page-header">
            <div>
              <h1 class="page-title">🏠 ${t('dashboard')}</h1>
              <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
            </div>
          </div>
          <div class="card card-lg">
            <div class="empty-state">
              <div class="empty-icon">🎓</div>
              <p>${t('noStudentRecordLinked')}</p>
            </div>
          </div>`;
      }

      // Kick off the load if it isn't cached yet — _pdLoadChild() ends
      // with a store.childCache re-assignment, which triggers a fresh
      // render() once the data lands (same contract as the parent
      // dashboard's __pdSwitchChild() / initial-mount load).
      if (!store.childCache || !Object.prototype.hasOwnProperty.call(store.childCache, studentId)) {
        _pdLoadChild(studentId);
      }

      const cached = store.childCache?.[studentId];

      if (!cached) {
        return `
          <div class="page-header">
            <div>
              <h1 class="page-title">🏠 ${t('dashboard')}</h1>
              <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
            </div>
          </div>
          ${skeletonCard(4)}`;
      }

      if (cached.error) {
        return `
          <div class="page-header">
            <div>
              <h1 class="page-title">🏠 ${t('dashboard')}</h1>
              <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
            </div>
          </div>
          <div class="card card-lg">
            <p style="color:var(--danger);">
              ${store.lang === 'am' ? 'መረጃ መጫን አልተቻለም።' : 'Could not load your student data.'}
            </p>
          </div>`;
      }

      const { student } = cached;
      const isAm = store.lang === 'am';
      const todayEc = EC.todayEc();

      // Bilingual greeting — both full-name fields shown together (rather
      // than swapping by store.lang the way most other labels do) since a
      // student greeting is the one place the task explicitly calls for
      // showing the name in both languages at once.
      const nameEn = student?.fullName ?? studentId;
      const nameAm = student?.fullNameAm ?? '';

      // Ensure the exam-schedule subscription is scoped to this student's
      // own class/grade — same _pdEnsureExamSub() mechanism the parent
      // dashboard uses, just keyed by this student's own classKey/grade
      // instead of a parent-selected child's.
      const myClassKey = student?.currentClassKey ?? '';
      const myGrade    = cached.grade;
      _pdEnsureExamSub(myClassKey, myGrade);
      const relevantExams = (store.examSchedules ?? []).filter(e =>
        e.classKey === '' || e.classKey === myClassKey || e.grade === myGrade
      );

      // Real-time "today's attendance marked" notification — same
      // mechanism _pdEnsureAttendanceNotify() gives parents, just pointed
      // at the student's own record.
      _pdEnsureAttendanceNotify(studentId, nameEn);

      return `
        <div style="background:linear-gradient(135deg,#E65100 0%,#BF360C 100%);border-radius:28px;padding:48px 32px;color:#fff;position:relative;overflow:hidden;margin-block-end:32px;box-shadow:0 16px 48px rgba(230,81,0,0.28);">
          <div style="position:absolute;inset:0;background:radial-gradient(ellipse 50% 70% at 85% 20%,rgba(255,255,255,0.08) 0%,transparent 70%);pointer-events:none;"></div>
          <div style="position:relative;z-index:1;">
