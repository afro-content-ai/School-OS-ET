    match /announcements/{announcementId} {
      allow read:  if isActive();
      allow write: if isAdmin();
      // Registrar carve-out: dal.postAnnouncement() allows admin or
      // registrar to post. Admin's blanket write above already covers
      // create/update/delete (including dal.deleteAnnouncement()); this
      // adds create only for registrar, and only as themselves
      // (createdBy must match their own uid) — same integrity check as
      // the tuitionPayments.recordedBy carve-out. Registrars get no
      // update/delete here: there is no dal.updateAnnouncement(), and
      // dal.deleteAnnouncement() is admin-only client-side as well.
      allow create: if isRegistrar() && request.resource.data.createdBy == request.auth.uid;
    }

    // ════════════════════════════════════════════════════════════════════
    // TUITION PAYMENTS — /tuitionPayments/{paymentId}
    // ════════════════════════════════════════════════════════════════════
    match /tuitionPayments/{paymentId} {
      allow read: if isAdmin() || parentOf(resource.data.studentId);
      // Admin may create freely; registrar may create only as themselves
      // (recordedBy must match their own uid — dal.recordPayment() always
      // sets this to store.user.uid, so a correctly-behaving client never
      // trips this check; it's here to stop a forged write from
      // attributing a payment to someone else).
      allow create: if isAdmin()
        || (isRegistrar() && request.resource.data.recordedBy == request.auth.uid);
      allow update: if false;
      allow delete: if isAdmin();
    }

    // ════════════════════════════════════════════════════════════════════
    // PROMOTION JOBS — /promotionJobs/{ecYear}
    // ════════════════════════════════════════════════════════════════════
    match /promotionJobs/{ecYear} {
      allow read, write: if isAdmin();
    }

    // ════════════════════════════════════════════════════════════════════
    // PARENT INVITES — /parentInvites/{inviteId}
    // ════════════════════════════════════════════════════════════════════
    // Spark-safe self-registration for new parent accounts — see
    // dal.createParentInvite() / dal.getParentInvite() / dal.acceptParentInvite()
    // and the #/accept-invite/:inviteId/:token route (acceptInviteView).
    match /parentInvites/{inviteId} {
      // Read: an invite link must be checkable by a visitor who has not
      // signed in yet (request.auth == null) — that's the whole point of
      // the flow, since the parent doesn't have an account until AFTER
      // they've validated the invite. Already-signed-in active users may
      // also read (e.g. a registrar re-opening their own sent invites).
      allow read: if request.auth == null || isActive();
      // Create: only a registrar/admin may originate an invite —
      // dal.createParentInvite() is only ever called from the (role-gated)
      // registrarStudentsView.
      allow create: if isAdmin() || isRegistrar();
      // Update: the token must match exactly between the existing document
      // and the incoming write (request.resource.data.token ==
      // resource.data.token would be the same check — kept symmetric to
      // the original spec's phrasing). This is intentionally NOT gated by
      // request.auth at all: the whole reason a token exists is to let an
      // otherwise-unauthenticated party (the accept-invite flow runs after
      // createUserWithEmailAndPassword(), so the caller IS authenticated as
      // the new parent by the time dal.acceptParentInvite() runs — but
      // nothing here requires that) prove they hold the secret printed
      // into their own invite link, rather than proving who they are via
      // an existing role. A write presenting any other token value is
      // rejected outright, regardless of auth state.
      allow update: if resource.data.token == request.resource.data.token;
      allow delete: if isAdmin();
    }

    // ════════════════════════════════════════════════════════════════════
    // DEFAULT DENY — anything not matched above is closed by default
    // (Firestore's implicit default), so no explicit catch-all is needed.
    // ════════════════════════════════════════════════════════════════════
  }
}
`;
    };

    // ── Security Rules Verification Test Suite ─────────────────────────────

    // dal.runRulesTests()
    //   Live Firestore probes that verify the *deployed* security rules
    //   actually enforce what dal.exportSecurityRules() declares. Returns
    //   an array of { name, expected, actual, pass } results, where `pass`
    //   is true (✅), false (❌), or the string 'warning' (⚠️) for checks
    //   that are inherently limited by running inside a single auth
    //   session (see note below).
    //
    //   IMPORTANT — single-session limitation:
    //   This app has exactly one signed-in Firebase Auth user per browser
    //   tab/session (see § AUTH — there is no client-side "act as another
    //   role" mechanism, by design: that would itself be a security hole).
    //   That means these probes can only exercise rules from the
    //   perspective of whichever role is currently signed in (always
    //   'admin' here, since this view is gated to admins — see route
    //   registration below). They CANNOT prove what happens when a
    //   *teacher*, *parent*, or *student* session attempts the same
    //   operations, because doing that for real requires a second,
    //   independently authenticated session.
    //
    //   Full cross-role score range testing requires Firebase Emulator
    //   Suite — add a note to the verification checklist (Step 40) to run
    //   `firebase emulators:start` and test with two browser tabs logged
    //   in as different roles.
    //
    //   Tests that cannot be fully verified in-session are marked
    //   pass: 'warning' rather than true/false, and their `actual` field
    //   says so explicitly — they are never silently reported as passing.
    dal.runRulesTests = async function runRulesTests() {
      const results = [];
      const role = store.userDoc?.role;
      const isAdminSession = role === ROLES.ADMIN;
      const TEST_CLASS_KEY   = '_test_class_0000';
      const TEST_SUBJECT_KEY = '_test_subject';
      const testGbRef = doc(db, 'classes', TEST_CLASS_KEY, 'gradebooks', TEST_SUBJECT_KEY);

      // ── Test 1: score range / role enforcement ──────────────────────────
      // What we CAN verify in one session: an admin can create a temporary
      // gradebook, and admin writes bypass the finalized-lock rule
      // (`allow update: if isAdmin() || (teachesSubject(...) && finalized
      // == false)`). What we CANNOT verify in one session: a teacher
      // actually being rejected for an out-of-range score, because (a)
      // dal.saveScore() validates the range client-side before ever
      // calling Firestore, and (b) the deployed rules in
      // dal.exportSecurityRules() gate gradebook updates by role +
      // finalized state only — there is no field-level maxScore check at
      // the rules layer, so this can only be exercised meaningfully with
      // two real sessions (admin + teacher) against the Emulator Suite.
      try {
        await setDoc(testGbRef, {
          classKey:    TEST_CLASS_KEY,
          subjectKey:  TEST_SUBJECT_KEY,
          columns:     [{ id: 'col1', label: 'Test Column', maxScore: 100 }],
          scores:      {},
          finalized:   true,
          createdAt:   serverTimestamp(),
        });
        results.push({
          name:     'Test 1a — Admin can create a gradebook doc',
          expected: 'setDoc succeeds (admin has write access to /classes/*/gradebooks/*)',
          actual:   'setDoc succeeded',
          pass:     true,
        });

        // Attempt an updateDoc as the *current* (admin) session on a doc
        // marked finalized: true. Per the rules, a teacher would be
        // rejected here (finalized == false is required for them) — but
        // isAdmin() short-circuits that check, so this confirms the admin
        // override half of the rule, not the teacher-rejection half.
        try {
          await updateDoc(testGbRef, { 'scores.test_student.col1': 999 });
          results.push({
            name:     'Test 1b — Admin bypasses finalized-lock on update',
            expected: 'updateDoc succeeds (isAdmin() bypasses the finalized==false requirement)',
            actual:   'updateDoc succeeded',
            pass:     true,
          });
        } catch (err) {
          results.push({
            name:     'Test 1b — Admin bypasses finalized-lock on update',
            expected: 'updateDoc succeeds (isAdmin() bypasses the finalized==false requirement)',
            actual:   `updateDoc threw ${err.code ?? err.message}`,
            pass:     false,
          });
        }

        // The actual teacher-rejection / out-of-range-score half of this
        // test cannot be run from an admin session.
        results.push({
          name:     'Test 1c — Teacher rejected for out-of-range score on finalized gradebook',
          expected: 'permission-denied (simulated teacher session, finalized:true, score > maxScore)',
          actual:   'NOT TESTABLE in a single auth session — requires Firebase Emulator Suite with a second tab signed in as a teacher. See deployment checklist, Step 40.',
          pass:     'warning',
        });
      } catch (err) {
        results.push({
          name:     'Test 1a — Admin can create a gradebook doc',
          expected: 'setDoc succeeds (admin has write access to /classes/*/gradebooks/*)',
          actual:   `setDoc threw ${err.code ?? err.message}`,
          pass:     false,
        });
      } finally {
        // Always clean up the temporary doc, regardless of how the
        // sub-tests above went.
        try { await deleteDoc(testGbRef); } catch (_) { /* best-effort cleanup */ }
      }

      // ── Test 2: finalized gradebook lock (admin override + readback) ───
      try {
        await setDoc(testGbRef, {
          classKey:   TEST_CLASS_KEY,
          subjectKey: TEST_SUBJECT_KEY,
          columns:    [{ id: 'col1', label: 'Test Column', maxScore: 100 }],
          scores:     {},
          finalized:  true,
          createdAt:  serverTimestamp(),
        });

        try {
          await updateDoc(testGbRef, { 'scores.test_student.col1': 87 });

          // Verify by reading back — confirms the write actually landed,
          // not just that the SDK call resolved.
          const snap = await getDoc(testGbRef);
          const written = snap.exists() ? snap.data()?.scores?.test_student?.col1 : undefined;

          results.push({
            name:     'Test 2 — Admin can update scores on a finalized gradebook',
            expected: 'updateDoc succeeds and the written value reads back as 87',
            actual:   snap.exists() && written === 87
              ? 'updateDoc succeeded; readback confirmed scores.test_student.col1 === 87'
              : `updateDoc succeeded but readback was unexpected (got ${JSON.stringify(written)})`,
            pass:     snap.exists() && written === 87,
          });
        } catch (err) {
          results.push({
            name:     'Test 2 — Admin can update scores on a finalized gradebook',
            expected: 'updateDoc succeeds and the written value reads back as 87',
            actual:   `updateDoc threw ${err.code ?? err.message}`,
            pass:     false,
          });
        }
      } catch (err) {
        results.push({
          name:     'Test 2 — Admin can update scores on a finalized gradebook',
          expected: 'updateDoc succeeds and the written value reads back as 87',
          actual:   `Setup (setDoc) threw ${err.code ?? err.message}`,
          pass:     false,
        });
      } finally {
        try { await deleteDoc(testGbRef); } catch (_) { /* best-effort cleanup */ }
      }

      // ── Test 3: parent/student data isolation ───────────────────────────
      // Reads a real (non-test) gradebook path as the current session.
      // This document is NOT created or deleted by this test — it's an
      // existing class/subject gradebook, read-only, so we never risk
      // touching real data.
      {
        const REAL_CLASS_KEY   = '8A_2017';
        const REAL_SUBJECT_KEY = 'physics';
        const realGbRef = doc(db, 'classes', REAL_CLASS_KEY, 'gradebooks', REAL_SUBJECT_KEY);
        try {
          const snap = await getDoc(realGbRef);
          if (isAdminSession) {
            results.push({
              name:     `Test 3a — Admin can read /classes/${REAL_CLASS_KEY}/gradebooks/${REAL_SUBJECT_KEY}`,
              expected: 'getDoc succeeds (isAdmin() grants read on all gradebooks)',
              actual:   snap.exists()
                ? 'getDoc succeeded (document exists)'
                : 'getDoc succeeded (no error — document does not exist, which is still a successful read)',
              pass:     true,
            });
          } else {
            results.push({
              name:     `Test 3a — Current session reading /classes/${REAL_CLASS_KEY}/gradebooks/${REAL_SUBJECT_KEY}`,
              expected: 'Outcome depends on role/relationship to this class',
              actual:   `getDoc succeeded for role "${role}" — not evaluated further (this view is admin-only in practice)`,
              pass:     'warning',
            });
          }
        } catch (err) {
          results.push({
            name:     `Test 3a — Reading /classes/${REAL_CLASS_KEY}/gradebooks/${REAL_SUBJECT_KEY}`,
            expected: isAdminSession
              ? 'getDoc succeeds (isAdmin() grants read on all gradebooks)'
              : 'Depends on role',
            actual:   `getDoc threw ${err.code ?? err.message}`,
            pass:     isAdminSession ? false : 'warning',
          });
        }

        results.push({
          name:     'Test 3b — Parent cannot read another family\'s gradebook',
          expected: 'permission-denied (simulated parent session, child not enrolled in this class)',
          actual:   '⚠️ Cross-role tests (parent cannot see gradebook, student cannot see class attendance) require Firebase Local Emulator Suite. See deployment checklist.',
          pass:     'warning',
        });
        results.push({
          name:     'Test 3c — Student cannot read another class\'s attendance',
          expected: 'permission-denied (simulated student session, different classKey)',
          actual:   '⚠️ Cross-role tests (parent cannot see gradebook, student cannot see class attendance) require Firebase Local Emulator Suite. See deployment checklist.',
          pass:     'warning',
        });
      }

      return results;
    };


    // ── Composite key validation ──────────────────────────────────────────────

    // dal.validateCompositeKey(compositeKey)
    //   Splits compositeKey on '|' and asserts exactly 2 non-empty parts.
    //   Returns { classKey, subjectId } on success.
    //   Throws TypeError('Malformed composite key: ' + compositeKey) on failure.
    //
    //   A valid composite key looks like: 'g5a-2017|math-g5'
    //     part[0] = classKey  (non-empty string)
    //     part[1] = subjectId (non-empty string)
    //   Any deviation — extra pipes, empty parts, missing pipe — is malformed.
    dal.validateCompositeKey = function validateCompositeKey(compositeKey) {
      const parts = String(compositeKey ?? '').split('|');
      if (parts.length !== 2 || !parts[0].trim() || !parts[1].trim()) {
        throw new TypeError('Malformed composite key: ' + compositeKey);
      }
      return { classKey: parts[0].trim(), subjectId: parts[1].trim() };
    };

    // dal.validateAndSyncAssignments(teacherUid, proposedAssignments)
    //   Full pre-save validation pipeline for a teacher's composite-key set.
    //   Async — fetches Firestore docs in parallel to verify existence/status.
    //
    //   Pipeline (all errors are collected; none short-circuits the batch):
    //   (1) Deduplicate proposedAssignments.
    //   (2) Validate every key with dal.validateCompositeKey(); collect all
    //       TypeError messages; throw a combined Error if any are malformed.
    //   (3) Fetch all unique classKey docs in parallel (Promise.all of
    //       dal.getClass calls — cache-aware, 1 read per uncached classKey).
    //       Collect missing classKeys; throw if any are absent from Firestore.
    //   (4) Pre-warm store._subjectDocCache from store.subjectsCache (so
    //       already-loaded subjects cost 0 reads), then fetch any uncached
    //       subject docs in parallel. Verify each subjectId exists in
    //       /subjects AND has active:true. Collect missing/inactive subjectIds;
    //       throw if any fail.
    //   (5) Only if all validations pass: derive teachingClassKeys as the
    //       unique set of classKey prefixes and call
    //       dal.updateTeacherAssignments(teacherUid, proposedAssignments).
    //
    //   Budget cost: 1 read per uncached classKey + 1 read per uncached
    //   subjectId. Docs already in cache cost 0 reads.
    dal.validateAndSyncAssignments = async function validateAndSyncAssignments(teacherUid, proposedAssignments) {
      // ── Step 1: deduplicate ───────────────────────────────────────────────
      const deduped = [...new Set(proposedAssignments)];

      // ── Step 2: structural validation ────────────────────────────────────
      const malformedErrors = [];
      const parsed = deduped.map(key => {
        try {
          return { key, ...dal.validateCompositeKey(key) };
        } catch (err) {
          malformedErrors.push(err.message);
          return { key, classKey: null, subjectId: null };
        }
      });

      if (malformedErrors.length > 0) {
        throw new Error(
          `Composite key validation failed:\n• ${malformedErrors.join('\n• ')}`
        );
      }

      // Only work with well-formed entries from here on.
      const validParsed = parsed.filter(p => p.classKey !== null);

      // ── Step 3: verify classKey docs exist in Firestore ───────────────────
      const uniqueClassKeys = [...new Set(validParsed.map(p => p.classKey))];

      // Parallel fetch — dal.getClass is cache-aware (1 read per cache miss).
      const classDocs = await Promise.all(
        uniqueClassKeys.map(ck => dal.getClass(ck))
      );

      const missingClassKeys = uniqueClassKeys.filter((ck, i) => classDocs[i] === null);
      if (missingClassKeys.length > 0) {
        throw new Error(
          `The following classes do not exist in Firestore:\n• ${missingClassKeys.join('\n• ')}`
        );
      }

      // ── Step 4: verify subjectId docs exist and are active ────────────────
      const uniqueSubjectIds = [...new Set(validParsed.map(p => p.subjectId))];

      // Pre-warm _subjectDocCache from store.subjectsCache to avoid re-reads
      // for subjects that were already loaded by dal.getAllSubjects() in _taMount.
      if (!store._subjectDocCache) store._subjectDocCache = {};
      (store.subjectsCache ?? []).forEach(s => {
        if (s.subjectId && !Object.prototype.hasOwnProperty.call(store._subjectDocCache, s.subjectId)) {
          store._subjectDocCache[s.subjectId] = s;
        }
      });

      // Parallel fetch — dal.getSubject is cache-aware (1 read per cache miss).
      const subjectDocs = await Promise.all(
        uniqueSubjectIds.map(sid => dal.getSubject(sid))
      );

      const invalidSubjectIds = [];
      uniqueSubjectIds.forEach((sid, i) => {
        const s = subjectDocs[i];
        if (!s) {
          invalidSubjectIds.push(`"${sid}" — does not exist in /subjects`);
        } else if (s.active !== true) {
          invalidSubjectIds.push(`"${sid}" — exists but is not active`);
        }
      });

      if (invalidSubjectIds.length > 0) {
        throw new Error(
          `The following subjects are missing or inactive:\n• ${invalidSubjectIds.join('\n• ')}`
        );
      }

      // ── Step 5: all validations passed — write to Firestore ───────────────
      await dal.updateTeacherAssignments(teacherUid, deduped);
    };

    // dal.safe(asyncFn, errorToastPrefix?)
    //   Wraps an async function so that any thrown error (including
    //   TypeError from dal.validateCompositeKey and aggregated errors from
    //   dal.validateAndSyncAssignments) is caught, logged, and shown as an
    //   error toast instead of crashing the caller.
    //   Returns { ok: true, value } on success and { ok: false, error } on
    //   failure — call sites check result.ok and skip further work if false.
    //
    //   Usage in save handlers:
    //     const result = await dal.safe(() => dal.validateAndSyncAssignments(uid, keys));
    //     if (!result.ok) return; // toast already shown
    dal.safe = async function safe(asyncFn, errorToastPrefix = '') {
      try {
        const value = await asyncFn();
        return { ok: true, value };
      } catch (err) {
        const prefix = errorToastPrefix ? errorToastPrefix + ': ' : '';
        const msg    = err?.message ?? String(err);
        console.error('[SchoolOS DAL] dal.safe caught:', err);
        if (typeof showToast === 'function') {
          showToast(prefix + msg, 'error');
        }
        return { ok: false, error: err };
      }
    };

    dal.cleanup = function cleanup() {
      store.listeners.forEach(unsub => { try { unsub(); } catch (_) {} });
      store.listeners = [];
    };

    // ── System Self-Test Suite ──────────────────────────────────────────────

    // _DAL_REQUIRED_FUNCTIONS
    //   A representative cross-section of dal.* functions — one or two per
    //   domain (config, users, students, classes, gradebook, attendance,
    //   homework, announcements, exams, payments, rules) — used by
    //   dal.runSelfTest() to confirm the DAL object hasn't lost a function
    //   to a bad edit. Not the full function list (70+ functions); a
    //   representative spot-check is enough to catch a wholesale wiring
    //   break without the test itself becoming another thing to maintain
    //   in lockstep with every DAL addition.
    const _DAL_REQUIRED_FUNCTIONS = [
      'getSchoolConfig', 'updateSchoolConfig', 'subscribeConfig',
      'getMe', 'getUser', 'listUsers', 'createUser', 'updateUser',
      'getStudent', 'listStudents', 'createStudent', 'updateStudent',
      'getClass', 'listClasses', 'createClass',
      'getGradebook', 'createGradebook', 'saveScore', 'finalizeGradebook', 'computeRanks',
      'getAttendance', 'markAttendance', 'getStudentAttendance',
      'postHomework', 'listHomework',
      'postAnnouncement', 'subscribeAnnouncements',
      'postExamSchedule', 'subscribeExamSchedules',
      'recordPayment', 'listPayments', 'getStudentBalance',
      'exportSecurityRules', 'runRulesTests',
      'validateCompositeKey', 'safe', 'cleanup',
    ];

    // dal.runSelfTest()
    //   Admin-only, non-destructive verification suite — distinct from
    //   dal.runRulesTests() (which probes live Firestore security rules by
    //   writing/reading temporary documents). This suite checks that the
    //   *application itself* booted into a sane state: Firebase
    //   connectivity, auth, store hydration, DAL wiring, the EC calendar
    //   converter, i18n, the router's route table, and service-worker
    //   control. Every check is read-only or pure-computation — nothing
    //   here writes to Firestore or mutates app state.
    //
    //   Returns Promise<Array<{ name, detail, pass }>> where pass is
    //   true | false | 'warning' — same three-state convention as
    //   dal.runRulesTests(), so the UI can share its icon/row-class helpers.
    dal.runSelfTest = async function runSelfTest() {
      const results = [];
      const role = store.userDoc?.role;

      if (role !== ROLES.ADMIN) {
        return [{
          name:   'Admin authorization',
          detail: 'dal.runSelfTest() is admin-only — current session role is "' + (role ?? 'none') + '".',
          pass:   false,
        }];
      }

      // ── 1. Firebase connection ──────────────────────────────────────────
      // A real getDoc() round-trip against schoolConfig/main. Read-only;
      // this document is never written by this suite. Success here means
      // the SDK initialised, the network call resolved, and (implicitly)
      // Firestore rules allow this admin session to read it.
      try {
        const snap = await getDoc(doc(db, 'schoolConfig', 'main'));
        results.push({
          name:   'Firebase connection',
          detail: snap.exists()
            ? 'getDoc(schoolConfig/main) succeeded — document exists.'
            : 'getDoc(schoolConfig/main) succeeded — connection is live, though the document itself does not exist yet.',
          pass:   true,
        });
      } catch (err) {
        results.push({
          name:   'Firebase connection',
          detail: 'getDoc(schoolConfig/main) threw: ' + (err.code ?? err.message),
          pass:   false,
        });
      }

      // ── 2. Auth state ────────────────────────────────────────────────────
      try {
        const hasUser = !!store.user && !!auth.currentUser;
        results.push({
          name:   'Auth state',
          detail: hasUser
            ? 'Signed in as ' + (store.user.email ?? store.user.uid) + '.'
            : 'No authenticated user — store.user / auth.currentUser is empty.',
          pass:   hasUser,
        });
      } catch (err) {
        results.push({ name: 'Auth state', detail: 'Check threw: ' + err.message, pass: false });
      }

      // ── 3. Store completeness ────────────────────────────────────────────
      try {
        const configLoaded  = store.config != null;
        const userDocLoaded = store.userDoc != null;
        const pass = configLoaded && userDocLoaded;
        const missing = [
          !configLoaded  ? 'store.config'  : null,
          !userDocLoaded ? 'store.userDoc' : null,
        ].filter(Boolean);
        results.push({
          name:   'Store completeness',
          detail: pass
            ? 'store.config and store.userDoc are both loaded.'
            : 'Missing: ' + missing.join(', ') + '.',
          pass,
        });
      } catch (err) {
        results.push({ name: 'Store completeness', detail: 'Check threw: ' + err.message, pass: false });
      }

      // ── 4. DAL functions exist ───────────────────────────────────────────
      try {
        const missing = _DAL_REQUIRED_FUNCTIONS.filter(fn => typeof dal[fn] !== 'function');
        results.push({
          name:   'DAL functions exist',
          detail: missing.length === 0
            ? `All ${_DAL_REQUIRED_FUNCTIONS.length} spot-checked dal.* functions are present.`
            : `Missing dal.* function(s): ${missing.join(', ')}.`,
          pass:   missing.length === 0,
        });
      } catch (err) {
        results.push({ name: 'DAL functions exist', detail: 'Check threw: ' + err.message, pass: false });
      }

      // ── 5. EC converter ──────────────────────────────────────────────────
      try {
        const ec = EC.toEc(new Date());
        const valid = ec
          && typeof ec.year  === 'number' && Number.isFinite(ec.year)
          && typeof ec.month === 'number' && ec.month >= 1 && ec.month <= 13
          && typeof ec.day   === 'number' && ec.day   >= 1 && ec.day   <= 30;
        results.push({
          name:   'EC converter',
          detail: valid
            ? `EC.toEc(new Date()) → { year: ${ec.year}, month: ${ec.month}, day: ${ec.day} }.`
            : `EC.toEc(new Date()) returned an unexpected shape: ${JSON.stringify(ec)}.`,
          pass:   !!valid,
        });
      } catch (err) {
        results.push({ name: 'EC converter', detail: 'EC.toEc() threw: ' + err.message, pass: false });
      }

      // ── 6. i18n ──────────────────────────────────────────────────────────
      // Reads DICT directly for both locales rather than calling t() twice
      // (which would require flipping store.lang — a side effect this
      // non-destructive suite avoids).
      try {
        const enVal = DICT.en?.login;
        const amVal = DICT.am?.login;
        const pass = typeof enVal === 'string' && enVal.length > 0
                  && typeof amVal === 'string' && amVal.length > 0;
        results.push({
          name:   'i18n',
          detail: pass
            ? `t('login') → "${enVal}" (en) / "${amVal}" (am).`
            : `t('login') missing or empty in one or both locales (en: ${JSON.stringify(enVal)}, am: ${JSON.stringify(amVal)}).`,
          pass,
        });
      } catch (err) {
        results.push({ name: 'i18n', detail: 'Check threw: ' + err.message, pass: false });
      }

      // ── 7. Router ────────────────────────────────────────────────────────
      // Confirms a representative set of routes (one per role + the
      // shared/system routes) made it into router.routes. Like the DAL
      // check above, this is a spot-check against wholesale registration
      // failure, not an exhaustive list of every route.
      try {
        const expectedRoutes = [
          '#/login', '#/403',
          '#/admin/dashboard', '#/admin/users', '#/admin/settings',
          '#/teacher/dashboard', '#/teacher/attendance', '#/teacher/marks',
          '#/parent/dashboard', '#/student/dashboard',
          '#/registrar/students', '#/registrar/payments',
        ];
        const registered = Object.keys(router.routes);
        const missing = expectedRoutes.filter(r => !registered.includes(r));
        results.push({
          name:   'Router',
          detail: missing.length === 0
            ? `All ${expectedRoutes.length} spot-checked routes are registered (${registered.length} total routes).`
            : `Missing route(s): ${missing.join(', ')}.`,
          pass:   missing.length === 0,
        });
      } catch (err) {
        results.push({ name: 'Router', detail: 'Check threw: ' + err.message, pass: false });
      }

      // ── 8. Service worker ────────────────────────────────────────────────
      // A null controller is expected and not a failure on first load
      // (before the SW has activated) or in browsers/contexts where SW
      // registration is unsupported — reported as a warning, not a fail.
      try {
        if (!('serviceWorker' in navigator)) {
          results.push({
            name:   'Service worker',
            detail: 'navigator.serviceWorker is not supported in this browser/context.',
            pass:   'warning',
          });
        } else if (navigator.serviceWorker.controller) {
          results.push({
            name:   'Service worker',
            detail: 'navigator.serviceWorker.controller is active — this page load is served by the SW.',
            pass:   true,
          });
        } else {
          results.push({
            name:   'Service worker',
            detail: 'navigator.serviceWorker.controller is null — normal on first load before the SW activates, or if registration failed. Reload once and re-run this check.',
            pass:   'warning',
          });
        }
      } catch (err) {
        results.push({ name: 'Service worker', detail: 'Check threw: ' + err.message, pass: false });
      }

      return results;
    };

    // Expose globally for console debugging, consistent with window.Auth.
    window.dal = dal;
    // ── END DAL ──────────────────────────────────────────────────────────────


    // ── BUDGET UI ────────────────────────────────────────────────────────────
    // Admin-facing read-budget dashboard: a floating pill (#budget-pill,
    // markup in <body>, § HTML) showing live "reads / limit", a detail
    // modal with progress bars and the last 50 operations from
    // dal.budgetLog, and the persistent top warning banner
    // (#budget-warning-banner) that appears for everyone once usage gets
    // high enough to matter to whoever's using the app, not just admins.
    //
    // Design note: this section deliberately does NOT hook into the
    // store Proxy / render() pipeline for its own updates. dal.budgetTrack()
    // fires on essentially every Firestore call in the app — routing that
    // through a store.* mutation would mean a full render() (and on
    // first-mount, app shell + router dispatch) on every single read/write,
    // which is wasteful and risks feedback loops if any render path itself
    // triggers a read. Instead window.__budgetSyncUI() does targeted,
    // idempotent DOM writes (textContent / classList), and is called
    // directly from dal.budgetTrack()/dal.budgetReset() plus from
    // window.__render() (see § INIT) so it also stays in sync with normal
    // app navigation and role changes.

    // _budgetPct()
    //   Today's read count as a 0..1+ fraction of DAL_DAILY_READ_LIMIT.
    function _budgetPct() {
      return store.readCount / DAL_DAILY_READ_LIMIT;
    }

    // _budgetFmt(n)
    //   Thousands-separated integer formatting for the pill/modal —
    //   delegates to fmtNum() (§ STORE) for consistent plain-digit
    //   formatting across the whole UI.
    function _budgetFmt(n) {
      return fmtNum(Math.round(n));
    }

    // _budgetLogRowsHtml()
    //   Renders the last 50 entries of store.budgetLog (newest first) as
    //   <tr> rows for the modal's breakdown table. Each call site's
    //   reads/writes show as "+N" / "—" (em dash) when zero, so a glance
    //   down the column makes it obvious which calls were read-heavy. The
    //   me() column shows the hidden security-rule overhead for that one
    //   call (docCount * ME_READS_PER_DOC_ACCESS) so it's visible exactly
    //   where the "extra" reads are coming from, not just in the totals.
    function _budgetLogRowsHtml() {
      const entries = store.budgetLog.slice(-50).reverse();
      if (entries.length === 0) {
        return `<tr><td colspan="5" class="budget-log-empty">No operations logged yet.</td></tr>`;
      }
      return entries.map(e => {
        const time   = new Date(e.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const reads  = e.reads  > 0 ? `+${e.reads}`  : '—';
        const writes = e.writes > 0 ? `+${e.writes}` : '—';
        const me     = (e.meOverhead ?? 0) > 0 ? `+${e.meOverhead}` : '—';
        return `
          <tr>
            <td>${time}</td>
            <td class="budget-log-op" title="${_escapeHtml(e.op)}">${_escapeHtml(e.op)}</td>
            <td>${reads}</td>
            <td>${writes}</td>
            <td class="budget-log-me">${me}</td>
          </tr>`;
      }).join('');
    }

    // _escapeHtml(s)
    //   Minimal HTML-escaping for the one piece of "external" text in the
    //   budget UI — the caller name extracted from a stack trace — before
    //   it's interpolated into innerHTML. Stack frames are sourced from
    //   this app's own code, not user input, but escaping costs nothing
    //   and removes any doubt.
    function _escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // budgetModalHtml()
    //   Builds the full detail-modal markup: reads/writes progress bars,
    //   the last-50-ops log table, and the Reset Counter / Export Log
    //   action buttons. Re-built fresh on every open/refresh rather than
    //   patched in place — it's a small, infrequently-opened modal, so
    //   simplicity wins over micro-optimizing DOM diffing here.
    function budgetModalHtml() {
      const readPct  = Math.min(_budgetPct() * 100, 999);
      const writePct = Math.min((store.writeCount / DAL_DAILY_READ_LIMIT) * 100, 999);
      // Task spec: reads bar turns red once usage is past 80% — kept as a
      // single threshold (not a separate amber stage) to match "red if >
      // 80%" literally; the 95%-and-above state is still distinguished in
      // the helper text below the bars and in the top banner/pill.
      const readBarClass = readPct > DAL_BUDGET_WARN_PCT * 100 ? 'is-danger' : '';

      const explicitReads = store.readCount - store.meOverheadCount;
      const meOverhead    = store.meOverheadCount;
      const totalBilled   = store.readCount; // store.readCount IS the real billed total already

      return `
        <div class="modal-backdrop" id="budget-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="budget-modal-title">
          <div class="modal budget-modal">
            <div class="modal-header">
              <span class="modal-title" id="budget-modal-title">📖 Read Budget</span>
              <span class="modal-close" onclick="window.__budgetCloseModal()">✕</span>
            </div>

            <div class="budget-stat-row">
              <span>Reads today</span>
              <span class="budget-stat-num">${_budgetFmt(store.readCount)} / ${_budgetFmt(DAL_DAILY_READ_LIMIT)} (${readPct.toFixed(1)}%)</span>
            </div>
            <div class="budget-progress-track">
              <div class="budget-progress-fill ${readBarClass}" style="width:${Math.min(readPct, 100)}%;"></div>
            </div>

            <div class="budget-stat-row">
              <span>Writes today</span>
              <span class="budget-stat-num">${_budgetFmt(store.writeCount)} / ${_budgetFmt(DAL_DAILY_READ_LIMIT)} (${writePct.toFixed(1)}%)</span>
            </div>
            <div class="budget-progress-track">
              <div class="budget-progress-fill" style="width:${Math.min(writePct, 100)}%;"></div>
            </div>

            <!-- ── Explicit vs. me() overhead breakdown ───────────────────────
                 Every document access (read or write) that passes through a
                 security rule costs one extra get() of /users/{uid} — see
                 ME_READS_PER_DOC_ACCESS, § DAL — and that's a real billed
                 read, not just bookkeeping. store.readCount already IS the
                 total (explicit + overhead); this row breaks that total
                 back out so the hidden cost is visible at a glance. ──────── -->
            <div class="budget-breakdown-row" title="Every document access that triggers a security rule costs one extra get() to /users/{uid} (the me() helper) — that's a real, billed Firestore read.">
              <span>Explicit reads: <strong>${_budgetFmt(explicitReads)}</strong></span>
              <span class="budget-breakdown-sep">|</span>
              <span>me() overhead: <strong>${_budgetFmt(meOverhead)}</strong></span>
              <span class="budget-breakdown-sep">|</span>
              <span>Total billed: <strong>${_budgetFmt(totalBilled)}</strong></span>
            </div>

            <p style="font-size:0.78rem;color:var(--text-muted);margin-block-end:0;">
              Budget date: <strong>${store.budgetDate || '—'}</strong> · resets automatically at local midnight.
              ${readPct >= DAL_BUDGET_BLOCK_PCT * 100
                ? '<br><strong style="color:var(--danger);">List reads (rosters, payment histories, etc.) are currently disabled.</strong>'
                : ''}
            </p>

            <!-- ── File Size ───────────────────────────────────────────────── -->
            <div class="budget-section-title">File Size</div>
            ${(() => {
              const m = window.__perfMetrics;
              if (!m) return '<p style="font-size:0.8rem;color:var(--text-muted);">Measuring…</p>';
              return `
                <div class="budget-stat-row">
                  <span>Total HTML</span>
                  <span class="budget-stat-num">${m.htmlKB} KB</span>
                </div>
                <div class="budget-stat-row">
                  <span>Script block</span>
                  <span class="budget-stat-num">${m.scriptKB} KB</span>
                </div>
                <div class="budget-stat-row">
                  <span>Tier 1 views (eager)</span>
                  <span class="budget-stat-num">${m.tier1Count}</span>
                </div>
                <div class="budget-stat-row">
                  <span>Tier 2 views (deferred)</span>
                  <span class="budget-stat-num">${m.tier2Count}</span>
                </div>
                <div class="budget-stat-row">
                  <span>Est. 3G parse time</span>
                  <span class="budget-stat-num">${m.parseTime3G} s</span>
                </div>`;
            })()}

            <div class="budget-section-title">Reads &amp; writes by operation (last 50)</div>
            <div class="budget-log-wrap">
              <table class="budget-log-table">
                <thead>
                  <tr><th>Time</th><th>Operation</th><th>Reads</th><th>Writes</th><th title="me() security-rule overhead for this call">me()</th></tr>
                </thead>
                <tbody>${_budgetLogRowsHtml()}</tbody>
              </table>
            </div>

            <div class="budget-modal-actions">
              <button class="btn btn-ghost" onclick="window.__budgetExportLogClick()">⬇ Export Log</button>
              <button class="btn btn-danger" onclick="window.__budgetResetClick()">⚠ Reset Counter</button>
            </div>
          </div>
        </div>`;
    }

    // window.__budgetOpenModal() / __budgetCloseModal()
    //   Mount/unmount the modal into #budget-modal-mount (a permanent,
    //   always-present container in <body> — see § HTML — so the modal
    //   survives #app being wholesale-replaced on every route change).
    //   store._budgetModalOpen tracks open state purely so __budgetSyncUI()
    //   knows whether to refresh the modal's contents in place (e.g. after
    //   a fresh dal.budgetTrack() call) while it's sitting open.
    window.__budgetOpenModal = function __budgetOpenModal() {
      if (store.userDoc?.role !== 'admin') return; // defensive: pill shouldn't even be visible otherwise
      const mount = document.getElementById('budget-modal-mount');
      if (!mount) return;
      mount.innerHTML = budgetModalHtml();
      store._budgetModalOpen = true;

      const backdrop = document.getElementById('budget-modal-backdrop');
      if (backdrop) {
        backdrop.addEventListener('click', (e) => {
          if (e.target === backdrop) window.__budgetCloseModal();
        });
      }
      const onKey = (e) => {
        if (e.key === 'Escape') {
          document.removeEventListener('keydown', onKey);
          window.__budgetCloseModal();
        }
      };
      document.addEventListener('keydown', onKey);
    };

    window.__budgetCloseModal = function __budgetCloseModal() {
      const mount = document.getElementById('budget-modal-mount');
      if (mount) mount.innerHTML = '';
      store._budgetModalOpen = false;
    };

    // window.__budgetResetClick()
    //   Confirms before calling dal.budgetReset() — this zeroes today's
    //   counts, so it deserves the same confirm-before-destructive-action
    //   pattern used elsewhere (e.g. the promotion-job reset modal).
    window.__budgetResetClick = function __budgetResetClick() {
      const doReset = () => {
        dal.budgetReset();
        if (store._budgetModalOpen) window.__budgetOpenModal(); // refresh contents in place
      };
      if (typeof showConfirm === 'function') {
        showConfirm(
          'Reset today\'s read and write counts? The operation log is kept. This cannot be undone.',
          doReset,
        );
      } else if (window.confirm('Reset today\'s read/write counter? The log is kept.')) {
        doReset();
      }
    };

    window.__budgetExportLogClick = function __budgetExportLogClick() {
      dal.budgetExportLog();
    };

    // window.__budgetSyncUI()
    //   Single entry point that keeps #budget-pill, #budget-warning-banner,
    //   and (if open) the modal's live numbers in sync with
    //   store.readCount/writeCount/budgetLog and store.userDoc.role. Safe
    //   to call far more often than the state actually changes — every
    //   branch is a cheap, idempotent DOM write.
    window.__budgetSyncUI = function __budgetSyncUI() {
      const pill = document.getElementById('budget-pill');
      const isAdmin = store.userDoc?.role === 'admin';

      // ── Floating pill (admin-only) ──
      if (pill) {
        if (isAdmin) {
          const pct = _budgetPct();
          pill.classList.add('is-visible');
          pill.classList.toggle('is-critical', pct >= DAL_BUDGET_BLOCK_PCT);
          pill.classList.toggle('is-warning', pct >= DAL_BUDGET_WARN_PCT && pct < DAL_BUDGET_BLOCK_PCT);
          pill.textContent = `📖 ${_budgetFmt(store.readCount)} / ${_budgetFmt(DAL_DAILY_READ_LIMIT)}`;
          // Native title attribute as the tooltip — pill.textContent is
          // plain text (no nested markup to hang a custom tooltip off of),
          // and title works for hover on desktop and long-press on mobile
          // without any extra DOM/JS. Shows the explicit/me()-overhead
          // split so the headline number's composition is one hover away.
          const explicitReads = store.readCount - store.meOverheadCount;
          pill.title = `Explicit reads: ${_budgetFmt(explicitReads)} · me() overhead: ${_budgetFmt(store.meOverheadCount)} · Total billed: ${_budgetFmt(store.readCount)}`;
        } else {
          pill.classList.remove('is-visible');
          // A non-admin (or signed-out) session should never have the
          // modal lingering open either — most relevant after sign-out.
          if (store._budgetModalOpen) window.__budgetCloseModal();
        }
      }

      // ── Persistent top warning banner (visible to any signed-in role —
      //    quota exhaustion affects everyone's app, not just admins) ──
      const banner     = document.getElementById('budget-warning-banner');
      const bannerText = document.getElementById('budget-warning-banner-text');
      if (banner && bannerText) {
        const pct = _budgetPct();
        if (pct >= DAL_BUDGET_BLOCK_PCT) {
          bannerText.textContent = '⚠ Read limit reached — only essential data shown';
          banner.classList.add('is-visible', 'is-critical');
          document.body.classList.add('has-budget-banner');
        } else if (pct >= DAL_BUDGET_WARN_PCT) {
          bannerText.textContent = `⚠ Approaching daily read limit (${_budgetFmt(store.readCount)} / ${_budgetFmt(DAL_DAILY_READ_LIMIT)})`;
          banner.classList.remove('is-critical');
          banner.classList.add('is-visible');
          document.body.classList.add('has-budget-banner');
        } else {
          banner.classList.remove('is-visible', 'is-critical');
          document.body.classList.remove('has-budget-banner');
        }
      }

      // ── Modal, if currently open ──
      if (store._budgetModalOpen) {
        const mount = document.getElementById('budget-modal-mount');
        if (mount && mount.firstElementChild) mount.innerHTML = budgetModalHtml();
      }
    };
    // ── END BUDGET UI ────────────────────────────────────────────────────────


    // ═══════════════════════════════════════════════════════════════════════════
    // REGISTRAR STUDENT REGISTRY VIEW  (#/registrar/students)
    // ── requireRole: 'admin', 'registrar'
    //
    // Architecture:
    //   Two tabs: "Students" (searchable table) and "Register New" (4-step form).
    //
    //   Students tab:
    //     - Fetches all students for the current EC year via a query on
    //       currentClassKey starting with `_${currentEcYear}` (where-clause
    //       approach: where('status','==','active') as fallback). Lists up to 200.
    //     - Columns: photo placeholder, studentId, fullName, fullNameAm, class,
    //       status badge, tuitionOwed (color-coded), action buttons.
    //     - Clicking a row or "View" opens a detail panel showing all fields plus
    //       parentUids resolved to display names via getDoc (cached in _rsParentCache).
    //
    //   Register New tab (4 steps):
    //     Step 1 — Student info: studentId, fullName, fullNameAm, dobEc, gender.
    //     Step 2 — Class assignment: grade → section → auto-computes classKey,
    //              auto-loads subjectIds for that grade, sets currentClassKey.
    //     Step 3 — Parent linking: search existing parent users by name/email
    //              and link by uid (recommended), OR invite a new parent via
    //              a Spark-safe /parentInvites document + shareable link that
    //              the parent opens to self-register (see dal.createParentInvite
    //              and the #/accept-invite/:inviteId/:token flow, defined
    //              earlier in this file near the login/auth components).
    //     Step 4 — Review & confirm: calls dal.createStudent(), then
    //              dal.updateClass(classKey, { studentIds: arrayUnion(studentId) }),
    //              then dal.updateUser(parentUid, { childKeys: arrayUnion(studentId) })
    //              if an existing parent was linked. (If an invite was sent
    //              instead, the parent link happens later, when the invite is
    //              accepted — see the accept-invite flow.)
    // ═══════════════════════════════════════════════════════════════════════════

    // Module-level state for the registrar students view.
    let _rsAllStudents    = [];   // fetched student list
    let _rsFilteredList   = [];   // after search filter
    let _rsParentCache    = {};   // { [uid]: userDoc } — parent name lookups
    let _rsActiveTab      = 'students'; // 'students' | 'register'
    let _rsDetailStudentId = null; // currently open detail panel studentId

    // 4-step form state object.
    const _rsForm = {
      step: 1,
      // Step 1
      studentId: '', fullName: '', fullNameAm: '', dobEc: '', gender: '',
      // Step 2
      grade: '', section: '', classKey: '', subjectIds: [],
      // Step 3 — parent linking. parentUid/parentName/parentEmail hold the
      // selected EXISTING parent (Link Existing Parent flow). inviteSent /
      // inviteEmail / inviteId / inviteLink hold the result of the Invite
      // New Parent flow (Spark-safe — see Step 3 below). The two are
      // mutually exclusive in the UI, but both are allowed to be set at
      // once is harmless since dal.createStudent() only reads parentUid.
      parentUid: '', parentName: '', parentEmail: '',
      showInviteForm: false,
      inviteSent: false, inviteEmail: '', inviteId: '', inviteLink: '',
    };

    // ─── Main view builder ────────────────────────────────────────────────────

    function registrarStudentsView() {
      setTimeout(_rsMountView, 0);

      const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);

      return `
        <div style="background:linear-gradient(135deg,#6A1B9A 0%,#4A148C 100%);border-radius:28px;padding:48px 32px;color:#fff;position:relative;overflow:hidden;margin-block-end:32px;box-shadow:0 16px 48px rgba(106,27,154,0.30);">
          <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 90% 15%,rgba(255,255,255,0.07) 0%,transparent 70%);pointer-events:none;"></div>
          <div style="position:relative;z-index:1;">
            <p style="font-size:0.62rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-block-end:8px;">Registrar Portal</p>
            <h1 style="font-size:1.65rem;font-weight:900;letter-spacing:-0.03em;line-height:1.15;color:#fff;margin-block-end:8px;">Student Registry</h1>
            <p style="font-size:0.80rem;color:rgba(255,255,255,0.65);font-weight:500;">${EC.formatEcAm(new Date())} · EC Year ${ecYear}</p>
          </div>
        </div>

        <!-- Tab strip -->
        <div class="reg-tabs" role="tablist" id="rs-tab-strip">
          <button
            class="reg-tab ${_rsActiveTab === 'students' ? 'active' : ''}"
            role="tab"
            aria-selected="${_rsActiveTab === 'students'}"
            id="rs-tab-students"
            onclick="window.__rsSetTab('students')">
            📋 Students
          </button>
          <button
            class="reg-tab ${_rsActiveTab === 'register' ? 'active' : ''}"
            role="tab"
            aria-selected="${_rsActiveTab === 'register'}"
            id="rs-tab-register"
            onclick="window.__rsSetTab('register')">
            ➕ Register New
          </button>
        </div>

        <!-- Students tab panel -->
        <div id="rs-panel-students"
             class="reg-tab-panel ${_rsActiveTab === 'students' ? 'active' : ''}"
             role="tabpanel">
          <!-- Detail panel (hidden by default) -->
          <div id="rs-detail-panel" style="display:none;"></div>

          <!-- Toolbar -->
          <div class="reg-toolbar">
            <div class="search-bar" style="flex:1 1 220px;">
              <span class="search-icon" aria-hidden="true">🔍</span>
              <input
                id="rs-search"
                type="search"
                class="input"
                placeholder="Search by name, ID, or class…"
                autocomplete="off"
                aria-label="Search students" />
            </div>
            <p id="rs-count-line" class="text-sm text-muted" style="flex-shrink:0;">
              <span class="spinner spinner-sm"></span>
            </p>
          </div>

          <!-- Table -->
          <div class="card" style="padding:0;overflow:hidden;">
            <div id="rs-table-area">
              ${skeletonTable(5, 4)}
            </div>
          </div>
        </div>

        <!-- Register New tab panel -->
        <div id="rs-panel-register"
             class="reg-tab-panel ${_rsActiveTab === 'register' ? 'active' : ''}"
             role="tabpanel">
          <div id="rs-reg-form-area">
            ${_rsRenderFormShell()}
          </div>
        </div>`;
    }

    // ─── Mount ────────────────────────────────────────────────────────────────

    async function _rsMountView() {
      if (!document.getElementById('rs-table-area')) return;

      // If we're starting on the register tab, don't fetch students yet.
      if (_rsActiveTab === 'register') {
        _rsRenderFormStep();
        return;
      }

      await _rsFetchAndRenderStudents();
      _rsWireSearch();
    }

    // ─── Fetch & render student list ─────────────────────────────────────────

    async function _rsFetchAndRenderStudents() {
      const area = document.getElementById('rs-table-area');
      if (!area) return;

      const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);

      try {
        // Fetch active students — use status == 'active' as the primary filter
        // (most efficient for Firestore; composite index on status is common).
        // Filter client-side to current year by checking currentClassKey ends with _${ecYear}.
        const allActive = await _rsFetchAllActiveStudents(ecYear);
        _rsAllStudents  = allActive;
        _rsFilteredList = [...allActive];
        _rsRenderTable(_rsFilteredList);
        _rsUpdateCountLine(_rsAllStudents.length, _rsFilteredList.length);
      } catch (err) {
        if (area) area.innerHTML = `
          <div class="reg-empty" style="color:var(--danger);">
            Failed to load students: ${_rsSafe(err.message)}
          </div>`;
        showToast('Failed to load students: ' + err.message, 'error');
      }
    }

    // _rsFetchAllActiveStudents(ecYear)
    //   Fetches up to 200 students with status === 'active', then filters
    //   client-side to those whose currentClassKey ends with `_${ecYear}`.
    //   Falls back to no year filter if config is missing.
    async function _rsFetchAllActiveStudents(ecYear) {
      const { getDocs: _getDocs, query: _q, collection: _col, where: _where, limit: _lim } =
        { getDocs, query, collection, where, limit };

      const q = _q(
        _col(db, 'students'),
        _where('status', '==', 'active'),
        _lim(200),
      );
      const snap = await _getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);

      const suffix = `_${ecYear}`;
      return snap.docs
        .map(d => d.data())
        .filter(s => !ecYear || (s.currentClassKey ?? '').endsWith(suffix));
    }

    // ─── Table render ─────────────────────────────────────────────────────────

    function _rsRenderTable(students) {
      const area = document.getElementById('rs-table-area');
      if (!area) return;

      if (students.length === 0) {
        area.innerHTML = `
          <div class="reg-empty">
            <div style="font-size:2rem;margin-block-end:var(--sp-3);opacity:.4;">👤</div>
            <p>No students found. Use the <strong>Register New</strong> tab to enroll one.</p>
          </div>`;
        return;
      }

      const rows = students.map(s => {
        const idAttr   = _rsEsc(s.studentId ?? '');
        const nameAttr = _rsEsc(s.fullName ?? '');
        const owed     = Number(s.tuitionOwed ?? 0);
        const tuitionHtml = owed > 0
          ? `<span class="reg-tuition-owed">ETB ${fmtNum(owed)}</span>`
          : `<span class="reg-tuition-clear">✓ Clear</span>`;

        const statusBadge = s.status === 'active'
          ? `<span class="badge badge-success badge-dot">Active</span>`
          : `<span class="badge badge-muted badge-dot">${_rsSafe(s.status ?? 'Unknown')}</span>`;

        const classDisplay = s.currentClassKey
          ? `<span class="reg-id-chip">${_rsSafe(s.currentClassKey)}</span>`
          : '<span class="text-muted">—</span>';

        return `
          <tr onclick="window.__rsOpenDetail('${idAttr}')" style="cursor:pointer;">
            <td>
              <div class="reg-photo">👤</div>
            </td>
            <td>
              <span class="reg-id-chip">${_rsSafe(s.studentId ?? '—')}</span>
            </td>
            <td>
              <div class="reg-name-line">${_rsSafe(s.fullName) || '<em class="text-muted">—</em>'}</div>
              ${s.fullNameAm ? `<div class="reg-name-am">${_rsSafe(s.fullNameAm)}</div>` : ''}
            </td>
            <td>${classDisplay}</td>
            <td>${statusBadge}</td>
            <td class="num">${tuitionHtml}</td>
            <td class="reg-actions" onclick="event.stopPropagation()">
              <button
                class="btn btn-ghost btn-sm"
                onclick="window.__rsOpenDetail('${idAttr}')"
                aria-label="View ${nameAttr}">
                👁 View
              </button>
              <button
                class="btn btn-ghost btn-sm"
                onclick="window.__rsEditStudent('${idAttr}')"
                aria-label="Edit ${nameAttr}">
                ✏️ Edit
              </button>
            </td>
          </tr>`;
      }).join('');

      area.innerHTML = `
        <div class="reg-table-wrap">
          <table class="reg-table">
            <thead>
              <tr>
                <th style="width:44px;"></th>
                <th>ID</th>
                <th>Name</th>
                <th>Class</th>
                <th>Status</th>
                <th class="num">Tuition Owed</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function _rsUpdateCountLine(total, filtered) {
      const el = document.getElementById('rs-count-line');
      if (!el) return;
      const shown = filtered === total
        ? `${total} student${total !== 1 ? 's' : ''}`
        : `${filtered} of ${total} student${total !== 1 ? 's' : ''}`;
      el.innerHTML = `Showing <strong>${shown}</strong>`;
    }

    // ─── Search wiring ────────────────────────────────────────────────────────

    function _rsWireSearch() {
      const searchEl = document.getElementById('rs-search');
      if (!searchEl) return;
      searchEl.addEventListener('input', () => {
        const q = searchEl.value.toLowerCase().trim();
        _rsFilteredList = _rsAllStudents.filter(s =>
          (s.fullName ?? '').toLowerCase().includes(q)        ||
          (s.fullNameAm ?? '').toLowerCase().includes(q)      ||
          (s.studentId ?? '').toLowerCase().includes(q)       ||
          (s.currentClassKey ?? '').toLowerCase().includes(q)
        );
        _rsRenderTable(_rsFilteredList);
        _rsUpdateCountLine(_rsAllStudents.length, _rsFilteredList.length);
      });
    }

    // ─── Detail panel ─────────────────────────────────────────────────────────

    window.__rsOpenDetail = async function __rsOpenDetail(studentId) {
      const panelEl = document.getElementById('rs-detail-panel');
      if (!panelEl) return;

      _rsDetailStudentId = studentId;

      // Show loading state
      panelEl.style.display = 'block';
      panelEl.innerHTML = `
        <div class="reg-detail-panel">
          <div class="reg-detail-header">
            <span class="reg-detail-title">📋 Student Detail</span>
            <button class="btn btn-ghost btn-sm" onclick="window.__rsCloseDetail()">✕ Close</button>
          </div>
          <div style="text-align:center;padding:var(--sp-5);">
            <div class="spinner" style="margin:0 auto;"></div>
          </div>
        </div>`;
      panelEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      try {
        // Fetch student (prefer from cache, else fetch)
        let student = _rsAllStudents.find(s => s.studentId === studentId);
        if (!student) {
          student = await dal.getStudent(studentId);
        }
        if (!student) {
          panelEl.innerHTML = `
            <div class="reg-detail-panel">
              <div class="reg-detail-header">
                <span class="reg-detail-title">Student not found</span>
                <button class="btn btn-ghost btn-sm" onclick="window.__rsCloseDetail()">✕ Close</button>
              </div>
            </div>`;
          return;
        }

        // Resolve parent names
        const parentUids = Array.isArray(student.parentUids) ? student.parentUids : [];
        const parentNames = await Promise.all(
          parentUids.map(async uid => {
            if (_rsParentCache[uid]) return _rsParentCache[uid];
            try {
              const snap = await getDoc(doc(db, 'users', uid));
              dal.budgetTrack(1, 0, 1);
              const u = snap.exists() ? snap.data() : null;
              _rsParentCache[uid] = u;
              return u;
            } catch (_) {
              return null;
            }
          })
        );

        const parentsHtml = parentNames.length === 0
          ? '<span class="text-muted">None linked</span>'
          : parentNames.map((u, i) => u
              ? `<span class="badge badge-primary" style="margin:2px;">${_rsSafe(u.displayName ?? parentUids[i])}</span>`
              : `<span class="text-muted">${_rsSafe(parentUids[i])}</span>`
          ).join(' ');

        const owed = Number(student.tuitionOwed ?? 0);
        const tuitionHtml = owed > 0
          ? `<span class="reg-tuition-owed">ETB ${fmtNum(owed)}</span>`
          : `<span class="reg-tuition-clear">✓ Clear</span>`;

        const statusBadge = student.status === 'active'
          ? `<span class="badge badge-success badge-dot">Active</span>`
          : `<span class="badge badge-muted badge-dot">${_rsSafe(student.status ?? '—')}</span>`;

        panelEl.innerHTML = `
          <div class="reg-detail-panel">
            <div class="reg-detail-header">
              <div style="display:flex;align-items:center;gap:var(--sp-3);">
                <div class="reg-photo" style="width:48px;height:48px;font-size:1.4rem;">👤</div>
                <div>
                  <div class="reg-detail-title">${_rsSafe(student.fullName ?? '—')}</div>
                  ${student.fullNameAm ? `<div class="text-sm text-muted">${_rsSafe(student.fullNameAm)}</div>` : ''}
                </div>
              </div>
              <button class="btn btn-ghost btn-sm" onclick="window.__rsCloseDetail()">✕ Close</button>
            </div>
            <div class="reg-detail-grid">
              <div class="reg-detail-item">
                <div class="reg-detail-label">Student ID</div>
                <div class="reg-detail-value"><span class="reg-id-chip">${_rsSafe(student.studentId ?? '—')}</span></div>
              </div>
              <div class="reg-detail-item">
                <div class="reg-detail-label">Status</div>
                <div class="reg-detail-value">${statusBadge}</div>
              </div>
              <div class="reg-detail-item">
                <div class="reg-detail-label">Current Class</div>
                <div class="reg-detail-value"><span class="reg-id-chip">${_rsSafe(student.currentClassKey ?? '—')}</span></div>
              </div>
              <div class="reg-detail-item">
                <div class="reg-detail-label">Gender</div>
                <div class="reg-detail-value">${_rsSafe(student.gender ?? '—')}</div>
              </div>
              <div class="reg-detail-item">
                <div class="reg-detail-label">Date of Birth (EC)</div>
                <div class="reg-detail-value">${_rsSafe(student.dobEc ?? '—')}</div>
              </div>
              <div class="reg-detail-item">
                <div class="reg-detail-label">Tuition Owed</div>
                <div class="reg-detail-value">${tuitionHtml}</div>
              </div>
              <div class="reg-detail-item" style="grid-column:1/-1;">
                <div class="reg-detail-label">Parents / Guardians</div>
                <div class="reg-detail-value">${parentsHtml}</div>
              </div>
              ${student.subjectIds && student.subjectIds.length > 0 ? `
              <div class="reg-detail-item" style="grid-column:1/-1;">
                <div class="reg-detail-label">Subjects</div>
                <div class="reg-detail-value" style="display:flex;flex-wrap:wrap;gap:4px;">
                  ${student.subjectIds.map(sid => `<span class="badge badge-muted">${_rsSafe(sid)}</span>`).join('')}
                </div>
              </div>` : ''}
              ${student.notes ? `
              <div class="reg-detail-item" style="grid-column:1/-1;">
                <div class="reg-detail-label">Notes</div>
                <div class="reg-detail-value">${_rsSafe(student.notes)}</div>
              </div>` : ''}
            </div>
            <div class="reg-form-actions" style="margin-block-start:var(--sp-4);">
              <button
                class="btn btn-ghost btn-sm"
                onclick="window.__rsEditStudent('${_rsEsc(student.studentId ?? '')}')">
                ✏️ Edit Student
              </button>
              ${await _rsRenderReportCardButtons(student)}
            </div>
          </div>`;
      } catch (err) {
        panelEl.innerHTML = `
          <div class="reg-detail-panel">
            <div class="reg-detail-header">
              <span class="reg-detail-title">Error loading student</span>
              <button class="btn btn-ghost btn-sm" onclick="window.__rsCloseDetail()">✕ Close</button>
            </div>
            <p style="color:var(--danger);">${_rsSafe(err.message)}</p>
          </div>`;
      }
    };

    window.__rsCloseDetail = function __rsCloseDetail() {
      const panelEl = document.getElementById('rs-detail-panel');
      if (panelEl) { panelEl.style.display = 'none'; panelEl.innerHTML = ''; }
      _rsDetailStudentId = null;
    };

    // _rsRenderReportCardButtons(student)
    //   Fetches the student's academicYears sub-collection for the current
    //   EC year and renders a "Print Report Card" button for each semester
    //   whose data exists and is finalized. Returns an HTML string (async).
    async function _rsRenderReportCardButtons(student) {
      const sid    = student.studentId ?? '';
      const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);
      if (!sid) return '';

      try {
        dal.budgetTrack(1, 0, 1);
        const yearSnap = await getDoc(doc(db, 'students', sid, 'academicYears', ecYear));
        if (!yearSnap.exists()) return '';
        const yearData = yearSnap.data();
        const semesters = yearData.semesters ?? {};

        const buttons = Object.entries(semesters)
          .filter(([, semData]) => semData && semData.finalized === true)
          .sort(([a], [b]) => Number(a) - Number(b))
          .map(([semNum]) => {
            const href = `#/report-card/${_rsEsc(sid)}/${_rsEsc(ecYear)}/${_rsEsc(semNum)}`;
            return `
              <a
                href="${href}"
                class="btn btn-accent btn-sm"
                style="text-decoration:none;"
                aria-label="Print report card Semester ${_rsSafe(semNum)}">
                🖨️ Report Card — Sem ${_rsSafe(semNum)}
              </a>`;
          }).join('');

        return buttons || '';
      } catch (_) {
        return ''; // best-effort; don't block the detail panel
      }
    }

    window.__rsEditStudent = function __rsEditStudent(studentId) {
      showToast('Edit student: coming in a future prompt.', 'info');
    };

    // ─── Tab switching ────────────────────────────────────────────────────────

    window.__rsSetTab = function __rsSetTab(tab) {
      _rsActiveTab = tab;

      document.querySelectorAll('.reg-tab').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.reg-tab-panel').forEach(el => el.classList.remove('active'));

      const tabBtn = document.getElementById(`rs-tab-${tab}`);
      const panel  = document.getElementById(`rs-panel-${tab}`);
      if (tabBtn) { tabBtn.classList.add('active'); tabBtn.setAttribute('aria-selected', 'true'); }
      if (panel)  panel.classList.add('active');

      // Reset aria on the other tab
      const otherTab = tab === 'students' ? 'register' : 'students';
      const otherBtn = document.getElementById(`rs-tab-${otherTab}`);
      if (otherBtn) otherBtn.setAttribute('aria-selected', 'false');

      if (tab === 'students') {
        // Fetch if not already loaded
        if (_rsAllStudents.length === 0) {
          _rsFetchAndRenderStudents().then(() => _rsWireSearch());
        }
      } else if (tab === 'register') {
        // Re-render the registration form into the panel
        const area = document.getElementById('rs-reg-form-area');
        if (area) {
          area.innerHTML = _rsRenderFormShell();
          _rsRenderFormStep();
        }
      }
    };

    // ─── Registration form — shell ────────────────────────────────────────────

    function _rsRenderFormShell() {
      return `
        <!-- Step indicator -->
        <div class="reg-steps" id="rs-step-indicators">
          ${[
            { n: 1, label: 'Student Info'     },
            { n: 2, label: 'Class'            },
            { n: 3, label: 'Parent / Guardian'},
            { n: 4, label: 'Review & Confirm' },
          ].map(s => {
            const cls = _rsForm.step > s.n ? 'done'
                      : _rsForm.step === s.n ? 'active' : '';
            const icon = _rsForm.step > s.n ? '✓' : s.n;
            return `
              <div class="reg-step-item ${cls}">
                <div class="reg-step-num">${icon}</div>
                <div class="reg-step-label">${s.label}</div>
              </div>`;
          }).join('')}
        </div>
        <!-- Step content -->
        <div id="rs-step-content"></div>`;
    }

    // ─── Registration form — step renderer ───────────────────────────────────

    function _rsRenderFormStep() {
      const content = document.getElementById('rs-step-content');
      if (!content) return;

      // Update step indicators
      const indicators = document.getElementById('rs-step-indicators');
      if (indicators) {
        indicators.innerHTML = [
          { n: 1, label: 'Student Info'      },
          { n: 2, label: 'Class'             },
          { n: 3, label: 'Parent / Guardian' },
          { n: 4, label: 'Review & Confirm'  },
        ].map(s => {
          const cls  = _rsForm.step > s.n ? 'done' : _rsForm.step === s.n ? 'active' : '';
          const icon = _rsForm.step > s.n ? '✓' : s.n;
          return `
            <div class="reg-step-item ${cls}">
              <div class="reg-step-num">${icon}</div>
              <div class="reg-step-label">${s.label}</div>
            </div>`;
        }).join('');
      }

      if      (_rsForm.step === 1) content.innerHTML = _rsStep1Html();
      else if (_rsForm.step === 2) content.innerHTML = _rsStep2Html();
      else if (_rsForm.step === 3) { content.innerHTML = _rsStep3Html(); _rsWireParentSearch(); }
      else if (_rsForm.step === 4) content.innerHTML = _rsStep4Html();
    }

    // ── Step 1: Student info ──────────────────────────────────────────────────

    function _rsStep1Html() {
      const ecYear    = store.config?.currentEcYear ?? String(EC.todayEc().year);
      const todayEc   = EC.todayEc();
      const dobHint   = `${todayEc.year - 20}-01-01`;

      return `
        <div class="reg-form-card">
          <div class="reg-form-title">Step 1 — Student Information</div>
          <div class="reg-form-grid">
            <div class="input-group" style="margin:0;">
              <label class="label" for="rs-s1-id">Student ID *</label>
              <input id="rs-s1-id" class="input" type="text"
                placeholder="e.g. STU-2025-001"
                value="${_rsEsc(_rsForm.studentId)}"
                autocomplete="off" />
              <span class="label-hint">Unique identifier — cannot be changed later.</span>
            </div>
            <div class="input-group" style="margin:0;">
              <label class="label" for="rs-s1-gender">Gender *</label>
              <select id="rs-s1-gender" class="input">
                <option value="">— Select —</option>
                <option value="Male"   ${_rsForm.gender === 'Male'   ? 'selected' : ''}>Male</option>
                <option value="Female" ${_rsForm.gender === 'Female' ? 'selected' : ''}>Female</option>
                <option value="Other"  ${_rsForm.gender === 'Other'  ? 'selected' : ''}>Other</option>
              </select>
            </div>
            <div class="input-group span-2" style="margin:0;">
              <label class="label" for="rs-s1-name">Full Name (English) *</label>
              <input id="rs-s1-name" class="input" type="text"
                placeholder="e.g. Abebe Kebede Hailu"
                value="${_rsEsc(_rsForm.fullName)}" />
            </div>
            <div class="input-group span-2" style="margin:0;">

                placeholder="ለምሳሌ፡ አበበ ቀበደ ሃይሉ"

    }

    window.__rsStep1Next = function __rsStep1Next() {
      const errorEl  = document.getElementById('rs-s1-error');
      if (errorEl) errorEl.textContent = '';

      const studentId = document.getElementById('rs-s1-id')?.value.trim()      ?? '';
      const fullName  = document.getElementById('rs-s1-name')?.value.trim()    ?? '';
      const fullNameAm= document.getElementById('rs-s1-name-am')?.value.trim() ?? '';
      const dobEc     = document.getElementById('rs-s1-dob')?.value.trim()     ?? '';
      const gender    = document.getElementById('rs-s1-gender')?.value         ?? '';

      if (!fullName)  { if (errorEl) errorEl.textContent = 'Full Name (English) is required.'; return; }
      if (!gender)    { if (errorEl) errorEl.textContent = 'Gender is required.'; return; }

      _rsForm.studentId  = studentId;
      _rsForm.fullName   = fullName;
      _rsForm.fullNameAm = fullNameAm;
      _rsForm.dobEc      = dobEc;
      _rsForm.gender     = gender;
      _rsForm.step       = 2;
      _rsRenderFormStep();
    };

    // ── Step 2: Class assignment ──────────────────────────────────────────────

    function _rsStep2Html() {
      const ecYear     = store.config?.currentEcYear ?? String(EC.todayEc().year);
      const gradeLevels = (store.config?.gradeLevels && store.config.gradeLevels.length)
        ? store.config.gradeLevels
        : GRADE_LEVELS;
      const sections   = (store.config?.sections && store.config.sections.length)
        ? store.config.sections
        : ['A','B','C','D'];

      const gradeOpts = gradeLevels.map(g =>
        `<option value="${g}" ${_rsForm.grade === g ? 'selected' : ''}>${g}</option>`
      ).join('');
      const sectionOpts = sections.map(s =>
        `<option value="${s}" ${_rsForm.section === s ? 'selected' : ''}>${s}</option>`
      ).join('');

      const classKeyPreview = _rsForm.grade && _rsForm.section
        ? `${_rsForm.grade}${_rsForm.section}_${ecYear}`
        : '—';

      // Show subjects for the selected grade (from cache)
      const subjects = _rsForm.grade ? dal.getSubjectsForGrade(_rsForm.grade) : [];
      const subjectList = subjects.length > 0
        ? subjects.map(s => `<span class="badge badge-muted" style="margin:2px;">${_rsSafe(s.name ?? s.subjectId)}</span>`).join('')
        : '<span class="text-muted text-sm">Select a grade to preview subjects</span>';

      return `
        <div class="reg-form-card">
          <div class="reg-form-title">Step 2 — Class Assignment</div>
          <div class="reg-form-grid">
            <div class="input-group" style="margin:0;">
              <label class="label" for="rs-s2-grade">Grade *</label>
              <select id="rs-s2-grade" class="input"
                onchange="window.__rsStep2UpdateKey()">
                <option value="">— Select Grade —</option>
                ${gradeOpts}

            </div>
            <div class="input-group" style="margin:0;">
              <label class="label" for="rs-s2-section">Section *</label>
              <select id="rs-s2-section" class="input"
                onchange="window.__rsStep2UpdateKey()">
                <option value="">— Select Section —</option>
                ${sectionOpts}
              </select>
            </div>
            <div class="input-group span-2" style="margin:0;">
              <label class="label">Class Key (auto-computed)</label>
              <div class="cls-key-preview" id="rs-s2-key-preview">${_rsSafe(classKeyPreview)}</div>
              <span class="label-hint">Academic year: EC ${ecYear}</span>
            </div>
            <div class="input-group span-2" style="margin:0;">
              <label class="label">Subjects for this grade</label>
              <div id="rs-s2-subjects" style="display:flex;flex-wrap:wrap;gap:4px;margin-block-start:4px;">
                ${subjectList}
              </div>
            </div>
          </div>
          <div id="rs-s2-error" class="input-error mt-3" role="alert"></div>
          <div class="reg-form-actions">
            <button class="btn btn-ghost" onclick="window.__rsFormBack()">← Back</button>
            <button class="btn btn-primary" onclick="window.__rsStep2Next()">
              Next: Parent / Guardian →
            </button>
          </div>
        </div>`;
    }

    window.__rsStep2UpdateKey = function __rsStep2UpdateKey() {
      const ecYear   = store.config?.currentEcYear ?? String(EC.todayEc().year);
      const grade    = document.getElementById('rs-s2-grade')?.value   ?? '';
      const section  = document.getElementById('rs-s2-section')?.value ?? '';
      const preview  = document.getElementById('rs-s2-key-preview');
      const subjectsEl = document.getElementById('rs-s2-subjects');

      if (preview) {
        preview.textContent = grade && section ? `${grade}${section}_${ecYear}` : '—';
      }

      // Update subject list
      if (subjectsEl && grade) {
        const subs = dal.getSubjectsForGrade(grade);
        if (subs.length > 0) {
          subjectsEl.innerHTML = subs.map(s =>
            `<span class="badge badge-muted" style="margin:2px;">${_rsSafe(s.name ?? s.subjectId)}</span>`
          ).join('');
        } else {
          // Try fetching from Firestore if cache is empty
