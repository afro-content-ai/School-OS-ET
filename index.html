        const max = Number(s.maxGrade ?? 12);
        return g >= min && g <= max;
      });
    };


    // ── Gradebooks ───────────────────────────────────────────────────────────
    // Gradebooks live one level under their class: classes/{classKey}/
    // gradebooks/{subjectKey}. Shape:
    //   {
    //     columns:    [{ id, label, maxScore }, …],
    //     scores:     { [studentId]: { [columnId]: number } },
    //     semester:   1 | 2,        // set by the caller via createGradebook(data)
    //     finalized:  false,
    //     createdAt, finalizedAt, finalizedBy
    //   }
    // store.gradebookCache holds whichever class's gradebooks are currently
    // open in the UI, keyed by subjectKey — callers are expected to load
    // (and, on navigating to a different class, clear/replace) the cache
    // via dal.getGradebook()/dal.listGradebooks() before calling
    // dal.saveScore() or dal.finalizeGradebook(), since both validate
    // against the cached copy rather than re-fetching.

    const GRADE_LETTER_CUTOFFS = [
      { min: 90, letter: 'A' },
      { min: 80, letter: 'B' },
      { min: 70, letter: 'C' },
      { min: 60, letter: 'D' },
      { min: 0,  letter: 'F' },
    ];

    // gradeLetterFor(percentScore)
    //   Maps a 0–100 percent score to a letter grade: A≥90, B≥80, C≥70,
    //   D≥60, F<60. Internal helper — not exposed on dal.
    function gradeLetterFor(percentScore) {
      return GRADE_LETTER_CUTOFFS.find(c => percentScore >= c.min).letter;
    }

    // dal.getGradebook(classKey, subjectKey)
    //   Reads a single subject's gradebook for a class at
    //   classes/{classKey}/gradebooks/{subjectKey}, caches it in
    //   store.gradebookCache[subjectKey], and returns the data (or null
    //   if it doesn't exist yet).
    dal.getGradebook = async function getGradebook(classKey, subjectKey) {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'classes', classKey, 'gradebooks', subjectKey));
      const data = snap.exists() ? snap.data() : null;
      store.gradebookCache[subjectKey] = data;
      return data;
    };

    // dal.createGradebook(classKey, subjectKey, data)
    //   Creates a new gradebook at classes/{classKey}/gradebooks/{subjectKey}
    //   with the given columns (and any other caller-supplied fields, e.g.
    //   semester), an empty scores map, finalized: false, and a server
    //   createdAt timestamp.
    dal.createGradebook = async function createGradebook(classKey, subjectKey, data) {
      dal.budgetTrack(0, 1, 1);
      await setDoc(doc(db, 'classes', classKey, 'gradebooks', subjectKey), {
        ...data,
        columns:   data.columns ?? [],
        scores:    {},
        finalized: false,
        createdAt: serverTimestamp(),
      });
    };

    // dal.saveScore(classKey, subjectKey, studentId, columnId, rawValue)
    //   Writes a single student/column score into a gradebook, validating
    //   against the cached copy (store.gradebookCache[subjectKey]) before
    //   writing anything:
    //     (a) the gradebook must already be cached (loaded via
    //         dal.getGradebook()/dal.listGradebooks())
    //     (b) the column must exist on the gradebook
    //     (c) the numeric value must be within [0, col.maxScore]
    //     (d) the gradebook must not already be finalized
    //   On success, writes via a single dot-notation field path
    //   (scores.${studentId}.${columnId}) — never the whole scores map —
    //   and mirrors the same value into the local cache so subsequent
    //   reads/validations in the same session see it immediately.
    dal.saveScore = async function saveScore(classKey, subjectKey, studentId, columnId, rawValue) {
      const gb = store.gradebookCache[subjectKey];
      if (!gb) {
        throw new Error(`Gradebook not loaded for subject "${subjectKey}" — call dal.getGradebook() first.`);
      }

      if (gb.finalized) {
        throw new Error(`Gradebook for subject "${subjectKey}" is finalized and can no longer be edited.`);
      }

      const col = (gb.columns ?? []).find(c => c.id === columnId);
      if (!col) {
        throw new RangeError(`Column "${columnId}" does not exist on this gradebook.`);
      }

      const value = Number(rawValue);
      if (Number.isNaN(value) || value < 0 || value > col.maxScore) {
        throw new RangeError(
          `Score for column "${columnId}" must be a number between 0 and ${col.maxScore} (got "${rawValue}").`
        );
      }

      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'classes', classKey, 'gradebooks', subjectKey), {
        [`scores.${studentId}.${columnId}`]: value,
      });

      // Mirror into the local cache so it stays consistent with Firestore
      // without requiring a re-fetch.
      gb.scores ??= {};
      gb.scores[studentId] ??= {};
      gb.scores[studentId][columnId] = value;
    };

    // dal.listGradebooks(classKey)
    //   Lists every subject's gradebook for a class and caches each one in
    //   store.gradebookCache, keyed by its document id (subjectKey).
    dal.listGradebooks = async function listGradebooks(classKey) {
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled
      const snap = await getDocs(collection(db, 'classes', classKey, 'gradebooks'));
      dal.budgetTrack(snap.size, 0, snap.size);

      const gradebooks = snap.docs.map(d => {
        const data = d.data();
        store.gradebookCache[d.id] = data;
        return data;
      });
      return gradebooks;
    };

    // dal.computeRanks(roster, averages)
    //   roster:    array of studentIds
    //   averages:  { [studentId]: number }  — e.g. percentScore
    //   Sorts students by average descending and assigns 1-based ranks;
    //   students tied on average share the same rank (standard
    //   competition ranking — a tie for 2nd is followed by 4th, not 3rd).
    //   Returns a { [studentId]: rank } map. Synchronous — no Firestore
    //   access — so it isn't async like the rest of the DAL.
    dal.computeRanks = function computeRanks(roster, averages) {
      const sorted = [...roster].sort((a, b) => (averages[b] ?? 0) - (averages[a] ?? 0));

      const ranks = {};
      let rank = 0;
      let studentsAtRank = 0;
      let prevAverage = null;

      sorted.forEach((studentId) => {
        const avg = averages[studentId] ?? 0;
        studentsAtRank += 1;

        if (prevAverage === null || avg < prevAverage) {
          rank += studentsAtRank;
          studentsAtRank = 0;
          prevAverage = avg;
        }

        ranks[studentId] = rank;
      });

      return ranks;
    };

    // dal.finalizeGradebook(classKey, subjectKey, studentRemarks)
    //   studentRemarks: { [studentId]: remarkString }
    //   Locks a gradebook for grading and pushes each student's computed
    //   result into their permanent record. Reads only the cached
    //   gradebook (store.gradebookCache[subjectKey] — load it first via
    //   dal.getGradebook()/dal.listGradebooks()); does not re-fetch.
    //
    //   For every student with at least one score recorded:
    //     totalScore   = sum of that student's column values
    //     maxPossible  = sum of every column's maxScore
    //     percentScore = totalScore / maxPossible * 100
    //     grade        = gradeLetterFor(percentScore)
    //     remark       = studentRemarks[studentId] ?? ''
    //   Ranks are computed once across the whole roster via
    //   dal.computeRanks(roster, averages), where averages is each
    //   student's percentScore.
    //
    //   All writes happen in a single writeBatch:
    //     - one batch.set(…, { merge: true }) per student into
    //       students/{studentId}/academicYears/{ecYear}, nesting the
    //       result under the gradebook's subject and semester so other
    //       subjects'/semesters' results for the same year are untouched
    //     - one batch.update() on the gradebook itself: finalized: true,
    //       finalizedAt, finalizedBy
    //   Throws if the gradebook isn't cached or is already finalized.
    dal.finalizeGradebook = async function finalizeGradebook(classKey, subjectKey, studentRemarks) {
      const gb = store.gradebookCache[subjectKey];
      if (!gb) {
        throw new Error(`Gradebook not loaded for subject "${subjectKey}" — call dal.getGradebook() first.`);
      }
      if (gb.finalized) {
        throw new Error(`Gradebook for subject "${subjectKey}" is already finalized.`);
      }

      const columns     = gb.columns ?? [];
      const maxPossible = columns.reduce((sum, col) => sum + col.maxScore, 0);
      const scores      = gb.scores ?? {};
      const roster      = Object.keys(scores);
      const ecYear      = EC.todayEc().year;

      const results  = {};  // studentId → computed result (without rank yet)
      const averages = {};  // studentId → percentScore, input to computeRanks

      roster.forEach((studentId) => {
        const studentScores = scores[studentId] ?? {};
        const totalScore = columns.reduce(
          (sum, col) => sum + (Number(studentScores[col.id]) || 0),
          0
        );
        const percentScore = maxPossible > 0 ? (totalScore / maxPossible) * 100 : 0;

        results[studentId] = {
          totalScore,
          maxPossible,
          percentScore,
          grade:  gradeLetterFor(percentScore),
          remark: studentRemarks[studentId] ?? '',
        };
        averages[studentId] = percentScore;
      });

      const ranks = dal.computeRanks(roster, averages);

      const batch = writeBatch(db);

      roster.forEach((studentId) => {
        const result = { ...results[studentId], rank: ranks[studentId] };

        batch.set(
          doc(db, 'students', studentId, 'academicYears', String(ecYear)),
          {
            subjects: {
              [subjectKey]: {
                [`semester${gb.semester ?? 1}`]: result,
              },
            },
          },
          { merge: true }
        );
      });

      batch.update(doc(db, 'classes', classKey, 'gradebooks', subjectKey), {
        finalized:   true,
        finalizedAt: serverTimestamp(),
        finalizedBy: store.user?.uid ?? null,
      });

      // roster.length writes for the per-student academicYears docs, plus
      // 1 write for the gradebook's own finalized/finalizedAt/finalizedBy
      // update — all committed atomically below. docCount matches writes
      // 1:1 here since every write in the batch is a distinct document.
      dal.budgetTrack(0, roster.length + 1, roster.length + 1);
      await batch.commit();

      // Mirror the finalized state into the local cache.
      gb.finalized   = true;
      gb.finalizedAt = new Date();
      gb.finalizedBy = store.user?.uid ?? null;
    };

    // ── Attendance ───────────────────────────────────────────────────────────
    // Attendance is written in two places per day, per class, kept in sync
    // by a single writeBatch in dal.markAttendance():
    //   classes/{classKey}/attendance/{dateKey}   — one doc per class per
    //     day, holding every student's status (statuses map) — the fast
    //     path for "show me today's roster for this class".
    //   students/{studentId}/attendance/{dateKey} — one doc per student per
    //     day, mirroring just that student's status — the fast path for
    //     "show me this student's attendance history across classes/days".
    // dateKey is a sortable string id (e.g. '2018-02-15' in EC, or
    // whatever format the caller settles on) — it's also stored as a field
    // on each doc so range queries with where('dateKey', '>=', …) work.

    // dal.getAttendance(classKey, dateKey)
    //   Reads a single day's class-level attendance doc at
    //   classes/{classKey}/attendance/{dateKey}. Returns the document
    //   data, or null if it doesn't exist (e.g. attendance not yet taken).
    dal.getAttendance = async function getAttendance(classKey, dateKey) {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'classes', classKey, 'attendance', dateKey));
      return snap.exists() ? snap.data() : null;
    };

    // dal.markAttendance(classKey, dateKey, statuses, studentIds)
    //   statuses:    { [studentId]: 'present' | 'absent' | 'late' }
    //   studentIds:  full roster for the class — every student in this
    //                array gets a per-child mirror doc, even ones missing
    //                from `statuses` (those default to 'absent').
    //   Only the homeroom teacher of this class may mark attendance for
    //   it — checked against store.userDoc.homeroomOf, which is expected
    //   to be an array of classKeys the signed-in teacher is homeroom for.
    //   Throws if the check fails.
    //
    //   dateGts is derived by round-tripping today's date through the
    //   Ethiopian calendar and back (EC.toEc(new Date()) → EC.toGc(…)),
    //   which normalizes "now" down to midnight UTC of today's calendar
    //   day — so every attendance doc for the same day gets an identical,
    //   comparable timestamp regardless of what time of day it was marked.
    //
    //   Writes, in a single writeBatch:
    //     - the class-level doc at classes/{classKey}/attendance/{dateKey}
    //     - one per-child mirror at students/{studentId}/attendance/{dateKey}
    //       for every studentId in studentIds
    //   Budget-tracks 0 reads, 1 + studentIds.length writes.
    dal.markAttendance = async function markAttendance(classKey, dateKey, statuses, studentIds) {
      if (!store.userDoc?.homeroomOf?.includes(classKey)) {
        throw new Error(`Only the homeroom teacher of class "${classKey}" may mark its attendance.`);
      }

      const { year, month, day } = EC.toEc(new Date());
      const dateGts = Timestamp.fromDate(EC.toGc(year, month, day));

      const batch = writeBatch(db);

      batch.set(doc(db, 'classes', classKey, 'attendance', dateKey), {
        dateKey,
        dateGts,
        classKey,
        markedBy: store.user.uid,
        statuses,
      });

      studentIds.forEach((studentId) => {
        batch.set(doc(db, 'students', studentId, 'attendance', dateKey), {
          dateKey,
          dateGts,
          classKey,
          status:   statuses[studentId] ?? 'absent',
          markedBy: store.user.uid,
        });
      });

      dal.budgetTrack(0, 1 + studentIds.length, 1 + studentIds.length);
      await batch.commit();
    };

    // dal.getStudentAttendance(studentId, startDateKey, endDateKey)
    //   Lists a student's attendance mirror docs at
    //   students/{studentId}/attendance whose dateKey falls within
    //   [startDateKey, endDateKey] (inclusive). dateKey must sort
    //   lexicographically the same as chronologically (e.g. zero-padded
    //   'YYYY-MM-DD') for the range comparison to behave correctly.
    dal.getStudentAttendance = async function getStudentAttendance(studentId, startDateKey, endDateKey) {
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled
      const q = query(
        collection(db, 'students', studentId, 'attendance'),
        where('dateKey', '>=', startDateKey),
        where('dateKey', '<=', endDateKey),
      );
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => d.data());
    };

    // dal.getClassAttendanceRange(classKey, startDateKey, endDateKey)
    //   Lists a class's day-level attendance docs at
    //   classes/{classKey}/attendance whose dateKey falls within
    //   [startDateKey, endDateKey] (inclusive) — same dateKey-format
    //   requirement as dal.getStudentAttendance().
    dal.getClassAttendanceRange = async function getClassAttendanceRange(classKey, startDateKey, endDateKey) {
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled
      const q = query(
        collection(db, 'classes', classKey, 'attendance'),
        where('dateKey', '>=', startDateKey),
        where('dateKey', '<=', endDateKey),
      );
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => d.data());
    };

    // dal.subscribeStudentAttendance(studentId, onNew)
    //   Real-time "today's attendance was just marked" notifier for the
    //   parent dashboard. Sets up onSnapshot on
    //   students/{studentId}/attendance filtered to where('dateKey','==',
    //   todayDateKey) — that's at most a single matching document, so each
    //   snapshot fire budget-tracks 0 or 1 reads.
    //
    //   todayDateKey is computed once, at subscribe time, the same way
    //   every other attendance call site does (EC.todayEc() → zero-padded
    //   'YYYY-MM-DD') — see _pdDateKey()/_taAttDateKey_(). Because the
    //   listener is scoped to a single fixed dateKey rather than a range,
    //   it does NOT roll over automatically at local midnight; a parent
    //   who leaves the dashboard open across midnight won't see the
    //   listener silently start watching the new day. In practice the
    //   parent dashboard re-mounts (and re-subscribes) on essentially
    //   every visit, so this is an acceptable tradeoff for the simplicity
    //   of a single where('==', …) clause over a range query.
    //
    //   onNew(record) fires only for documents that are newly ADDED to the
    //   result set after the listener attaches — i.e. the moment a
    //   homeroom teacher's dal.markAttendance() call lands for today —
    //   never for the initial snapshot of a pre-existing doc (so opening
    //   the dashboard after attendance was already taken this morning
    //   does not re-fire the toast). docChanges() is the mechanism: its
    //   type is 'added' both for a brand-new doc AND for the very first
    //   snapshot's contents, so a one-shot `isFirstSnapshot` flag
    //   distinguishes "doc existed before we subscribed" from "doc just
    //   appeared while we were watching".
    //
    //   Registers the unsubscribe in store.listeners so dal.cleanup()/
    //   signOut() tears it down like every other live listener. Returns
    //   the unsubscribe function.
    dal.subscribeStudentAttendance = function subscribeStudentAttendance(studentId, onNew) {
      const today = EC.todayEc();
      const todayDateKey = `${today.year}-${String(today.month).padStart(2,'0')}-${String(today.day).padStart(2,'0')}`;

      const q = query(
        collection(db, 'students', studentId, 'attendance'),
        where('dateKey', '==', todayDateKey),
      );

      let isFirstSnapshot = true;

      const unsubscribe = onSnapshot(q, (snap) => {
        dal.budgetTrack(snap.size, 0, snap.size);

        if (isFirstSnapshot) {
          // Don't notify for attendance that was already marked before
          // this listener attached — only for records that arrive while
          // we're actively watching.
          isFirstSnapshot = false;
          return;
        }

        snap.docChanges().forEach((change) => {
          if (change.type === 'added' && typeof onNew === 'function') {
            onNew(change.doc.data());
          }
        });
      }, (err) => {
        console.error('subscribeStudentAttendance error:', err);
      });

      store.listeners.push(unsubscribe);
      return unsubscribe;
    };

    // dal.getStudentAcademicYear(studentId, ecYear)
    //   Reads a single student's academic-year record at
    //   students/{studentId}/academicYears/{ecYear} — the document
    //   dal.finalizeGradebook() writes into, shaped as:
    //     { subjects: { [subjectKey]: { [`semester${n}`]: {
    //         totalScore, maxPossible, percentScore, grade, rank, remark
    //     } } } }
    //   Returns the document data, or null if it doesn't exist (e.g. no
    //   gradebook has been finalized for this student yet this year).
    //   Not cached internally — callers (e.g. the parent dashboard) cache
    //   the result themselves, keyed by studentId, to avoid re-reading on
    //   every render.
    dal.getStudentAcademicYear = async function getStudentAcademicYear(studentId, ecYear) {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'students', studentId, 'academicYears', String(ecYear)));
      return snap.exists() ? snap.data() : null;
    };

    // ── Homework ─────────────────────────────────────────────────────────────
    // Homework lives at homework/{classKey}/assignments/{homeworkId}, with
    // homeworkId generated as 'hw_' + Date.now() at post time. Each
    // assignment denormalizes the class's studentIds roster as it stood
    // at the moment it was posted — a snapshot, not a live reference — so
    // dal.getHomeworkForStudent() can filter with a single
    // array-contains query instead of joining against the class doc.

    // dal.postHomework(classKey, data)
    //   Posts a new homework assignment for a class. Only a teacher
    //   currently assigned to teach this class (teachingClassKeys), its
    //   homeroom teacher (homeroomOf), or an admin may post.
    //
    //   Reads the class doc first (dal.getClass(classKey) — 1 read) to
    //   snapshot its current studentIds roster, then setDoc()s the new
    //   assignment with every field from `data` plus classKey,
    //   studentIds, postedBy, and a server createdAt. Returns the new
    //   homeworkId.
    dal.postHomework = async function postHomework(classKey, data) {
      const userDoc = store.userDoc;
      const isAuthorized =
        userDoc?.teachingClassKeys?.includes(classKey) ||
        userDoc?.homeroomOf?.includes(classKey) ||
        userDoc?.role === ROLES.ADMIN;

      if (!isAuthorized) {
        throw new Error(`Not authorized to post homework for class "${classKey}".`);
      }

      const cls = await dal.getClass(classKey);
      const studentIds = cls?.studentIds ?? [];

      const homeworkId = 'hw_' + Date.now();

      dal.budgetTrack(0, 1, 1);
      await setDoc(doc(db, 'homework', classKey, 'assignments', homeworkId), {
        ...data,
        homeworkId,       // denormalized so reads don't require merging the doc ID
        classKey,
        studentIds,
        postedBy:  store.user.uid,
        createdAt: serverTimestamp(),
      });

      return homeworkId;
    };

    // dal.listHomework(classKey)
    //   Lists the 20 most recent homework assignments for a class,
    //   newest first. Merges the document ID as `homeworkId` into each
    //   returned object so the homework view can use it for edit/delete
    //   operations without a separate field lookup (postHomework uses the
    //   doc ID as the identifier, not a stored field).
    dal.listHomework = async function listHomework(classKey) {
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled
      const q = query(
        collection(db, 'homework', classKey, 'assignments'),
        orderBy('createdAt', 'desc'),
        limit(20),
      );
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => ({ homeworkId: d.id, ...d.data() }));
    };

    // dal.getHomeworkForStudent(classKey, studentId)
    //   Lists up to 10 homework assignments for a class whose denormalized
    //   studentIds roster includes this student.
    dal.getHomeworkForStudent = async function getHomeworkForStudent(classKey, studentId) {
      const q = query(
        collection(db, 'homework', classKey, 'assignments'),
        where('studentIds', 'array-contains', studentId),
        limit(10),
      );
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => d.data());
    };

    // dal.updateHomework(classKey, homeworkId, updates)
    //   Applies a partial, dot-notation update to a homework assignment.
    //   Only the teacher who originally posted it (postedBy) or an admin
    //   may edit it.
    dal.updateHomework = async function updateHomework(classKey, homeworkId, updates) {
      const homeworkRef = doc(db, 'homework', classKey, 'assignments', homeworkId);
      const isAdmin = store.userDoc?.role === ROLES.ADMIN;

      if (!isAdmin) {
        dal.budgetTrack(1, 0, 1);
        const snap = await getDoc(homeworkRef);
        const postedBy = snap.exists() ? snap.data().postedBy : null;
        if (postedBy !== store.user.uid) {
          throw new Error('Not authorized to edit this homework assignment.');
        }
      }

      dal.budgetTrack(0, 1, 1);
      await updateDoc(homeworkRef, updates);
    };

    // dal.deleteHomework(classKey, homeworkId)
    //   Deletes a homework assignment. Same authorization rule as
    //   dal.updateHomework(): only the original poster (postedBy) or an
    //   admin may delete it.
    dal.deleteHomework = async function deleteHomework(classKey, homeworkId) {
      const homeworkRef = doc(db, 'homework', classKey, 'assignments', homeworkId);
      const isAdmin = store.userDoc?.role === ROLES.ADMIN;

      if (!isAdmin) {
        dal.budgetTrack(1, 0, 1);
        const snap = await getDoc(homeworkRef);
        const postedBy = snap.exists() ? snap.data().postedBy : null;
        if (postedBy !== store.user.uid) {
          throw new Error('Not authorized to delete this homework assignment.');
        }
      }

      dal.budgetTrack(0, 1, 1);
      await deleteDoc(homeworkRef);
    };

    // ── Announcements ────────────────────────────────────────────────────────
    // Announcements live at announcements/{id}, id = 'ann_' + Date.now().
    // audience.roles and audience.grades are both opt-in allow-lists: an
    // empty array means "everyone" for that dimension. Firestore can't
    // efficiently express "array is empty OR array contains X" server-side
    // alongside the other filters this query already needs, so audience
    // targeting is applied client-side, once per snapshot, against the
    // signed-in user's own role/grade.

    // resolveUserGrade()
    //   Returns the signed-in user's grade level for announcement/exam
    //   audience filtering. Staff (admin/teacher/registrar) typically
    //   won't have a grade and fall through to undefined, which simply
    //   never matches a grade-restricted audience — fine, since
    //   grade-restricted announcements are aimed at students/parents.
    //   Prefers userDoc.grade directly; for accounts that only carry a
    //   link to their student record (userDoc.studentId — e.g. parent or
    //   student logins), looks the grade up from there instead.
    //   Internal helper — not exposed on dal.
    async function resolveUserGrade() {
      const userDoc = store.userDoc;
      if (!userDoc) return undefined;
      if (userDoc.grade !== undefined) return userDoc.grade;

      if (userDoc.studentId) {
        const student = await dal.getStudent(userDoc.studentId);
        return student?.grade;
      }

      return undefined;
    }

    // dal.postAnnouncement(data)
    //   Posts a school-wide (or audience-targeted) announcement.
    //   Admin/registrar only — throws otherwise.
    //   Sets every field from `data` plus title/titleAm/body/bodyAm (left
    //   as provided — pass empty strings for any translation not yet
    //   written), an audience object defaulting to { roles: [], grades: [] }
    //   (i.e. visible to everyone) if not supplied, createdBy, and a
    //   server createdAt. Returns the new announcement id.
    dal.postAnnouncement = async function postAnnouncement(data) {
      const role = store.userDoc?.role;
      if (role !== ROLES.ADMIN && role !== ROLES.REGISTRAR) {
        throw new Error('Only an admin or registrar may post announcements.');
      }

      const id = 'ann_' + Date.now();

      dal.budgetTrack(0, 1, 1);
      await setDoc(doc(db, 'announcements', id), {
        title:     '',
        titleAm:   '',
        body:      '',
        bodyAm:    '',
        audience:  { roles: [], grades: [] },
        ...data,
        createdBy: store.user.uid,
        createdAt: serverTimestamp(),
      });

      return id;
    };

    // dal.subscribeAnnouncements()
    //   Subscribes to the 20 most recent announcements posted since the
    //   start of the current semester (store.config.semesterDatesEc[
    //   store.config.currentSemester], converted from EC to a GC
    //   Timestamp), newest first.
    //
    //   On every snapshot: budget-tracks the doc count, then filters
    //   locally by audience — a doc is visible if its audience.roles is
    //   empty or contains the user's role, AND its audience.grades is
    //   empty or contains the user's grade (see resolveUserGrade()) — and
    //   commits the filtered list to store.announcements. Registers the
    //   unsubscribe in store.listeners so dal.cleanup()/signOut() can tear
    //   it down. Returns the unsubscribe function.
    dal.subscribeAnnouncements = async function subscribeAnnouncements() {
      const [ecYear, ecMonth, ecDay] = store.config.semesterDatesEc[store.config.currentSemester];
      const semesterStartTimestamp = Timestamp.fromDate(EC.toGc(ecYear, ecMonth, ecDay));

      const myGrade = await resolveUserGrade();
      const myRole  = store.userDoc?.role;

      const q = query(
        collection(db, 'announcements'),
        where('createdAt', '>=', semesterStartTimestamp),
        orderBy('createdAt', 'desc'),
        limit(20),
      );

      const unsubscribe = onSnapshot(q, (snap) => {
        dal.budgetTrack(snap.size, 0, snap.size);

        const filtered = snap.docs
          .map(d => d.data())
          .filter((a) => {
            const roles  = a.audience?.roles  ?? [];
            const grades = a.audience?.grades ?? [];
            const roleOk  = roles.length === 0  || roles.includes(myRole);
            const gradeOk = grades.length === 0 || grades.includes(myGrade);
            return roleOk && gradeOk;
          });

        store.announcements = filtered;
      });

      store.listeners.push(unsubscribe);
      return unsubscribe;
    };

    // dal.deleteAnnouncement(announcementId)
    //   Deletes an announcement document. Admin only — the Firestore rule
    //   for /announcements grants registrars create-only access (see
    //   dal.exportSecurityRules()), so this throws client-side for any
    //   other role rather than letting the request reach Firestore and
    //   bounce off the rules (which would surface a less friendly error).
    dal.deleteAnnouncement = async function deleteAnnouncement(announcementId) {
      if (store.userDoc?.role !== ROLES.ADMIN) {
        throw new Error('Only an admin may delete announcements.');
      }
      if (!announcementId || typeof announcementId !== 'string') {
        throw new Error('deleteAnnouncement: announcementId is required.');
      }

      dal.budgetTrack(0, 1, 1);
      await deleteDoc(doc(db, 'announcements', announcementId));
    };

    // ── Exam Schedules ───────────────────────────────────────────────────────
    // Exam schedules live at examSchedules/{id}, id = 'exam_' + Date.now().
    // A schedule entry targets either a specific class (classKey set), a
    // whole grade (grade set, classKey left ''), or everyone (both left
    // unset/''). Audience resolution happens client-side in
    // dal.subscribeExamSchedules(), filtered to the current ecYear to
    // prevent stale entries from prior academic years showing up.

    // VALID_EXAM_TYPES — canonical set for the examType field.
    const VALID_EXAM_TYPES = Object.freeze(['mid', 'final', 'quiz', 'assignment', 'other']);

    // _validateExamScheduleData(data)
    //   Internal validator. Checks every required field in the canonical
    //   exam-schedule shape and throws a descriptive Error on the first
    //   violation. Returns a fully assembled document object ready to be
    //   written to Firestore (including examDateGts derived from examDateEc).
    function _validateExamScheduleData(data, overrideId) {
      // ── scheduleId ──
      const scheduleId = overrideId ?? data.scheduleId;
      if (!scheduleId || typeof scheduleId !== 'string') {
        throw new Error('Exam schedule validation failed: scheduleId must be a non-empty string.');
      }

      // ── classKey ──
      if (data.classKey === undefined || data.classKey === null || typeof data.classKey !== 'string') {
        throw new Error('Exam schedule validation failed: classKey is required (use \'\' for school-wide).');
      }

      // ── grade ──
      if (data.grade === undefined || data.grade === null || typeof data.grade !== 'string') {
        throw new Error('Exam schedule validation failed: grade is required (use \'\' for all grades).');
      }

      // ── subjectId ──
      if (data.subjectId === undefined || data.subjectId === null || typeof data.subjectId !== 'string') {
        throw new Error('Exam schedule validation failed: subjectId is required (use \'\' for multi-subject).');
      }

      // ── subjectName / subjectNameAm ──
      if (typeof data.subjectName !== 'string') {
        throw new Error('Exam schedule validation failed: subjectName must be a string (denormalized from /subjects).');
      }
      if (typeof data.subjectNameAm !== 'string') {
        throw new Error('Exam schedule validation failed: subjectNameAm must be a string (denormalized from /subjects).');
      }

      // ── title ──
      if (!data.title || typeof data.title !== 'string' || data.title.trim().length < 3) {
        throw new Error('Exam schedule validation failed: title is required and must be at least 3 characters.');
      }

      // ── titleAm — required when subjectId is non-empty ──
      if (data.subjectId !== '' && (!data.titleAm || typeof data.titleAm !== 'string' || data.titleAm.trim().length < 1)) {
        throw new Error('Exam schedule validation failed: titleAm is required when subjectId is set.');
      }

      // ── body / bodyAm — optional but must be strings ──
      const body   = (data.body   ?? '');
      const bodyAm = (data.bodyAm ?? '');
      if (typeof body !== 'string')   throw new Error('Exam schedule validation failed: body must be a string.');
      if (typeof bodyAm !== 'string') throw new Error('Exam schedule validation failed: bodyAm must be a string.');

      // ── examDateEc ── 'YYYY-MM-DD' string
      if (!data.examDateEc || typeof data.examDateEc !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(data.examDateEc)) {
        throw new Error('Exam schedule validation failed: examDateEc is required in \'YYYY-MM-DD\' EC format.');
      }
      const [ecYearStr, ecMonthStr, ecDayStr] = data.examDateEc.split('-');
      const ecYear  = Number(ecYearStr);
      const ecMonth = Number(ecMonthStr);
      const ecDay   = Number(ecDayStr);
      if (ecMonth < 1 || ecMonth > 13 || ecDay < 1 || ecDay > 30) {
        throw new Error(`Exam schedule validation failed: examDateEc '${data.examDateEc}' has out-of-range month/day.`);
      }

      // ── examDateGts — derived from examDateEc ──
      const examDateGts = Timestamp.fromDate(EC.toGc(ecYear, ecMonth, ecDay));

      // ── examTimeStart ──
      if (!data.examTimeStart || typeof data.examTimeStart !== 'string' || !/^\d{2}:\d{2}$/.test(data.examTimeStart)) {
        throw new Error('Exam schedule validation failed: examTimeStart is required in \'HH:MM\' 24-hour format.');
      }

      // ── examTimeEnd — must be after examTimeStart ──
      if (!data.examTimeEnd || typeof data.examTimeEnd !== 'string' || !/^\d{2}:\d{2}$/.test(data.examTimeEnd)) {
        throw new Error('Exam schedule validation failed: examTimeEnd is required in \'HH:MM\' 24-hour format.');
      }
      if (data.examTimeEnd <= data.examTimeStart) {
        throw new Error(`Exam schedule validation failed: examTimeEnd (${data.examTimeEnd}) must be after examTimeStart (${data.examTimeStart}).`);
      }

      // ── venue / venueAm — optional strings ──
      const venue   = (data.venue   ?? '');
      const venueAm = (data.venueAm ?? '');
      if (typeof venue !== 'string')   throw new Error('Exam schedule validation failed: venue must be a string.');
      if (typeof venueAm !== 'string') throw new Error('Exam schedule validation failed: venueAm must be a string.');

      // ── examType ──
      if (!data.examType || !VALID_EXAM_TYPES.includes(data.examType)) {
        throw new Error(`Exam schedule validation failed: examType must be one of: ${VALID_EXAM_TYPES.join(', ')}.`);
      }

      // ── semester ── 1–4
      const semester = Number(data.semester);
      if (!Number.isInteger(semester) || semester < 1 || semester > 4) {
        throw new Error('Exam schedule validation failed: semester must be an integer between 1 and 4.');
      }

      // ── ecYear (string) ──
      if (!data.ecYear || typeof data.ecYear !== 'string' || !/^\d{4}$/.test(data.ecYear)) {
        throw new Error('Exam schedule validation failed: ecYear is required as a 4-digit string (e.g. \'2017\').');
      }

      // ── createdBy ──
      if (!data.createdBy || typeof data.createdBy !== 'string') {
        throw new Error('Exam schedule validation failed: createdBy (uid) is required.');
      }

      // Return the canonical document; callers may add createdAt/updatedAt server timestamps.
      return {
        scheduleId,
        classKey:      data.classKey,
        grade:         data.grade,
        subjectId:     data.subjectId,
        subjectName:   data.subjectName,
        subjectNameAm: data.subjectNameAm,
        title:         data.title.trim(),
        titleAm:       (data.titleAm ?? '').trim(),
        body,
        bodyAm,
        examDateGts,
        examDateEc:    data.examDateEc,
        examTimeStart: data.examTimeStart,
        examTimeEnd:   data.examTimeEnd,
        venue,
        venueAm,
        examType:      data.examType,
        semester,
        ecYear:        data.ecYear,
        createdBy:     data.createdBy,
      };
    }

    // dal.examTypeLabel(type)
    //   Returns the localized display object { en, am } for a given examType
    //   value. Falls back to the raw type string if unknown.
    dal.examTypeLabel = function examTypeLabel(type) {
      const labels = {
        mid:        { en: DICT.en.examType_mid,        am: DICT.am.examType_mid        },
        final:      { en: DICT.en.examType_final,      am: DICT.am.examType_final      },
        quiz:       { en: DICT.en.examType_quiz,       am: DICT.am.examType_quiz       },
        assignment: { en: DICT.en.examType_assignment, am: DICT.am.examType_assignment },
        other:      { en: DICT.en.examType_other,      am: DICT.am.examType_other      },
      };
      return labels[type] ?? { en: type, am: type };
    };

    // dal.postExamSchedule(data)
    //   Posts a new exam-schedule entry. Admin only — throws otherwise.
    //   Validates and enforces the complete canonical field set (see
    //   _validateExamScheduleData). scheduleId is auto-generated as
    //   'exam_' + Date.now() and injected before validation. Returns
    //   the new entry's scheduleId.
    dal.postExamSchedule = async function postExamSchedule(data) {
      if (store.userDoc?.role !== ROLES.ADMIN) {
        throw new Error('Only an admin may post exam schedules.');
      }

      const scheduleId = 'exam_' + Date.now();
      const docData    = _validateExamScheduleData(
        { ...data, createdBy: data.createdBy ?? store.user?.uid ?? '' },
        scheduleId,
      );

      dal.budgetTrack(0, 1, 1);
      await setDoc(doc(db, 'examSchedules', scheduleId), {
        ...docData,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
      });

      return scheduleId;
    };

    // dal.updateExamSchedule(scheduleId, updates)
    //   Applies a partial update to an existing exam schedule. Admin only.
    //   Stamps updatedAt with the server's clock.
    dal.updateExamSchedule = async function updateExamSchedule(scheduleId, updates) {
      if (store.userDoc?.role !== ROLES.ADMIN) {
        throw new Error('Only an admin may update exam schedules.');
      }
      if (!scheduleId || typeof scheduleId !== 'string') {
        throw new Error('updateExamSchedule: scheduleId is required.');
      }

      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'examSchedules', scheduleId), {
        ...updates,
        updatedAt: serverTimestamp(),
      });
    };

    // dal.deleteExamSchedule(scheduleId)
    //   Deletes an exam schedule document. Admin only.
    dal.deleteExamSchedule = async function deleteExamSchedule(scheduleId) {
      if (store.userDoc?.role !== ROLES.ADMIN) {
        throw new Error('Only an admin may delete exam schedules.');
      }
      if (!scheduleId || typeof scheduleId !== 'string') {
        throw new Error('deleteExamSchedule: scheduleId is required.');
      }

      dal.budgetTrack(0, 1, 1);
      await deleteDoc(doc(db, 'examSchedules', scheduleId));
    };

    // dal.getExamSchedule(scheduleId)
    //   Reads a single exam schedule document from examSchedules/{scheduleId}.
    //   Returns the document data, or null if it doesn't exist.
    dal.getExamSchedule = async function getExamSchedule(scheduleId) {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'examSchedules', scheduleId));
      return snap.exists() ? snap.data() : null;
    };

    // dal.subscribeExamSchedules(myClassKey, myGrade)
    //   Subscribes to up to 30 upcoming exam-schedule entries (examDateGts
    //   in the future), soonest first.
    //
    //   On every snapshot: budget-tracks the doc count, then filters
    //   client-side to entries that:
    //     (a) apply to this caller — entry.classKey is '' (school-wide),
    //         or matches myClassKey, or entry.grade matches myGrade.
    //     (b) belong to the current academic year (entry.ecYear ===
    //         store.config.currentEcYear) to prevent stale entries from
    //         prior years cluttering the feed.
    //   Commits the filtered list to store.examSchedules. Registers the
    //   unsubscribe in store.listeners so dal.cleanup()/signOut() can tear
    //   it down. Returns the unsubscribe function.
    dal.subscribeExamSchedules = async function subscribeExamSchedules(myClassKey, myGrade) {
      const currentEcYear = store.config?.currentEcYear ?? String(EC.todayEc().year);

      const q = query(
        collection(db, 'examSchedules'),
        where('examDateGts', '>=', Timestamp.now()),
        orderBy('examDateGts', 'asc'),
        limit(30),
      );

      const unsubscribe = onSnapshot(q, (snap) => {
        dal.budgetTrack(snap.size, 0, snap.size);

        const filtered = snap.docs
          .map(d => d.data())
          .filter(e =>
            // ecYear guard — only current academic year
            e.ecYear === currentEcYear &&
            // audience guard — school-wide, matching class, or matching grade
            (e.classKey === '' || e.classKey === myClassKey || e.grade === myGrade)
          );

        store.examSchedules = filtered;
      });

      store.listeners.push(unsubscribe);
      return unsubscribe;
    };

    // ── Tuition Payments ─────────────────────────────────────────────────────
    // Tuition payment records live at tuitionPayments/{paymentId}, where
    // paymentId = 'pay_' + Date.now(). Each record links back to the student
    // via studentId and carries the semester/ecYear it applies to.
    //
    // The student's running balance is denormalised onto students/{studentId}
    // as the tuitionOwed field. dal.recordPayment() decrements it atomically
    // inside a Firestore transaction so the record and the balance can never
    // drift apart — even if two payments are submitted concurrently.

    // dal.recordPayment(studentId, amount, semester, ecYear, method, reference)
    //   Records a tuition payment and atomically decrements the student's
    //   tuitionOwed balance. Admin or registrar only — throws otherwise.
    //
    //   Inside runTransaction:
    //     1. Reads /students/{studentId} (budget-tracks 1 read).
    //     2. Validates the student document exists — throws if not.
    //     3. t.set() a new tuitionPayments/{paymentId} document with the
    //        full payment payload plus recordedBy and createdAt.
    //     4. t.update() /students/{studentId} decrementing tuitionOwed by
    //        amount via FieldValue increment(-amount).
    //
    //   After the transaction, if the signed-in user IS this student (i.e.
    //   store.userDoc.studentId === studentId), the local store.userDoc is
    //   refreshed so the balance shown in the UI updates immediately without
    //   a route change.
    //
    //   Returns the new tuitionOwed value (post-payment balance) as a number.
    //
    //   Budget note: runTransaction handles its own retries internally;
    //   dal.budgetTrack is called once for the student read (the set and
    //   update are counted as 2 writes). Firestore charges the full read +
    //   write cost on each retry attempt, but we only track the first attempt
    //   here to keep the session budget accounting simple.
    dal.recordPayment = async function recordPayment(
      studentId, amount, semester, ecYear, method, reference
    ) {
      const role = store.userDoc?.role;
      if (role !== ROLES.ADMIN && role !== ROLES.REGISTRAR) {
        throw new Error('Only an admin or registrar may record tuition payments.');
      }

      if (!studentId || typeof studentId !== 'string') {
        throw new Error('recordPayment: studentId is required.');
      }
      const amt = Number(amount);
      if (!Number.isFinite(amt) || amt <= 0) {
        throw new Error(`recordPayment: amount must be a positive number (got ${amount}).`);
      }
      const sem = Number(semester);
      if (!Number.isInteger(sem) || sem < 1 || sem > 4) {
        throw new Error(`recordPayment: semester must be 1–4 (got ${semester}).`);
      }
      if (!ecYear || typeof ecYear !== 'string' || !/^\d{4}$/.test(ecYear)) {
        throw new Error(`recordPayment: ecYear must be a 4-digit string (got '${ecYear}').`);
      }
      if (!method || typeof method !== 'string' || method.trim().length === 0) {
        throw new Error('recordPayment: method is required (e.g. \'cash\', \'bank\', \'mobile\').');
      }

      const paymentId  = 'pay_' + Date.now();
      const studentRef = doc(db, 'students',       studentId);
      const paymentRef = doc(db, 'tuitionPayments', paymentId);

      // Budget-track the one student read we know will happen inside the tx.
      // Writes (set + update = 2) are also tracked here for session accuracy.
      // docCount = 3: one me() overhead per distinct document access inside
      // the transaction (1 read of studentRef + 1 write of paymentRef via
      // set + 1 write of studentRef via update — three separate rule
      // evaluations even though studentRef itself is touched twice).
      dal.budgetTrack(1, 2, 3);

      let newBalance;

      await runTransaction(db, async (t) => {
        const studentSnap = await t.get(studentRef);
        if (!studentSnap.exists()) {
          throw new Error(`recordPayment: student '${studentId}' not found.`);
        }

        const currentOwed = Number(studentSnap.data().tuitionOwed ?? 0);
        newBalance = currentOwed - amt;

        t.set(paymentRef, {
          studentId,
          amount:     amt,
          semester:   sem,
          ecYear,
          method:     method.trim(),
          reference:  (reference ?? '').toString().trim(),
          recordedBy: store.user.uid,
          createdAt:  serverTimestamp(),
        });

        t.update(studentRef, {
          tuitionOwed: increment(-amt),
        });
      });

      // If the logged-in user is this student, refresh their local userDoc so
      // the balance displayed in the UI reflects the payment immediately.
      if (store.userDoc?.studentId === studentId) {
        const refreshed = await dal.getStudent(studentId);
        if (refreshed) {
          // Merge only the tuitionOwed field into the existing userDoc to
          // avoid losing other in-memory-only fields.
          store.userDoc = { ...store.userDoc, tuitionOwed: refreshed.tuitionOwed };
        }
      }

      return newBalance;
    };

    // dal.listPayments(studentId)
    //   Returns up to 50 payment records for a single student at
    //   /tuitionPayments, newest first. Budget-tracks the actual doc count.
    dal.listPayments = async function listPayments(studentId) {
      if (!studentId || typeof studentId !== 'string') {
        throw new Error('listPayments: studentId is required.');
      }
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled

      const q = query(
        collection(db, 'tuitionPayments'),
        where('studentId', '==', studentId),
        orderBy('createdAt', 'desc'),
        limit(50),
      );
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    };

    // dal.listAllPayments(ecYear, semester)
    //   Admin only. Returns up to 100 payment records across all students
    //   for the given ecYear, optionally filtered to a single semester.
    //   Pass semester as null/undefined to return all semesters for that year.
    dal.listAllPayments = async function listAllPayments(ecYear, semester) {
      if (store.userDoc?.role !== ROLES.ADMIN) {
        throw new Error('Only an admin may list all tuition payments.');
      }
      if (!ecYear || typeof ecYear !== 'string' || !/^\d{4}$/.test(ecYear)) {
        throw new Error(`listAllPayments: ecYear must be a 4-digit string (got '${ecYear}').`);
      }
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled

      const constraints = [
        collection(db, 'tuitionPayments'),
        where('ecYear', '==', ecYear),
      ];

      if (semester !== null && semester !== undefined) {
        const sem = Number(semester);
        if (!Number.isInteger(sem) || sem < 1 || sem > 4) {
          throw new Error(`listAllPayments: semester must be 1–4 (got ${semester}).`);
        }
        constraints.push(where('semester', '==', sem));
      }

      constraints.push(orderBy('createdAt', 'desc'));
      constraints.push(limit(100));

      const q    = query(...constraints);
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    };

    // ── Promotion ────────────────────────────────────────────────────────────
    // Year-end promotion advances every student from currentEcYear's class
    // into the equivalent class for targetEcYear (grade + 1, same section),
    // or marks them graduated if they're leaving grade '12'. It also seeds
    // next year's tuitionOwed balance for everyone who isn't graduating.
    //
    // Run state lives at /promotionJobs/{currentEcYear} so the whole
    // operation is resumable: if it's interrupted (closed tab, dropped
    // connection, mobile app backgrounded), re-calling dal.runPromotion()
    // with the same currentEcYear picks up where it left off rather than
    // re-promoting students who are already done. processedClassKeys is the
    // resume checkpoint — a class is only added to it after every chunk of
    // its roster has committed successfully.
    //
    // Within each class, students are processed in batches of 20 (Firestore
    // writeBatch's effective practical ceiling for this workload, well
    // under the hard 500-op limit since each student touches multiple docs
    // per batch entry). Progress is reported via the onProgress(message)
    // callback so a long-running UI (e.g. a modal with a status line) can
    // show what's happening class by class.

    // dal.getPromotionJob(ecYear)
    //   Reads the promotion job document at /promotionJobs/{ecYear}.
    //   Returns the document data, or null if it doesn't exist.
    dal.getPromotionJob = async function getPromotionJob(ecYear) {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'promotionJobs', String(ecYear)));
      return snap.exists() ? snap.data() : null;
    };

    // dal.resetPromotionJob(ecYear)
    //   Admin only. Resets an existing promotion job back to status:
    //   'running' and clears processedClassKeys to an empty array, so a
    //   subsequent dal.runPromotion() call re-walks every class from
    //   scratch. Does NOT undo any writes already committed to students —
    //   this is for retrying a job that finished in a bad state (e.g. it
    //   was marked 'complete' prematurely), not for rolling back promotions.
    //   Throws if the job doesn't exist.
    dal.resetPromotionJob = async function resetPromotionJob(ecYear) {
      if (store.userDoc?.role !== ROLES.ADMIN) {
        throw new Error('Only an admin may reset a promotion job.');
      }

      const jobRef  = doc(db, 'promotionJobs', String(ecYear));
      dal.budgetTrack(1, 0, 1);
      const jobSnap = await getDoc(jobRef);
      if (!jobSnap.exists()) {
        throw new Error(`resetPromotionJob: no promotion job found for EC year '${ecYear}'.`);
      }

      dal.budgetTrack(0, 1, 1);
      await updateDoc(jobRef, {
        status:             'running',
        processedClassKeys: [],
        completedAt:        null,
      });
    };

    // promoteStudent(batch, studentId, classDoc, config)
    //   Internal helper (not exported on dal). Stages every Firestore
    //   operation for a single student's promotion onto an already-open
    //   writeBatch — it does not call batch.commit() itself; the caller
    //   (dal.runPromotion) commits once per chunk after every student in
    //   that chunk has been staged.
    //
    //   IDEMPOTENCY, explicitly:
    //     - The one piece of state that must never be double-applied is
    //       the tuitionOwed increment, because increment() is additive —
    //       replaying it would overcharge the student. Everything else
    //       here (update() with a fixed value, set(..., {merge:true}),
    //       arrayUnion()) is naturally idempotent: writing the same value
    //       twice, or union-ing the same id twice, leaves the document in
    //       the same state as writing it once.
    //     - To gate the one non-idempotent operation, we read
    //       /students/{studentId}/academicYears/{targetEcYear} BEFORE
    //       touching the batch and check tuitionSeeded. This read happens
    //       outside any transaction — a writeBatch is not a transaction
    //       and offers no read-your-writes guarantee — so it is a plain
    //       getDoc(). If this function (or the whole run) crashes after
    //       the batch commits but before the job's processedClassKeys
    //       checkpoint is updated, the next dal.runPromotion() call will
    //       re-stage this same student. The re-staged batch will see
    //       tuitionSeeded already true on its getDoc() and skip the
    //       increment — so re-running a partially-applied chunk is safe.
    //     - Within the batch itself, the tuitionSeeded:true write is
    //       staged BEFORE the tuitionOwed increment so that, if anything
    //       ever inspects the batch's intended end state, the seeded flag
    //       and the charge travel together (a writeBatch is atomic on
    //       commit — either both land or neither does — but ordering them
    //       this way keeps the code's intent unambiguous).
    //   NOTE ON SCOPE: currentEcYear and targetEcYear are passed in
    //   explicitly (alongside classDoc and config) rather than closed over,
    //   since this function is declared at module scope, not nested inside
    //   dal.runPromotion — an explicit parameter list keeps that boundary
    //   unambiguous and makes promoteStudent independently testable.
    async function promoteStudent(batch, studentId, classDoc, config, currentEcYear, targetEcYear) {
      const grade   = classDoc.grade;
      const section = classDoc.section;

      const isGraduating   = grade === '12';
      const nextGrade      = isGraduating ? null : String(Number(grade) + 1);
      const targetClassKey = isGraduating ? null : `${nextGrade}${section}_${targetEcYear}`;

      // IDEMPOTENCY: read the targetEcYear academicYears doc INSIDE the batch loop
      // (not inside a transaction — batch writes are not transactions).
      // We do a plain getDoc before adding to the batch.
      const ayTargetRef  = doc(db, 'students', studentId, 'academicYears', targetEcYear);
      const ayTargetSnap = await getDoc(ayTargetRef);
      dal.budgetTrack(1, 0, 1);

      const alreadySeeded = ayTargetSnap.exists() && ayTargetSnap.data().tuitionSeeded === true;

      // 1. Update student's current class and status (idempotent: same value written each time)
      batch.update(doc(db, 'students', studentId), {
        currentClassKey: targetClassKey ?? `graduated_${currentEcYear}`,
        status: isGraduating ? 'graduated' : 'active',
        updatedAt: serverTimestamp()
      });

      // 2. Mark the current year's academicYears doc as promoted (merge:true = idempotent)
      batch.set(
        doc(db, 'students', studentId, 'academicYears', currentEcYear),
        { promoted: true, promotedToClassKey: targetClassKey, lastModified: serverTimestamp() },
        { merge: true }
      );

      // 3. Seed tuition for next year ONLY if not already seeded (the idempotency gate)
      if (!alreadySeeded && !isGraduating) {
        const annualFee = config.tuitionPerYear[nextGrade] ?? 0;
        // Set the target academicYears doc with tuitionSeeded:true FIRST in the batch
        batch.set(ayTargetRef, {
          ecYear: targetEcYear,
          classKey: targetClassKey,
          tuitionSeeded: true,
          lastModified: serverTimestamp()
        }, { merge: true });
        // Then increment tuitionOwed
        batch.update(doc(db, 'students', studentId), {
          tuitionOwed: increment(annualFee)
        });
      }

      // 4. Add student to the target class roster (arrayUnion is idempotent)
      if (targetClassKey) {
        batch.update(doc(db, 'classes', targetClassKey), {
          studentIds: arrayUnion(studentId),
          updatedAt: serverTimestamp()
        });
      }

      return { isGraduating };
    }

    // dal.runPromotion(currentEcYear, targetEcYear, onProgress)
    //   Promotes every student in currentEcYear into targetEcYear, one
    //   class at a time, resuming from /promotionJobs/{currentEcYear} if a
    //   prior run was interrupted. onProgress(message) is called with a
    //   short human-readable status string before each chunk is committed
    //   and once more when the whole job finishes — wire it up to a modal
    //   or toast to show live progress.
    //
    //   Steps:
    //     1. Read /promotionJobs/{currentEcYear}.
    //        - If it exists with status === 'complete', throw
    //          'Promotion already complete for this year'.
    //        - If it doesn't exist, create it with status: 'running' and
    //          an empty processedClassKeys checkpoint.
    //     2. List every class for currentEcYear via dal.listClasses().
    //     3. For each class whose classKey isn't already in
    //        processedClassKeys:
    //          - read the class doc for its studentIds roster
    //          - chunk studentIds into groups of 20
    //          - for each chunk: open a fresh writeBatch, call
    //            promoteStudent(batch, studentId, classDoc, store.config)
    //            sequentially (for...of + await, NOT Promise.all — staying
    //            sequential keeps each student's pre-batch getDoc() read
    //            from racing the next student's, and keeps the total
    //            op count per batch easy to reason about against
    //            Firestore's 500-operation ceiling), then batch.commit(),
    //            then bump the job's promotedCount by chunk.length via
    //            increment() — written immediately after each chunk
    //            commits, not batched at the end, so a crash mid-class
    //            still leaves an accurate count for whatever did land —
    //            then onProgress(...)
    //          - once every chunk for the class has committed,
    //            arrayUnion(classKey) onto the job's processedClassKeys
    //     4. When every class has been processed, update the job to
    //        status: 'complete', completedAt: serverTimestamp(), call
    //        onProgress('Complete').
    //
    //   onProgress defaults to a no-op so callers can omit it entirely.
    dal.runPromotion = async function runPromotion(currentEcYear, targetEcYear, onProgress) {
      if (store.userDoc?.role !== ROLES.ADMIN) {
        throw new Error('Only an admin may run year-end promotion.');
      }
      if (!currentEcYear || typeof currentEcYear !== 'string') {
        throw new Error('runPromotion: currentEcYear is required (string).');
      }
      if (!targetEcYear || typeof targetEcYear !== 'string') {
        throw new Error('runPromotion: targetEcYear is required (string).');
      }

      const notify = typeof onProgress === 'function' ? onProgress : () => {};

      const jobRef = doc(db, 'promotionJobs', currentEcYear);

      // ── Step 1: read-or-create the job doc ──────────────────────────────
      dal.budgetTrack(1, 0, 1);
      const existingSnap = await getDoc(jobRef);

      let job;
      if (existingSnap.exists()) {
        job = existingSnap.data();
        if (job.status === 'complete') {
          throw new Error('Promotion already complete for this year');
        }
      } else {
        job = {
          ecYear:             currentEcYear,
          targetEcYear,
          status:             'running',
          processedClassKeys: [],
          totalStudents:      0,
          promotedCount:      0,
          graduatedCount:     0,
          startedBy:          store.user.uid,
          startedAt:          serverTimestamp(),
          completedAt:        null,
        };
        dal.budgetTrack(0, 1, 1);
        await setDoc(jobRef, job);
      }

      const processedClassKeys = new Set(job.processedClassKeys ?? []);

      // ── Step 2: list every class for this year ──────────────────────────
      const classes = await dal.listClasses(currentEcYear);

      // ── Step 3: walk each unprocessed class ─────────────────────────────
      for (const classDoc of classes) {
        const classKey = classDoc.classKey;
        if (processedClassKeys.has(classKey)) continue;

        const studentIds = classDoc.studentIds ?? [];

        // Chunk the roster into groups of 20 so each writeBatch stays well
        // under Firestore's 500-operation ceiling even with several
        // operations per student.
        const chunks = [];
        for (let i = 0; i < studentIds.length; i += 20) {
          chunks.push(studentIds.slice(i, i + 20));
        }

        for (const chunk of chunks) {
          const batch = writeBatch(db);

          // Sequential, not Promise.all: each promoteStudent() call does
          // its own getDoc() before staging onto the batch, and staying
          // sequential keeps that read-then-stage step deterministic and
          // keeps the per-batch operation count easy to bound.
          for (const studentId of chunk) {
            await promoteStudent(batch, studentId, classDoc, store.config, currentEcYear, targetEcYear);
          }

          dal.budgetTrack(0, chunk.length * 3, chunk.length * 3);
          await batch.commit();

          // Crash-safe progress: write promotedCount immediately after
          // this chunk commits (not deferred to end-of-class or
          // end-of-job), so if the process dies right after this point
          // the job doc still reflects exactly what was actually written.
          dal.budgetTrack(0, 1, 1);
          await updateDoc(jobRef, {
            promotedCount: increment(chunk.length),
          });

          notify(`Processed ${chunk.length} students in ${classKey}`);
        }

        processedClassKeys.add(classKey);
        dal.budgetTrack(0, 1, 1);
        await updateDoc(jobRef, {
          processedClassKeys: arrayUnion(classKey),
        });
      }

      // ── Step 4: mark the job complete ───────────────────────────────────
      dal.budgetTrack(0, 1, 1);
      await updateDoc(jobRef, {
        status:      'complete',
        completedAt: serverTimestamp(),
      });

      notify('Complete');
    };

    // dal.getStudentBalance(studentId)
    //   Reads /students/{studentId} and returns the tuitionOwed field as a
    //   number, or null if the student document doesn't exist. Budget-tracks
    //   1 read.
    dal.getStudentBalance = async function getStudentBalance(studentId) {
      if (!studentId || typeof studentId !== 'string') {
        throw new Error('getStudentBalance: studentId is required.');
      }
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'students', studentId));
      if (!snap.exists()) return null;
      return Number(snap.data().tuitionOwed ?? 0);
    };

    // ── Security Rules Export ───────────────────────────────────────────────

    // dal.exportSecurityRules()
    //   Returns a string containing the complete, production-ready
    //   firestore.rules file for SchoolOS — sync, not async on purpose
    //   (same exception as dal.budgetTrack/dal.computeRanks/dal.cleanup):
    //   it's a pure string builder with no Firestore calls of its own.
    //
    //   This is the single source of truth for what should be pasted into
    //   the Firebase console's Rules tab (or committed as firestore.rules
    //   and deployed via `firebase deploy --only firestore:rules`, for
    //   anyone who later gets a Node toolchain). Keeping it inline means
    //   the rules travel with the app instead of living in a second file
    //   that can drift out of sync with the data shapes dal.* actually
    //   reads and writes.
    //
    //   Helpers defined once at the top of the ruleset and reused
    //   everywhere below:
    //     me()                    — single get() of /users/{request.auth.uid}
    //     isActive()              — signed in AND me().active != false
    //     isAdmin() / isTeacher() / isParent() / isStudent() / isRegistrar()
    //                             — isActive() AND me().role == '<role>'
    //     teachesSubject(classKey, subjectKey)
    //                             — me().teachingAssignments contains 'classKey|subjectKey'
    //     teachesInClass(key)     — me().teachingClassKeys contains key
    //     isHomeroomOf(key)       — me().homeroomOf contains key
    //     parentOf(studentId)     — me().childKeys contains studentId
    //     isSelf(studentId)       — me().studentId == studentId
    //
    //   isRegistrar() is intentionally NOT granted the same broad access
    //   as isAdmin() anywhere. It's opted into exactly three narrow spots
    //   that mirror what the DAL actually lets a registrar do: creating a
    //   /tuitionPayments doc (as themselves, via dal.recordPayment()),
    //   updating only the tuitionOwed field on /students/{studentId} (the
    //   other half of that same call), and creating an /announcements doc
    //   (as themselves, via dal.postAnnouncement()). Every other
    //   admin-only rule in this file stays admin-only for registrars.
    dal.exportSecurityRules = function exportSecurityRules() {
      return `rules_version = '2';

service cloud.firestore {
  match /databases/{database}/documents {

    // ════════════════════════════════════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════════════════════════════════════

    // me() — single get() of the signed-in user's own /users doc. Every
    // other helper below reads through this one function so a given rules
    // evaluation only ever pays for one /users get(), no matter how many
    // helpers it calls.
    function me() {
      return get(/databases/$(database)/documents/users/$(request.auth.uid)).data;
    }

    function isActive() {
      return request.auth != null && me().active != false;
    }

    function isAdmin() {
      return isActive() && me().role == 'admin';
    }

    function isTeacher() {
      return isActive() && me().role == 'teacher';
    }

    function isParent() {
      return isActive() && me().role == 'parent';
    }

    function isStudent() {
      return isActive() && me().role == 'student';
    }

    // isRegistrar() — registrars handle day-to-day enrollment/finance
    // tasks (recording tuition payments, posting announcements) without
    // the full administrative access isAdmin() implies; kept as its own
    // helper rather than folded into isAdmin() so registrar access stays
    // scoped to exactly the rules that opt it in below.
    function isRegistrar() {
      return isActive() && me().role == 'registrar';
    }

    // teachesSubject(classKey, subjectKey) — true if the signed-in teacher
    // has a teachingAssignments entry for this exact class+subject pair.
    // Entries are stored as composite strings 'classKey|subjectId' (see
    // dal.updateTeacherAssignments), so membership is checked against that
    // joined form rather than the bare subjectKey — a teacher assigned to
    // Math in 9A should not get gradebook access to Math in 10B just
    // because the subjectKey happens to match.
    //
    // me().get('teachingAssignments', []) defaults to an empty list when
    // the field is absent (true for every non-teacher user doc) — without
    // this default, the 'in' operator on a missing/null field throws a
    // rules evaluation error rather than returning false, which would
    // deny access for reasons unrelated to the actual permission check.
    function teachesSubject(classKey, subjectKey) {
      return isActive()
        && (classKey + '|' + subjectKey) in me().get('teachingAssignments', []);
    }

    // teachesInClass(classKey) — true if the signed-in teacher is assigned
    // to teach (any subject) in this class.
    function teachesInClass(classKey) {
      return isActive() && classKey in me().get('teachingClassKeys', []);
    }

    // isHomeroomOf(classKey) — true if the signed-in teacher is the
    // homeroom teacher of this class.
    function isHomeroomOf(classKey) {
      return isActive() && classKey in me().get('homeroomOf', []);
    }

    // parentOf(studentId) — true if the signed-in parent's childKeys
    // includes this student.
    function parentOf(studentId) {
      return isActive() && studentId in me().get('childKeys', []);
    }

    // isSelf(studentId) — true if the signed-in student's own studentId
    // matches. Used by the student role to read/act on their own records.
    function isSelf(studentId) {
      return isActive() && me().studentId == studentId;
    }

    // teacherOfClass(classKey) — convenience union of every teacher-style
    // relationship to a class, used where the spec says "teacher of class"
    // without distinguishing homeroom from subject-teaching.
    function teacherOfClass(classKey) {
      return teachesInClass(classKey) || isHomeroomOf(classKey);
    }

    // selfRegisteredViaInvite(newUserData) — true if newUserData (the
    // /users doc about to be created) carries an inviteId pointing at a
    // /parentInvites document that has already been marked 'accepted' by
    // exactly this auth user, for exactly this email. Used only by the
    // /users create rule's parent-self-registration carve-out below — see
    // dal.acceptParentInvite(), which must run BEFORE this create for the
    // get() here to see status == 'accepted'. The email match additionally
    // stops the invite for parent-A@example.com being reused to vouch for
    // a /users doc claiming a different email.
    function selfRegisteredViaInvite(newUserData) {
      let invite = get(/databases/$(database)/documents/parentInvites/$(newUserData.inviteId)).data;
      return invite.status == 'accepted'
        && invite.parentUid == request.auth.uid
        && invite.email == newUserData.email;
    }

    // ════════════════════════════════════════════════════════════════════
    // USERS — /users/{uid}
    // ════════════════════════════════════════════════════════════════════
    match /users/{uid} {
      allow get:    if isActive() && (request.auth.uid == uid || isAdmin());
      allow list:   if isAdmin();
      allow delete: if isAdmin();
      // Create: admin may create any user doc (the normal flow throughout
      // this app). The second clause is the parent self-registration
      // carve-out for the Spark-safe invite flow (see dal.createParentInvite
      // / acceptInviteView): a brand-new, not-yet-existing auth user may
      // create exactly their OWN /users/{uid} doc, with role locked to
      // 'parent' and active locked to true, provided an ALREADY-ACCEPTED
      // invite (see selfRegisteredViaInvite()) vouches for it. Order matters
      // client-side: dal.acceptParentInvite() must run before this create,
      // not after — see __aiSubmit's comments.
      allow create: if isAdmin()
        || (request.auth.uid == uid
            && request.resource.data.role == 'parent'
            && request.resource.data.active == true
            && selfRegisteredViaInvite(request.resource.data));
      // Update: admin may change anything; a signed-in user may update
      // only their own phone/displayName on their own doc — every other
      // field (role, active, teachingAssignments, etc.) stays admin-only,
      // enforced by requiring the diff to be a subset of these two keys.
      allow update: if isAdmin()
        || (isActive() && request.auth.uid == uid
            && request.resource.data.diff(resource.data).affectedKeys()
                 .hasOnly(['phone', 'displayName']));
    }

    // ════════════════════════════════════════════════════════════════════
    // SCHOOL CONFIG — /schoolConfig/{docId}
    // ════════════════════════════════════════════════════════════════════
    match /schoolConfig/{docId} {
      allow read:  if isActive();
      allow write: if isAdmin();
    }

    // ════════════════════════════════════════════════════════════════════
    // SUBJECTS — /subjects/{subjectId}
    // ════════════════════════════════════════════════════════════════════
    match /subjects/{subjectId} {
      allow read:  if isActive();
      allow write: if isAdmin();
    }

    // ════════════════════════════════════════════════════════════════════
    // CLASSES — /classes/{classKey}
    // ════════════════════════════════════════════════════════════════════
    match /classes/{classKey} {
      allow read: if isAdmin()
        || isHomeroomOf(classKey)
        || teachesInClass(classKey)
        || (isParent() && resource.data.studentIds.hasAny(me().get('childKeys', [])))
        || (isStudent() && resource.data.studentIds.hasAny([me().studentId]));
      allow write: if isAdmin();

      // ── Gradebooks — /classes/{classKey}/gradebooks/{subjectKey} ──────
      match /gradebooks/{subjectKey} {
        allow read: if isAdmin() || isHomeroomOf(classKey) || teachesSubject(classKey, subjectKey);
        allow create: if isAdmin() || teachesSubject(classKey, subjectKey);
        allow update: if isAdmin()
          || (teachesSubject(classKey, subjectKey) && resource.data.finalized == false);
        allow delete: if isAdmin();
      }

      // ── Attendance — /classes/{classKey}/attendance/{dateKey} ─────────
      match /attendance/{dateKey} {
        allow read: if isAdmin() || isHomeroomOf(classKey);
        allow create, update: if isAdmin()
          || (isHomeroomOf(classKey) && request.resource.data.markedBy == request.auth.uid);
        allow delete: if isAdmin();
      }
    }

    // ════════════════════════════════════════════════════════════════════
    // STUDENTS — /students/{studentId}
    // ════════════════════════════════════════════════════════════════════
    match /students/{studentId} {
      allow read: if isAdmin()
        || parentOf(studentId)
        || isSelf(studentId)
        || teacherOfClass(resource.data.currentClassKey);
      allow write: if isAdmin();
      // Registrar carve-out: dal.recordPayment() needs to decrement
      // tuitionOwed on the student doc as part of recording a payment.
      // Scoped to that single field only (via the same diff/hasOnly
      // pattern used for self-service profile edits on /users) so a
      // registrar can never use this path to touch any other student
      // field.
      //
      // Self-registered-parent carve-out: dal.updateStudent() is also
      // called from __aiSubmit (accept-invite flow) to add the brand-new
      // parent's own uid to parentUids on exactly the student named in
      // their (already-accepted, by this point) invite. Scoped to the
      // parentUids field only, and only as an array-union add of the
      // caller's own uid — isParent() is required so a never-completed
      // self-registration (no /users doc yet) can't use this path either.
      allow update: if (isRegistrar()
          && request.resource.data.diff(resource.data).affectedKeys().hasOnly(['tuitionOwed']))
        || (isParent()
            && request.resource.data.diff(resource.data).affectedKeys().hasOnly(['parentUids'])
            && request.resource.data.parentUids.hasAll(resource.data.parentUids)
            && request.resource.data.parentUids.hasAny([request.auth.uid]));

      // ── Per-student attendance mirror — /students/{id}/attendance/{dateKey} ──
      match /attendance/{dateKey} {
        allow read: if isAdmin() || parentOf(studentId) || isSelf(studentId);
        allow create: if isAdmin() || isHomeroomOf(request.resource.data.classKey);
        allow update: if false;
        allow delete: if isAdmin();
      }

      // ── Academic years — /students/{id}/academicYears/{ecYear} ────────
      match /academicYears/{ecYear} {
        allow read: if isAdmin()
          || parentOf(studentId)
          || isSelf(studentId)
          || teacherOfClass(resource.data.classKey);
        allow create: if isAdmin() || isHomeroomOf(request.resource.data.classKey);
        allow update: if isAdmin()
          || (isHomeroomOf(resource.data.classKey) && resource.data.promoted == false);
        allow delete: if isAdmin();
      }
    }

    // ════════════════════════════════════════════════════════════════════
    // HOMEWORK — /homework/{classKey}/assignments/{homeworkId}
    // ════════════════════════════════════════════════════════════════════
    match /homework/{classKey}/assignments/{homeworkId} {
      allow read: if isAdmin()
        || isHomeroomOf(classKey)
        || teachesInClass(classKey)
        || (isParent() && resource.data.studentIds.hasAny(me().get('childKeys', [])))
        || (isStudent() && resource.data.studentIds.hasAny([me().studentId]));
      allow create: if (isAdmin() || isHomeroomOf(classKey) || teachesInClass(classKey))
        && request.resource.data.classKey == classKey
        && request.resource.data.postedBy == request.auth.uid;
      allow update, delete: if isAdmin() || resource.data.postedBy == request.auth.uid;
    }

    // ════════════════════════════════════════════════════════════════════
    // EXAM SCHEDULES — /examSchedules/{scheduleId}
    // ════════════════════════════════════════════════════════════════════
    match /examSchedules/{scheduleId} {
      allow read:  if isActive();
      allow write: if isAdmin();
    }

    // ════════════════════════════════════════════════════════════════════
    // ANNOUNCEMENTS — /announcements/{announcementId}
    // ════════════════════════════════════════════════════════════════════
