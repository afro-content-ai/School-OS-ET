    // ── ETHIOPIAN CALENDAR (EC) ───────────────────────────────────────────────
    // Pure JS Ethiopian ↔ Gregorian calendar converter. No external dependencies.
    //
    // Algorithm basis:
    //   Ethiopian calendar epoch = 29 August 8 CE (Julian)
    //                            = JDN 1,724,221
    //   Ethiopian year has 12 months of 30 days + 1 intercalary month (Pagumē)
    //   of 5 days (6 in Ethiopian leap years, which occur every 4 years when
    //   EC year ≡ 3 mod 4).
    //
    //   Conversion uses Julian Day Numbers (JDN) as the neutral intermediate:
    //     GC → JDN  (proleptic Gregorian via standard formula)
    //     JDN → EC  (subtract EC epoch JDN, divide into 30-day months)
    //     EC → JDN  (reverse)
    //     JDN → GC  (standard inverse formula)
    //
    // Exposed as window.EC (also module-scoped as EC).

    const EC = (() => {
      // ── Month name tables ────────────────────────────────────────────────────
      const ecMonths = [
        'Meskerem',  // መስከረም  Month  1  (Sep/Oct)
        'Tikimt',    // ጥቅምት   Month  2  (Oct/Nov)
        'Hidar',     // ሕዳር    Month  3  (Nov/Dec)
        'Tahsas',    // ታህሳስ   Month  4  (Dec/Jan)
        'Tir',       // ጥር     Month  5  (Jan/Feb)
        'Yekatit',   // የካቲት   Month  6  (Feb/Mar)
        'Megabit',   // መጋቢት   Month  7  (Mar/Apr)
        'Miyazia',   // ሚያዝያ   Month  8  (Apr/May)
        'Ginbot',    // ግንቦት   Month  9  (May/Jun)
        'Sene',      // ሰኔ     Month 10  (Jun/Jul)
        'Hamle',     // ሐምሌ    Month 11  (Jul/Aug)
        'Nehase',    // ነሐሴ    Month 12  (Aug/Sep)
        'Pagume',    // ጳጉሜን   Month 13  (intercalary, 5 or 6 days)
      ];

      const ecMonthsAm = [
        'መስከረም',  // Meskerem
        'ጥቅምት',   // Tikimt
        'ሕዳር',    // Hidar
        'ታህሳስ',   // Tahsas
        'ጥር',     // Tir
        'የካቲት',   // Yekatit
        'መጋቢት',   // Megabit
        'ሚያዝያ',   // Miyazia
        'ግንቦት',   // Ginbot
        'ሰኔ',     // Sene
        'ሐምሌ',    // Hamle
        'ነሐሴ',    // Nehase
        'ጳጉሜን',   // Pagume
      ];

      // ── JDN helpers ──────────────────────────────────────────────────────────

      // Proleptic Gregorian date → Julian Day Number.
      // Formula: Meeus, "Astronomical Algorithms" ch. 7.
      function gcToJdn(year, month, day) {
        // Treat Jan/Feb as months 13/14 of the previous year.
        if (month <= 2) { year -= 1; month += 12; }
        const A = Math.floor(year / 100);
        const B = 2 - A + Math.floor(A / 4);
        return Math.floor(365.25 * (year + 4716))
             + Math.floor(30.6001 * (month + 1))
             + day + B - 1524;
      }

      // Julian Day Number → proleptic Gregorian { year, month, day }.
      function jdnToGc(jdn) {
        const z = jdn;
        const a = Math.floor((z - 1867216.25) / 36524.25);
        const A = z + 1 + a - Math.floor(a / 4);
        const B = A + 1524;
        const C = Math.floor((B - 122.1) / 365.25);
        const D = Math.floor(365.25 * C);
        const E = Math.floor((B - D) / 30.6001);
        const day   = B - D - Math.floor(30.6001 * E);
        const month = E < 14 ? E - 1 : E - 13;
        const year  = month > 2 ? C - 4716 : C - 4715;
        return { year, month, day };
      }

      // Ethiopian calendar epoch as a JDN.
      // 29 August 8 CE (Julian) = JDN 1,724,221.
      // Verified: gcToJdn(8, 8, 27) — 27 Aug 8 CE proleptic Gregorian maps to
      // the same JDN as 29 Aug 8 CE Julian.
      const EC_EPOCH_JDN = 1724221;

      // ── Core conversion functions ─────────────────────────────────────────────

      // JDN → Ethiopian date object.
      function jdnToEc(jdn) {
        // Days elapsed since Ethiopian epoch (0-based).
        const r = jdn - EC_EPOCH_JDN;

        // Each Ethiopian year = 365 days (366 in Ethiopian leap years,
        // but we handle leap-year intercalation via the day-within-year split).
        // A 4-year cycle = 4 × 365 + 1 = 1461 days.
        const n4   = Math.floor(r / 1461);       // completed 4-year cycles
        const rem4 = r % 1461;                   // days into current cycle

        // Year within the 4-year cycle (0–3); the leap day falls at the END
        // of the 4th year (day 1460 of the cycle), keeping years 0–2 at 365 days.
        const yearInCycle = rem4 < 1460 ? Math.floor(rem4 / 365) : 3;
        const dayInYear   = rem4 < 1460 ? rem4 % 365 : 365;

        const year  = n4 * 4 + yearInCycle + 1;  // EC year (1-based)
        const month = Math.floor(dayInYear / 30) + 1; // 1–13
        const day   = (dayInYear % 30) + 1;           // 1–30 (Pagumē: 1–5/6)

        return {
          year,
          month,
          day,
          monthName:   ecMonths[month - 1],
          monthNameAm: ecMonthsAm[month - 1],
        };
      }

      // Ethiopian date → JDN.
      function ecToJdn(year, month, day) {
        // Complete 4-year cycles before this year.
        const n4     = Math.floor((year - 1) / 4);
        const yearIn = (year - 1) % 4;           // 0–3 within current cycle
        const daysFromEpoch =
              n4 * 1461               // days in complete 4-year cycles
            + yearIn * 365            // days in complete years of this cycle
            + (month - 1) * 30        // days in complete months
            + (day - 1);              // days in current month
        return EC_EPOCH_JDN + daysFromEpoch;
      }

      // ── Public API ────────────────────────────────────────────────────────────

      // JS Date → Ethiopian date object { year, month, day, monthName, monthNameAm }.
      function toEc(jsDate) {
        const y = jsDate.getFullYear();
        const m = jsDate.getMonth() + 1; // JS months are 0-based
        const d = jsDate.getDate();
        return jdnToEc(gcToJdn(y, m, d));
      }

      // Ethiopian date integers → JS Date (midnight UTC).
      function toGc(ecYear, ecMonth, ecDay) {
        const jdn = ecToJdn(ecYear, ecMonth, ecDay);
        const { year, month, day } = jdnToGc(jdn);
        return new Date(Date.UTC(year, month - 1, day));
      }

      // JS Date → English string, e.g. "Meskerem 5, 2017".
      function formatEc(jsDate) {
        const { year, month, day } = toEc(jsDate);
        return `${ecMonths[month - 1]} ${day}, ${year}`;
      }

      // JS Date → Amharic string, e.g. "መስከረም 5, 2017".
      function formatEcAm(jsDate) {
        const { year, month, day } = toEc(jsDate);
        return `${ecMonthsAm[month - 1]} ${day}, ${year}`;
      }

      // Returns today as an EC object.
      function todayEc() {
        return toEc(new Date());
      }

      return { toEc, toGc, formatEc, formatEcAm, todayEc, ecMonths, ecMonthsAm };
    })();

    // Expose globally so non-module scripts and the console can reach it.
    window.EC = EC;
    // ── END ETHIOPIAN CALENDAR ────────────────────────────────────────────────


    // ── DAL (Data Access Layer) ───────────────────────────────────────────────
    // Thin async wrappers around Firestore operations.
    // One function per logical entity; no raw Firestore calls outside this layer.
    //
    // Collections (top-level, multi-tenant by schoolId):
    //   schools/{schoolId}
    //   schools/{schoolId}/users/{uid}
    //   schools/{schoolId}/students/{studentId}
    //   schools/{schoolId}/classes/{classId}
    //   schools/{schoolId}/attendance/{attendanceId}
    //   schools/{schoolId}/grades/{gradeId}
    //   schools/{schoolId}/fees/{feeId}
    //   schools/{schoolId}/announcements/{announcementId}
    //
    // Examples:
    //   DAL.getStudent(schoolId, studentId) → Promise<Student>
    //   DAL.listClassAttendance(schoolId, classId, date) → Promise<Attendance[]>
    //   DAL.saveGrade(schoolId, gradePayload) → Promise<void>
    // ── END DAL ───────────────────────────────────────────────────────────────


    // ── COMPONENTS ───────────────────────────────────────────────────────────
    // Pure functions that return DOM nodes or HTML strings.
    // Naming convention: PascalCase, e.g. NavBar(), LoginForm(), StudentCard().
    //
    // Component lifecycle:
    //   mount(el, props)   – called when the router renders the component
    //   unmount(el)        – called before the router replaces the component
    //
    // Shared UI primitives:
    //   Spinner()          – full-screen loading indicator
    //   Toast(msg, type)   – transient notification (success / error / info)
    //   Modal(title, body) – accessible dialog overlay
    //   BottomNav()        – mobile navigation bar (role-aware)
    //   TopBar(title)      – page header with back button

    // ── Component registry ────────────────────────────────────────────────────
    // Maps component names → { renderFn, cleanup } entries.
    // Use createComponent() to register; the registry itself is not used
    // directly — the router calls component factories that invoke renderFn().
    const _componentRegistry = new Map();

    // createComponent(name, renderFn)
    //   name      – unique string identifier, e.g. 'LoginForm'
    //   renderFn  – function() → HTML string
    //
    // Returns an object with:
    //   mount(el)   – sets el.innerHTML to renderFn() output, stores cleanup
    //   unmount(el) – calls cleanup if registered, clears the element
    //   cleanup     – optional function the component may set after mount
    //                 (e.g. to remove event listeners)
    function createComponent(name, renderFn) {
      let _cleanup = null;

      const component = {
        name,
        renderFn,

        // Mount: render HTML into the target element.
        // Returns the component object so callers can chain .cleanup = fn.
        mount(el) {
          if (!el) { console.warn(`[Component:${name}] mount target not found`); return this; }
          // Run previous cleanup before replacing content.
          if (typeof _cleanup === 'function') { _cleanup(); _cleanup = null; }
          el.innerHTML = renderFn();
          return this;
        },

        // Unmount: run cleanup and clear the element.
        unmount(el) {
          if (typeof _cleanup === 'function') { _cleanup(); _cleanup = null; }
          if (el) el.innerHTML = '';
        },

        // Setter — components call component.cleanup = () => { … } after mount
        // to register event-listener teardown, timers, etc.
        set cleanup(fn) { _cleanup = fn; },
        get cleanup()   { return _cleanup; },
      };

      _componentRegistry.set(name, component);
      return component;
    }

    // ── UI Primitives ─────────────────────────────────────────────────────────

    // Spinner() — returns HTML string for a centred loading spinner overlay.
    function Spinner(message = '') {
      return `
        <div class="spinner-overlay" role="status" aria-live="polite">
          <div class="spinner spinner-lg"></div>
          ${message ? `<p>${message}</p>` : ''}
        </div>`;
    }

    // skeletonCard(lines)
    //   Card-shaped loading placeholder — a set of pulsing bars inside a
    //   .card. Used in place of a spinner for card-style views (dashboard
    //   summaries, single-record panels) so the eventual layout doesn't
    //   "pop" once data arrives.
    function skeletonCard(lines = 3) {
      // lines: number of placeholder rows to show inside the card
      const rows = Array.from({ length: lines }, (_, i) => {
        const widths = ['100%', '80%', '60%', '90%', '70%'];
        const w = widths[i % widths.length];
        return `<div class="skeleton-line" style="width:${w}"></div>`;
      }).join('');
      return `<div class="card skeleton-card" aria-busy="true" aria-label="Loading…">${rows}</div>`;
    }

    // skeletonTable(rows, cols)
    //   Table-shaped loading placeholder — a header row plus a configurable
    //   number of body rows, each cell a pulsing bar. Used in place of a
    //   spinner for table-style list views.
    function skeletonTable(rows = 4, cols = 4) {
      const headerCells = Array.from({length: cols}, () =>
        `<th><div class="skeleton-line" style="width:70%"></div></th>`).join('');
      const bodyRows = Array.from({length: rows}, () => {
        const cells = Array.from({length: cols}, (_, i) =>
          `<td><div class="skeleton-line" style="width:${i===0?'90%':'60%'}"></div></td>`).join('');
        return `<tr>${cells}</tr>`;
      }).join('');
      return `
        <div class="card" aria-busy="true" aria-label="Loading…">
          <table class="table"><thead><tr>${headerCells}</tr></thead>
          <tbody>${bodyRows}</tbody></table>
        </div>`;
    }

    // emptyState(icon, title, body, actionLabel, actionFn)
    //   icon: SVG string or emoji string
    //   actionFn: optional — if provided, renders a button that calls it
    //   Caller must call attachEmptyActions(containerEl) immediately after
    //   inserting the returned HTML into the DOM, or the action button
    //   (if any) will render but stay inert.
    function emptyState(icon, title, body, actionLabel, actionFn) {
      const actionId = actionFn ? 'empty-action-' + Date.now() : null;
      const btn = actionLabel && actionFn
        ? `<button class="btn btn-primary" id="${actionId}">${actionLabel}</button>`
        : '';
      const html = `
        <div class="empty-state-block" role="status">
          <div class="empty-state-icon" aria-hidden="true">${icon}</div>
          <h3 class="empty-state-title">${title}</h3>
          <p class="empty-state-body">${body}</p>
          ${btn}
        </div>`;
      // Wire up the button after the caller inserts HTML into DOM
      if (actionId && actionFn) {
        // Use event delegation on the nearest container — caller must call attachEmptyActions()
        window.__emptyActions = window.__emptyActions || {};
        window.__emptyActions[actionId] = actionFn;
      }
      return html;
    }

    // attachEmptyActions(containerEl)
    //   Call once after inserting emptyState() HTML into the DOM. Wires up
    //   any pending action buttons registered by emptyState() above.
    function attachEmptyActions(containerEl) {
      (containerEl || document).querySelectorAll('[id^="empty-action-"]').forEach(btn => {
        const fn = window.__emptyActions?.[btn.id];
        if (fn) {
          btn.addEventListener('click', fn);
          delete window.__emptyActions[btn.id];
        }
      });
    }

    // applyKeyboardNav(containerEl)
    //   Call after any dynamic HTML is inserted into the DOM. Ensures
    //   div/span elements styled as buttons are keyboard-reachable and
    //   activatable, and gives the gradebook score grid Tab-to-next-cell
    //   behaviour. Idempotent — safe to call repeatedly on the same subtree.
    function applyKeyboardNav(containerEl) {
      const root = containerEl || document;

      // 1. Any <div> or <span> with role="button" or class="btn" that lacks tabindex gets one
      root.querySelectorAll('[role="button"]:not([tabindex]), .btn:not([tabindex])')
        .forEach(el => { el.setAttribute('tabindex', '0'); });

      // 2. Add Enter/Space key handler to all role="button" elements that aren't <button>
      root.querySelectorAll('[role="button"]:not(button)').forEach(el => {
        if (el.__kbNavBound) return;   // avoid double-binding
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            el.click();
          }
        });
        el.__kbNavBound = true;
      });

      // 3. Attendance toggle buttons — ensure proper role and label
      root.querySelectorAll('.att-toggle').forEach(btn => {
        if (!btn.getAttribute('role')) btn.setAttribute('role', 'button');
        if (!btn.getAttribute('tabindex')) btn.setAttribute('tabindex', '0');
      });

      // 4. Gradebook score inputs — Tab moves to next cell (not next focusable element)
      const scoreCells = Array.from(root.querySelectorAll('.gb-score-cell'));
      scoreCells.forEach((cell, idx) => {
        if (cell.__kbNavTabBound) return; // avoid double-binding on repeat calls
        cell.addEventListener('keydown', e => {
          if (e.key === 'Tab') {
            e.preventDefault();
            const next = scoreCells[idx + (e.shiftKey ? -1 : 1)];
            if (next) next.focus();
          }
        });
        cell.__kbNavTabBound = true;
      });
    }

    // Toast(message, type, durationMs)
    //   type: 'success' | 'error' | 'info' | 'warning'
    //   Legacy wrapper kept for existing call sites. Delegates to
    //   showToast() (see § AUTH) for 'success' | 'error' | 'info', which is
    //   now the canonical implementation; falls back to the original
    //   behaviour here for 'warning' (and any custom durationMs) since
    //   showToast() only supports the three standard types at a fixed
    //   4-second duration.
    function Toast(message, type = 'info', durationMs = 4000) {
      if (type !== 'warning' && durationMs === 4000 && typeof showToast === 'function') {
        showToast(message, type);
        return;
      }

      const container = document.getElementById('toasts');
      if (!container) return;

      const typeLabels = { success: 'Success', error: 'Error', info: 'Info', warning: 'Warning' };
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.setAttribute('role', 'alert');
      el.innerHTML = `
        <div>
          <span class="toast-title">${typeLabels[type] ?? type}</span>
          ${message}
        </div>
        <button class="toast-dismiss" aria-label="Dismiss">✕</button>`;

      const dismiss = () => {
        el.classList.add('is-hiding');
        el.addEventListener('animationend', () => el.remove(), { once: true });
      };
      el.querySelector('.toast-dismiss').addEventListener('click', dismiss);
      container.appendChild(el);
      setTimeout(dismiss, durationMs);
    }

    }

    function _aiSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // acceptInviteView(params)
    //   Called directly from render()'s public-route special-case (NOT
    //   registered via router.register() — see the comment above this
    //   section for why) with params = { inviteId, token } parsed out of
    //   window.location.hash. Kicks off validation asynchronously (mirrors
    //   registrarStudentsView's setTimeout(_rsMountView, 0) pattern — the
    //   caller expects a synchronous HTML string back immediately, so we
    //   return a loading placeholder here and mutate #app in place once
    //   the read resolves).
    function acceptInviteView(params) {
      _aiInviteId = params.inviteId ?? '';
      // The token segment was encodeURIComponent()'d when the link was
      // built (see dal.createParentInvite) specifically because raw base64
      // can contain '/', which the router's :token segment can't span.
      // router._dispatch() does no decoding of its own, so we decode here.
      try {
        _aiToken = decodeURIComponent(params.token ?? '');
      } catch (_e) {
        _aiToken = params.token ?? '';
      }

      setTimeout(_aiValidateAndRender, 0);

      return `
        <div class="login-screen">
          <div class="login-card">
            <div class="login-logo">
              <div class="login-logo-mark" aria-hidden="true">SO</div>
              <div class="login-app-name">${APP_NAME}</div>
            </div>
            <p class="text-center text-muted">Checking your invite…</p>
          </div>
        </div>`;
    }

    // _aiValidateAndRender()
    //   1 Firestore read (dal.getParentInvite). Validates, in order:
    //     - invite document exists
    //     - token in the URL matches the stored token exactly
    //     - status is still 'pending' (not already accepted)
    //     - expiresAt is in the future
    //   Mounts either the error card or the registration form into #app.
    async function _aiValidateAndRender() {
      const app = document.getElementById('app');
      if (!app) return;

      try {
        const invite = await dal.getParentInvite(_aiInviteId);

        if (!invite) {
          app.innerHTML = _aiInviteErrorCard('This invite link is invalid or no longer exists.');
          return;
        }
        if (invite.token !== _aiToken) {
          app.innerHTML = _aiInviteErrorCard('This invite link is invalid.');
          return;
        }
        if (invite.status !== 'pending') {
          app.innerHTML = _aiInviteErrorCard(
            invite.status === 'accepted'
              ? 'This invite has already been used. Please sign in instead.'
              : 'This invite is no longer valid.'
          );
          return;
        }
        const expiresAtMs = invite.expiresAt?.toMillis ? invite.expiresAt.toMillis() : 0;
        if (!expiresAtMs || expiresAtMs <= Date.now()) {
          app.innerHTML = _aiInviteErrorCard('This invite link has expired (invites are valid for 7 days).');
          return;
        }

        _aiInvite = invite;
        app.innerHTML = _aiRegistrationFormCard();
      } catch (err) {
        app.innerHTML = _aiInviteErrorCard('Could not load this invite: ' + err.message);
      }
    }

    // window.__aiSubmit()
    //   1. Validates the form fields.
    //   2. createUserWithEmailAndPassword(auth, invite.email, password) —
    //      this signs the new parent in immediately. That's expected and
    //      fine here (unlike the admin/registrar "add user" flows), because
    //      this visitor had no prior session to lose.
    //   3. Marks the invite accepted (dal.acceptParentInvite) — done BEFORE
    //      the /users write below, not after. The /users create rule's
    //      self-registration carve-out (see selfRegisteredViaInvite() in
    //      dal.exportSecurityRules()) checks that the referenced invite is
    //      ALREADY status == 'accepted' with parentUid == the new auth uid;
    //      doing this step out of order would make every self-registration
    //      create fail the rule.
    //   4. Writes /users/{newUid} with role 'parent', childKeys seeded with
    //      the invited studentId, and an inviteId field the create rule
    //      uses to find and verify the invite from step 3.
    //   5. Adds newUid to the student's parentUids (dal.updateStudent).
    //   6. Redirects to #/parent/dashboard.
    //
    //   Steps 3–5 all run after the new Auth session is already active, so
    //   they execute under the NEW parent's security-rule permissions, not
    //   the registrar's — see dal.exportSecurityRules() for exactly what
    //   each rule allows a freshly-self-registered parent to do.
    window.__aiSubmit = async function __aiSubmit() {
      const errorEl = document.getElementById('ai-error');
      const btn     = document.getElementById('ai-submit');
      if (errorEl) errorEl.textContent = '';

      const name     = document.getElementById('ai-name')?.value.trim()     ?? '';
      const nameAm   = document.getElementById('ai-name-am')?.value.trim()  ?? '';
      const phone    = document.getElementById('ai-phone')?.value.trim()    ?? '';
      const password = document.getElementById('ai-password')?.value       ?? '';

      if (!name)             { if (errorEl) errorEl.textContent = 'Full name is required.'; return; }
      if (password.length < 8) { if (errorEl) errorEl.textContent = 'Password must be at least 8 characters.'; return; }
      if (!_aiInvite)        { if (errorEl) errorEl.textContent = 'Invite is no longer valid — please refresh.'; return; }

      if (btn) { btn.disabled = true; btn.textContent = '⏳ Creating account…'; }

      try {
        // Step (2) — signs the new parent in. No prior session to lose.
        const cred   = await createUserWithEmailAndPassword(auth, _aiInvite.email, password);
        const newUid = cred.user.uid;

        // Step (3) — accept the invite FIRST. dal.acceptParentInvite()'s
        // update is allowed by the /parentInvites rule because it echoes
        // the existing token back unchanged (see that rule's comment); it
        // does not depend on the /users doc existing yet.
        await dal.acceptParentInvite(_aiInviteId, _aiInvite.token, newUid);

        // Step (4) — write the parent's own profile document. inviteId
        // here is what the /users create rule's selfRegisteredViaInvite()
        // helper looks up to confirm step (3) already happened for this
        // exact uid + email.
        await setDoc(doc(db, 'users', newUid), {
          uid:           newUid,
          role:          'parent',
          email:         _aiInvite.email,
          displayName:   name,
          displayNameAm: nameAm,
          phone,
          active:        true,
          childKeys:     [_aiInvite.studentId],
          inviteId:      _aiInviteId,
          createdAt:     serverTimestamp(),
        });

        // Step (5) — link the student → parent in the other direction.
        await dal.updateStudent(_aiInvite.studentId, { parentUids: arrayUnion(newUid) });

        showToast(`✅ Welcome, ${name}! Your parent account is ready.`, 'success');

        // Step (6): onAuthStateChanged has already fired from step (2) and
        // loaded store.userDoc by now (role: 'parent'); render() will mount
        // the authenticated shell. We still set the hash explicitly so the
        // post-login redirect lands on the parent dashboard rather than
        // re-resolving to whatever #/accept-invite/... is still in the URL.
        window.location.hash = '#/parent/dashboard';
        router.navigate('#/parent/dashboard');
      } catch (err) {
        const friendly = {
          'auth/email-already-in-use': 'An account with this email already exists. Please sign in instead.',
          'auth/weak-password':        'Password is too weak — use at least 8 characters.',
          'auth/invalid-email':        'The invite email address is invalid.',
          'auth/network-request-failed': 'Network error. Check your connection and try again.',
        };
        const message = friendly[err.code] ?? err.message;
        if (errorEl) errorEl.textContent = message;
        showToast('Account creation failed: ' + message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '✅ Create My Account'; }
      }
    };

    // NOT registered via router.register(): this route is handled entirely
    // by render()'s public-route special-case above (see § INIT), which
    // mounts straight into #app. router._dispatch()/#main is the
    // authenticated-route path — registering this hash there too would let
    // an already-signed-in user's hash dispatch mount the registration
    // form a second time, nested inside the authenticated shell, which is
    // exactly the confusing/unsafe state the !store.user gate in render()
    // is meant to prevent. acceptInviteView() itself is still a normal
    // module-scope function, just invoked directly rather than via the
    // router's route table.

    // ── END COMPONENTS ───────────────────────────────────────────────────────


    // ── AUTH ─────────────────────────────────────────────────────────────────
    // Firebase Auth state machine + role resolution.
    //
    // Flow:
    //   1. onAuthStateChanged fires on page load / sign-in / sign-out.
    //   2. If user → loadUserDoc(uid) reads users/{uid}, validates the
    //      account, commits store.userDoc, then loadConfig() reads the
    //      single school-wide config document at schoolConfig/main.
    //   3. render() re-evaluates state on every store mutation (Proxy trap).
    //   4. If no user → clear userDoc, render() shows the login view.
    //
    // Exported helpers (free functions — usable directly or via window.Auth
    // for backward compatibility with existing call sites):
    //   signIn(email, password)  → Promise<void>
    //   signOut()                → Promise<void>
    //   loadUserDoc(uid)         → Promise<void>
    //   loadConfig()             → Promise<void>
    //   showToast(message, type) → void

    // signIn(email, password)
    //   Authenticates against Firebase Auth. On failure, shows a toast with
    //   the error message and re-throws (with the same friendly message)
    //   so callers — e.g. the login form submit handler — can also react,
    //   such as mirroring the message inline or re-enabling the submit
    //   button, without duplicating the error-translation logic.
    async function signIn(email, password) {
      try {
        await signInWithEmailAndPassword(auth, email, password);
        // onAuthStateChanged fires next → loadUserDoc() runs → render().
      } catch (err) {
        const friendly = {
          'auth/invalid-credential':    'Incorrect email or password.',
          'auth/invalid-email':         'Please enter a valid email address.',
          'auth/user-not-found':        'No account found with this email.',
          'auth/wrong-password':        'Incorrect password.',
          'auth/user-disabled':         'This account has been disabled.',
          'auth/too-many-requests':     'Too many attempts. Please try again later.',
          'auth/network-request-failed':'Network error. Check your connection.',
        };
        const message = friendly[err.code] ?? err.message;
        showToast(message, 'error');
        throw new Error(message);
      }
    }

    // signOut()
    //   Cancels active Firestore listeners, signs out of Firebase Auth,
    //   clears session-scoped store state, and navigates back to login.
    async function signOut() {
      try {
        // Cancel all active Firestore listeners before signing out.
        dal.cleanup();

        await _firebaseSignOut(auth);

        store.userDoc        = null;
        store.config          = null;
        store.gradebookCache = {};
        store._classDocCache   = {};
        store._subjectDocCache = {};
        store.childCache        = {};
        store._parentExamSubKey = undefined;
        _pdSelectedChildId      = null;

        router.navigate('#/login');
      } catch (err) {
        showToast('Sign out failed: ' + err.message, 'error');
        throw err;
      }
    }

    // loadUserDoc(uid)
    //   Reads users/{uid}. If the document doesn't exist, or exists but is
    //   marked inactive (active === false), the account is treated as
    //   invalid: the user is signed out and an explanatory toast is shown.
    //   Otherwise commits the document to store.userDoc and loads the
    //   school-wide config.
    //
    //   One-time retry on "not found": onAuthStateChanged can fire (and
    //   call this) before a just-created account's /users/{uid} doc has
    //   finished writing — both the accept-invite self-registration flow
    //   and the admin "add user via password" flow call
    //   createUserWithEmailAndPassword() and then setDoc() as two separate
    //   awaited steps, so there's a brief window where Auth knows about the
    //   uid but Firestore doesn't have the doc yet. A missing doc on the
    //   FIRST read is therefore ambiguous (genuinely missing vs. not written
    //   yet), so we wait 800ms and read once more before concluding the
    //   account really is invalid. A still-missing doc on the retry signs
    //   out as before — this only adds latency to the "doc not found"
    //   path, never to the normal "doc exists" path.
    async function loadUserDoc(uid, _isRetry = false) {
      try {
        const snap = await getDoc(doc(db, 'users', uid));

        if (!snap.exists()) {
          if (!_isRetry) {
            await new Promise(resolve => setTimeout(resolve, 800));
            return loadUserDoc(uid, true);
          }
          showToast('Account not found or deactivated', 'error');
          await signOut();
          return;
        }
        if (snap.data()?.active === false) {
          showToast('Account not found or deactivated', 'error');
          await signOut();
          return;
        }

        store.userDoc = snap.data();
        await loadConfig();
        _maybeShowBudgetOverheadInfoToast();
      } catch (err) {
        showToast('Failed to load user profile: ' + err.message, 'error');
      }
    }

    // _maybeShowBudgetOverheadInfoToast()
    //   One-time onboarding notice: the read-budget tracker (§ DAL,
    //   ME_READS_PER_DOC_ACCESS) now folds in the hidden me() security-rule
    //   overhead, so the numbers admins see went up even though nothing
    //   about the app's actual Firestore usage changed. Shown once ever
    //   per browser (not once per session — a localStorage flag, not a
    //   store/sessionStorage one) the first time store.userDoc is
    //   successfully populated, covering both a fresh sign-in and a
    //   restored session equally, since either is a legitimate "first time
    //   this browser has seen the new behavior" moment. Swallows
    //   localStorage errors the same way the rest of § BUDGET does — if
    //   storage is unavailable the toast may repeat on later visits, which
    //   is a harmless degradation, not a crash.
    const BUDGET_OVERHEAD_TOAST_SEEN_KEY = 'schoolos_budget_overhead_toast_seen';
    function _maybeShowBudgetOverheadInfoToast() {
      try {
        if (localStorage.getItem(BUDGET_OVERHEAD_TOAST_SEEN_KEY) === '1') return;
        localStorage.setItem(BUDGET_OVERHEAD_TOAST_SEEN_KEY, '1');
      } catch (_) {
        // localStorage unavailable — show it anyway this one time rather
        // than silently never explaining the new numbers.
      }
      showToast(
        'Budget tracker now includes hidden security rule reads. Your real Firestore usage is approximately 2× your explicit reads.',
        'info',
        7000,
      );
    }

    // loadConfig()
    //   Reads the single school-wide settings document at
    //   schoolConfig/main and commits it to store.config.
    async function loadConfig() {
      try {
        const snap = await getDoc(doc(db, 'schoolConfig', 'main'));
        store.config = snap.exists() ? snap.data() : null;
      } catch (err) {
        showToast('Failed to load school configuration: ' + err.message, 'error');
      }
    }

    // showToast(message, type)
    //   type: 'success' | 'error' | 'info'
    //   Appends a dismissible toast to #toasts and auto-removes it after
    //   `duration` ms (default 4000). Supports stacking up to 5; oldest
    //   is removed if a 6th arrives. Each toast has a type icon, coloured
    //   left border, message text, close button, and animated progress bar.
    function showToast(message, type = 'info', duration = 4000) {
      const container = document.getElementById('toasts');
      if (!container) return;

      // ── Cap at 5 toasts: evict the oldest ────────────────────────────
      const MAX_TOASTS = 5;
      const existing = container.querySelectorAll('.toast');
      if (existing.length >= MAX_TOASTS) {
        const oldest = existing[0];
        oldest.classList.add('is-hiding');
        oldest.addEventListener('animationend', () => oldest.remove(), { once: true });
      }

      // ── Type metadata ─────────────────────────────────────────────────
      const META = {
        success: {
          label: 'Success',
          icon: `<svg class="toast-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="8.5"/><polyline points="6.5,10.5 9,13 13.5,7.5"/></svg>`,
        },
        error: {
          label: 'Error',
          icon: `<svg class="toast-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="8.5"/><line x1="7" y1="7" x2="13" y2="13"/><line x1="13" y1="7" x2="7" y2="13"/></svg>`,
        },
        warning: {
          label: 'Warning',
          icon: `<svg class="toast-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 3L18 17H2L10 3z"/><line x1="10" y1="9" x2="10" y2="12.5"/><circle cx="10" cy="14.5" r="0.8" fill="currentColor" stroke="none"/></svg>`,
        },
        info: {
          label: 'Info',
          icon: `<svg class="toast-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="8.5"/><line x1="10" y1="9" x2="10" y2="14"/><circle cx="10" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>`,
        },
      };
      const meta = META[type] ?? META.info;

      // ── Build element ─────────────────────────────────────────────────
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.setAttribute('role', 'alert');
      el.setAttribute('aria-live', 'assertive');
      el.innerHTML = `
        ${meta.icon}
        <div class="toast-body">
          <span class="toast-title">${meta.label}</span>
          <span class="toast-message">${message}</span>
        </div>
        <button class="toast-dismiss" aria-label="Dismiss toast">✕</button>
        <div class="toast-progress" style="animation: toastProgress ${duration}ms linear forwards;"></div>`;

      // ── Dismiss helpers ───────────────────────────────────────────────
      let _dismissed = false;
      const dismiss = () => {
        if (_dismissed) return;
        _dismissed = true;
        el.classList.add('is-hiding');
        el.addEventListener('animationend', () => el.remove(), { once: true });
      };

      el.querySelector('.toast-dismiss').addEventListener('click', dismiss);
      container.appendChild(el);
      const timer = setTimeout(dismiss, duration);

      // Cancel auto-dismiss while hovered / focused (accessibility).
      el.addEventListener('mouseenter', () => clearTimeout(timer));
      el.addEventListener('mouseleave', () => setTimeout(dismiss, 800));
    }

    // ── showConfirm(message, onConfirm, onCancel) ─────────────────────────────
    //   Renders a lightweight modal overlay with Confirm / Cancel buttons.
    //   Replaces all window.confirm() calls — non-blocking, mobile-friendly.
    //   onConfirm / onCancel are called and the modal is removed on selection.
    //   Pressing Escape also cancels.
    function showConfirm(message, onConfirm, onCancel) {
      // Remove any stale instance.
      document.getElementById('schoolos-confirm-backdrop')?.remove();

      const backdrop = document.createElement('div');
      backdrop.id = 'schoolos-confirm-backdrop';
      backdrop.setAttribute('role', 'dialog');
      backdrop.setAttribute('aria-modal', 'true');
      backdrop.setAttribute('aria-labelledby', 'schoolos-confirm-msg');

      backdrop.innerHTML = `
        <div id="schoolos-confirm-modal">
          <h3>Confirm Action</h3>
          <p id="schoolos-confirm-msg">${message}</p>
          <div class="schoolos-confirm-actions">
            <button id="schoolos-confirm-cancel" class="btn btn-ghost">Cancel</button>
            <button id="schoolos-confirm-ok"     class="btn btn-primary">Confirm</button>
          </div>
        </div>`;

      document.body.appendChild(backdrop);

      const close = () => backdrop.remove();

      document.getElementById('schoolos-confirm-ok').addEventListener('click', () => {
        close();
        if (typeof onConfirm === 'function') onConfirm();
      });
      document.getElementById('schoolos-confirm-cancel').addEventListener('click', () => {
        close();
        if (typeof onCancel === 'function') onCancel();
      });

      // Backdrop-click cancels.
      backdrop.addEventListener('click', (e) => {
        if (e.target === backdrop) { close(); if (typeof onCancel === 'function') onCancel(); }
      });

      // Escape key cancels.
      const onKey = (e) => {
        if (e.key === 'Escape') {
          document.removeEventListener('keydown', onKey);
          close();
          if (typeof onCancel === 'function') onCancel();
        }
      };
      document.addEventListener('keydown', onKey);

      // Focus the confirm button for keyboard accessibility.
      requestAnimationFrame(() => document.getElementById('schoolos-confirm-ok')?.focus());
    }

    // Expose globally so inline onclick handlers and any future modules can use it.
    window.showConfirm = showConfirm;


    // Legacy object-style wrapper, kept so existing window.Auth.* call sites
    // (and any external code relying on it) continue to work unchanged.
    const Auth = {
      signInWithEmail: signIn,
      signOut,
      currentUser() { return auth.currentUser; },
    };

    // Expose globally for console debugging and inline onclick handlers.
    window.Auth = Auth;

    onAuthStateChanged(auth, async (user) => {
      store.user = user;

      if (!user) {
        store.userDoc = null;
        // store setter triggers render() — login view will be shown.
      } else {
        await loadUserDoc(user.uid);
      }
    });
    // ── END AUTH ─────────────────────────────────────────────────────────────


    // ── DAL ──────────────────────────────────────────────────────────────────
    // Data Access Layer — the single point of contact between app code and
    // Firestore. Every Firestore read or write in the app should eventually
    // go through a dal.* function rather than calling getDoc/setDoc/etc.
    // directly, so that:
    //   1. Read/write volume is tracked against the Spark (free-tier) daily
    //      quota via dal.budgetTrack(reads, writes, docCount) — docCount
    //      also drives the hidden me() security-rule overhead (see
    //      ME_READS_PER_DOC_ACCESS below).
    //   2. Partial updates consistently use dot-notation / field-level
    //      updateDoc() calls rather than full-document overwrites.
    //   3. Every Firestore listener is registered in store.listeners so it
    //      can be torn down in one place (dal.cleanup(), called from
    //      signOut() — see § AUTH).
    //
    // All dal.* functions are async, even ones that don't strictly need to
    // be, so call sites can always `await dal.foo()` without checking.
    //
    // Exported:
    //   dal.budgetTrack(reads, writes, docCount)   → void   (sync; not async on purpose)
    //   dal.budgetLoad()                           → void   (sync; hydrates counts from localStorage at init)
    //   dal.isListReadBlocked()                    → boolean  (sync; true once reads ≥ 95% of daily limit)
    //   dal.getMe()                                → Promise<object|null>
    //   dal.getSchoolConfig()                      → Promise<object|null>
    //   dal.updateSchoolConfig(updates)            → Promise<void>
    //   dal.subscribeConfig(callback)              → Promise<function>  (returns unsubscribe)
    //   dal.getUser(uid)                           → Promise<object|null>
    //   dal.listUsers(role)                        → Promise<object[]>
    //   dal.createUser(uid, data)                  → Promise<void>
    //   dal.updateUser(uid, updates)               → Promise<void>
    //   dal.deactivateUser(uid)                    → Promise<void>
    //   dal.updateTeacherAssignments(uid, assigns) → Promise<void>
    //   dal.createParentInvite(email, studentId, registrarUid) → Promise<{inviteId, inviteLink}>
    //   dal.getParentInvite(inviteId)              → Promise<object|null>
    //   dal.acceptParentInvite(inviteId, token, parentUid) → Promise<void>
    //   dal.validateCompositeKey(compositeKey)     → { classKey, subjectId } or throws TypeError
    //   dal.validateAndSyncAssignments(uid, keys)  → Promise<void>  (validates then writes)
    //   dal.safe(asyncFn, prefix?)                 → Promise<{ ok, value|error }>
    //   dal.getSubject(subjectId)                  → Promise<object|null>  (cache-aware)
    //   dal.getStudent(studentId)                  → Promise<object|null>
    //   dal.listStudents(classKey)                 → Promise<object[]>
    //   dal.createStudent(data)                    → Promise<void>
    //   dal.updateStudent(studentId, updates)      → Promise<void>
    //   dal.getClass(classKey)                     → Promise<object|null>
    //   dal.listClasses(ecYear)                    → Promise<object[]>
    //   dal.createClass(data)                      → Promise<void>
    //   dal.updateClass(classKey, updates)         → Promise<void>
    //   dal.listSubjects()                         → Promise<object[]>
    //   dal.createSubject(data)                    → Promise<void>
    //   dal.updateSubject(subjectId, updates)      → Promise<void>
    //   dal.getGradebook(classKey, subjectKey)     → Promise<object|null>
    //   dal.createGradebook(classKey, subjectKey, data) → Promise<void>
    //   dal.saveScore(classKey, subjectKey, studentId, columnId, rawValue) → Promise<void>
    //   dal.listGradebooks(classKey)               → Promise<object[]>
    //   dal.finalizeGradebook(classKey, subjectKey, studentRemarks) → Promise<void>
    //   dal.computeRanks(roster, averages)         → object  (sync; not async on purpose)
    //   dal.getAttendance(classKey, dateKey)       → Promise<object|null>
    //   dal.markAttendance(classKey, dateKey, statuses, studentIds) → Promise<void>
    //   dal.getStudentAttendance(studentId, startDateKey, endDateKey) → Promise<object[]>
    //   dal.getClassAttendanceRange(classKey, startDateKey, endDateKey) → Promise<object[]>
    //   dal.postHomework(classKey, data)           → Promise<string>  (returns homeworkId)
    //   dal.listHomework(classKey)                 → Promise<object[]>
    //   dal.getHomeworkForStudent(classKey, studentId) → Promise<object[]>
    //   dal.updateHomework(classKey, homeworkId, updates) → Promise<void>
    //   dal.deleteHomework(classKey, homeworkId)   → Promise<void>
    //   dal.postAnnouncement(data)                 → Promise<string>  (returns announcement id)
    //   dal.subscribeAnnouncements()               → Promise<function>  (returns unsubscribe)
    //   dal.deleteAnnouncement(announcementId)      → Promise<void>   (admin only)
    //   dal.postExamSchedule(data)                 → Promise<string>  (returns exam-schedule id; enforces canonical field set)
    //   dal.updateExamSchedule(scheduleId, updates) → Promise<void>   (admin only)
    //   dal.deleteExamSchedule(scheduleId)         → Promise<void>   (admin only)
    //   dal.getExamSchedule(scheduleId)            → Promise<object|null>
    //   dal.subscribeExamSchedules(myClassKey, myGrade) → Promise<function>  (returns unsubscribe)
    //   dal.examTypeLabel(type)                    → { en: string, am: string }
    //   dal.recordPayment(studentId, amount, semester, ecYear, method, reference) → Promise<number>  (returns new tuitionOwed)
    //   dal.listPayments(studentId)                → Promise<object[]>
    //   dal.listAllPayments(ecYear, semester)      → Promise<object[]>  (admin only)
    //   dal.getStudentBalance(studentId)           → Promise<number|null>
    //   dal.runPromotion(currentEcYear, targetEcYear, onProgress) → Promise<void>  (admin only; resumable)
    //   dal.getPromotionJob(ecYear)                → Promise<object|null>
    //   dal.resetPromotionJob(ecYear)              → Promise<void>  (admin only)
    //   dal.exportSecurityRules()                  → string  (sync; not async on purpose)
    //   dal.runRulesTests()                        → Promise<Array<{name, expected, actual, pass}>>
    //   dal.runSelfTest()                          → Promise<Array<{name, detail, pass}>>  (admin only; non-destructive)
    //   dal.budgetReset()                          → void   (sync; admin "Reset Counter" button)
    //   dal.budgetExportLog()                      → void   (sync; admin "Export Log" button — downloads JSON)
    //   dal.cleanup()                              → void   (sync; not async on purpose)

    // ── Read budget tracking ────────────────────────────────────────────────
    // Spark (Firebase free-tier) plans cap Firestore at a fixed number of
    // document reads/writes per day. There's no hard enforcement on our end
    // (Firestore itself will start erroring once the real Google-side quota
    // is hit), so this is a *soft* budget: a local running counter, persisted
    // across reloads, that warns admins as usage approaches the limit and
    // throttles non-essential reads once it gets dangerously close.
    //
    //   DAL_DAILY_READ_LIMIT — soft daily read budget. 50,000 is comfortably
    //     under typical Spark-tier daily read allowances, leaving headroom
    //     for the live onSnapshot listeners (announcements, exam schedules,
    //     promotion-job progress) that read continuously while mounted.
    //   DAL_BUDGET_WARN_PCT — banner threshold (80%): visible warning, but
    //     every read still goes through normally. Measured against the
    //     REAL total (explicit reads + me() overhead — store.readCount
    //     already includes both, see ME_READS_PER_DOC_ACCESS below), since
    //     that's what Firestore is actually billing.
    //   DAL_BUDGET_BLOCK_PCT — hard-throttle threshold (95%): list-style
    //     multi-document reads (roster views, payment histories, etc.) are
    //     short-circuited to an empty result; single-document "essential"
    //     reads (the signed-in user's own doc, a specific student/class
    //     being opened, school config, …) are left untouched so the app
    //     doesn't lock a user out of their own session. Also measured
    //     against the real (explicit + overhead) total.
    //
    //   ME_READS_PER_DOC_ACCESS — Every Firestore document access (read or
    //     write) that triggers a security rule evaluation causes one
    //     additional get() call to /users/{uid} (the me() helper). This is
    //     billed as a real Firestore read. For list queries returning N
    //     documents, this adds N hidden reads. dal.budgetTrack()'s 3rd
    //     argument, docCount, is how many documents a given operation
    //     touched (1 for a single getDoc/setDoc/updateDoc, N for a list
    //     query's N results, M for an M-document writeBatch) — store.readCount
    //     is incremented by `reads + docCount * ME_READS_PER_DOC_ACCESS` so
    //     the running total reflects what Firestore is actually billing,
    //     not just the application-level "explicit" read/write counts.
    const ME_READS_PER_DOC_ACCESS = 1;
    const DAL_DAILY_READ_LIMIT  = 50000; // Spark free-tier soft budget (reads/day)
    const DAL_BUDGET_WARN_PCT   = 0.80;  // 40,000 reads → persistent warning banner
    const DAL_BUDGET_BLOCK_PCT  = 0.95;  // 47,500 reads → list reads disabled
    const DAL_BUDGET_LOG_MAX    = 200;   // cap on retained dal.budgetLog entries
    const DAL_BUDGET_STORAGE_KEY = 'schoolos_budget';

    const dal = {};

    // dal.budgetLog
    //   Rolling log of the last DAL_BUDGET_LOG_MAX dal.budgetTrack() calls,
    //   newest last: [{ op, reads, writes, timestamp }]. Mirrors store at
    //   the module level too (store.budgetLog) so the Proxy triggers
    //   render() when it changes; dal.budgetLog and store.budgetLog are
    //   kept as the same array reference.
    dal.budgetLog = store.budgetLog;

    // _todayKey()
    //   Local-time 'YYYY-MM-DD' string used as the daily-reset boundary.
    //   Deliberately local time, not UTC — admins reason about "today" in
    //   the school's own timezone, not GMT.
    function _todayKey() {
      const d = new Date();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}-${mm}-${dd}`;
    }

    // _budgetCallerName()
    //   Best-effort extraction of "who called dal.budgetTrack()" from the
    //   current stack trace, for the operation-breakdown log. Stack frame 0
    //   is this function, frame 1 is budgetTrack() itself, so the caller is
    //   frame 2. Falls back to 'unknown' for engines/minifiers that don't
    //   expose readable function names (this is a diagnostic nice-to-have,
    //   never load-bearing — it must never throw past this function).
    function _budgetCallerName() {
      try {
        const stack = new Error().stack;
        if (!stack) return 'unknown';
        const lines = stack.split('\n').slice(1); // drop "Error" header line
        // lines[0] = this function, lines[1] = budgetTrack, lines[2] = caller
        const frame = lines[2] || lines[1] || '';
        // V8/Chrome: "    at functionName (file:line:col)"
        // Fallback (Safari/Firefox): "functionName@file:line:col"
        let m = frame.match(/at\s+([^\s(]+)\s*\(/) || frame.match(/at\s+([^\s]+)$/);
        if (!m) m = frame.match(/^\s*([^@\s]+)@/);
        let name = m ? m[1] : frame.trim();
        if (!name) return 'unknown';
        // Collapse "Object.dal.foo" / "dal.foo" down to just "foo" for
        // readability in the log table.
        name = name.replace(/^Object\./, '').replace(/^dal\./, '');
        return name.slice(0, 60) || 'unknown';
      } catch (_) {
        return 'unknown';
      }
    }

    // _budgetSave()
    //   Persists store.readCount / meOverheadCount / writeCount /
    //   budgetDate / budgetLog to localStorage as a single JSON blob (one
    //   key, written together, so a reload can never observe a
    //   torn/partial update across keys). Swallows write errors (e.g.
    //   localStorage disabled in a private tab or quota exceeded) — budget
    //   tracking degrades to session-only in that case rather than
    //   crashing the app.
    function _budgetSave() {
      try {
        localStorage.setItem(DAL_BUDGET_STORAGE_KEY, JSON.stringify({
          readCount:       store.readCount,
          meOverheadCount: store.meOverheadCount,
          writeCount:      store.writeCount,
          budgetDate:      store.budgetDate,
          budgetLog:       store.budgetLog,
        }));
      } catch (_) { /* storage unavailable — counts stay session-only */ }
    }

    // dal.budgetLoad()
    //   Hydrates store.readCount / meOverheadCount / writeCount /
    //   budgetDate / budgetLog from localStorage. Called once during app
    //   init (§ INIT), before any Firestore call has a chance to fire
    //   dal.budgetTrack(). If the persisted date doesn't match today, the
    //   daily reset already happening inside budgetTrack() on the very
    //   next call will zero the counts out — so budgetLoad() doesn't need
    //   to duplicate that logic, it just needs to faithfully restore
    //   whatever was last saved.
    dal.budgetLoad = function budgetLoad() {
      try {
        const raw = localStorage.getItem(DAL_BUDGET_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (typeof parsed.readCount === 'number')       store.readCount       = parsed.readCount;
        if (typeof parsed.meOverheadCount === 'number') store.meOverheadCount = parsed.meOverheadCount;
        if (typeof parsed.writeCount === 'number')      store.writeCount      = parsed.writeCount;
        if (typeof parsed.budgetDate === 'string')      store.budgetDate      = parsed.budgetDate;
        if (Array.isArray(parsed.budgetLog)) {
          store.budgetLog = parsed.budgetLog.slice(-DAL_BUDGET_LOG_MAX);
          dal.budgetLog = store.budgetLog;
        }
      } catch (_) { /* corrupt/missing — start from zero, same as a fresh install */ }
    };

    // dal.budgetTrack(reads, writes, docCount)
    //   Increments the day's running read/write counters and appends an
    //   entry to dal.budgetLog. Call this immediately before or after
    //   issuing any Firestore read (reads = number of documents about to
    //   be / just read) and/or write (writes = number of documents about
    //   to be / just written) — call sites throughout § DAL do both,
    //   depending on whether the document count is known up front.
    //   Defaults to 0 for either so call sites can pass just the dimension
    //   they're tracking.
    //
    //   docCount is the number of distinct documents accessed by this
    //   operation — 1 for a single getDoc/setDoc/updateDoc, N for a list
    //   query's N results, M for an M-document writeBatch/transaction.
    //   Each document access that goes through a security rule costs one
    //   extra get() of /users/{uid} (the me() helper) — see
    //   ME_READS_PER_DOC_ACCESS above — and that hidden read is a REAL
    //   Firestore read Google bills for, so it's added to store.readCount
    //   right alongside the explicit `reads` argument:
    //     store.readCount += reads + docCount * ME_READS_PER_DOC_ACCESS
    //   store.meOverheadCount tracks just the me()-overhead portion of
    //   that, so "explicit reads" can always be recovered as
    //   store.readCount - store.meOverheadCount for display purposes
    //   (see budgetModalHtml() / § BUDGET UI below).
    //
    //   Daily reset: if store.budgetDate doesn't match today's date, the
    //   counts (but not the log — the log is a rolling diagnostic window,
    //   not a daily one) are zeroed before applying this call's increment.
    //
    //   Persists to localStorage after every call so a refresh/crash never
    //   loses budget state for the day.
    //
    //   Crossing 80% of the daily limit (measured against the REAL total —
    //   explicit + me() overhead) triggers the persistent warning banner
    //   (re-evaluated on every call by whatever's reading store reactively
    //   — see § BUDGET UI); it deliberately does not also fire a one-off
    //   toast on every single call past that point, to avoid spamming
    //   admins who are already seeing the banner.
    dal.budgetTrack = function budgetTrack(reads = 0, writes = 0, docCount = 0) {
      const today = _todayKey();
      if (store.budgetDate !== today) {
        store.budgetDate      = today;
        store.readCount       = 0;
        store.meOverheadCount = 0;
        store.writeCount      = 0;
        // Daily reset clears counts, not the rolling op log — the log is a
        // short diagnostic window (last ~200 calls), independent of "today".
      }

      const meOverhead = docCount * ME_READS_PER_DOC_ACCESS;

      store.readCount       += reads + meOverhead;
      store.meOverheadCount += meOverhead;
      store.writeCount      += writes;

      const entry = {
        op:         _budgetCallerName(),
        reads,
        writes,
        docCount,
        meOverhead,
        timestamp:  Date.now(),
      };
      store.budgetLog.push(entry);
      if (store.budgetLog.length > DAL_BUDGET_LOG_MAX) {
        store.budgetLog.splice(0, store.budgetLog.length - DAL_BUDGET_LOG_MAX);
      }
      dal.budgetLog = store.budgetLog;

      _budgetSave();

      // Reflect the new totals into the floating pill / banner immediately
      // — these are plain DOM writes (no store.* mutation, so no extra
      // render() loop) so they stay in sync even though most budgetTrack()
      // callers don't otherwise touch any store field the Proxy would
      // re-render on.
      if (typeof window.__budgetSyncUI === 'function') window.__budgetSyncUI();
    };

    // dal.isListReadBlocked()
    //   Returns true once today's read count has crossed
    //   DAL_BUDGET_BLOCK_PCT (95%) of the daily limit. store.readCount is
    //   the REAL billed total (explicit reads + me() security-rule
    //   overhead — see ME_READS_PER_DOC_ACCESS, § DAL), so this threshold
    //   is already measured against actual Firestore billing, not just
    //   the app's explicit read count. List-style dal.* functions
    //   (multi-document collection queries — rosters, payment histories,
    //   gradebook lists, etc.) check this *before* issuing their query and
    //   short-circuit to an empty result when blocked, so the remaining
    //   headroom is preserved for essential single-document reads (a
    //   user's own profile, the specific record someone has already
    //   opened, school config, …) rather than being exhausted by a list
    //   view's bulk fetch.
    dal.isListReadBlocked = function isListReadBlocked() {
      return store.readCount >= DAL_DAILY_READ_LIMIT * DAL_BUDGET_BLOCK_PCT;
    };

    // dal.budgetReset()
    //   Admin "Reset Counter" action (§ BUDGET UI modal). Zeroes today's
    //   read/write counts and re-stamps budgetDate to today, but preserves
    //   dal.budgetLog — the log is a diagnostic trail of what happened,
    //   resetting the counter shouldn't erase the evidence of why it was
    //   reset. Persists immediately so the zeroed state survives a reload.
    dal.budgetReset = function budgetReset() {
      store.readCount       = 0;
      store.meOverheadCount = 0;
      store.writeCount      = 0;
      store.budgetDate      = _todayKey();
      _budgetSave();
      if (typeof window.__budgetSyncUI === 'function') window.__budgetSyncUI();
      if (typeof showToast === 'function') showToast('Budget counter reset', 'success');
    };

    // dal.budgetExportLog()
    //   Admin "Export Log" action. Downloads the current dal.budgetLog
    //   (up to the last 200 entries) as a pretty-printed JSON file via a
    //   throwaway object URL + anchor click — the same browser-native
    //   download pattern used elsewhere in the app for CSV/JSON exports,
    //   no server round-trip required.
    dal.budgetExportLog = function budgetExportLog() {
      try {
        const payload = {
          exportedAt:      new Date().toISOString(),
          budgetDate:      store.budgetDate,
          explicitReads:   store.readCount - store.meOverheadCount,
          meOverheadReads: store.meOverheadCount,
          totalReadsBilled: store.readCount,
          writeCount:      store.writeCount,
          dailyLimit:      DAL_DAILY_READ_LIMIT,
          log:             store.budgetLog,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `schoolos-budget-log-${store.budgetDate || _todayKey()}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        console.error('[SchoolOS DAL] budgetExportLog failed:', err);
        if (typeof showToast === 'function') showToast('Could not export log: ' + (err?.message ?? err), 'error');
      }
    };

    // dal.getMe()
    //   Reads the signed-in user's own document at users/{uid}.
    //   Returns the document data, or null if it doesn't exist.
    dal.getMe = async function getMe() {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'users', store.user.uid));
      return snap.exists() ? snap.data() : null;
    };

    // dal.getSchoolConfig()
    //   Reads the single school-wide settings document at schoolConfig/main,
    //   commits it to store.config, and returns the data.
    dal.getSchoolConfig = async function getSchoolConfig() {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'schoolConfig', 'main'));
      const data = snap.exists() ? snap.data() : null;
      store.config = data;
      return data;
    };

    // dal.updateSchoolConfig(updates)
    //   Applies a partial update to schoolConfig/main using dot-notation
    //   field paths (e.g. { 'feesEnabled': true, 'terms.current': 2 }) —
    //   never overwrites the whole document. Stamps updatedAt with the
    //   server's clock.
    dal.updateSchoolConfig = async function updateSchoolConfig(updates) {
      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'schoolConfig', 'main'), {
        ...updates,
        updatedAt: serverTimestamp(),
      });
    };

    // dal.subscribeConfig(callback)
    //   Subscribes to live updates on schoolConfig/main. Tracks one read
    //   against the budget on every snapshot (initial + each subsequent
    //   change), registers the unsubscribe function in store.listeners so
    //   dal.cleanup()/signOut() can tear it down, and invokes callback(data)
    //   on every snapshot. Returns the unsubscribe function.
    dal.subscribeConfig = async function subscribeConfig(callback) {
      const unsubscribe = onSnapshot(doc(db, 'schoolConfig', 'main'), (snap) => {
        dal.budgetTrack(1, 0, 1);
        const data = snap.exists() ? snap.data() : null;
        callback(data);
      });

      store.listeners.push(unsubscribe);
      return unsubscribe;
    };

    // ── Users ────────────────────────────────────────────────────────────────

    // dal.getUser(uid)
    //   Reads a single user document at users/{uid}.
    //   Returns the document data, or null if it doesn't exist.
    dal.getUser = async function getUser(uid) {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'users', uid));
      return snap.exists() ? snap.data() : null;
    };

    // dal.listUsers(role)
    //   Lists users, optionally filtered to a single role
    //   (e.g. 'teacher', 'parent'). Pass no argument (or a falsy value) to
    //   list all users. Budget-tracks the actual number of documents
    //   returned, since that's the true read cost of the query.
    dal.listUsers = async function listUsers(role) {
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled
      const usersRef = collection(db, 'users');
      const q = role ? query(usersRef, where('role', '==', role)) : query(usersRef);
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => d.data());
    };

    // dal.createUser(uid, data)
    //   Creates (or overwrites) the user document at users/{uid}.
    //   Stamps createdAt with the server's clock.
    dal.createUser = async function createUser(uid, data) {
      dal.budgetTrack(0, 1, 1);
      await setDoc(doc(db, 'users', uid), {
        ...data,
        createdAt: serverTimestamp(),
      });
    };

    // dal.updateUser(uid, updates)
    //   Applies a partial, dot-notation update to users/{uid}.
    //   Stamps updatedAt with the server's clock.
    dal.updateUser = async function updateUser(uid, updates) {
      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'users', uid), {
        ...updates,
        updatedAt: serverTimestamp(),
      });
    };

    // dal.deactivateUser(uid)
    //   Soft-deletes a user by flipping active to false — never deletes
    //   the document outright, so audit history and references (e.g.
    //   teachingAssignments) stay intact.
    dal.deactivateUser = async function deactivateUser(uid) {
      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'users', uid), { active: false });
    };

    // dal.updateTeacherAssignments(teacherUid, newAssignments)
    //   Replaces a teacher's full teachingAssignments array (entries look
    //   like 'classKey|subjectId') and derives the companion
    //   teachingClassKeys array — the de-duplicated set of classKey
    //   prefixes — from it in the same call. The two fields are always
    //   written together in a single updateDoc() so they can never drift
    //   out of sync with each other.
    dal.updateTeacherAssignments = async function updateTeacherAssignments(teacherUid, newAssignments) {
      const classKeys = [...new Set(newAssignments.map(a => a.split('|')[0]))];

      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'users', teacherUid), {
        teachingAssignments: newAssignments,
        teachingClassKeys:   classKeys,
        updatedAt:           serverTimestamp(),
      });
    };

    // ── Parent Invites ───────────────────────────────────────────────────────
    // Spark-safe self-registration for new parent accounts (see the
    // architecture note at the top of the "Step 3: Parent linking" block in
    // registrarStudentsView, and the #/accept-invite/:inviteId/:token route
    // near § INIT for the consuming side of this flow).
    //
    // Why this exists: createUserWithEmailAndPassword() immediately signs in
    // whichever account it just created, displacing any currently-signed-in
    // session. A registrar can't safely create a parent's Auth account from
    // their own logged-in session for that reason (same constraint as the
    // admin "add user" flow — see __umSubmit's comments). The fix used
    // throughout this app for that constraint is to let the OTHER person
    // create their own account: we write a short-lived invite document the
    // registrar can hand to the parent, and the parent calls
    // createUserWithEmailAndPassword() themselves, with no session of their
    // own to lose.

    // dal.createParentInvite(email, studentId, registrarUid)
    //   Creates /parentInvites/{inviteId} (auto-generated doc ID, via an
    //   empty-path doc() call) with a random-ish opaque token, a 7-day
    //   expiry, and status 'pending'. Returns { inviteId, inviteLink } so
    //   the caller can immediately show/copy the shareable URL.
    //
    //   Token note: btoa(email + '_' + Date.now()) is NOT cryptographically
    //   secure — it's base64, trivially decodable, not a secret. Its job
    //   here is narrower than "prove possession of a secret": combined with
    //   the security rule below (only the holder of the exact token on file
    //   may update this document), it mainly guards against a *different*
    //   invite's inviteId being reused or guessed in sequence, since
    //   Firestore auto-IDs are themselves unguessable. For materially
    //   stronger guarantees (e.g. resistant to someone who can read a
    //   parent's email but must not be able to forge the token), generate
    //   the token server-side in a Cloud Function on a paid plan instead.
    dal.createParentInvite = async function createParentInvite(email, studentId, registrarUid) {
      const inviteRef = doc(collection(db, 'parentInvites')); // auto-generated ID
      const inviteId  = inviteRef.id;
      const token     = btoa(email + '_' + Date.now());

      const expiresAt = Timestamp.fromDate(new Date(Date.now() + 7 * 24 * 60 * 60 * 1000));

      dal.budgetTrack(0, 1, 1);
      await setDoc(inviteRef, {
        email,
        studentId,
        registrarUid,
        token,
        status:    'pending',
        createdAt: serverTimestamp(),
        expiresAt,
      });

      // encodeURIComponent() the token before putting it in the URL path:
      // raw base64 (btoa output) can contain '/', '+', and '=' — and '/'
      // specifically would be mis-parsed as an extra path segment by the
      // router's :token matcher (`[^/]+`, which cannot span a literal
      // slash). acceptInviteView() decodeURIComponent()s it back out
      // before comparing against the stored token.
      const inviteLink = window.location.origin + window.location.pathname
        + '#/accept-invite/' + inviteId + '/' + encodeURIComponent(token);

      return { inviteId, inviteLink };
    };

    // dal.getParentInvite(inviteId)
    //   Reads a single /parentInvites/{inviteId} document. Returns the
    //   document data, or null if it doesn't exist. Used by the (public,
    //   unauthenticated) accept-invite view to validate a link before
    //   showing the registration form — see security rules: unauthenticated
    //   reads are allowed on this collection specifically so this call can
    //   succeed before the parent has an Auth session of their own.
    dal.getParentInvite = async function getParentInvite(inviteId) {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'parentInvites', inviteId));
      return snap.exists() ? snap.data() : null;
    };

    // dal.acceptParentInvite(inviteId, token, parentUid)
    //   Marks the invite accepted and records which parent UID claimed it.
    //   Called AFTER createUserWithEmailAndPassword() + the new /users doc
    //   write succeed, from the accept-invite view. The security rule for
    //   this collection requires request.resource.data.token to equal the
    //   existing token (i.e. only an update that doesn't change — and
    //   therefore must already know — the token is allowed), so this call
    //   must echo the original token back unchanged alongside the new
    //   status/acceptedAt/parentUid fields.
    dal.acceptParentInvite = async function acceptParentInvite(inviteId, token, parentUid) {
      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'parentInvites', inviteId), {
        token, // unchanged — required by the security rule, see above
        status:     'accepted',
        acceptedAt: serverTimestamp(),
        parentUid,
      });
    };

    // ── Students ─────────────────────────────────────────────────────────────

    // dal.getStudent(studentId)
    //   Reads a single student document at students/{studentId}.
    //   Returns the document data, or null if it doesn't exist.
    dal.getStudent = async function getStudent(studentId) {
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'students', studentId));
      return snap.exists() ? snap.data() : null;
    };

    // dal.listStudents(classKey)
    //   Lists students currently enrolled in a given class. Capped at 60
    //   documents per call — matches a realistic max class size and keeps
    //   any single roster screen well within the free-tier read budget.
    dal.listStudents = async function listStudents(classKey) {
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled
      const q = query(
        collection(db, 'students'),
        where('currentClassKey', '==', classKey),
        limit(60),
      );
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => d.data());
    };

    // dal.createStudent(data)
    //   Creates the student document at students/{data.studentId}.
    //   Stamps createdAt and updatedAt with the server's clock.
    dal.createStudent = async function createStudent(data) {
      dal.budgetTrack(0, 1, 1);
      await setDoc(doc(db, 'students', data.studentId), {
        ...data,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
      });
    };

    // dal.updateStudent(studentId, updates)
    //   Applies a partial, dot-notation update to students/{studentId}.
    dal.updateStudent = async function updateStudent(studentId, updates) {
      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'students', studentId), updates);
    };

    // ── Classes ──────────────────────────────────────────────────────────────

    // dal.getClass(classKey)
    //   Reads a single class document at classes/{classKey}.
    //   Cache-aware: checks store._classDocCache (keyed by classKey) first;
    //   only issues a Firestore read (and budget-tracks 1 read) on a cache miss.
    //   Returns the document data, or null if it doesn't exist.
    //   store._classDocCache is populated here and also pre-populated by
    //   dal.validateAndSyncAssignments so subsequent calls cost 0 reads.
    dal.getClass = async function getClass(classKey) {
      if (!store._classDocCache) store._classDocCache = {};
      if (Object.prototype.hasOwnProperty.call(store._classDocCache, classKey)) {
        return store._classDocCache[classKey];
      }
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'classes', classKey));
      const data = snap.exists() ? snap.data() : null;
      store._classDocCache[classKey] = data;
      return data;
    };

    // dal.getSubject(subjectId)
    //   Reads a single subject document at subjects/{subjectId}.
    //   Cache-aware: checks store._subjectDocCache (keyed by subjectId) first;
    //   only issues a Firestore read (and budget-tracks 1 read) on a cache miss.
    //   Returns the document data (with active flag), or null if it doesn't exist.
    //   Note: subjects loaded via dal.getAllSubjects() or dal.listSubjects() are
    //   NOT pre-populated here — we pre-populate below in validateAndSyncAssignments
    //   using the data already in store.subjectsCache when available, saving reads.
    dal.getSubject = async function getSubject(subjectId) {
      if (!store._subjectDocCache) store._subjectDocCache = {};
      if (Object.prototype.hasOwnProperty.call(store._subjectDocCache, subjectId)) {
        return store._subjectDocCache[subjectId];
      }
      dal.budgetTrack(1, 0, 1);
      const snap = await getDoc(doc(db, 'subjects', subjectId));
      const data = snap.exists() ? snap.data() : null;
      store._subjectDocCache[subjectId] = data;
      return data;
    };

    // dal.listClasses(ecYear)
    //   Lists every class for a given Ethiopian-calendar academic year.
    dal.listClasses = async function listClasses(ecYear) {
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled
      const q = query(collection(db, 'classes'), where('ecYear', '==', ecYear));
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => d.data());
    };

    // dal.createClass(data)
    //   Creates the class document at classes/{data.classKey}.
    dal.createClass = async function createClass(data) {
      dal.budgetTrack(0, 1, 1);
      await setDoc(doc(db, 'classes', data.classKey), data);
    };

    // dal.updateClass(classKey, updates)
    //   Applies a partial, dot-notation update to classes/{classKey}.
    dal.updateClass = async function updateClass(classKey, updates) {
      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'classes', classKey), updates);
    };

    // ── Subjects ─────────────────────────────────────────────────────────────

    // dal.listSubjects()
    //   Lists every active subject (active === true). Inactive/retired
    //   subjects are excluded so old curricula don't clutter pickers.
    dal.listSubjects = async function listSubjects() {
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled
      const q = query(collection(db, 'subjects'), where('active', '==', true));
      const snap = await getDocs(q);
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => d.data());
    };

    // dal.createSubject(data)
    //   Creates the subject document at subjects/{data.subjectId}.
    dal.createSubject = async function createSubject(data) {
      dal.budgetTrack(0, 1, 1);
      await setDoc(doc(db, 'subjects', data.subjectId), data);
    };

    // dal.updateSubject(subjectId, updates)
    //   Applies a partial, dot-notation update to subjects/{subjectId}.
    dal.updateSubject = async function updateSubject(subjectId, updates) {
      dal.budgetTrack(0, 1, 1);
      await updateDoc(doc(db, 'subjects', subjectId), updates);
    };

    // dal.getAllSubjects()
    //   Lists ALL subjects regardless of active flag — used in the admin
    //   curriculum management view so inactive subjects can be reactivated.
    dal.getAllSubjects = async function getAllSubjects() {
      if (dal.isListReadBlocked()) return []; // § BUDGET: non-essential list read disabled
      const snap = await getDocs(collection(db, 'subjects'));
      dal.budgetTrack(snap.size, 0, snap.size);
      return snap.docs.map(d => d.data());
    };

    // dal.getSubjectsForGrade(grade)
    //   Filters store.subjectsCache to subjects whose minGrade <= numericGrade
    //   <= maxGrade. Returns [] if cache is empty.
    dal.getSubjectsForGrade = function getSubjectsForGrade(grade) {
      const g = Number(grade);
      if (!Number.isFinite(g)) return [];
      return (store.subjectsCache ?? []).filter(s => {
        const min = Number(s.minGrade ?? 1);
