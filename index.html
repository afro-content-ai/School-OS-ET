    // ── Async mount ───────────────────────────────────────────────────────
    async function _taAttMount(classKey) {
      const bodyEl = document.getElementById('att-body');
      if (!bodyEl) return; // view was already navigated away from

      try {
        // 1. Load class doc to get the roster.
        const classDoc = await dal.getClass(classKey);
        if (!classDoc) {
          bodyEl.innerHTML = `<div class="empty-state"><p class="text-danger">Class "${_taAttSafe(classKey)}" not found in Firestore.</p></div>`;
          return;
        }
        _taAttStudentIds = classDoc.studentIds ?? [];

        // 2. Batch-fetch student names in chunks of 10 (Firestore `in` limit).
        //    Uses direct getDocs with documentId() via __taAttFetchStudents.
        if (_taAttStudentIds.length > 0) {
          await __taAttFetchStudents(_taAttStudentIds);
        }

        // 3. Compute today's date key.
        // (already done in teacherAttendanceView; _taAttTodayKey is set)

        // 4. Check if attendance already marked today.
        const existing = await dal.getAttendance(classKey, _taAttTodayKey);
        if (existing) {
          _taAttStatuses = { ...(existing.statuses ?? {}) };
          _taAttReadOnly = true;
        } else {
          // Default all students to present.
          _taAttStudentIds.forEach(id => { _taAttStatuses[id] = 'present'; });
          _taAttReadOnly = false;
        }

        // 5. Render.
        _taAttUpdateTally();
        _taAttRenderBody();
      } catch (err) {
        if (bodyEl) bodyEl.innerHTML = `<div class="empty-state"><p class="text-danger">Error loading attendance: ${_taAttSafe(err.message)}</p></div>`;
        showToast('Failed to load attendance: ' + err.message, 'error');
      }
    }

    // Batch-fetch student docs by ID in chunks of 10.
    // Populates _taAttStudentCache. Uses getDocs with documentId() sentinel.
    async function __taAttFetchStudents(studentIds) {
      // Firestore `in` queries are limited to 10 items per query.
      const { documentId } = await import(
        'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js'
      );

      const chunks = [];
      for (let i = 0; i < studentIds.length; i += 10) {
        chunks.push(studentIds.slice(i, i + 10));
      }

      await Promise.all(chunks.map(async (chunk) => {
        const q = query(
          collection(db, 'students'),
          where(documentId(), 'in', chunk),
        );
        const snap = await getDocs(q);
        dal.budgetTrack(snap.size, 0, snap.size);
        snap.docs.forEach(d => {
          _taAttStudentCache[d.id] = d.data();
        });
      }));
    }

    // ══════════════════════════════════════════════════════════════════════════
    // TEACHER GRADEBOOK — SUBJECT PICKER  (#/teacher/marks)
    // ── requireRole (guardRoute): 'teacher', 'homeroom_teacher'
    //
    // Lists every 'classKey|subjectKey' entry in store.userDoc.teachingAssignments
    // as a tappable card. Navigates to #/teacher/gradebook/:classKey/:subjectKey.
    // Empty state if the teacher has no assignments yet.
    // ══════════════════════════════════════════════════════════════════════════

    function teacherGradebookPickerView() {
      const assignments = store.userDoc?.teachingAssignments ?? [];

      if (assignments.length === 0) {
        return `
          <div class="page-header">
            <div>
              <h1 class="page-title">📝 ${t('gradebook')}</h1>
              <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
            </div>
          </div>
          <div class="card card-accented">
            <div class="empty-state">
              <div class="empty-icon">📚</div>
              <p style="font-weight:600;color:var(--primary);">No teaching assignments</p>
              <p class="text-sm text-muted">Ask your administrator to assign you to a class and subject.</p>
            </div>
          </div>`;
      }

      // Group by classKey for a tidy two-level layout.
      const byClass = {};
      assignments.forEach(a => {
        const [ck, sk] = a.split('|');
        if (!ck || !sk) return;
        if (!byClass[ck]) byClass[ck] = [];
        byClass[ck].push(sk);
      });

      const sections = Object.entries(byClass).map(([ck, sks]) => {
        const subjectCards = sks.map(sk => {
          const cached = store._subjectDocCache?.[sk];
          const label  = cached ? (store.lang === 'am' && cached.nameAm ? cached.nameAm : cached.name) : sk;
          const gbCached = store.gradebookCache?.[sk];
          const badge = gbCached?.finalized
            ? `<span class="badge badge-warning">Finalized</span>`
            : (gbCached ? `<span class="badge badge-success">Open</span>` : '');
          return `
            <button
              class="card"
              style="text-align:start;width:100%;cursor:pointer;"
              onclick="router.navigate('#/teacher/gradebook/${encodeURIComponent(ck)}/${encodeURIComponent(sk)}')"
            >
              <div class="row-sb">
                <div>
                  <div class="card-title">📖 ${_gbSafe(label)}</div>
                  <div class="text-xs text-muted mt-1">${_gbSafe(sk)}</div>
                </div>
                <div class="row" style="gap:var(--sp-2);">${badge}<span style="opacity:0.4;font-size:1.2rem;">›</span></div>
              </div>
            </button>`;
        }).join('');

        return `
          <div>
            <p class="text-xs text-muted fw-bold mb-2" style="text-transform:uppercase;letter-spacing:0.5px;">
              🏛 ${_gbSafe(ck)}
            </p>
            <div class="stack">${subjectCards}</div>
          </div>`;
      }).join('');

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">📝 ${t('gradebook')}</h1>
            <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
          </div>
        </div>
        <div class="stack">${sections}</div>`;
    }


    // ══════════════════════════════════════════════════════════════════════════
    // TEACHER GRADEBOOK VIEW  (#/teacher/gradebook/:classKey/:subjectKey)
    // ── requireRole (guardRoute): 'teacher', 'homeroom_teacher'
    //
    // Excel-style score grid with live computed Total / % / Grade columns.
    //
    //  ACCESS GUARD
    //    teachingAssignments must contain 'classKey|subjectKey'. If not, 403.
    //
    //  MOUNT (_gbMount — async)
    //    1. dal.getGradebook(classKey, subjectKey) — load & cache.
    //    2. If null → show Create Gradebook form.
    //    3. dal.getClass(classKey) → roster (studentIds).
    //    4. Batch-fetch student names (reuses __taAttFetchStudents's cache).
    //    5. Render: finalized banner if locked, else editable grid.
    //
    //  GRID
    //    Rows = students (sticky name column).
    //    Columns = gradebook.columns + Total + % + Grade (computed client-side).
    //    Each score cell: <input class="gb-cell-input"> → onblur → _gbSaveCell().
    //    Saving: spinner overlay, green/red flash on resolve.
    //
    //  FINALIZATION
    //    "Finalize Semester" button → modal with remark per student → dalFinalizeGradebook.
    //    If finalized: FINALIZED banner. Admin sees "Unlock (Admin)" button.
    //
    // Module-level state (reset on each mount):
    //   _gbCK, _gbSK         — current keys
    //   _gbStudentIds        — ordered roster
    //   _gbStudentCache      — { [id]: studentDoc }  (shared with attendance cache)
    // ══════════════════════════════════════════════════════════════════════════

    let _gbCK           = '';
    let _gbSK           = '';
    let _gbStudentIds   = [];
    let _gbStudentCache = {};   // { [studentId]: studentDoc }
    let _gbPendingSaves = {};   // { [cellId]: true } — debounce guard

    // ── Helpers ───────────────────────────────────────────────────────────
    function _gbSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Compute a student's running totals from the local cache.
    function _gbComputeRow(studentId) {
      const gb = store.gradebookCache[_gbSK];
      if (!gb) return { total: 0, maxPossible: 0, pct: 0, grade: '—' };
      const columns    = gb.columns ?? [];
      const scores     = gb.scores?.[studentId] ?? {};
      const total      = columns.reduce((s, c) => s + (Number(scores[c.id]) || 0), 0);
      const maxPoss    = columns.reduce((s, c) => s + c.maxScore, 0);
      const pct        = maxPoss > 0 ? (total / maxPoss) * 100 : 0;
      const grade      = maxPoss > 0 ? gradeLetterFor(pct) : '—';
      return { total, maxPossible: maxPoss, pct, grade };
    }

    // Update a single student's computed cells in the DOM without re-rendering.
    function _gbRefreshComputedRow(studentId) {
      const { total, maxPossible, pct, grade } = _gbComputeRow(studentId);
      const safeId = studentId.replace(/[^a-zA-Z0-9_-]/g, '_');
      const totalEl = document.getElementById(`gb-total-${safeId}`);
      const pctEl   = document.getElementById(`gb-pct-${safeId}`);
      const gradeEl = document.getElementById(`gb-grade-${safeId}`);
      if (totalEl)  totalEl.textContent  = `${fmtNum(total)}/${fmtNum(maxPossible)}`;
      if (pctEl)    pctEl.textContent    = pct.toFixed(1) + '%';
      if (gradeEl) {
        gradeEl.textContent  = grade;
        gradeEl.className    = `grade-${grade}`;
      }
    }

    // Save a single score cell on blur.
    window.__gbSaveCell = async function __gbSaveCell(input, studentId, columnId) {
      const rawValue = input.value.trim();
      if (rawValue === '') return; // allow blanks to pass through without saving

      const cellId = `${studentId}||${columnId}`;
      if (_gbPendingSaves[cellId]) return; // debounce: ignore if already in flight
      _gbPendingSaves[cellId] = true;

      // Show spinner inside the cell wrapper.
      const wrap = input.parentElement;
      const spinner = document.createElement('div');
      spinner.className = 'gb-cell-spinner';
      spinner.textContent = '⏳';
      if (wrap && wrap.classList.contains('gb-cell-wrap')) wrap.appendChild(spinner);

      const td = wrap?.parentElement; // the <td> hosting the wrap

      try {
        await dal.saveScore(_gbCK, _gbSK, studentId, columnId, rawValue);
        // Green flash on the <td>.
        if (td) {
          td.classList.remove('gb-flash-err');
          void td.offsetWidth; // reflow to restart animation
          td.classList.add('gb-flash-ok');
          td.addEventListener('animationend', () => td.classList.remove('gb-flash-ok'), { once: true });
        }
        _gbRefreshComputedRow(studentId);
      } catch (err) {
        // Red flash + restore previous cached value in the input.
        if (td) {
          td.classList.remove('gb-flash-ok');
          void td.offsetWidth;
          td.classList.add('gb-flash-err');
          td.addEventListener('animationend', () => td.classList.remove('gb-flash-err'), { once: true });
        }
        // Restore the cached value so the cell doesn't hold an invalid number.
        const gb = store.gradebookCache[_gbSK];
        const cached = gb?.scores?.[studentId]?.[columnId];
        input.value = cached !== undefined ? String(cached) : '';
        showToast(err.message, 'error');
      } finally {
        if (wrap && wrap.contains(spinner)) wrap.removeChild(spinner);
        delete _gbPendingSaves[cellId];
      }
    };

    // ── Create-gradebook form handlers ────────────────────────────────────

    // Add a column row to the create form.
    window.__gbAddColumn = function __gbAddColumn() {
      const list = document.getElementById('gb-col-list');
      if (!list) return;
      const idx  = list.children.length;
      const row  = document.createElement('div');
      row.className = 'gb-col-row';
      row.dataset.idx = idx;
      row.innerHTML = `
        <input class="input" placeholder="Label (e.g. Test 1)" id="gb-col-label-${idx}" maxlength="40" />
        <input class="input w-24" type="number" placeholder="Max" id="gb-col-max-${idx}" min="1" max="999" />
        <button class="btn btn-ghost btn-sm" style="flex-shrink:0;" onclick="this.closest('.gb-col-row').remove()">✕</button>`;
      list.appendChild(row);
      document.getElementById(`gb-col-label-${idx}`)?.focus();
    };

    // Submit the create form.
    window.__gbCreateSubmit = async function __gbCreateSubmit() {
      const list     = document.getElementById('gb-col-list');
      const semEl    = document.getElementById('gb-create-semester');
      const errorEl  = document.getElementById('gb-create-error');
      const submitBtn= document.getElementById('gb-create-submit');
      if (!list || !errorEl || !submitBtn) return;

      // Harvest columns.
      const columns = [];
      let valid = true;
      Array.from(list.children).forEach((row, i) => {
        const labelEl = row.querySelector(`[id^="gb-col-label"]`);
        const maxEl   = row.querySelector(`[id^="gb-col-max"]`);
        const label   = labelEl?.value.trim() ?? '';
        const maxScore= Number(maxEl?.value ?? '');
        if (!label || isNaN(maxScore) || maxScore < 1) { valid = false; return; }
        columns.push({ id: `col_${Date.now()}_${i}`, label, maxScore });
      });

      if (!valid || columns.length === 0) {
        errorEl.textContent = 'Each column needs a label and a max score ≥ 1.';
        return;
      }

      const semester = Number(semEl?.value ?? 1) || 1;
      errorEl.textContent = '';
      submitBtn.disabled  = true;
      submitBtn.textContent = '⏳ Creating…';

      try {
        await dal.createGradebook(_gbCK, _gbSK, { columns, semester });
        showToast('✅ Gradebook created!', 'success');
        // Reload the view so the grid renders with the new gradebook.
        router.navigate(`#/teacher/gradebook/${encodeURIComponent(_gbCK)}/${encodeURIComponent(_gbSK)}`);
      } catch (err) {
        errorEl.textContent = err.message;
        submitBtn.disabled  = false;
        submitBtn.textContent = 'Create Gradebook';
      }
    };

    // ── Admin unlock (set finalized: false) ───────────────────────────────
    window.__gbAdminUnlock = async function __gbAdminUnlock() {
      if (store.userDoc?.role !== ROLES.ADMIN) return;
      const btn = document.getElementById('gb-unlock-btn');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Unlocking…'; }
      try {
        dal.budgetTrack(0, 1, 1);
        await updateDoc(doc(db, 'classes', _gbCK, 'gradebooks', _gbSK), { finalized: false });
        // Mirror into cache.
        if (store.gradebookCache[_gbSK]) store.gradebookCache[_gbSK].finalized = false;
        showToast('Gradebook unlocked.', 'success');
        _gbRenderGrid();
      } catch (err) {
        showToast('Unlock failed: ' + err.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = 'Unlock (Admin)'; }
      }
    };

    // ── Finalize modal ────────────────────────────────────────────────────

    window.__gbOpenFinalizeModal = function __gbOpenFinalizeModal() {
      const host = document.getElementById('gb-modal-host');
      if (!host) return;
      const gb   = store.gradebookCache[_gbSK];
      if (!gb)   return;

      const columns    = gb.columns ?? [];
      const maxPossible= columns.reduce((s, c) => s + c.maxScore, 0);

      const rows = _gbStudentIds.map(id => {
        const student = _gbStudentCache[id];
        const name    = _gbSafe(student?.displayName ?? id);
        const { total, pct, grade } = _gbComputeRow(id);
        const safeId  = id.replace(/[^a-zA-Z0-9_-]/g, '_');
        // Pre-fill remark from cache if already finalized (modal is for re-finalize after unlock).
        return `
          <tr>
            <td style="font-weight:600;color:var(--primary);">${name}</td>
            <td class="num">${total}/${maxPossible}</td>
            <td class="num">${pct.toFixed(1)}%</td>
            <td class="num"><span class="grade-${grade}">${grade}</span></td>
            <td><textarea class="gb-fin-remark" rows="1" id="gb-remark-${safeId}" placeholder="Remarks…"></textarea></td>
          </tr>`;
      }).join('');

      host.innerHTML = `
        <div class="modal-backdrop" id="gb-fin-backdrop" role="dialog" aria-modal="true" aria-labelledby="gb-fin-title">
          <div class="modal" style="max-width:680px;">
            <div class="modal-header">
              <span class="modal-title" id="gb-fin-title">🎓 Finalize Semester</span>
              <span class="modal-close" onclick="window.__gbCloseFinalizeModal()">✕</span>
            </div>
            <p class="text-sm text-muted mb-3">
              Review each student's result and add optional remarks. Once finalized, scores become read-only.
            </p>
            <div style="overflow-x:auto;max-height:55vh;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);">
              <table class="gb-fin-table">
                <thead>
                  <tr>
                    <th>Student</th>
                    <th>Total</th>
                    <th>%</th>
                    <th>Grade</th>
                    <th>Remarks</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
            <div id="gb-fin-error" class="input-error mt-2"></div>
            <div class="um-form-actions mt-3">
              <button class="btn btn-primary" id="gb-fin-submit-btn" onclick="window.__gbConfirmFinalize()">
                🎓 Finalize
              </button>
              <button class="btn btn-ghost" onclick="window.__gbCloseFinalizeModal()">Cancel</button>
            </div>
          </div>
        </div>`;

      document.getElementById('gb-fin-backdrop')?.addEventListener('click', e => {
        if (e.target.id === 'gb-fin-backdrop') window.__gbCloseFinalizeModal();
      });
    };

    window.__gbCloseFinalizeModal = function __gbCloseFinalizeModal() {
      const host = document.getElementById('gb-modal-host');
      if (host) host.innerHTML = '';
    };

    window.__gbConfirmFinalize = async function __gbConfirmFinalize() {
      const btn     = document.getElementById('gb-fin-submit-btn');
      const errorEl = document.getElementById('gb-fin-error');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Finalizing…'; }
      if (errorEl) errorEl.textContent = '';

      // Harvest remarks.
      const remarks = {};
      _gbStudentIds.forEach(id => {
        const safeId = id.replace(/[^a-zA-Z0-9_-]/g, '_');
        const el = document.getElementById(`gb-remark-${safeId}`);
        if (el) remarks[id] = el.value.trim();
      });

      try {
        await dal.finalizeGradebook(_gbCK, _gbSK, remarks);
        window.__gbCloseFinalizeModal();
        showToast('✅ Gradebook finalized!', 'success');
        _gbRenderGrid();
      } catch (err) {
        if (errorEl) errorEl.textContent = err.message;
        if (btn) { btn.disabled = false; btn.textContent = '🎓 Finalize'; }
        showToast(err.message, 'error');
      }
    };

    // ── Grid renderer (called after mount and after finalize/unlock) ──────

    function _gbRenderGrid() {
      const container = document.getElementById('gb-grid-container');
      if (!container) return;

      const gb         = store.gradebookCache[_gbSK];
      const isFinalized= !!gb?.finalized;
      const isAdmin    = store.userDoc?.role === ROLES.ADMIN;
      const columns    = gb?.columns ?? [];

      // ── Finalized banner ──
      const banner = isFinalized ? `
        <div class="gb-finalized-banner">
          <span class="banner-icon">🔒</span>
          <span class="banner-text">FINALIZED — this gradebook is locked. Scores are read-only.</span>
          ${isAdmin ? `
            <button class="btn btn-warning btn-sm" id="gb-unlock-btn" onclick="window.__gbAdminUnlock()">
              🔓 Unlock (Admin)
            </button>` : ''}
        </div>` : '';

      // ── Column headers ──
      const colHeaders = columns.map(c =>
        `<th title="Max: ${c.maxScore}">${_gbSafe(c.label)}<br><span style="font-size:0.62rem;opacity:0.7;">/${c.maxScore}</span></th>`
      ).join('');

      // ── Student rows ──
      const studentRows = _gbStudentIds.map(id => {
        const student  = _gbStudentCache[id];
        const name     = _gbSafe(student?.displayName ?? id);
        const scores   = gb?.scores?.[id] ?? {};
        const safeId   = id.replace(/[^a-zA-Z0-9_-]/g, '_');
        const { total, maxPossible, pct, grade } = _gbComputeRow(id);

        const scoreCells = columns.map(c => {
          const val     = scores[c.id] !== undefined ? scores[c.id] : '';
          const cellId  = `gb-cell-${safeId}-${c.id}`;
          if (isFinalized) {
            return `<td>${val !== '' ? val : '—'}</td>`;
          }
          // Escape for safe attribute value.
          const safeStudentId = id.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          const safeColumnId  = c.id.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `
            <td>
              <div class="gb-cell-wrap">
                <input
                  id="${cellId}"
                  class="gb-cell-input gb-score-cell"
                  type="number"
                  min="0"
                  max="${c.maxScore}"
                  step="0.5"
                  value="${val}"
                  onblur="window.__gbSaveCell(this,'${safeStudentId}','${safeColumnId}')"
                  onkeydown="if(event.key==='Enter'){this.blur();}"
                  title="0 – ${c.maxScore}"
                />
              </div>
            </td>`;
        }).join('');

        return `
          <tr>
            <td>${name}</td>
            ${scoreCells}
            <td id="gb-total-${safeId}">${fmtNum(total)}/${fmtNum(maxPossible)}</td>
            <td id="gb-pct-${safeId}">${pct.toFixed(1)}%</td>
            <td id="gb-grade-${safeId}" class="grade-${grade}">${grade}</td>
          </tr>`;
      }).join('');

      // Empty roster notice.
      const emptyNotice = _gbStudentIds.length === 0 ? `
        <tr><td colspan="${columns.length + 4}" style="text-align:center;padding:var(--sp-5);color:var(--text-muted);">
          No students enrolled in this class yet.
        </td></tr>` : '';

      container.innerHTML = `
        ${banner}

        ${!isFinalized ? `
          <div class="row-sb mb-4" style="flex-wrap:wrap;gap:var(--sp-2);">
            <span class="text-sm text-muted">${_gbStudentIds.length} student${_gbStudentIds.length !== 1 ? 's' : ''} · ${columns.length} column${columns.length !== 1 ? 's' : ''}</span>
            <button class="btn btn-primary btn-sm" onclick="window.__gbOpenFinalizeModal()">🎓 Finalize Semester</button>
          </div>` : ''}

        <div class="gb-wrapper">
          <table class="gb-grid">
            <thead>
              <tr>
                <th>Student</th>
                ${colHeaders}
                <th class="col-total">Total</th>
                <th class="col-pct">%</th>
                <th class="col-grade">Grade</th>
              </tr>
            </thead>
            <tbody>
              ${studentRows || emptyNotice}
            </tbody>
          </table>
        </div>

        <div id="gb-modal-host"></div>`;
    }

    // ── Main view factory ─────────────────────────────────────────────────
    function teacherGradebookView(params) {
      const classKey  = decodeURIComponent(params?.classKey  ?? '');
      const subjectKey= decodeURIComponent(params?.subjectKey ?? '');

      // Access guard: must be in teachingAssignments OR be admin.
      const isAdmin    = store.userDoc?.role === ROLES.ADMIN;
      const assignments= store.userDoc?.teachingAssignments ?? [];
      const composite  = `${classKey}|${subjectKey}`;

      if (!classKey || !subjectKey || (!isAdmin && !assignments.includes(composite))) {
        return `
          <div class="page-header">
            <div>
              <h1 class="page-title">📝 ${t('gradebook')}</h1>
              <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
            </div>
          </div>
          <div class="card card-danger">
            <div class="empty-state">
              <div class="empty-icon">🔒</div>
              <p style="font-weight:700;font-size:1rem;color:var(--danger);">403 — Access Denied</p>
              <p class="text-sm text-muted">You are not assigned to teach <strong>${_gbSafe(subjectKey)}</strong> in <strong>${_gbSafe(classKey)}</strong>.</p>
              <button class="btn btn-ghost mt-4" onclick="router.navigate('#/teacher/marks')">← Back</button>
            </div>
          </div>`;
      }

      // Reset module-level state.
      _gbCK           = classKey;
      _gbSK           = subjectKey;
      _gbStudentIds   = [];
      _gbStudentCache = {};
      _gbPendingSaves = {};

      // Resolve display name from subject cache if available.
      const subjectDoc = store._subjectDocCache?.[subjectKey];
      const subjectLabel = subjectDoc
        ? (store.lang === 'am' && subjectDoc.nameAm ? subjectDoc.nameAm : subjectDoc.name)
        : subjectKey;

      const html = `
        <div class="page-header">
          <div>
            <h1 class="page-title">📝 ${_gbSafe(subjectLabel)}</h1>
            <p class="page-subtitle">${EC.formatEcAm(new Date())} · ${_gbSafe(classKey)}</p>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="router.navigate('#/teacher/marks')">← Back</button>
        </div>

        <div id="gb-grid-container">
          ${skeletonTable(5, 4)}
        </div>`;

      setTimeout(() => _gbMount(classKey, subjectKey), 0);
      return html;
    }

    // ── Async mount ───────────────────────────────────────────────────────
    async function _gbMount(classKey, subjectKey) {
      const container = document.getElementById('gb-grid-container');
      if (!container) return;

      try {
        // 1. Load gradebook (caches into store.gradebookCache[subjectKey]).
        const gb = await dal.getGradebook(classKey, subjectKey);

        // 2. No gradebook yet → show Create form.
        if (!gb) {
          container.innerHTML = `
            <div class="card gb-create-card">
              <div class="card-header">
                <span class="card-title">📋 Create Gradebook</span>
              </div>
              <p class="text-sm text-muted mb-4">Define the columns (assessments) for this subject. You can always add more later by re-creating.</p>

              <div class="input-group">
                <label class="label" for="gb-create-semester">Semester</label>
                <select class="input" id="gb-create-semester" style="max-width:120px;">
                  <option value="1">Semester 1</option>
                  <option value="2">Semester 2</option>
                </select>
              </div>

              <label class="label">Columns</label>
              <div id="gb-col-list" class="mb-3">
                <div class="gb-col-row" data-idx="0">
                  <input class="input" placeholder="Label (e.g. Test 1)" id="gb-col-label-0" maxlength="40" />
                  <input class="input w-24" type="number" placeholder="Max" id="gb-col-max-0" min="1" max="999" />
                  <button class="btn btn-ghost btn-sm" style="flex-shrink:0;" onclick="this.closest('.gb-col-row').remove()">✕</button>
                </div>
              </div>
              <button class="btn btn-ghost btn-sm" onclick="window.__gbAddColumn()">+ Add Column</button>

              <div id="gb-create-error" class="input-error mt-3"></div>
              <div class="um-form-actions mt-4">
                <button class="btn btn-primary" id="gb-create-submit" onclick="window.__gbCreateSubmit()">Create Gradebook</button>
                <button class="btn btn-ghost" onclick="router.navigate('#/teacher/marks')">Cancel</button>
              </div>
            </div>`;
          return;
        }

        // 3. Load class doc for student roster.
        const classDoc = await dal.getClass(classKey);
        _gbStudentIds  = classDoc?.studentIds ?? [];

        // 4. Batch-fetch student names (same technique as attendance view).
        if (_gbStudentIds.length > 0) {
          await _gbFetchStudents(_gbStudentIds);
        }

        // 5. Render the grid.
        _gbRenderGrid();

      } catch (err) {
        if (container) container.innerHTML = `
          <div class="empty-state">
            <p class="text-danger">Error loading gradebook: ${_gbSafe(err.message)}</p>
          </div>`;
        showToast('Failed to load gradebook: ' + err.message, 'error');
      }
    }

    // Batch-fetch student docs by ID in chunks of 10.
    async function _gbFetchStudents(studentIds) {
      const { documentId } = await import(
        'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js'
      );
      const chunks = [];
      for (let i = 0; i < studentIds.length; i += 10) {
        chunks.push(studentIds.slice(i, i + 10));
      }
      await Promise.all(chunks.map(async chunk => {
        const q    = query(collection(db, 'students'), where(documentId(), 'in', chunk));
        const snap = await getDocs(q);
        dal.budgetTrack(snap.size, 0, snap.size);
        snap.docs.forEach(d => { _gbStudentCache[d.id] = d.data(); });
      }));
    }

    // ── END TEACHER GRADEBOOK VIEW ────────────────────────────────────────


    // ══════════════════════════════════════════════════════════════════════════
    // EC DATE PICKER COMPONENT
    // ── ecDatePicker(containerId, initialEcDate, onSelect, options)
    //
    // Reusable Ethiopian calendar date picker. Mounts a text input + inline
    // popup calendar directly into document.getElementById(containerId).
    // Bilingual (English / Amharic, driven by store.lang). Returns a
    // controller object — { getValue(), setValue(ecDate), destroy() } — for
    // programmatic control by the caller.
    //
    // Parameters:
    //   containerId   – id of an existing, empty container element. The
    //                    component renders its markup into this element.
    //   initialEcDate – { year, month, day } or null. null defaults to today
    //                    (EC.todayEc()).
    //   onSelect      – callback({ ecDate: {year,month,day}, gcDate: Date })
    //                    fired whenever the user picks a day.
    //   options       – {
    //                      minEcDate: {year,month,day} | null,
    //                      maxEcDate: {year,month,day} | null,
    //                      label:     string | null   (rendered above the input)
    //                      required:  boolean         (adds a "*" to the label)
    //                    }
    //
    // Returns: { getValue(), setValue(ecDate), destroy() }
    //   getValue()        → currently selected { year, month, day } or null
    //   setValue(ecDate)  → programmatically set the selection ({year,month,day}
    //                        or null to clear) and refresh the input display
    //   destroy()         → removes DOM nodes and event listeners for this
    //                        instance (safe to call on view teardown)
    //
    // REUSABLE: referenced in:
    //   • Step 27/35: Teacher Homework (#/teacher/homework) — due date field
    //   • Step 25: Teacher Attendance (#/teacher/attendance/:classKey) — TBD
    //   • Student/parent views — TBD
    // ══════════════════════════════════════════════════════════════════════════

    // Instance registry, keyed by containerId, so destroy()/multiple pickers
    // on the same page don't collide.
    const _ecPickerInstances = {};

    // ecDatePicker(containerId, initialEcDate, onSelect, options)
    function ecDatePicker(containerId, initialEcDate, onSelect, options = {}) {
      const container = document.getElementById(containerId);
      if (!container) {
        console.error(`ecDatePicker: container #${containerId} not found.`);
        return { getValue: () => null, setValue: () => {}, destroy: () => {} };
      }

      // Tear down any prior instance mounted in this container (re-mount safety).
      if (_ecPickerInstances[containerId]) {
        _ecPickerInstances[containerId].destroy();
      }

      const { minEcDate = null, maxEcDate = null, label = null, required = false } = options;

      // ── Instance state ───────────────────────────────────────────────────
      const today = EC.todayEc();
      const state = {
        selected:  initialEcDate ? { ...initialEcDate } : null,
        viewYear:  (initialEcDate ?? today).year,
        viewMonth: (initialEcDate ?? today).month,
        isOpen:    false,
      };

      const uid = `ecdp-${containerId}`;

      // ── Helpers (scoped to this instance) ────────────────────────────────

      function isAm() { return store.lang === 'am'; }

      function monthNames() { return isAm() ? EC.ecMonthsAm : EC.ecMonths; }

      function weekdayLabels() {
        return isAm()
          ? ['እሑ','ሰኞ','ማክ','ረቡ','ሐሙ','አር','ቅዳ']
          : ['Su','Mo','Tu','We','Th','Fr','Sa'];
      }

      // Days in a given EC month: 1–12 = 30 days; month 13 (Pagumē) = 5,
      // or 6 in an Ethiopian leap year (ecYear % 4 === 3).
      function daysInEcMonth(ecYear, ecMonth) {
        if (ecMonth === 13) return (ecYear % 4 === 3) ? 6 : 5;
        return 30;
      }

      // Clamp/normalize a {year,month} pair after navigation, wrapping
      // month 13 (Pagumē) → month 1 of the next year, and month 1 → month 13
      // of the previous year, in either direction.
      function navigateMonth(viewYear, viewMonth, delta) {
        let y = viewYear, m = viewMonth + delta;
        if (m > 13) { m = 1; y += 1; }
        if (m < 1)  { m = 13; y -= 1; }
        return { year: y, month: m };
      }

      function formatDisplay(ecDate) {
        if (!ecDate) return '';
        const names = monthNames();
        const mName = names[ecDate.month - 1] || '';
        return `${mName} ${ecDate.day}, ${ecDate.year}`;
      }

      // Compares two {year,month,day} EC dates. Returns <0, 0, or >0.
      function cmpEc(a, b) {
        if (a.year !== b.year) return a.year - b.year;
        if (a.month !== b.month) return a.month - b.month;
        return a.day - b.day;
      }

      function isBeforeMin(ecDate) {
        return !!minEcDate && cmpEc(ecDate, minEcDate) < 0;
      }
      function isAfterMax(ecDate) {
        return !!maxEcDate && cmpEc(ecDate, maxEcDate) > 0;
      }
      function isDisabledDay(ecDate) {
        return isBeforeMin(ecDate) || isAfterMax(ecDate);
      }

      // ── DOM scaffold (rendered once; popup body re-rendered on navigation) ─
      container.innerHTML = `
        <div class="ec-picker-wrap" id="${uid}-wrap">
          ${label ? `
            <label class="ec-picker-label" for="${uid}-input">
              ${_hwSafe(label)}${required ? '<span class="ec-picker-required">*</span>' : ''}
            </label>` : ''}
          <input
            type="text"
            id="${uid}-input"
            class="input ec-picker-input"
            readonly
            ${required ? 'required' : ''}
            aria-label="${_hwSafe(label || 'Ethiopian calendar date picker')}"
            aria-haspopup="true"
            aria-expanded="false"
            value="${_hwSafe(formatDisplay(state.selected))}"
          />
          <div id="${uid}-popup" class="ec-picker-popup" style="display:none;" role="dialog" aria-modal="false"></div>
        </div>`;

      const wrapEl  = document.getElementById(`${uid}-wrap`);
      const inputEl = document.getElementById(`${uid}-input`);
      const popupEl = document.getElementById(`${uid}-popup`);

      // ── Popup rendering ──────────────────────────────────────────────────
      function renderPopup() {
        const names    = monthNames();
        const weekdays = weekdayLabels();
        const dim      = daysInEcMonth(state.viewYear, state.viewMonth);

        // Weekday offset of day 1 of the displayed month, via the GC bridge.
        const gc1     = EC.toGc(state.viewYear, state.viewMonth, 1);
        const startWd = gc1.getUTCDay(); // 0=Sun … 6=Sat

        let cells = '';
        for (let i = 0; i < startWd; i++) {
          cells += `<div class="ec-picker-day is-empty"></div>`;
        }
        for (let d = 1; d <= dim; d++) {
          const cellDate = { year: state.viewYear, month: state.viewMonth, day: d };
          const disabled = isDisabledDay(cellDate);
          const isSelected = !!state.selected
            && state.selected.year === cellDate.year
            && state.selected.month === cellDate.month
            && state.selected.day === cellDate.day;
          const isToday = today.year === cellDate.year
            && today.month === cellDate.month
            && today.day === cellDate.day;

          const classes = [
            'ec-picker-day',
            isSelected ? 'is-selected' : '',
            isToday ? 'is-today' : '',
            disabled ? 'is-disabled' : '',
          ].filter(Boolean).join(' ');

          cells += `
            <div
              class="${classes}"
              role="button"
              tabindex="${disabled ? '-1' : '0'}"
              aria-disabled="${disabled ? 'true' : 'false'}"
              aria-label="${_hwSafe(formatDisplay(cellDate))}"
              data-y="${cellDate.year}" data-m="${cellDate.month}" data-d="${d}"
            >${d}</div>`;
        }

        const headerLabel = `${names[state.viewMonth - 1] || state.viewMonth} ${state.viewYear}`;

        popupEl.innerHTML = `
          <div class="ec-picker-header">
            <button type="button" class="ec-picker-nav" data-nav="-1" aria-label="${isAm() ? 'ቀደም ያለ ወር' : 'Previous month'}">‹</button>
            <span class="ec-picker-header-label">${_hwSafe(headerLabel)}</span>
            <button type="button" class="ec-picker-nav" data-nav="1" aria-label="${isAm() ? 'የሚቀጥለው ወር' : 'Next month'}">›</button>
          </div>
          <div class="ec-picker-weekdays">
            ${weekdays.map(w => `<div class="ec-picker-weekday">${_hwSafe(w)}</div>`).join('')}
          </div>
          <div class="ec-picker-grid">
            ${cells}
          </div>`;

        // Wire nav buttons.
        popupEl.querySelectorAll('[data-nav]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const delta = parseInt(btn.getAttribute('data-nav'), 10);
            const next = navigateMonth(state.viewYear, state.viewMonth, delta);
            state.viewYear  = next.year;
            state.viewMonth = next.month;
            renderPopup();
          });
        });

        // Wire day buttons.
        popupEl.querySelectorAll('.ec-picker-day:not(.is-empty):not(.is-disabled)').forEach(cell => {
          cell.addEventListener('click', (e) => {
            e.stopPropagation();
            selectDay(
              parseInt(cell.getAttribute('data-y'), 10),
              parseInt(cell.getAttribute('data-m'), 10),
              parseInt(cell.getAttribute('data-d'), 10)
            );
          });
          cell.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              cell.click();
            }
          });
        });
      }

      function selectDay(y, m, d) {
        const ecDate = { year: y, month: m, day: d };
        state.selected  = ecDate;
        state.viewYear  = y;
        state.viewMonth = m;
        inputEl.value = formatDisplay(ecDate);
        closePopup();
        const gcDate = EC.toGc(y, m, d);
        if (typeof onSelect === 'function') onSelect({ ecDate, gcDate });
      }

      // ── Open / close ─────────────────────────────────────────────────────
      function openPopup() {
        if (state.isOpen) return;
        // Close any other open EC pickers first.
        document.querySelectorAll('.ec-picker-popup').forEach(el => {
          if (el !== popupEl) el.style.display = 'none';
        });
        state.isOpen = true;
        renderPopup();
        popupEl.style.display = 'block';
        inputEl.setAttribute('aria-expanded', 'true');
        document.addEventListener('click', onOutsideClick, true);
        document.addEventListener('keydown', onKeydown, true);
      }

      function closePopup() {
        if (!state.isOpen) return;
        state.isOpen = false;
        popupEl.style.display = 'none';
        inputEl.setAttribute('aria-expanded', 'false');
        document.removeEventListener('click', onOutsideClick, true);
        document.removeEventListener('keydown', onKeydown, true);
      }

      function togglePopup() {
        if (state.isOpen) closePopup(); else openPopup();
      }

      function onOutsideClick(e) {
        if (wrapEl && !wrapEl.contains(e.target)) closePopup();
      }

      function onKeydown(e) {
        if (e.key === 'Escape') closePopup();
      }

      inputEl.addEventListener('click', (e) => { e.stopPropagation(); togglePopup(); });
      inputEl.addEventListener('focus', () => openPopup());

      // ── Controller ───────────────────────────────────────────────────────
      const controller = {
        getValue() {
          return state.selected ? { ...state.selected } : null;
        },
        setValue(ecDate) {
          state.selected = ecDate ? { ...ecDate } : null;
          const ref = ecDate || today;
          state.viewYear  = ref.year;
          state.viewMonth = ref.month;
          inputEl.value = formatDisplay(state.selected);
          if (state.isOpen) renderPopup();
        },
        destroy() {
          closePopup();
          container.innerHTML = '';
          delete _ecPickerInstances[containerId];
        },
      };

      _ecPickerInstances[containerId] = controller;
      return controller;
    }

    // ── END EC DATE PICKER COMPONENT ─────────────────────────────────────────


    // ══════════════════════════════════════════════════════════════════════════
    // TEACHER HOMEWORK VIEW  (#/teacher/homework)
    // ── requireRole (guardRoute): 'teacher', 'homeroom_teacher'
    //
    // Two-panel layout:
    //   1. POST HOMEWORK form (top)
    //      - classKey select (from userDoc.teachingClassKeys / homeroomOf)
    //      - subjectId select (filtered to that class's subjects, derived from
    //        userDoc.teachingAssignments where classKey matches)
    //      - title / titleAm / description / descriptionAm
    //      - dueDateEc — EC date picker component
    //      On submit: dal.postHomework(classKey, {...}) → success toast + reset
    //      Edit mode: form pre-fills from existing hw item, submit calls
    //        dal.updateHomework(classKey, homeworkId, {...})
    //
    //   2. MY POSTED HOMEWORK list (bottom)
    //      Grouped by classKey. Each item: title, subject pill, due date in EC,
    //      student count, posted date, Edit + Delete buttons.
    //
    // Module-level state (reset on each mount):
    //   _hwClassKeys       — union of teachingClassKeys + homeroomOf
    //   _hwItems           — { [classKey]: homework[] }
    //   _hwEditId          — homeworkId being edited (null in create mode)
    //   _hwEditClassKey    — classKey of item being edited
    //   _hwSelectedDueDate — { ecDate: {year,month,day}|null, gcDate: Date|null }
    //   _hwDuePicker       — controller returned by ecDatePicker() for the due
    //                        date field ({ getValue, setValue, destroy })
    // ══════════════════════════════════════════════════════════════════════════

    let _hwClassKeys       = [];
    let _hwItems           = {};          // { [classKey]: hw[] }
    let _hwEditId          = null;
    let _hwEditClassKey    = null;
    let _hwSelectedDueDate = { ecDate: null, gcDate: null };
    let _hwDuePicker       = null;

    // ── Helpers ───────────────────────────────────────────────────────────────
    function _hwSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function _hwEsc(str) {
      return String(str ?? '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }
    function _hwTimestampToDate(value) {
      if (!value) return null;
      if (typeof value.toDate === 'function') {
        try { return value.toDate(); } catch (_) { return null; }
      }
      if (value instanceof Date) return value;
      return null;
    }
    // _hwFormatEcDateStr(ecDateStr)
    //   Formats a stored 'YYYY-MM-DD' EC date string (as persisted on the
    //   homework doc) into a bilingual display label, e.g. 'Meskerem 5, 2017'.
    function _hwFormatEcDateStr(ecDateStr) {
      if (!ecDateStr) return '';
      const parts = ecDateStr.split('-').map(Number);
      if (parts.length < 3 || parts.some(isNaN)) return ecDateStr;
      const [y, m, d] = parts;
      const names = store.lang === 'am' ? EC.ecMonthsAm : EC.ecMonths;
      return `${names[m - 1] || ''} ${d}, ${y}`;
    }

    // _hwSubjectsForClass(classKey)
    //   Returns the subjectId strings from userDoc.teachingAssignments that
    //   belong to the given classKey (parsed as 'classKey|subjectId').
    //   Also accepts homeroomOf classes — for those, falls back to listing
    //   all assignment subjects since homeroom teachers may not have explicit
    //   per-subject assignments.
    function _hwSubjectsForClass(classKey) {
      const assignments = store.userDoc?.teachingAssignments ?? [];
      const subjects = [];
      assignments.forEach(a => {
        const [ck, sk] = a.split('|');
        if (ck === classKey && sk) subjects.push(sk);
      });
      return subjects;
    }

    // teacherHomeworkView()
    //   Returns the HTML shell. Async mount fills the list panel.
    function teacherHomeworkView() {
      // Compute the union of teaching classes + homeroom classes.
      const teaching  = store.userDoc?.teachingClassKeys ?? [];
      const homeroom  = store.userDoc?.homeroomOf ?? [];
      const seen      = new Set();
      _hwClassKeys    = [];
      [...teaching, ...homeroom].forEach(ck => {
        if (ck && !seen.has(ck)) { seen.add(ck); _hwClassKeys.push(ck); }
      });

      // Reset edit state on fresh mount.
      _hwEditId          = null;
      _hwEditClassKey    = null;
      _hwSelectedDueDate = { ecDate: null, gcDate: null };
      _hwDuePicker       = null;
      _hwItems           = {};

      const hasClasses = _hwClassKeys.length > 0;

      // Build class <options>.
      const classOptions = _hwClassKeys.map(ck =>
        `<option value="${_hwEsc(ck)}">${_hwSafe(ck)}</option>`
      ).join('');

      // Initial subject options for the first class (updated dynamically on class change).
      const firstClass    = _hwClassKeys[0] ?? '';
      const firstSubjects = _hwSubjectsForClass(firstClass);
      const subjectOptions = firstSubjects.map(sk => {
        const cached = store._subjectDocCache?.[sk];
        const label  = cached
          ? (store.lang === 'am' && cached.nameAm ? cached.nameAm : cached.name)
          : sk;
        return `<option value="${_hwEsc(sk)}">${_hwSafe(label)}</option>`;
      }).join('');

      const formContent = hasClasses ? `
        <!-- Class selector -->
        <div class="input-group">
          <label class="label" for="hw-class-sel">${t('class')}</label>
          <select class="input" id="hw-class-sel"
            onchange="window.__hwOnClassChange(this.value)">
            ${classOptions}
          </select>
        </div>

        <!-- Subject selector (updates dynamically) -->
        <div class="input-group">
          <label class="label" for="hw-subject-sel">${t('subject')}</label>
          <select class="input" id="hw-subject-sel">
            ${subjectOptions || `<option value="">— ${t('noSubjects')} —</option>`}
          </select>
        </div>

        <div class="hw-form-grid">
          <div class="input-group">
            <label class="label" for="hw-title">${t('homeworkTitle')}</label>
            <input type="text" class="input" id="hw-title"
              maxlength="120" placeholder="e.g. Chapter 5 Exercises" />
          </div>
          <div class="input-group">
            <label class="label" for="hw-title-am">${t('homeworkTitleAm')}</label>
            <input type="text" class="input" id="hw-title-am"
              maxlength="120" placeholder="ለምሳሌ፡ ምዕራፍ 5 ልምምዶች" />
          </div>
          <div class="input-group span-2">
            <label class="label" for="hw-desc">${t('homeworkDesc')}</label>
            <textarea class="input" id="hw-desc" rows="3"
              maxlength="800" placeholder="Describe the assignment…"></textarea>
          </div>
          <div class="input-group span-2">
            <label class="label" for="hw-desc-am">${t('homeworkDescAm')}</label>
            <textarea class="input" id="hw-desc-am" rows="3"
              maxlength="800" placeholder="የቤት ሥራውን ያብራሩ…"></textarea>
          </div>
          <div class="input-group">
            <div id="hw-due-picker"></div>
          </div>
        </div>

        <div id="hw-form-error" class="input-error"></div>
        <div class="hw-form-actions">
          <button class="btn btn-accent" id="hw-submit-btn"
            onclick="window.__hwSubmit()">
            📤 ${t('postHomework')}
          </button>
          <button class="btn btn-ghost" id="hw-cancel-btn" style="display:none;"
            onclick="window.__hwCancelEdit()">
            ${t('cancel')}
          </button>
        </div>
      ` : `
        <div class="hw-empty">
          <div style="font-size:2rem;margin-block-end:var(--sp-2);">📚</div>
          <p style="font-weight:600;color:var(--primary);">${t('noTeachingClasses')}</p>
        </div>
      `;

      // Kick off async load of existing homework items, and mount the EC
      // date picker into its container (only present when hasClasses).
      setTimeout(() => {
        if (hasClasses) {
          _hwDuePicker = ecDatePicker(
            'hw-due-picker',
            null,
            (sel) => { _hwSelectedDueDate = sel; },
            {
              label:    t('dueDateEc'),
              required: true,
              minEcDate: EC.todayEc(),
            }
          );
        }
        _hwMount();
      }, 0);

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">📖 ${t('homework')}</h1>
            <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
          </div>
        </div>

        <!-- POST HOMEWORK FORM -->
        <div class="card card-lg hw-form-card" id="hw-form-card">
          <div class="card-header">
            <span class="card-title" id="hw-form-title">📤 ${t('postHomework')}</span>
          </div>
          ${formContent}
        </div>

        <!-- MY POSTED HOMEWORK LIST -->
        <div>
          <div class="page-header" style="margin-block-end:var(--sp-3);">
            <div>
              <h2 class="page-title" style="font-size:1rem;">📋 ${t('myPostedHomework')}</h2>
            </div>
          </div>
          <div id="hw-list-container">
            <div class="hw-loading"><p>${t('loading')}</p></div>
          </div>
        </div>`;
    }

    // _hwMount() — async: fetch all homework for each class and render list.
    async function _hwMount() {
      const container = document.getElementById('hw-list-container');
      if (!container) return;

      if (_hwClassKeys.length === 0) {
        container.innerHTML = `<div class="hw-empty"><p>${t('noTeachingClasses')}</p></div>`;
        return;
      }

      try {
        // Fetch homework for all classes in parallel.
        const results = await Promise.all(
          _hwClassKeys.map(ck =>
            dal.listHomework(ck)
              .then(items => ({ ck, items }))
              .catch(() => ({ ck, items: [] }))
          )
        );

        // Filter to items posted by this teacher.
        const myUid = store.user?.uid;
        results.forEach(({ ck, items }) => {
          _hwItems[ck] = items.filter(hw => hw.postedBy === myUid);
        });

        _hwRenderList();
      } catch (err) {
        if (container) container.innerHTML = `
          <div class="hw-empty" style="color:var(--danger);">
            Error loading homework: ${_hwSafe(err.message)}
          </div>`;
        showToast('Failed to load homework: ' + err.message, 'error');
      }
    }

    // _hwRenderList() — renders all hw items grouped by classKey.
    function _hwRenderList() {
      const container = document.getElementById('hw-list-container');
      if (!container) return;

      const allEmpty = _hwClassKeys.every(ck => (_hwItems[ck] ?? []).length === 0);
      if (allEmpty) {
        container.innerHTML = emptyState(
          '📝',
          t('no_data'),
          'No homework posted yet.',
          'Post Homework',
          () => document.getElementById('hw-form-card')?.scrollIntoView({ behavior: 'smooth', block: 'start' })
        );
        attachEmptyActions(container);
        return;
      }

      const sections = _hwClassKeys.map(ck => {
        const items = _hwItems[ck] ?? [];
        if (items.length === 0) return '';

        const itemsHtml = items.map(hw => _hwItemCard(ck, hw)).join('');
        return `
          <div class="hw-class-section">
            <div class="hw-class-label">
              🏛 ${_hwSafe(ck)}
              <span class="badge badge-muted">${items.length}</span>
            </div>
            ${itemsHtml}
          </div>`;
      }).join('');

      container.innerHTML = sections || `<div class="hw-empty"><p>${t('noHomeworkPosted')}</p></div>`;
    }

    // _hwItemCard(classKey, hw) — renders one homework item card.
    function _hwItemCard(classKey, hw) {
      const isAm      = store.lang === 'am';
      const title     = isAm && hw.titleAm ? hw.titleAm : hw.title;
      const titleAlt  = isAm ? hw.title : hw.titleAm;
      const desc      = isAm && hw.descriptionAm ? hw.descriptionAm : hw.description;

      // Subject label from cache.
      const subjId    = hw.subjectId ?? '';
      const cached    = store._subjectDocCache?.[subjId];
      const subjLabel = cached ? (isAm && cached.nameAm ? cached.nameAm : cached.name) : subjId;

      // Due date.
      const dueDateStr = hw.dueDateEc
        ? _hwFormatEcDateStr(hw.dueDateEc)
        : (hw.dueDateGts ? EC.formatEcAm(_hwTimestampToDate(hw.dueDateGts) ?? new Date()) : '—');

      // Check if overdue.
      let isOverdue = false;
      if (hw.dueDateGts) {
        const dueDate = _hwTimestampToDate(hw.dueDateGts);
        isOverdue = dueDate ? dueDate < new Date() : false;
      } else if (hw.dueDateEc) {
        const parts = hw.dueDateEc.split('-').map(Number);
        if (parts.length === 3) {
          const gcDue = EC.toGc(parts[0], parts[1], parts[2]);
          isOverdue = gcDue < new Date();
        }
      }

      // Posted date.
      const postedDate = _hwTimestampToDate(hw.createdAt);
      const postedStr  = postedDate ? EC.formatEcAm(postedDate) : '—';

      // Student count.
      const studentCount = (hw.studentIds ?? []).length;

      const hwId = hw.homeworkId ?? hw.id ?? '';
      const editFn   = `window.__hwEdit('${_hwEsc(classKey)}','${_hwEsc(hwId)}')`;
      const deleteFn = `window.__hwDelete('${_hwEsc(classKey)}','${_hwEsc(hwId)}')`;

      const dueChipClass = isOverdue ? 'hw-meta-chip overdue' : 'hw-meta-chip due';
      const dueIcon      = isOverdue ? '⚠️' : '📅';

      return `
        <div class="hw-item" id="hw-item-${_hwEsc(hwId)}">
          <div class="hw-item-header">
            <div style="flex:1;min-width:0;">
              <div class="hw-item-title">${_hwSafe(title || hwId)}</div>
              ${titleAlt ? `<div class="hw-item-title-am">${_hwSafe(titleAlt)}</div>` : ''}
            </div>
            <div class="hw-item-actions">
              <button class="btn btn-ghost btn-sm"
                onclick="${editFn}"
                title="${isAm ? 'አርትዕ' : 'Edit'}">
                ✏️
              </button>
              <button class="btn btn-danger btn-sm"
                onclick="${deleteFn}"
                title="${isAm ? 'ሰርዝ' : 'Delete'}">
                🗑
              </button>
            </div>
          </div>
          <div class="hw-item-meta">
            ${subjLabel ? `<span class="hw-meta-chip subject">📚 ${_hwSafe(subjLabel)}</span>` : ''}
            <span class="${dueChipClass}">${dueIcon} ${_hwSafe(dueDateStr)}</span>
            ${studentCount > 0
              ? `<span class="hw-meta-chip students">👥 ${studentCount} ${t('studentsTargeted')}</span>`
              : ''}
            <span class="hw-meta-chip posted">🕐 ${t('postedOn')} ${_hwSafe(postedStr)}</span>
          </div>
          ${desc ? `<div class="hw-item-desc">${_hwSafe(desc)}</div>` : ''}
        </div>`;
    }

    // __hwOnClassChange(classKey) — updates subject dropdown when class changes.
    window.__hwOnClassChange = function __hwOnClassChange(classKey) {
      const sel = document.getElementById('hw-subject-sel');
      if (!sel) return;
      const subjects = _hwSubjectsForClass(classKey);
      const isAm = store.lang === 'am';
      sel.innerHTML = subjects.map(sk => {
        const cached = store._subjectDocCache?.[sk];
        const label  = cached ? (isAm && cached.nameAm ? cached.nameAm : cached.name) : sk;
        return `<option value="${_hwEsc(sk)}">${_hwSafe(label)}</option>`;
      }).join('') || `<option value="">— ${t('noSubjects')} —</option>`;
    };

    // __hwSubmit() — handles both create and update.
    window.__hwSubmit = async function __hwSubmit() {
      const btn     = document.getElementById('hw-submit-btn');
      const errorEl = document.getElementById('hw-form-error');
      if (!btn) return;

      const classKey    = document.getElementById('hw-class-sel')?.value?.trim() ?? '';
      const subjectId   = document.getElementById('hw-subject-sel')?.value?.trim() ?? '';
      const title       = document.getElementById('hw-title')?.value?.trim() ?? '';
      const titleAm     = document.getElementById('hw-title-am')?.value?.trim() ?? '';
      const description = document.getElementById('hw-desc')?.value?.trim() ?? '';
      const descriptionAm = document.getElementById('hw-desc-am')?.value?.trim() ?? '';

      if (!classKey) {
        if (errorEl) errorEl.textContent = 'Please select a class.';
        return;
      }
      if (!title && !titleAm) {
        if (errorEl) errorEl.textContent = 'Please enter a title in at least one language.';
        return;
      }

      if (errorEl) errorEl.textContent = '';
      btn.disabled = true;
      const origText = btn.textContent;
      btn.textContent = '⏳ ' + t('loading');

      try {
        // Prefer the live picker value (covers any selection made without
        // the onSelect callback having fired yet), falling back to the
        // last value captured via the callback.
        const pickedEc = _hwDuePicker ? _hwDuePicker.getValue() : (_hwSelectedDueDate.ecDate ?? null);

        // Compute GTS from selected EC date, and the persisted 'YYYY-MM-DD'
        // string form (the format homework docs have always stored).
        let dueDateGts = null;
        let dueDateEc  = null;
        if (pickedEc) {
          const { year, month, day } = pickedEc;
          dueDateEc = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const { Timestamp: FSTimestamp } = await import(
            'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js'
          );
          dueDateGts = FSTimestamp.fromDate(EC.toGc(year, month, day));
        }

        const data = {
          subjectId,
          title,
          titleAm,
          description,
          descriptionAm,
          dueDateEc,
          dueDateGts,
        };

        if (_hwEditId) {
          // Edit mode — update existing doc.
          await dal.updateHomework(_hwEditClassKey, _hwEditId, data);
          showToast(t('hwUpdatedSuccess'), 'success');

          // Update local cache.
          const items = _hwItems[_hwEditClassKey] ?? [];
          const idx   = items.findIndex(h => (h.homeworkId ?? h.id) === _hwEditId);
          if (idx >= 0) {
            items[idx] = { ...items[idx], ...data };
            _hwItems[_hwEditClassKey] = items;
          }
        } else {
          // Create mode.
          const hwId = await dal.postHomework(classKey, data);
          showToast(t('hwPostedSuccess'), 'success');

          // Optimistically add to local list.
          const newHw = {
            ...data,
            homeworkId: hwId,
            classKey,
            studentIds: [],   // will be populated server-side; refresh on next mount
            postedBy:   store.user?.uid ?? '',
            createdAt:  { toDate: () => new Date() },
          };
          if (!_hwItems[classKey]) _hwItems[classKey] = [];
          _hwItems[classKey].unshift(newHw);
        }

        _hwCancelEdit();
        _hwRenderList();
      } catch (err) {
        if (errorEl) errorEl.textContent = err.message;
        showToast(err.message, 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = origText;
      }
    };

    // __hwEdit(classKey, hwId) — pre-fills the form for editing.
    window.__hwEdit = function __hwEdit(classKey, hwId) {
      const items = _hwItems[classKey] ?? [];
      const hw    = items.find(h => (h.homeworkId ?? h.id) === hwId);
      if (!hw) { showToast('Homework not found in local cache.', 'error'); return; }

      _hwEditId       = hwId;
      _hwEditClassKey = classKey;

      // Switch class selector to the edited class.
      const classEl = document.getElementById('hw-class-sel');
      if (classEl) { classEl.value = classKey; window.__hwOnClassChange(classKey); }

      // Switch subject selector.
      setTimeout(() => {
        const subEl = document.getElementById('hw-subject-sel');
        if (subEl) subEl.value = hw.subjectId ?? '';
      }, 0);

      // Fill title / desc fields.
      const setVal = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.value = val ?? '';
      };
      setVal('hw-title',    hw.title);
      setVal('hw-title-am', hw.titleAm);
      setVal('hw-desc',     hw.description);
      setVal('hw-desc-am',  hw.descriptionAm);

      // Set EC date picker value.
      if (hw.dueDateEc) {
        const parts = hw.dueDateEc.split('-').map(Number);
        if (parts.length === 3 && !parts.some(isNaN)) {
          const ecDate = { year: parts[0], month: parts[1], day: parts[2] };
          _hwSelectedDueDate = { ecDate, gcDate: EC.toGc(ecDate.year, ecDate.month, ecDate.day) };
          if (_hwDuePicker) _hwDuePicker.setValue(ecDate);
        }
      }

      // Update form header and button labels.
      const titleEl = document.getElementById('hw-form-title');
      if (titleEl) titleEl.textContent = '✏️ ' + t('editHomework');
      const btn = document.getElementById('hw-submit-btn');
      if (btn) btn.textContent = '💾 ' + t('save');
      const cancelBtn = document.getElementById('hw-cancel-btn');
      if (cancelBtn) cancelBtn.style.display = '';

      // Scroll form into view.
      document.getElementById('hw-form-card')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    // __hwCancelEdit() — resets form to create mode.
    window.__hwCancelEdit = function __hwCancelEdit() {
      _hwEditId          = null;
      _hwEditClassKey    = null;
      _hwSelectedDueDate = { ecDate: null, gcDate: null };

      // Reset fields.
      ['hw-title','hw-title-am','hw-desc','hw-desc-am'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      if (_hwDuePicker) _hwDuePicker.setValue(null);
      const errEl = document.getElementById('hw-form-error');
      if (errEl) errEl.textContent = '';

      // Reset form UI.
      const titleEl = document.getElementById('hw-form-title');
      if (titleEl) titleEl.textContent = '📤 ' + t('postHomework');
      const btn = document.getElementById('hw-submit-btn');
      if (btn) btn.textContent = '📤 ' + t('postHomework');
      const cancelBtn = document.getElementById('hw-cancel-btn');
      if (cancelBtn) cancelBtn.style.display = 'none';
    };

    // __hwDelete(classKey, hwId) — confirms then deletes.
    window.__hwDelete = async function __hwDelete(classKey, hwId) {
      const isAm = store.lang === 'am';
      const msg  = isAm ? 'ይህን የቤት ሥራ መሰረዝ ይፈልጋሉ?' : 'Delete this homework assignment?';

      showConfirm(msg, async () => {
        const btn = document.querySelector(`#hw-item-${CSS.escape(hwId)} .btn-danger`);
        if (btn) { btn.disabled = true; btn.textContent = '⏳'; }

        try {
          await dal.deleteHomework(classKey, hwId);
          showToast(t('hwDeletedSuccess'), 'success');

          // Remove from local cache and re-render.
          if (_hwItems[classKey]) {
            _hwItems[classKey] = _hwItems[classKey].filter(
              h => (h.homeworkId ?? h.id) !== hwId
            );
          }
          // If editing this item, cancel edit mode too.
          if (_hwEditId === hwId) _hwCancelEdit();
          _hwRenderList();
        } catch (err) {
          if (btn) { btn.disabled = false; btn.textContent = '🗑'; }
          showToast(err.message, 'error');
        }
      }); // end showConfirm
    };

    // ══════════════════════════════════════════════════════════════════════════
    // PARENT DASHBOARD  (#/parent/dashboard)
    // ── requireRole (guardRoute): 'parent'
    //
    // A parent may have more than one child (store.userDoc.childKeys — an
    // array of studentIds). This view renders a child switcher at the top,
    // then a full per-child dashboard below it: summary card, 7-day
    // attendance strip, latest grades, homework due, upcoming exams, and
    // announcements.
    //
    // Data flow, per selected child:
    //   1. dal.getStudent(studentId)                                — 1 read
    //   2. dal.getStudentAttendance(studentId, start7dKey, todayKey) — 1 query
    //   3. dal.getStudentAcademicYear(studentId, currentEcYear)      — 1 read
    //   4. dal.getHomeworkForStudent(classKey, studentId)            — 1 query
    //   5. dal.getSubject(subjectId) for each graded subject          — cached,
    //      0 reads on repeat (dal.getSubject caches in store._subjectDocCache)
    //
    // All five are fetched together in _pdLoadChild() and the combined
    // result is written into store.childCache[studentId] ONCE, as a single
    // store property re-assignment (store.childCache = {...}) — the store
    // Proxy only triggers render() on a top-level property set, not on a
    // mutation of a nested object, so every cache write goes through a
    // fresh object spread rather than `store.childCache[id] = …`.
    //
    // Upcoming exams reuse the existing global store.examSchedules /
    // dal.subscribeExamSchedules(classKey, grade) mechanism (the same one
    // parentExamScheduleView() and teacherExamScheduleView() already use)
    // rather than a separate per-child fetch — that subscription is
    // (re)started, scoped to the *selected* child's classKey/grade, via
    // store._parentExamSubKey, which records which "classKey|grade" pair
    // is currently subscribed so switching children re-subscribes only
    // when the scope actually changes.
    // ══════════════════════════════════════════════════════════════════════════

    // ── Module-level state ───────────────────────────────────────────────────
    let _pdSelectedChildId = null; // currently selected child's studentId

    // _pdSafe(str) / _pdEsc(str) — same escaping convention as the other
    // views (_hwSafe/_hwEsc, _annSafe/_annEsc, _rpSafe/_rpEsc, …).
    function _pdSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function _pdEsc(str) {
      return String(str ?? '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }

    // _pdDateKey(ecObj) — { year, month, day } → zero-padded 'YYYY-MM-DD'
    // EC date-key string, matching the format dal.markAttendance() writes
    // (see _taAttDateKey_() in the teacher attendance view for the same
    // convention).
    function _pdDateKey(ecObj) {
      const { year, month, day } = ecObj;
      return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }

    // _pdLast7EcDays() — returns the last 7 calendar days (oldest first,
    // today last) as an array of { dateKey, ecDay, gcDate }.
    //
    // Walks backward in *Gregorian* time (native Date arithmetic, always
    // correct across month/year boundaries) and converts each day to its
    // Ethiopian-calendar equivalent via EC.toEc() — rather than trying to
    // subtract days directly in EC space, which would need extra handling
    // around the 30-day-month / 5-6-day-Pagumē boundary that EC.toEc()
    // and EC.toGc() already handle internally.
    function _pdLast7EcDays() {
      const days = [];
      const today = new Date();
      for (let i = 6; i >= 0; i--) {
        const gcDate = new Date(today);
        gcDate.setDate(gcDate.getDate() - i);
        const ecDay = EC.toEc(gcDate);
        days.push({ dateKey: _pdDateKey(ecDay), ecDay, gcDate });
      }
      return days;
    }

    // _pdLoadChild(studentId)
    //   Fetches everything the dashboard needs for one child and commits it
    //   to store.childCache[studentId] in a single store re-assignment.
    //   No-ops (returns immediately) if this child is already cached.
    async function _pdLoadChild(studentId) {
      if (!studentId) return;
      if (store.childCache && Object.prototype.hasOwnProperty.call(store.childCache, studentId)) {
        return; // already cached — 0 additional reads
      }

      try {
        const student = await dal.getStudent(studentId);
        if (!student) {
          store.childCache = { ...store.childCache, [studentId]: { error: 'not_found' } };
          return;
        }

        const last7      = _pdLast7EcDays();
        const startKey      = last7[0].dateKey;
        const endKey        = last7[last7.length - 1].dateKey;
        const currentEcYear = store.config?.currentEcYear ?? String(EC.todayEc().year);
        const classKey      = student.currentClassKey ?? '';

        // `grade` lives on the classes/{classKey} doc, not on the student
        // doc itself (see dal.createClass()'s payload vs. the student
        // registration form's studentData) — dal.getClass() is cache-aware
        // (store._classDocCache), so this costs 0 reads once any other
        // view has already loaded this class.
        const [attendance, academicYear, homework, classDoc] = await Promise.all([
          dal.getStudentAttendance(studentId, startKey, endKey),
          dal.getStudentAcademicYear(studentId, currentEcYear),
          classKey ? dal.getHomeworkForStudent(classKey, studentId) : Promise.resolve([]),
          classKey ? dal.getClass(classKey) : Promise.resolve(null),
        ]);

        // Pre-warm subject name cache (cached, so this is free on repeat
        // views) for every subject that appears in this child's current
        // academic-year record, so _pdRenderGrades() never has to await
        // mid-render.
        const subjectKeys = Object.keys(academicYear?.subjects ?? {});
        await Promise.all(subjectKeys.map(sk => dal.getSubject(sk)));

        store.childCache = {
          ...store.childCache,
          [studentId]: {
            student,
            attendance,
            academicYear,
            homework,
            last7,
            grade: classDoc?.grade,
            loadedAt: Date.now(),
          },
        };
      } catch (err) {
        store.childCache = {
          ...store.childCache,
          [studentId]: { error: err.message || 'load_failed' },
        };
        showToast((store.lang === 'am' ? 'የልጅ መረጃ መጫን አልተሳካም፦ ' : 'Failed to load child data: ') + err.message, 'error');
      }
    }

    // _pdEnsureExamSub(classKey, grade)
    //   (Re-)subscribes to exam schedules scoped to the selected child's
    //   class/grade, but only when that scope actually changes — tracked
    //   via store._parentExamSubKey ('classKey|grade'). Mirrors
    //   dal.subscribeExamSchedules()'s existing filtering (school-wide,
    //   matching class, or matching grade) — see § DAL.
    //   The store._parentExamSubKey assignment is deferred a tick (rather
    //   than happening synchronously here) so it doesn't re-enter
    //   render() while the current render is still building its HTML
    //   string — the same deferral pattern requireRole()/guardRoute() use
    //   for their own redirects (see § ROUTER).
    function _pdEnsureExamSub(classKey, grade) {
      if (!store.user) return;
      const subKey = `${classKey ?? ''}|${grade ?? ''}`;
      if (store._parentExamSubKey === subKey) return; // already subscribed to this scope
      setTimeout(() => {
        if (store._parentExamSubKey === subKey) return; // a later call already won the race
        store._parentExamSubKey = subKey;
        dal.subscribeExamSchedules(classKey ?? '', grade ?? '');
      }, 0);
    }

    // _pdAttNotifySubIds — plain module-level Set (NOT a store property) of
    // studentIds that already have a live dal.subscribeStudentAttendance()
    // listener running. A plain variable, rather than something on
    // `store`, is intentional here: unlike _parentExamSubKey above, this
    // tracker only ever gates "have we already subscribed?" — it carries
    // no information the UI needs to react to, so writing it shouldn't
    // trigger a re-render via the store Proxy.
    const _pdAttNotifySubIds = new Set();

    // _pdEnsureAttendanceNotify(studentId, childName)
    //   Starts the real-time "today's attendance was just marked" listener
    //   for one child (dal.subscribeStudentAttendance() — see § DAL), but
    //   only once per studentId per session — parentDashboardView() calls
    //   this on every render, and re-subscribing on every store mutation
    //   would leak listeners (each one piling onto store.listeners) since
    //   the dashboard re-renders on practically every store write.
    //
    //   When a new record lands, shows a push-style toast: "Attendance
    //   marked for [childName]: Present/Absent/Late" (bilingual). The
    //   status→label/toast-type mapping mirrors _pdAttDot()'s
    //   present=green/absent=red/late=yellow convention, reusing showToast's
    //   'success'|'error'|'warning' visual treatment for the same meaning.
    function _pdEnsureAttendanceNotify(studentId, childName) {
      if (!store.user || !studentId) return;
      if (_pdAttNotifySubIds.has(studentId)) return; // already subscribed this session

      _pdAttNotifySubIds.add(studentId);

      dal.subscribeStudentAttendance(studentId, (record) => {
        const isAm = store.lang === 'am';
        const statusLabels = {
          present: { en: 'Present', am: 'ተገኝቷል', toastType: 'success' },
          absent:  { en: 'Absent',  am: 'አልተገኘም', toastType: 'error'   },
          late:    { en: 'Late',    am: 'ዘግይቷል',  toastType: 'warning' },
        };
        const meta = statusLabels[record?.status] ?? { en: record?.status ?? '—', am: record?.status ?? '—', toastType: 'info' };
        const name = _pdSafe(childName || studentId);

        const message = isAm
          ? `📋 የ${name} መገኘት ተመዝግቧል፦ ${meta.am}`
          : `📋 Attendance marked for ${name}: ${meta.en}`;

        Toast(message, meta.toastType);
      });
    }

    // _pdAttDot(status)
    //   Renders one day's colored indicator for the 7-day attendance strip.
    //   green = present, red = absent, yellow = late, gray = no record.
    function _pdAttDot(status) {
      const map = {
        present: { cls: 'present', icon: '✓' },
        absent:  { cls: 'absent',  icon: '✕' },
        late:    { cls: 'late',    icon: '!' },
      };
      const entry = map[status] ?? { cls: 'none', icon: '–' };
      return `<div class="pd-att-dot ${entry.cls}">${entry.icon}</div>`;
    }

    // _pdRenderAttendanceStrip(childData)
    //   Builds the 7-day attendance strip from childData.last7 (the date
    //   range that was queried) and childData.attendance (the docs that
    //   came back), matched up by dateKey. Days with no matching doc show
    //   the gray "no record" dot.
    function _pdRenderAttendanceStrip(childData) {
      const last7 = childData.last7 ?? [];
      const byKey = {};
      (childData.attendance ?? []).forEach(a => { byKey[a.dateKey] = a.status; });

      const isAm = store.lang === 'am';
      const weekdayNamesEn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const weekdayNamesAm = ['እሁድ','ሰኞ','ማክሰ','ረቡዕ','ሐሙስ','ዓርብ','ቅዳ'];

      const cells = last7.map(({ dateKey, ecDay, gcDate }) => {
        const status = byKey[dateKey];
        const wd = gcDate.getDay();
        const dayLabel = isAm ? weekdayNamesAm[wd] : weekdayNamesEn[wd];
        return `
          <div class="pd-att-day" title="${_pdSafe(dateKey)}">
            <div class="pd-att-day-label">${dayLabel}</div>
            ${_pdAttDot(status)}
            <div class="pd-att-day-num">${ecDay.day}</div>
          </div>`;
      }).join('');

      return `<div class="pd-att-strip">${cells}</div>`;
    }

    // _pdRenderGrades(childData)
    //   Renders the current semester's subject grades as a card grid, read
    //   from childData.academicYear.subjects[subjectKey][`semester${n}`].
    function _pdRenderGrades(childData) {
      const ay = childData.academicYear;
      const currentSemester = Number(store.config?.currentSemester ?? 1);
      const subjects = ay?.subjects ?? {};
      const isAm = store.lang === 'am';

      const cards = Object.keys(subjects)
        .map(subjectKey => {
          const result = subjects[subjectKey]?.[`semester${currentSemester}`];
          if (!result) return null;
          const cached = store._subjectDocCache?.[subjectKey];
          const subjectName = cached
            ? (isAm && cached.nameAm ? cached.nameAm : cached.name)
            : subjectKey;
          const letter = result.grade ?? '—';
          const score  = result.totalScore != null && result.maxPossible != null
            ? `${result.totalScore} / ${result.maxPossible}`
            : (result.percentScore != null ? `${Math.round(result.percentScore)}%` : '—');

          return `
            <div class="pd-grade-card">
              <div class="pd-grade-subject">${_pdSafe(subjectName)}</div>
              <div class="pd-grade-row">
                <span class="pd-grade-score">${_pdSafe(score)}</span>
                <span class="pd-grade-letter g-${_pdSafe(letter)}">${_pdSafe(letter)}</span>
              </div>
            </div>`;
        })
        .filter(Boolean);

      if (cards.length === 0) {
        return `
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <p>${t('noGradesYet')}</p>
          </div>`;
      }

      return `<div class="grid-2">${cards.join('')}</div>`;
    }

    // _pdRenderHomework(childData)
    //   Renders homework due, grouped by EC due date (dueDateEc string),
    //   soonest first. Items without a parseable due date are grouped
    //   under a trailing '—' bucket so nothing silently disappears.
    function _pdRenderHomework(childData) {
      const items = childData.homework ?? [];
      if (items.length === 0) {
        return emptyState('✅', 'All caught up!', 'No homework due for this child.', null, null);
      }

      const isAm = store.lang === 'am';

      // Group by dueDateEc (fallback to '' bucket, sorted last).
      const groups = {};
      items.forEach(hw => {
        const key = hw.dueDateEc || '';
