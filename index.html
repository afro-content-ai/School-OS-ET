    // _taMount(uid) — async; loads teacher doc + classes + subjects then builds the matrix.
    async function _taMount(uid) {
      const matrixArea   = document.getElementById('ta-matrix-area');
      const matrixStatus = document.getElementById('ta-matrix-status');
      const teacherCard  = document.getElementById('ta-teacher-card');
      const currentCard  = document.getElementById('ta-current-card');
      const saveBtn      = document.getElementById('ta-save-btn');
      if (!matrixArea) return;

      try {
        // Load teacher user doc
        const teacherDoc = await dal.getUser(uid);
        if (!teacherDoc) {
          matrixArea.innerHTML = `<div class="um-empty"><p style="color:var(--danger);">Teacher not found (uid: ${uid})</p></div>`;
          return;
        }

        // Render teacher info card
        if (teacherCard) {
          const initials = (teacherDoc.displayName ?? '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
          teacherCard.innerHTML = `
            <div class="ta-teacher-card">
              <div class="ta-teacher-avatar">${initials}</div>
              <div>
                <div class="ta-teacher-name">${teacherDoc.displayName ?? '—'}${teacherDoc.displayNameAm ? ' · ' + teacherDoc.displayNameAm : ''}</div>
                <div class="ta-teacher-meta">${teacherDoc.email ?? ''} · <span class="badge role-badge ${ROLE_META[teacherDoc.role]?.css ?? ''}">${ROLE_META[teacherDoc.role]?.label ?? teacherDoc.role}</span></div>
              </div>
            </div>`;
        }

        // Load classes and subjects
        const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);
        const [classes, subjects] = await Promise.all([
          dal.listClasses(ecYear),
          dal.getAllSubjects(),
        ]);

        // Cache for getSubjectsForGrade
        store.subjectsCache = subjects;

        // Pre-warm the per-doc caches used by __taUpdatePreview and
        // dal.validateAndSyncAssignments so the first pill render is instant
        // (0 extra Firestore reads) for all loaded classes and subjects.
        if (!store._classDocCache)   store._classDocCache   = {};
        if (!store._subjectDocCache) store._subjectDocCache = {};
        classes.forEach(c => { store._classDocCache[c.classKey] = c; });
        subjects.forEach(s => { store._subjectDocCache[s.subjectId] = s; });

        // Sort classes by grade then section
        classes.sort((a, b) => {
          const gA = _gradeNumFromClassKey(a.classKey ?? '') ?? 99;
          const gB = _gradeNumFromClassKey(b.classKey ?? '') ?? 99;
          if (gA !== gB) return gA - gB;
          return String(a.classKey).localeCompare(String(b.classKey));
        });

        // Current assignments and homeroom
        const existingAssign  = new Set(teacherDoc.teachingAssignments ?? []);
        const existingHomeroom = new Set(teacherDoc.homeroomOf ?? []);

        // Show current card
        if (currentCard) {
          currentCard.style.display = '';
          const currentBody = document.getElementById('ta-current-body');
          if (currentBody) {
            const assignList  = [...existingAssign];
            const hrList      = [...existingHomeroom];
            currentBody.innerHTML = `
              <div class="row-sb" style="flex-wrap:wrap;gap:var(--sp-3);">
                <div>
                  <div class="label" style="margin-bottom:4px;">Teaching (${assignList.length})</div>
                  ${assignList.length > 0
                    ? assignList.map(k => `<span class="subj-id-chip" style="margin:2px;">${k}</span>`).join('')
                    : '<span class="text-muted">None assigned</span>'}
                </div>
                <div>
                  <div class="label" style="margin-bottom:4px;">Homeroom</div>
                  ${hrList.length > 0
                    ? hrList.map(k => `<span class="cls-homeroom-tag">🏠 ${k}</span>`).join('')
                    : '<span class="text-muted">None</span>'}
                </div>
              </div>`;
          }
        }

        if (classes.length === 0) {
          matrixArea.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🏛</div>
              <p>${t('noClasses')}</p>
              <button class="btn btn-ghost btn-sm mt-3" onclick="router.navigate('#/admin/classes')">Manage Classes</button>
            </div>`;
          if (matrixStatus) matrixStatus.textContent = '0 classes';
          return;
        }

        if (subjects.length === 0) {
          matrixArea.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📖</div>
              <p>${t('noSubjects')}</p>
              <button class="btn btn-ghost btn-sm mt-3" onclick="router.navigate('#/admin/subjects')">Manage Subjects</button>
            </div>`;
          if (matrixStatus) matrixStatus.textContent = '0 subjects';
          return;
        }

        if (matrixStatus) matrixStatus.textContent = `${classes.length} classes · ${subjects.length} subjects`;

        // Build the matrix table
        const subjectCols = subjects.map(s =>
          `<th title="${s.name}${s.nameAm ? ' · ' + s.nameAm : ''}">${s.name ?? s.subjectId}</th>`
        ).join('');

        const rows = classes.map(cls => {
          const ck = cls.classKey ?? '';
          const gradeNum = _gradeNumFromClassKey(ck);
          const gradeSubs = gradeNum !== null
            ? subjects.filter(s => {
                const mn = Number(s.minGrade ?? 1);
                const mx = Number(s.maxGrade ?? 12);
                return gradeNum >= mn && gradeNum <= mx;
              })
            : subjects;
          const enabledSubjectIds = new Set(gradeSubs.map(s => s.subjectId));

          const subjectCells = subjects.map(s => {
            const sid     = s.subjectId ?? '';
            const key     = `${ck}|${sid}`;
            const checked = existingAssign.has(key);
            const enabled = enabledSubjectIds.has(sid);
            return `<td title="${enabled ? '' : 'Not offered at Grade ' + gradeNum}">
              ${enabled
                ? `<input type="checkbox" data-ck="${ck}" data-sid="${sid}"
                    ${checked ? 'checked' : ''}
                    onchange="window.__taUpdatePreview()">`
                : '<span style="color:var(--border);">—</span>'}
            </td>`;
          }).join('');

          const hrChecked = existingHomeroom.has(ck);
          const hrCell = `<td class="ta-homeroom-col">
            <input type="radio" name="ta-homeroom" value="${ck}"
              ${hrChecked ? 'checked' : ''} onchange="window.__taUpdatePreview()">
          </td>`;

          return `<tr>
            <td class="ta-class-col">
              <div style="font-weight:700;">${ck}</div>
              ${gradeNum !== null ? `<div class="text-xs text-muted">Grade ${gradeNum}</div>` : ''}
            </td>
            ${subjectCells}
            ${hrCell}
          </tr>`;
        }).join('');

        matrixArea.innerHTML = `
          <div class="ta-matrix-wrap">
            <table class="ta-matrix">
              <thead>
                <tr>
                  <th class="ta-class-col">Class</th>
                  ${subjectCols}
                  <th class="ta-homeroom-col">🏠 Homeroom</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;

        if (saveBtn) saveBtn.disabled = false;

        // Initial preview render
        window.__taUpdatePreview();

      } catch (err) {
        if (matrixArea) {
          matrixArea.innerHTML = `<div class="um-empty"><p style="color:var(--danger);">Error: ${err.message}</p></div>`;
        }
        showToast('Failed to load assignment data: ' + err.message, 'error');
      }
    }

    // __taUpdatePreview() — re-renders the composite-key validation preview box.
    //   Called on every checkbox/radio change. Renders colored pills:
    //     green  = key parsed correctly AND classKey exists AND subjectId is active
    //     red    = key is malformed, or classKey absent from Firestore, or
    //              subjectId absent/inactive
    //     yellow = currently validating against Firestore (async check in flight)
    //
    //   Uses the in-memory cache (_classDocCache / _subjectDocCache / subjectsCache)
    //   populated during _taMount and any previous validation calls — so most
    //   re-renders after the first are instant (0 additional Firestore reads).
    //   A per-call generation counter prevents stale async results from overwriting
    //   a newer render if the user checks/unchecks rapidly.
    let _taPreviewGen = 0; // monotonic counter; incremented on each invocation

    window.__taUpdatePreview = function __taUpdatePreview() {
      const preview  = document.getElementById('ta-preview');
      const hrVal    = document.getElementById('ta-homeroom-val');
      if (!preview) return;

      // Capture checked keys at the moment of this call.
      const checked   = document.querySelectorAll('.ta-matrix input[type="checkbox"]:checked');
      const keys      = [...checked].map(el => `${el.dataset.ck}|${el.dataset.sid}`);

      // Update homeroom label synchronously.
      const hrRadio  = document.querySelector('.ta-matrix input[type="radio"]:checked');
      if (hrVal) hrVal.textContent = hrRadio?.value ?? '—';

      if (keys.length === 0) {
        preview.innerHTML = '<span style="color:var(--text-muted);font-size:0.78rem;">— No assignments selected —</span>';
        return;
      }

      // Bump generation; the async continuation below will bail if it's stale.
      const myGen = ++_taPreviewGen;

      // ── Synchronous first pass using only in-memory caches ─────────────
      // This renders instantly (no Firestore reads) and gives the user
      // immediate visual feedback. Keys that cannot be resolved from cache
      // are shown as yellow "checking" pills.

      const classCache   = store._classDocCache   ?? {};
      const subjectCache = store._subjectDocCache  ?? {};

      // Pre-warm subjectDocCache from subjectsCache (populated by _taMount).
      if (!store._subjectDocCache) store._subjectDocCache = {};
      (store.subjectsCache ?? []).forEach(s => {
        if (s.subjectId && !Object.prototype.hasOwnProperty.call(store._subjectDocCache, s.subjectId)) {
          store._subjectDocCache[s.subjectId] = s;
        }
      });

      function pillStateSync(key) {
        // Structural check first.
        let parsed;
        try {
          parsed = dal.validateCompositeKey(key);
        } catch (_e) {
          return { state: 'invalid', reason: 'Malformed key (missing or extra "|")' };
        }
        const { classKey, subjectId } = parsed;

        // Check caches.
        const hasCk  = Object.prototype.hasOwnProperty.call(classCache, classKey);
        const hasSid = Object.prototype.hasOwnProperty.call(store._subjectDocCache, subjectId);

        if (!hasCk && !hasSid) return { state: 'checking', reason: 'Verifying class & subject…' };
        if (!hasCk)            return { state: 'checking', reason: 'Verifying class…' };
        if (!hasSid)           return { state: 'checking', reason: 'Verifying subject…' };

        const clsData  = classCache[classKey];
        const subjData = store._subjectDocCache[subjectId];

        if (clsData === null)               return { state: 'invalid', reason: `Class "${classKey}" not in Firestore` };
        if (subjData === null)              return { state: 'invalid', reason: `Subject "${subjectId}" not in Firestore` };
        if (subjData.active !== true)       return { state: 'invalid', reason: `Subject "${subjectId}" is inactive` };

        return { state: 'valid', reason: 'Exists and active' };
      }

      function renderPills(pillInfos) {
        if (myGen !== _taPreviewGen) return; // stale; a newer call has taken over
        preview.innerHTML = pillInfos.map(({ key, state, reason }) => {
          const icon = state === 'valid' ? '✓' : state === 'invalid' ? '✗' : '…';
          const safeKey = key.replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return `<span class="ta-key-pill ${state}" title="${reason}">${icon} ${safeKey}</span>`;
        }).join('');
      }

      const syncInfos = keys.map(key => ({ key, ...pillStateSync(key) }));
      renderPills(syncInfos);

      // ── Async second pass for any "checking" pills ─────────────────────
      // If there are pills still in "checking" state, fire a parallel batch
      // of dal.getClass / dal.getSubject calls to resolve them.  Because
      // those functions are cache-aware, only truly uncached keys hit Firestore.
      const needsAsync = syncInfos.some(p => p.state === 'checking');
      if (!needsAsync) return;

      (async () => {
        // Collect uncached classKeys and subjectIds.
        const uncachedCks  = [];
        const uncachedSids = [];

        syncInfos.forEach(({ key }) => {
          let parsed;
          try { parsed = dal.validateCompositeKey(key); } catch (_e) { return; }
          const { classKey, subjectId } = parsed;
          if (!Object.prototype.hasOwnProperty.call(classCache, classKey)) {
            uncachedCks.push(classKey);
          }
          if (!Object.prototype.hasOwnProperty.call(store._subjectDocCache, subjectId)) {
            uncachedSids.push(subjectId);
          }
        });

        // Fetch in parallel — dal methods are cache-aware; no duplicate reads.
        try {
          await Promise.all([
            ...uncachedCks.map(ck => dal.getClass(ck)),
            ...uncachedSids.map(sid => dal.getSubject(sid)),
          ]);
        } catch (_fetchErr) {
          // Best-effort: if a fetch fails, the pill stays yellow.
        }

        if (myGen !== _taPreviewGen) return; // stale

        // Re-evaluate all pills now that caches are warmed.
        const asyncInfos = keys.map(key => ({ key, ...pillStateSync(key) }));
        renderPills(asyncInfos);
      })();
    };

    // __taSave() — saves assignments + homeroom to Firestore.
    //   Replaced in Step 36 to call dal.validateAndSyncAssignments (which
    //   deduplicates, validates composite key structure, verifies class docs,
    //   and verifies subject docs are active) instead of calling
    //   dal.updateTeacherAssignments directly. Wrapped in dal.safe() so
    //   any validation error surfaces as an error toast rather than a crash.
    window.__taSave = async function __taSave() {
      const uid      = _uidFromHash();
      const saveBtn  = document.getElementById('ta-save-btn');
      const errorEl  = document.getElementById('ta-save-error');
      if (!uid || !saveBtn) return;

      const checked  = document.querySelectorAll('.ta-matrix input[type="checkbox"]:checked');
      const assignments = [...checked].map(el => `${el.dataset.ck}|${el.dataset.sid}`);

      const hrRadio  = document.querySelector('.ta-matrix input[type="radio"]:checked');
      const homeroomKeys = hrRadio?.value ? [hrRadio.value] : [];

      saveBtn.disabled    = true;
      saveBtn.textContent = '⏳ Validating…';
      if (errorEl) errorEl.textContent = '';

      // Step 1: validate + sync assignments via the DAL pipeline.
      const result = await dal.safe(
        () => dal.validateAndSyncAssignments(uid, assignments),
        'Save failed'
      );

      if (!result.ok) {
        // Validation error — toast already shown by dal.safe; restore button.
        if (errorEl) errorEl.textContent = result.error.message;
        saveBtn.disabled    = false;
        saveBtn.textContent = '💾 Save Assignments';
        return;
      }

      // Step 2: update homeroom (separate field, not part of the assignment pipeline).
      saveBtn.textContent = '⏳ Saving homeroom…';
      const hrResult = await dal.safe(
        () => dal.updateUser(uid, { homeroomOf: homeroomKeys }),
        'Homeroom update failed'
      );

      if (!hrResult.ok) {
        if (errorEl) errorEl.textContent = hrResult.error.message;
        saveBtn.disabled    = false;
        saveBtn.textContent = '💾 Save Assignments';
        return;
      }

      // Both writes succeeded.
      // Deduplicate matches what validateAndSyncAssignments persisted.
      const persisted = [...new Set(assignments)];

      showToast('✅ Assignments validated and saved.', 'success');
      saveBtn.textContent = '✅ Saved';
      setTimeout(() => {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 Save Assignments'; }
      }, 2000);

      // Refresh the current-assignments card.
      const currentBody = document.getElementById('ta-current-body');
      if (currentBody) {
        currentBody.innerHTML = `
          <div class="row-sb" style="flex-wrap:wrap;gap:var(--sp-3);">
            <div>
              <div class="label" style="margin-bottom:4px;">Teaching (${persisted.length})</div>
              ${persisted.length > 0
                ? persisted.map(k => `<span class="subj-id-chip" style="margin:2px;">${k}</span>`).join('')
                : '<span class="text-muted">None assigned</span>'}
            </div>
            <div>
              <div class="label" style="margin-bottom:4px;">Homeroom</div>
              ${homeroomKeys.length > 0
                ? homeroomKeys.map(k => `<span class="cls-homeroom-tag">🏠 ${k}</span>`).join('')
                : '<span class="text-muted">None</span>'}
            </div>
          </div>`;
      }

      // Re-render the preview to show the now-persisted state (all green).
      window.__taUpdatePreview();
    };


    // ═══════════════════════════════════════════════════════════════════════════
    // SUBJECTS / CURRICULUM MANAGEMENT VIEW  (#/admin/subjects)
    // ── requireRole: 'admin'
    //
    // Lists all subjects (active + inactive) in a table. Inline form for
    // creating and editing subjects. Active toggle per row.
    // Calls dal.createSubject(data) / dal.updateSubject(id, updates).
    // Caches result to store.subjectsCache after every write.
    // ═══════════════════════════════════════════════════════════════════════════

    // Module-level subject list state.
    let _subjAll = [];

    function adminSubjectsView() {
      setTimeout(_subjMount, 0);

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">📖 ${t('subjects')}</h1>
            <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
          </div>
          <button
            id="subj-add-btn"
            class="btn btn-primary"
            onclick="window.__subjOpenForm(null)">
            + ${t('addSubject')}
          </button>
        </div>

        <!-- Inline form panel -->
        <div id="subj-form-panel" class="subj-form-panel" style="display:none;" aria-live="polite"></div>

        <!-- Subject count -->
        <p id="subj-count-line" class="text-sm text-muted mb-4">
          <span class="spinner spinner-sm"></span>
        </p>

        _subjUpdateCount(_subjAll.length);

        if (tableArea) tableArea.innerHTML = `<div class="um-empty"><p style="color:var(--danger);">Failed to load subjects: ${err.message}</p></div>`;

    function _subjRenderTable(subjects) {

    // __subjToggleActive(subjectId, active)
    window.__subjToggleActive = async function __subjToggleActive(subjectId, active) {
      try {
        await dal.updateSubject(subjectId, { active });
        const idx = _subjAll.findIndex(s => s.subjectId === subjectId);
        if (idx !== -1) _subjAll[idx] = { ..._subjAll[idx], active };

        showToast(err.message, 'error');

        _subjRenderTable(_subjAll);

    window.__subjAutoSlug = function(nameVal) {
      const idEl = document.getElementById('subj-f-id');

    window.__subjSave = async function __subjSave(existingId) {
      const errorEl = document.getElementById('subj-f-error');
      const isEdit  = Boolean(existingId);
      if (errorEl) errorEl.textContent = '';

      const subjectId = document.getElementById('subj-f-id')?.value.trim() ?? '';
      const name      = document.getElementById('subj-f-name')?.value.trim() ?? '';
      const nameAm    = document.getElementById('subj-f-name-am')?.value.trim() ?? '';
      const minGrade  = document.getElementById('subj-f-min')?.value ?? '';
      const maxGrade  = document.getElementById('subj-f-max')?.value ?? '';
      const active    = document.getElementById('subj-f-active')?.checked ?? true;

      if (!subjectId)  { if (errorEl) errorEl.textContent = 'Subject ID is required.'; return; }
      if (!name)       { if (errorEl) errorEl.textContent = 'Name is required.'; return; }
      if (!minGrade)   { if (errorEl) errorEl.textContent = 'Minimum grade is required.'; return; }
      if (!maxGrade)   { if (errorEl) errorEl.textContent = 'Maximum grade is required.'; return; }
      if (Number(minGrade) > Number(maxGrade)) { if (errorEl) errorEl.textContent = 'Min grade must be ≤ Max grade.'; return; }

      const data = { subjectId, name, nameAm, minGrade, maxGrade, active };

      const saveBtn = document.querySelector('#subj-form-panel .btn-primary');
      if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ Saving…'; }

      try {
        if (isEdit) {
          await dal.updateSubject(subjectId, { name, nameAm, minGrade, maxGrade, active });
          const idx = _subjAll.findIndex(s => s.subjectId === subjectId);
          if (idx !== -1) _subjAll[idx] = { ..._subjAll[idx], ...data };
        } else {
          const duplicate = _subjAll.find(s => s.subjectId === subjectId);
          if (duplicate) { if (errorEl) errorEl.textContent = `Subject ID "${subjectId}" already exists.`; return; }
          await dal.createSubject(data);
          _subjAll.push(data);
        }

        store.subjectsCache = _subjAll.filter(s => s.active !== false);
        showToast(`Subject "${name}" ${isEdit ? 'updated' : 'created'}.`, 'success');
        window.__subjCloseForm();
        _subjRenderTable(_subjAll);
        _subjUpdateCount(_subjAll.length);
      } catch (err) {
        if (errorEl) errorEl.textContent = err.message;
        showToast(err.message, 'error');
      } finally {
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = `💾 ${t('save')} Subject`; }
      }
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // ADMIN PROMOTION RUNNER VIEW  (#/admin/promotion)
    // ── requireRole: 'admin' (enforced via guardRoute in the route table,
    //    same mechanism every other admin/* route uses; dal.runPromotion /
    //    dal.resetPromotionJob also re-check store.userDoc?.role === 'admin'
    //    server-side-equivalent on every call, so this is defense in depth,
    //    not the only gate).
    //
    // Drives dal.getPromotionJob / dal.runPromotion / dal.resetPromotionJob
    // (see the "── Promotion ──" section of the DAL for the full contract —
    // resumable, idempotent, checkpointed per-class). This view is a thin
    // status/control surface over that job document; it does not duplicate
    // any promotion logic itself.
    //
    // Module state (mirrors the _cls* convention used by the Classes view):
    //   _promoJob          – current /promotionJobs/{ecYear} doc, or null
    //   _promoClasses      – dal.listClasses(currentEcYear) result, sorted
    //   _promoEcYear       – store.config.currentEcYear (string)
    //   _promoTargetEcYear – String(Number(_promoEcYear) + 1)
    //   _promoIsRunning    – true while a runPromotion() call is in flight
    //                        in THIS tab (separate from job.status==='running',
    //                        which can be true even when nobody is actively
    //                        driving it — e.g. after a dropped connection)
    //   _promoLog          – array of timestamped log lines for the <pre>
    // ═══════════════════════════════════════════════════════════════════════════

    let _promoJob          = null;
    let _promoClasses      = [];
    let _promoEcYear       = null;
    let _promoTargetEcYear = null;
    let _promoIsRunning    = false;
    let _promoLog          = [];

    // _promoSafe(str) / _promoEsc(str) — same escaping pair convention as
    // _umSafe/_umEsc in the Users view (this codebase defines escaping
    // helpers per-section rather than one shared global).
    function _promoSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function _promoEsc(str) {
      return String(str ?? '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }

    // _promoTimestampToDate(value)
    //   Promotion job timestamps (startedAt/completedAt) are written with
    //   serverTimestamp() and come back as Firestore Timestamp objects with
    //   a .toDate() method — but immediately after a write, a locally-cached
    //   snapshot can still hold a sentinel before the server value resolves.
    //   Defensive: try .toDate(), fall back to null rather than throwing.
    function _promoTimestampToDate(value) {
      if (!value) return null;
      if (typeof value.toDate === 'function') {
        try { return value.toDate(); } catch (_) { return null; }
      }
      if (value instanceof Date) return value;
      return null;
    }

    function _promoFormatTime(date) {
      if (!date) return '—';
      try {
        return date.toLocaleString(undefined, {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });
      } catch (_) {
        return date.toString();
      }
    }

    // adminPromotionView()
    //   Returns the HTML shell for #/admin/promotion and schedules the
    //   async mount (same setTimeout(_fn, 0) pattern as adminClassesView).
    function adminPromotionView() {
      _promoLog = [];
      setTimeout(_promoMount, 0);

      const ecYear = store.config?.currentEcYear ?? String(EC.todayEc().year);

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">🎓 ${t('promotion')}</h1>
            <p class="page-subtitle">${EC.formatEcAm(new Date())} · EC ${ecYear}</p>
          </div>
        </div>

        <div id="promo-root">
          <div class="um-loading">
            <div class="spinner spinner-lg" style="margin:0 auto var(--sp-3);"></div>
            <p>Loading promotion status…</p>
          </div>
        </div>`;
    }

    // _promoMount()
    //   On-mount data fetch: the job doc for the current EC year (if any)
    //   plus the full class list for the current EC year (needed both to
    //   compute the N students / M classes confirmation copy and to render
    //   the "already processed" checklist on resume).
    async function _promoMount() {
      const root = document.getElementById('promo-root');
      if (!root) return;

      _promoEcYear       = store.config?.currentEcYear ?? String(EC.todayEc().year);
      _promoTargetEcYear = String(Number(_promoEcYear) + 1);

      try {
        const [job, classes] = await Promise.all([
          dal.getPromotionJob(_promoEcYear),
          dal.listClasses(_promoEcYear),
        ]);

        _promoJob     = job;
        _promoClasses = (classes ?? []).slice().sort((a, b) => {
          const gA = _gradeNumFromClassKey(a.classKey ?? '') ?? 99;
          const gB = _gradeNumFromClassKey(b.classKey ?? '') ?? 99;
          if (gA !== gB) return gA - gB;
          return String(a.classKey).localeCompare(String(b.classKey));
        });

        _promoRender();
      } catch (err) {
        root.innerHTML = `
          <div class="um-empty">
            <p style="color:var(--danger);">Failed to load promotion status: ${_promoSafe(err.message)}</p>
          </div>`;
        showToast('Failed to load promotion status: ' + err.message, 'error');
      }
    }

    // _promoTotals()
    //   Derives total student count and total class count from
    //   _promoClasses, for both the confirmation-modal copy ("N students
    //   across M classes") and the progress bar's denominator.
    function _promoTotals() {
      const totalClasses  = _promoClasses.length;
      const totalStudents = _promoClasses.reduce((sum, c) => sum + (c.studentIds?.length ?? 0), 0);
      return { totalClasses, totalStudents };
    }

    // _promoRender()
    //   Central re-render: picks the right shell (not-started / running-
    //   resumable / complete) based on _promoJob.status, and always
    //   re-renders from current module state — no partial DOM patches,
    //   mirroring how _clsRenderGrid / _clsUpdateCount work in the Classes
    //   view immediately above this section.
    function _promoRender() {
      const root = document.getElementById('promo-root');
      if (!root) return;

      const { totalClasses, totalStudents } = _promoTotals();
      const status = _promoJob?.status ?? 'not_started';

      const statusBadge =
        status === 'complete'   ? `<span class="promo-status-badge complete">✅ Complete</span>` :
        status === 'running'    ? `<span class="promo-status-badge running">⏳ Running (resumable)</span>` :
                                   `<span class="promo-status-badge not-started">⚪ Not started</span>`;

      const startedAt   = _promoFormatTime(_promoTimestampToDate(_promoJob?.startedAt));
      const completedAt = _promoFormatTime(_promoTimestampToDate(_promoJob?.completedAt));

      let body = '';

      if (status === 'complete') {
        body = _promoCompleteSummaryHtml();
      } else if (status === 'running') {
        body = _promoResumeHtml(totalClasses, totalStudents);
      } else {
        body = _promoNotStartedHtml(totalClasses, totalStudents);
      }

      root.innerHTML = `
        <div class="card promo-status-card mb-4">
          ${statusBadge}
          <span class="text-sm text-muted">EC ${_promoSafe(_promoEcYear)} → EC ${_promoSafe(_promoTargetEcYear)}</span>
          ${_promoJob ? `<span class="text-sm text-muted">Started: ${startedAt}</span>` : ''}
          ${status === 'complete' ? `<span class="text-sm text-muted">Completed: ${completedAt}</span>` : ''}
        </div>

        <div class="card mb-4">
          ${body}
        </div>

        ${_promoJob ? `
        <div class="promo-danger-zone">
          <h3 class="text-sm" style="color:var(--danger);font-weight:700;margin-block-end:var(--sp-2);">⚠ Danger Zone</h3>
          <p class="text-sm text-muted mb-3">
            Resets the job's checkpoint to start over from the first class.
            This does <strong>not</strong> undo any student records already
            promoted — only use this to retry a job that finished in a bad state.
          </p>
          <button id="promo-reset-btn" class="btn btn-danger btn-sm"
            onclick="window.__promoOpenResetModal()" ${_promoIsRunning ? 'disabled' : ''}>
            🗑 Reset Job (Danger)
          </button>
        </div>` : ''}

        <div id="promo-modal-host"></div>`;
    }

    // _promoNotStartedHtml(totalClasses, totalStudents)
    //   Shell shown when no job document exists yet for this EC year.
    function _promoNotStartedHtml(totalClasses, totalStudents) {
      return `
        <p class="text-sm text-muted mb-3">
          No promotion has been run for EC ${_promoSafe(_promoEcYear)} yet.
          Running it will advance every student into EC ${_promoSafe(_promoTargetEcYear)}
          (grade 12 students will be marked graduated instead).
        </p>
        <div class="promo-summary-grid" style="margin-block-end:var(--sp-3);">
          <div class="promo-summary-tile">
            <span class="num">${totalClasses}</span>
            <span class="lbl">Classes</span>
          </div>
          <div class="promo-summary-tile">
            <span class="num">${totalStudents}</span>
            <span class="lbl">Students</span>
          </div>
        </div>
        <button id="promo-run-btn" class="btn btn-primary"
          onclick="window.__promoOpenConfirmModal()"
          ${totalClasses === 0 ? 'disabled' : ''}>
          ▶ Run Year-End Promotion
        </button>
        ${totalClasses === 0 ? `<p class="text-sm text-muted mt-2">No classes found for EC ${_promoSafe(_promoEcYear)} — nothing to promote.</p>` : ''}`;
    }

    // _promoResumeHtml(totalClasses, totalStudents)
    //   Shell shown when a job exists with status:'running' — either because
    //   it's actively being driven right now in this tab (_promoIsRunning),
    //   or because a prior session was interrupted and it's sitting idle
    //   waiting to be resumed.
    function _promoResumeHtml(totalClasses, totalStudents) {
      const processed = new Set(_promoJob?.processedClassKeys ?? []);
      const pct = totalClasses > 0 ? Math.min(100, Math.round((processed.size / totalClasses) * 100)) : 0;

      const classListHtml = _promoClasses.map(c => {
        const key  = c.classKey ?? '—';
        const done = processed.has(key);
        return `
          <div class="promo-class-row ${done ? 'is-done' : ''}">
            <span class="${done ? 'promo-check' : 'promo-pending'}">${done ? '✔' : '○'}</span>
            <span class="promo-class-key">${_promoSafe(key)}</span>
          </div>`;
      }).join('');

      return `
        <p class="text-sm text-muted mb-3">
          A promotion job for EC ${_promoSafe(_promoEcYear)} is already in progress.
          ${_promoIsRunning
            ? 'It is currently running in this tab — do not close this page.'
            : 'It was interrupted before finishing. Resuming will skip every class already processed below and continue with the rest.'}
        </p>

        <div class="promo-progress-track">
          <div class="promo-progress-fill" style="width:${pct}%;"></div>
        </div>
        <p class="text-sm text-muted mb-3">${processed.size} / ${totalClasses} classes processed (${pct}%) · ${_promoJob?.promotedCount ?? 0} students promoted so far</p>

        ${!_promoIsRunning ? `
        <button id="promo-resume-btn" class="btn btn-primary mb-3" onclick="window.__promoResume()">
          ▶ Resume Promotion
        </button>` : ''}

        <p class="text-sm" style="font-weight:600;margin-block-end:var(--sp-2);">Classes</p>
        <div class="promo-class-list mb-3">
          ${classListHtml || '<p class="text-sm text-muted">No classes found.</p>'}
        </div>

        <p class="text-sm" style="font-weight:600;margin-block-end:var(--sp-2);">Live Progress Log</p>
        <pre id="promo-log-pre" class="promo-log">${_promoLog.length ? _promoSafe(_promoLog.join('\n')) : 'Waiting…'}</pre>`;
    }

    // _promoCompleteSummaryHtml()
    //   Shell shown once status:'complete'. Reads totals straight off the
    //   job document (promotedCount/graduatedCount), which dal.runPromotion
    //   maintains incrementally as the authoritative count — not recomputed
    //   client-side from the class list, since the class list reflects the
    //   POST-promotion state (students have already moved to next year's
    //   classKey) and is no longer a reliable source for "how many were
    //   promoted".
    function _promoCompleteSummaryHtml() {
      const promoted  = _promoJob?.promotedCount  ?? 0;
      const graduated = _promoJob?.graduatedCount ?? 0;
      const errors     = _promoJob?.errors ?? [];

      return `
        <p class="text-sm text-muted mb-2">
          Promotion from EC ${_promoSafe(_promoEcYear)} to EC ${_promoSafe(_promoTargetEcYear)} is complete.
        </p>
        <div class="promo-summary-grid">
          <div class="promo-summary-tile">
            <span class="num">${promoted}</span>
            <span class="lbl">Promoted</span>
          </div>
          <div class="promo-summary-tile">
            <span class="num">${graduated}</span>
            <span class="lbl">Graduated</span>
          </div>
          <div class="promo-summary-tile ${errors.length ? 'is-danger' : ''}">
            <span class="num">${errors.length}</span>
            <span class="lbl">Errors</span>
          </div>
        </div>
        ${errors.length ? `
          <div class="promo-log" style="margin-block-start:var(--sp-2);">${_promoSafe(errors.join('\n'))}</div>
        ` : `<p class="text-sm text-success">No errors reported.</p>`}
        ${_promoLog.length ? `
          <p class="text-sm mt-3" style="font-weight:600;margin-block-end:var(--sp-2);">Run Log</p>
          <pre id="promo-log-pre" class="promo-log">${_promoSafe(_promoLog.join('\n'))}</pre>
        ` : ''}
        <button class="btn btn-ghost btn-sm mt-3" disabled title="Promotion already complete for EC ${_promoSafe(_promoEcYear)}">
          ▶ Run Year-End Promotion (already complete)
        </button>`;
    }

    // _promoAppendLog(msg)
    //   Appends a timestamped line to _promoLog and, if the <pre> is
    //   currently mounted, writes it directly + auto-scrolls — avoids a
    //   full _promoRender() on every onProgress() tick (which would be
    //   wasteful and would also reset scroll position).
    function _promoAppendLog(msg) {
      const stamp = new Date().toLocaleTimeString();
      _promoLog.push(`[${stamp}] ${msg}`);

      const pre = document.getElementById('promo-log-pre');
      if (pre) {
        pre.textContent = _promoLog.join('\n');
        pre.scrollTop = pre.scrollHeight;
      }
    }

    // _promoUpdateProgressBarFromMessage(msg)
    //   dal.runPromotion's onProgress messages are of the form
    //   "Processed N students in {classKey}" once per chunk (a class can
    //   emit several of these, one per 20-student batch) and "Complete" once
    //   at the very end. We don't get a structured { classKey, done } event
    //   — only the string — so the progress bar's class-completed count is
    //   tracked by re-reading processedClassKeys off the LIVE job doc rather
    //   than parsing the message text, which would double-count multi-chunk
    //   classes. This does one extra getDoc() per progress tick; acceptable
    //   for an admin-only, once-a-year operation.
    async function _promoRefreshProgressFromServer() {
      try {
        const job = await dal.getPromotionJob(_promoEcYear);
        if (!job) return;
        _promoJob = job;

        const { totalClasses } = _promoTotals();
        const processed = new Set(job.processedClassKeys ?? []);
        const pct = totalClasses > 0 ? Math.min(100, Math.round((processed.size / totalClasses) * 100)) : 0;

        const fill = document.querySelector('#promo-root .promo-progress-fill');
        if (fill) fill.style.width = pct + '%';

        const countLine = document.querySelector('#promo-root .promo-progress-track + p');
        if (countLine) {
          countLine.textContent = `${processed.size} / ${totalClasses} classes processed (${pct}%) · ${job.promotedCount ?? 0} students promoted so far`;
        }

        // Tick the checklist's checkmarks in place without a full re-render
        // (keeps the log <pre>'s scroll position intact during a long run).
        document.querySelectorAll('#promo-root .promo-class-row').forEach(row => {
          const keyEl = row.querySelector('.promo-class-key');
          const key   = keyEl?.textContent;
          if (key && processed.has(key) && !row.classList.contains('is-done')) {
            row.classList.add('is-done');
            const mark = row.querySelector('.promo-pending, .promo-check');
            if (mark) { mark.textContent = '✔'; mark.classList.remove('promo-pending'); mark.classList.add('promo-check'); }
          }
        });
      } catch (_) {
        // Best-effort UI refresh; a failed poll here shouldn't interrupt
        // the actual promotion run, which continues regardless.
      }
    }

    // _promoRunOrResume()
    //   Shared driver for both the initial run and the resume path —
    //   dal.runPromotion(currentEcYear, targetEcYear, onProgress) is itself
    //   resumable (it reads-or-creates the job doc and skips any classKey
    //   already in processedClassKeys), so "Run" and "Resume" are the same
    //   call from the DAL's point of view; the UI just labels the button
    //   differently depending on whether a job already existed.
    async function _promoRunOrResume() {
      if (_promoIsRunning) return;
      _promoIsRunning = true;

      // Ensure we have a job shell to render progress against immediately,
      // status:'running' so _promoRender picks the resume/progress shell.
      if (!_promoJob) {
        _promoJob = {
          ecYear: _promoEcYear, targetEcYear: _promoTargetEcYear,
          status: 'running', processedClassKeys: [], promotedCount: 0, graduatedCount: 0,
        };
      } else {
        _promoJob = { ..._promoJob, status: 'running' };
      }
      _promoLog = [];
      _promoRender();
      _promoAppendLog('Starting promotion run…');

      try {
        await dal.runPromotion(_promoEcYear, _promoTargetEcYear, (msg) => {
          _promoAppendLog(msg);
          _promoRefreshProgressFromServer();
        });

        // Final authoritative read so the complete-summary shell shows the
        // job doc's real promotedCount/graduatedCount/errors/completedAt.
        _promoJob = await dal.getPromotionJob(_promoEcYear);
        showToast('Promotion complete.', 'success');
      } catch (err) {
        _promoAppendLog(`ERROR: ${err.message}`);
        showToast('Promotion run failed: ' + err.message, 'error');
        // Re-read the job so the UI reflects however far it actually got
        // (runPromotion's checkpointing means partial progress is real and
        // safely resumable even though this call threw).
        try { _promoJob = await dal.getPromotionJob(_promoEcYear); } catch (_) { /* keep prior state */ }
      } finally {
        _promoIsRunning = false;
        _promoRender();
      }
    }

    // window.__promoOpenConfirmModal()
    //   Shows the pre-run confirmation modal with the exact required copy:
    //   "This will promote all students to the next grade for EC Year
    //   [targetEcYear]. This action will update [N] students across [M]
    //   classes. Type CONFIRM to proceed." Gated on typing CONFIRM exactly.
    window.__promoOpenConfirmModal = function __promoOpenConfirmModal() {
      const host = document.getElementById('promo-modal-host');
      if (!host) return;

      const { totalClasses, totalStudents } = _promoTotals();

      host.innerHTML = `
        <div class="modal-backdrop" id="promo-confirm-backdrop" role="dialog" aria-modal="true" aria-labelledby="promo-confirm-title">
          <div class="modal">
            <div class="modal-header">
              <span class="modal-title" id="promo-confirm-title">Confirm Year-End Promotion</span>
              <span class="modal-close" onclick="window.__promoCloseModal()">✕</span>
            </div>
            <p class="text-sm mb-3">
              This will promote all students to the next grade for EC Year ${_promoSafe(_promoTargetEcYear)}.
              This action will update ${totalStudents} students across ${totalClasses} classes.
              Type CONFIRM to proceed.
            </p>
            <input id="promo-confirm-input" class="input promo-confirm-input" type="text"
              placeholder="CONFIRM" autocomplete="off" oninput="window.__promoValidateConfirmInput()" />
            <div class="um-form-actions mt-3">
              <button id="promo-confirm-submit-btn" class="btn btn-primary" disabled onclick="window.__promoConfirmAndRun()">
                ▶ Run Promotion
              </button>
              <button class="btn btn-ghost" onclick="window.__promoCloseModal()">Cancel</button>
            </div>
          </div>
        </div>`;

      document.getElementById('promo-confirm-backdrop')?.addEventListener('click', (e) => {
        if (e.target.id === 'promo-confirm-backdrop') window.__promoCloseModal();
      });
      document.getElementById('promo-confirm-input')?.focus();
    };

    window.__promoValidateConfirmInput = function __promoValidateConfirmInput() {
      const input = document.getElementById('promo-confirm-input');
      const btn   = document.getElementById('promo-confirm-submit-btn');
      if (!input || !btn) return;
      btn.disabled = input.value.trim() !== 'CONFIRM';
    };

    window.__promoConfirmAndRun = function __promoConfirmAndRun() {
      const input = document.getElementById('promo-confirm-input');
      if (!input || input.value.trim() !== 'CONFIRM') return;
      window.__promoCloseModal();
      _promoRunOrResume();
    };

    window.__promoResume = function __promoResume() {
      _promoRunOrResume();
    };

    window.__promoCloseModal = function __promoCloseModal() {
      const host = document.getElementById('promo-modal-host');
      if (host) host.innerHTML = '';
    };

    // window.__promoOpenResetModal()
    //   Danger-zone confirmation, gated on typing RESET exactly (separate
    //   from the CONFIRM gate above so the two destructive-ish actions
    //   can't be triggered by muscle-memory-typing the wrong word).
    window.__promoOpenResetModal = function __promoOpenResetModal() {
      const host = document.getElementById('promo-modal-host');
      if (!host) return;

      host.innerHTML = `
        <div class="modal-backdrop" id="promo-reset-backdrop" role="dialog" aria-modal="true" aria-labelledby="promo-reset-title">
          <div class="modal">
            <div class="modal-header">
              <span class="modal-title" id="promo-reset-title" style="color:var(--danger);">⚠ Reset Promotion Job</span>
              <span class="modal-close" onclick="window.__promoCloseModal()">✕</span>
            </div>
            <p class="text-sm mb-3">
              This clears the checkpoint for EC ${_promoSafe(_promoEcYear)}'s promotion job so the
              next run re-walks every class from scratch. It does <strong>not</strong>
              undo any student records already promoted. Only do this to retry
              a job that finished in a bad state.
            </p>
            <p class="text-sm mb-2" style="font-weight:600;">Type RESET to proceed.</p>
            <input id="promo-reset-input" class="input promo-confirm-input" type="text"
              placeholder="RESET" autocomplete="off" oninput="window.__promoValidateResetInput()" />
            <div id="promo-reset-error" class="input-error mt-2"></div>
            <div class="um-form-actions mt-3">
              <button id="promo-reset-submit-btn" class="btn btn-danger" disabled onclick="window.__promoConfirmReset()">
                🗑 Reset Job
              </button>
              <button class="btn btn-ghost" onclick="window.__promoCloseModal()">Cancel</button>
            </div>
          </div>
        </div>`;

      document.getElementById('promo-reset-backdrop')?.addEventListener('click', (e) => {
        if (e.target.id === 'promo-reset-backdrop') window.__promoCloseModal();
      });
      document.getElementById('promo-reset-input')?.focus();
    };

    window.__promoValidateResetInput = function __promoValidateResetInput() {
      const input = document.getElementById('promo-reset-input');
      const btn   = document.getElementById('promo-reset-submit-btn');
      if (!input || !btn) return;
      btn.disabled = input.value.trim() !== 'RESET';
    };

    window.__promoConfirmReset = async function __promoConfirmReset() {
      const input    = document.getElementById('promo-reset-input');
      const errorEl  = document.getElementById('promo-reset-error');
      const submitBtn = document.getElementById('promo-reset-submit-btn');
      if (!input || input.value.trim() !== 'RESET') return;
      if (errorEl) errorEl.textContent = '';
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '⏳ Resetting…'; }

      try {
        await dal.resetPromotionJob(_promoEcYear);
        _promoJob = await dal.getPromotionJob(_promoEcYear);
        _promoLog = [];
        window.__promoCloseModal();
        showToast(`Promotion job for EC ${_promoEcYear} has been reset.`, 'success');
        _promoRender();
      } catch (err) {
        if (errorEl) errorEl.textContent = err.message;
        showToast('Reset failed: ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '🗑 Reset Job'; }
      }
    };

    // ── END ADMIN PROMOTION RUNNER VIEW ──────────────────────────────────────

    // ── Admin Settings View ───────────────────────────────────────────────
    //   #/admin/schools and #/admin/settings (both routes point here) —
    //   hosts the editable school-wide configuration form (school name,
    //   academic year/semester, semester start dates, tuition per grade,
    //   grade levels, sections) backed by dal.updateSchoolConfig(), plus
    //   the Firestore security-rules export button and deployment
    //   checklist that originally lived here alone (Step 16).
    //
    //   The form is pre-filled from store.config on every render; saving
    //   re-reads the DOM (not a cached snapshot) so edits made after the
    //   last render are never lost.
    function adminSettingsView() {
      const cfg = store.config ?? {};
      const todayEc = EC.todayEc();

      const schoolName    = cfg.schoolName ?? '';
      const currentEcYear = cfg.currentEcYear ?? String(todayEc.year);
      const currentSemester = Number(cfg.currentSemester ?? 1);
      const gradeLevels   = (cfg.gradeLevels && cfg.gradeLevels.length) ? cfg.gradeLevels : GRADE_LEVELS;
      const sections      = cfg.sections ?? [];
      const tuitionPerYear = cfg.tuitionPerYear ?? {};
      const semesterDatesEc = cfg.semesterDatesEc ?? {};

      // semesterDatesEc[n] is stored as [ecYear, ecMonth, ecDay]; render
      // each as a single 'YYYY-MM-DD' text value for one date input per
      // semester (same EC-date-as-text convention as ex-date-ec elsewhere
      // in this app — Ethiopian dates can't use <input type="date">,
      // which is Gregorian-only).
      const semDateInput = (semNum) => {
        const triple = semesterDatesEc[semNum] ?? semesterDatesEc[String(semNum)];
        const val = Array.isArray(triple)
          ? `${triple[0]}-${String(triple[1]).padStart(2,'0')}-${String(triple[2]).padStart(2,'0')}`
          : '';
        return `
          <div class="input-group" style="margin:0;">
            <label class="label" for="set-sem-date-${semNum}">${t('semesterNum')} ${semNum}</label>
            <input id="set-sem-date-${semNum}" class="input" type="text"
              value="${_setEsc(val)}"
              placeholder="${todayEc.year}-01-01" maxlength="10" />
          </div>`;
      };

      const tuitionRows = gradeLevels.map(g => `
        <tr>
          <td>${t('grade')} ${_setSafe(g)}</td>
          <td>
            <input
              class="input set-tuition-input"
              data-grade="${_setEsc(g)}"
              type="number" min="0" step="1"
              value="${Number(tuitionPerYear[g] ?? 0)}" />
          </td>
        </tr>`).join('');

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">🏫 ${t('schoolSettings')}</h1>
            <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
          </div>
        </div>

        <!-- ── School Configuration Form ── -->
        <div class="card card-lg card-primary mb-5" id="set-form-card">
          <div class="card-header">
            <span class="card-title">⚙️ ${t('schoolSettings')}</span>
          </div>

          <div class="grid-2" style="gap:var(--sp-3);margin-block-end:var(--sp-4);">
            <div class="input-group" style="margin:0;">
              <label class="label" for="set-school-name">${t('schoolName')}</label>
              <input id="set-school-name" class="input" type="text"
                value="${_setEsc(schoolName)}" placeholder="e.g. Bole Preparatory School" />
            </div>
            <div class="input-group" style="margin:0;">
              <label class="label" for="set-ec-year">${t('currentEcYearLabel')}</label>
              <input id="set-ec-year" class="input" type="text"
                value="${_setEsc(currentEcYear)}" placeholder="e.g. 2017" maxlength="4" />
            </div>
          </div>

          <div class="input-group">
            <label class="label" for="set-semester">${t('currentSemesterLabel')}</label>
            <select id="set-semester" class="input">
              <option value="1" ${currentSemester === 1 ? 'selected' : ''}>1</option>
              <option value="2" ${currentSemester === 2 ? 'selected' : ''}>2</option>
              <option value="3" ${currentSemester === 3 ? 'selected' : ''}>3</option>
              <option value="4" ${currentSemester === 4 ? 'selected' : ''}>4</option>
            </select>

    // _setSafe(str) / _setEsc(str) — same escaping convention as the other
    // admin views.
    function _setSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function _setEsc(str) {
      return String(str ?? '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }

    // _parseSemDateInput(value)
    //   Parses a 'YYYY-MM-DD' EC date string from one of the semester-date
    //   inputs into the [ecYear, ecMonth, ecDay] triple that
    //   dal.subscribeAnnouncements() (and the canonical config shape)
    //   expects. Returns null for a blank/malformed input so the caller
    //   can skip writing that semester rather than writing garbage.
    function _parseSemDateInput(value) {
      const v = String(value ?? '').trim();
      const m = v.match(/^(\d{3,4})-(\d{1,2})-(\d{1,2})$/);
      if (!m) return null;
      return [Number(m[1]), Number(m[2]), Number(m[3])];
    }

    // window.__saveSchoolSettings — "Save Settings" button handler. Reads
    // every field in #set-form-card, validates the basics client-side, and
    // calls dal.updateSchoolConfig() with the full set of editable fields
    // (a partial update via updateDoc — see dal.updateSchoolConfig docs —
    // so any other config fields not edited here, if ever added, are left
    // untouched).
    window.__saveSchoolSettings = async function __saveSchoolSettings() {
      const btn     = document.getElementById('set-save-btn');
      const errorEl = document.getElementById('set-form-error');
      if (!btn) return;

      const ecYear = document.getElementById('set-ec-year')?.value.trim() ?? '';
      if (!/^\d{3,4}$/.test(ecYear)) {
        if (errorEl) errorEl.textContent = 'Current Academic Year (EC) must be a 3–4 digit number.';
        return;
      }

      const gradeLevelsRaw = document.getElementById('set-grade-levels')?.value ?? '';
      const gradeLevels = gradeLevelsRaw.split(',').map(s => s.trim()).filter(Boolean);
      if (gradeLevels.length === 0) {
        if (errorEl) errorEl.textContent = 'At least one grade level is required.';
        return;
      }

      const sectionsRaw = document.getElementById('set-sections')?.value ?? '';
      const sections = sectionsRaw.split(',').map(s => s.trim()).filter(Boolean);

      btn.disabled    = true;
      btn.textContent = '⏳ Saving…';
      if (errorEl) errorEl.textContent = '';

      try {
        // Semester dates — only write entries that parsed successfully;
        // skip (rather than null out) any left blank.
        const semesterDatesEc = { ...(store.config?.semesterDatesEc ?? {}) };
        for (let s = 1; s <= 4; s++) {
          const raw = document.getElementById(`set-sem-date-${s}`)?.value ?? '';
          const parsed = _parseSemDateInput(raw);
          if (parsed) semesterDatesEc[s] = parsed;
        }

        // Tuition per grade — one number input per grade level row.
        const tuitionPerYear = { ...(store.config?.tuitionPerYear ?? {}) };
        document.querySelectorAll('.set-tuition-input').forEach(input => {
          const grade = input.dataset.grade;
          const amount = Number(input.value);
          if (grade) tuitionPerYear[grade] = Number.isFinite(amount) ? amount : 0;
        });

        const updates = {
          schoolName:      document.getElementById('set-school-name')?.value.trim() ?? '',
          currentEcYear:   ecYear,
          currentSemester: Number(document.getElementById('set-semester')?.value) || 1,
          semesterDatesEc,
          tuitionPerYear,
          gradeLevels,
          sections,
        };

        await dal.updateSchoolConfig(updates);
        await dal.getSchoolConfig(); // refresh store.config so the form reflects the saved state
        showToast(t('settingsSaved'), 'success');

      } catch (err) {
        if (errorEl) errorEl.textContent = err.message;
        showToast(err.message, 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = '💾 ' + t('saveSettings');
      }
    };

    // __exportSecurityRules()
    //   Click handler for the "Export Security Rules" button above. Builds
    //   the rules text via dal.exportSecurityRules(), wraps it in a Blob
    //   (text/plain), and opens it in a new browser tab via a Blob URL —
    //   no server round-trip needed. The URL is revoked shortly after
    //   opening since the new tab has already loaded the content into
    //   memory by then; revoking earlier (synchronously) can race the
    //   new tab's load on some mobile browsers.
    window.__exportSecurityRules = function __exportSecurityRules() {
      try {
        const rulesText = dal.exportSecurityRules();
        const blob      = new Blob([rulesText], { type: 'text/plain' });
        const url       = URL.createObjectURL(blob);
        window.open(url, '_blank');
        setTimeout(() => URL.revokeObjectURL(url), 30000);
      } catch (err) {
        showToast(err.message, 'error');
      }
    };

    // window.__refreshPerfMetrics()
    //   Populates the Performance table in adminSettingsView with live numbers.
    //   Called on mount by the setTimeout below, and again on button click.
    window.__refreshPerfMetrics = function __refreshPerfMetrics() {
      const tbody = document.getElementById('perf-metrics-body');
      if (!tbody) return;

      const m = measureFileSize(); // always re-measure for freshness
      if (!m) {
        tbody.innerHTML = '<tr><td colspan="2" style="color:var(--danger)">Measurement failed.</td></tr>';
        return;
      }

      const deferred = Object.keys(window.views || {}).length;
      const rows = [
        ['Total file size (HTML)', `${m.htmlKB} KB`],
        ['Script block size',      `${m.scriptKB} KB`],
        ['Tier 1 views (eager)',   `${m.tier1Count} views`],
        ['Tier 2 views (deferred)',`${deferred || m.tier2Count} views`],
        ['Est. 3G parse time',     `${m.parseTime3G} s  (at 50 KB/s)`],
        ['Deferred ready',         deferred > 0 ? '✅ Yes' : '⏳ Pending idle callback'],
      ];
      tbody.innerHTML = rows.map(([label, value]) =>
        `<tr><td>${label}</td><td><strong>${value}</strong></td></tr>`
      ).join('');
    };

    // Auto-populate the perf table when the settings page is visited.
    // This fires after the view is mounted to #main via innerHTML.
    (function _initPerfSection() {
      // Defer until the DOM is painted.
      setTimeout(() => {
        if (document.getElementById('perf-metrics-body')) {
          window.__refreshPerfMetrics();
        }
      }, 0);
      // Also re-populate when the user navigates back to settings.
      window.addEventListener('hashchange', () => {
        if (window.location.hash === '#/admin/settings' || window.location.hash === '#/admin/schools') {
          setTimeout(() => {
            if (document.getElementById('perf-metrics-body')) window.__refreshPerfMetrics();
          }, 50);
        }
      });
    })();

    // ── Security Rules Test Suite View ──────────────────────────────────────
    //   #/admin/rules-test — admin-only (see route registration below).
    //   Runs dal.runRulesTests() against the live, deployed Firestore rules
    //   and renders the results in a table. Results are cached in
    //   store._rulesTestResults / store._rulesTestState so the view can
    //   show a loading state on first mount and "Re-run Tests" afterwards
    //   without losing the last results while a re-run is in flight.
    //
    //   pass: true      → ✅ row-success
    //   pass: false     → ❌ row-danger
    //   pass: 'warning' → ⚠️ row-warning (limitation of single-session
    //                      testing, documented inline — never silently
    //                      reported as a pass)
    function _rulesTestIcon(pass) {
      if (pass === true)  return '✅';
      if (pass === false) return '❌';
      return '⚠️';
    }
    function _rulesTestRowClass(pass) {
      if (pass === true)  return 'row-success';
      if (pass === false) return 'row-danger';
      return 'row-warning';
    }

    function adminRulesTestView() {
      const state   = store._rulesTestState ?? 'idle'; // 'idle' | 'running' | 'done'
      const results = store._rulesTestResults ?? [];

      // Auto-run once on first visit to this view, same one-shot pattern
      // used by teacherExamScheduleView()'s store._examSubActive guard —
      // avoids re-triggering on every render() call (e.g. store mutations
      // from the test run itself).
      if (state === 'idle' && !store._rulesTestAutoRan) {
        store._rulesTestAutoRan = true;
        // Deferred so the loading state below has a chance to paint first.
        setTimeout(() => { window.__runRulesTests && window.__runRulesTests(); }, 0);
      }

      const summary = (() => {
        if (state !== 'done' || results.length === 0) return '';
        const passCount = results.filter(r => r.pass === true).length;
        const failCount = results.filter(r => r.pass === false).length;
        const warnCount = results.filter(r => r.pass === 'warning').length;
        return `
          <div class="row" style="gap:var(--sp-2);flex-wrap:wrap;margin-block-end:var(--sp-4);">
            <span class="badge badge-success">✅ ${passCount} passed</span>
            ${failCount > 0 ? `<span class="badge badge-danger">❌ ${failCount} failed</span>` : ''}
            <span class="badge badge-warning">⚠️ ${warnCount} need emulator</span>
          </div>`;
      })();

      const tableRows = results.map(r => `
        <tr class="${_rulesTestRowClass(r.pass)}">
          <td>${_rulesTestIcon(r.pass)}</td>
          <td><strong>${r.name}</strong></td>
          <td>${r.expected}</td>
          <td>${r.actual}</td>
        </tr>`).join('');

      const body = state === 'running'
        ? Spinner('Running live Firestore probes…')
        : results.length === 0
          ? `
            <div class="empty-state">
              <div class="empty-icon">🧪</div>
              <p>No results yet — run the suite to verify your deployed rules.</p>
            </div>`
          : `
            ${summary}
            <div style="overflow-x:auto;">
              <table class="table">
                <thead>
                  <tr>
                    <th></th>
                    <th>Test</th>
                    <th>Expected</th>
                    <th>Actual</th>
                  </tr>
                </thead>
                <tbody>${tableRows}</tbody>
              </table>
            </div>`;

      return `
        <div class="page-header">
          <div>
            <h1 class="page-title">🧪 Security Rules Test Suite</h1>
            <p class="page-subtitle">${EC.formatEcAm(new Date())}</p>
          </div>
        </div>

        <div class="card card-lg card-warning mb-5">
          <p class="text-muted mb-4">
            Runs live probes against the <strong>currently deployed</strong>
            Firestore rules using this admin session. Tests marked ⚠️ confirm
            what an admin session can/cannot do, but cannot simulate a
            teacher, parent, or student session — that requires the
            Firebase Local Emulator Suite. See the deployment checklist on
            the Settings page (Step 40).
          </p>
          <button
            id="rules-test-rerun-btn"
            class="btn btn-primary"
            ${state === 'running' ? 'disabled' : ''}
            onclick="window.__runRulesTests && window.__runRulesTests()">
            ${state === 'running' ? '⏳ Running…' : '🔁 Re-run Tests'}
          </button>
        </div>

        <div class="card card-lg">
          ${body}
        </div>`;
    }

    // window.__runRulesTests()
    //   Click handler for the "Re-run Tests" button. Sets store state to
    //   'running' (re-renders with the button disabled + spinner), awaits
    //   dal.runRulesTests(), then commits the results and re-renders.
    window.__runRulesTests = async function __runRulesTests() {
      store._rulesTestState = 'running';
      try {
        const results = await dal.runRulesTests();
        store._rulesTestResults = results;
      } catch (err) {
        showToast('Rules test suite failed to run: ' + err.message, 'error');
        store._rulesTestResults = [{
          name:     'Test suite execution',
          expected: 'All probes run to completion',
          actual:   `Suite threw before completing: ${err.message}`,
          pass:     false,
        }];
      } finally {
        store._rulesTestState = 'done';
      }
    };

    function _checklistLoad() {

        const raw = localStorage.getItem(CHECKLIST_STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};

        return {};

    }

    function _checklistSave(stateObj) {
      try {
        localStorage.setItem(CHECKLIST_STORAGE_KEY, JSON.stringify(stateObj));
      } catch (err) {
        console.warn('[SchoolOS] Failed to save checklist to localStorage:', err.message);

    // window.__toggleChecklistItem(id)
    //   Click handler for each checkbox. Reads current state fresh from
    //   localStorage on every toggle (rather than caching in `store`) so
    //   this view has no render-loop dependency on the Proxy store —
    //   it patches its own DOM directly and re-saves.
    window.__toggleChecklistItem = function __toggleChecklistItem(id) {
      const state = _checklistLoad();
      state[id] = !state[id];
      _checklistSave(state);

    // ══════════════════════════════════════════════════════════════════════════
    // TEACHER ATTENDANCE VIEW  (#/teacher/attendance/:classKey)
    // ── requireRole (guardRoute): 'teacher', 'homeroom_teacher'
    //
    // Renders the attendance grid for a specific class.  Full lifecycle:
    //
    //  1. Role guard: validate store.userDoc.homeroomOf.includes(classKey).
    //     Renders a 403 error card and returns early if check fails.
    //
    //  2. Mount (async _taAttMount):
    //     a. dal.getClass(classKey) → extract studentIds roster.
    //     b. Batch-fetch student names from /students in chunks of 10
    //        (Firestore `in` limit), cache in _taAttStudentCache keyed by id.
    //     c. Compute todayDateKey from EC.todayEc() → "YYYY-MM-DD".
    //     d. dal.getAttendance(classKey, todayDateKey) → existing doc or null.
    //     e. Render: read-only if already marked, or editable grid.
    //
    //  3. UI state (module-level variables, reset on each mount):
    //     _taAttClassKey  — current classKey
    //     _taAttDateKey   — currently viewed date key
    //     _taAttStatuses  — { [studentId]: 'present'|'absent'|'late' }
    //     _taAttStudentCache — { [studentId]: { displayName, … } }
    //     _taAttReadOnly  — boolean; true after submit or when viewing history
    //     _taAttStudentIds — ordered array of studentIds for this class
    //
    //  4. Submit: calls dal.markAttendance(), shows success toast, flips to
    //     read-only mode.
    //
    //  5. Date picker: EC date displayed; selecting a past date loads that
    //     day's existing data (read-only).  Selecting today re-checks if
    //     attendance was already taken.
    // ══════════════════════════════════════════════════════════════════════════

    // ── Module-level state (reset on each mount) ──────────────────────────
    let _taAttClassKey     = '';
    let _taAttDateKey      = '';
    let _taAttStatuses     = {}; // { [studentId]: 'present'|'absent'|'late' }
    let _taAttStudentCache = {}; // { [studentId]: studentDoc }
    let _taAttReadOnly     = false;
    let _taAttStudentIds   = []; // ordered roster for this class
    let _taAttTodayKey     = ''; // today's EC date key, computed once per mount

    // ── Helpers ───────────────────────────────────────────────────────────
    function _taAttSafe(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function _taAttDateKey_(ecObj) {
      const { year, month, day } = ecObj;
      return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }

    // EC date key → display string, e.g. "2017-02-05" → "Tikimt 5, 2017"
    function _taAttFormatKey(dateKey) {
      if (!dateKey) return '—';
      const [y, m, d] = dateKey.split('-').map(Number);
      if (!y || !m || !d) return dateKey;
      const name = store.lang === 'am'
        ? (EC.ecMonthsAm[m - 1] ?? '')
        : (EC.ecMonths[m - 1]   ?? '');
      return `${name} ${d}, ${y}`;
    }

    // Returns initials (≤ 2 chars) from a display name.
    function _taAttInitials(name) {
      return String(name ?? '?')
        .split(' ')
        .filter(Boolean)
        .map(w => w[0])
        .slice(0, 2)
        .join('')
        .toUpperCase() || '?';
    }

    // Recompute tally and update the sticky header counters.
    function _taAttUpdateTally() {
      const counts = { present: 0, absent: 0, late: 0 };
      _taAttStudentIds.forEach(id => {
        const s = _taAttStatuses[id] ?? 'present';
        counts[s] = (counts[s] ?? 0) + 1;
      });
      const total   = _taAttStudentIds.length;
      const totalEl = document.getElementById('att-tally-total');
      const presEl  = document.getElementById('att-tally-present');
      const absEl   = document.getElementById('att-tally-absent');
      const lateEl  = document.getElementById('att-tally-late');
      if (totalEl)  totalEl.textContent  = `${fmtNum(total)} student${total !== 1 ? 's' : ''}`;
      if (presEl)   presEl.textContent   = fmtNum(counts.present);
      if (absEl)    absEl.textContent    = fmtNum(counts.absent);
      if (lateEl)   lateEl.textContent   = fmtNum(counts.late);
    }

    // Toggle a student's status; cycles present → absent → late → present.
    window.__taAttToggle = function __taAttToggle(studentId, requestedStatus) {
      if (_taAttReadOnly) return;
      _taAttStatuses[studentId] = requestedStatus;

      // Update button styles for this student's toggle row.
      ['present', 'absent', 'late'].forEach(s => {
        const btn = document.getElementById(`att-btn-${s}-${CSS.escape(studentId)}`);
        if (!btn) return;
        btn.classList.toggle('is-active', s === requestedStatus);
      });

      _taAttUpdateTally();
    };

    // Submit attendance for the current date.
    window.__taAttSubmit = async function __taAttSubmit() {
      const btn = document.getElementById('att-submit-btn');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Saving…'; }

      try {
        await dal.markAttendance(
          _taAttClassKey,
          _taAttDateKey,
          _taAttStatuses,
          _taAttStudentIds,
        );
        showToast('✅ Attendance marked successfully!', 'success');
        _taAttReadOnly = true;
        _taAttRenderBody();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '✅ Submit Attendance'; }
      }
    };

    // Re-enable editing (Edit button in read-only mode).
    window.__taAttEdit = function __taAttEdit() {
      _taAttReadOnly = false;
      _taAttRenderBody();
    };

    // Load a different date from the EC date picker.
    window.__taAttLoadDate = async function __taAttLoadDate() {
      const input = document.getElementById('att-date-input');
      if (!input || !input.value) return;
      const dateKey = input.value; // already "YYYY-MM-DD" EC
      if (dateKey === _taAttDateKey) return;

      _taAttDateKey = dateKey;
      const isToday = dateKey === _taAttTodayKey;

      const bodyEl = document.getElementById('att-body');
      if (bodyEl) bodyEl.innerHTML = `<div class="empty-state"><p>${t('loading')}</p></div>`;

      try {
        const existing = await dal.getAttendance(_taAttClassKey, dateKey);
        if (existing) {
          _taAttStatuses  = { ...(existing.statuses ?? {}) };
          _taAttReadOnly  = true; // history is always read-only initially
        } else {
          // No record for this date: reset to all-present, editable only if today
          _taAttStudentIds.forEach(id => { _taAttStatuses[id] = 'present'; });
          _taAttReadOnly = !isToday;
        }
        _taAttUpdateHeaderDate();
        _taAttRenderBody();
      } catch (err) {
        const bodyEl2 = document.getElementById('att-body');
        if (bodyEl2) bodyEl2.innerHTML = `<div class="empty-state"><p class="text-danger">Error: ${_taAttSafe(err.message)}</p></div>`;
      }

    // Update the date display line in the sticky header.
    function _taAttUpdateHeaderDate() {
      const dateEl = document.getElementById('att-header-date');
      if (dateEl) {
        const isToday = _taAttDateKey === _taAttTodayKey;
        dateEl.textContent = _taAttFormatKey(_taAttDateKey) + (isToday ? ' — Today' : '');

    // (Re)render only the att-body region inside #att-body.
    function _taAttRenderBody() {
      const bodyEl = document.getElementById('att-body');
      if (!bodyEl) return;

      const isToday = _taAttDateKey === _taAttTodayKey;

      if (_taAttStudentIds.length === 0) {
        bodyEl.innerHTML = `

      if (_taAttReadOnly) {

          const student = _taAttStudentCache[id];

          const status  = _taAttStatuses[id] ?? 'absent';
          return `
            <div class="att-student-row">
              <div class="att-student-initials">${initials}</div>

            </div>`;
        }).join('');

        bodyEl.innerHTML = `
          <div class="card" style="padding:0;">
            <div class="card-header" style="padding:var(--sp-3) var(--sp-4);">
              <span class="card-title">Attendance Record</span>
              ${isToday ? `<button class="btn btn-ghost btn-sm" onclick="window.__taAttEdit()">✏️ Edit</button>` : ''}
            </div>
            <div style="padding:0 var(--sp-4);">${rows}</div>
          </div>`;
      } else {
        // ── Editable grid ───────────────────────────────────────────────
        const rows = _taAttStudentIds.map(id => {
          const student  = _taAttStudentCache[id];
          const name     = _taAttSafe(student?.displayName ?? id);
          const initials = _taAttInitials(student?.displayName ?? id);
          const status   = _taAttStatuses[id] ?? 'present';

          // Escape id for use in DOM ids (CSS.escape not available in old envs,
          // so we strip non-alphanumeric chars for the id suffix; the raw id
          // is stored in data-student-id to avoid any loss).
          const safeId = id.replace(/[^a-zA-Z0-9_-]/g, '_');

          return `
            <div class="att-student-row">

                <button
                  id="att-btn-present-${safeId}"

                  onclick="window.__taAttToggle('${id.replace(/'/g,"\\'")}','present')"
                  title="Present"
                >✓</button>
                <button
                  id="att-btn-absent-${safeId}"
                  class="att-toggle-btn is-absent ${status === 'absent' ? 'is-active' : ''}"
                  onclick="window.__taAttToggle('${id.replace(/'/g,"\\'")}','absent')"
                  title="Absent"
                >✗</button>
                <button
                  id="att-btn-late-${safeId}"
                  class="att-toggle-btn is-late ${status === 'late' ? 'is-active' : ''}"
                  onclick="window.__taAttToggle('${id.replace(/'/g,"\\'")}','late')"
                  title="Late"
                >⏱</button>
              </div>
            </div>`;
        }).join('');

        bodyEl.innerHTML = `
          <div class="card" style="padding:0;">
            <div class="card-header" style="padding:var(--sp-3) var(--sp-4);">
              <span class="card-title">Mark Attendance</span>
              <span class="badge badge-primary">${_taAttStudentIds.length} student${_taAttStudentIds.length !== 1 ? 's' : ''}</span>
            </div>
            <div style="padding:0 var(--sp-4);">${rows}</div>
          </div>
          <div class="mt-4">
            <button
              id="att-submit-btn"
              class="btn btn-success btn-block btn-lg"
              onclick="window.__taAttSubmit()"
            >✅ Submit Attendance</button>
          </div>`;
      }

      _taAttUpdateTally();
    }

    // ── Main view factory (sync; triggers async mount) ────────────────────
    function teacherAttendanceView(params) {

            </span>

            </span>

          </div>

                type="text"

                class="btn btn-ghost btn-sm"
                onclick="document.getElementById('att-date-input').value='${_taAttTodayKey}';window.__taAttLoadDate()"
              >Today</button>
            </div>
            <p class="text-xs text-muted mt-2">Enter an Ethiopian calendar date (EC year-month-day) to view historical records.</p>
          </div>

          <!-- Attendance body: filled async by _taAttMount -->
          <div id="att-body">
            <div class="empty-state"><p>${t('loading')}</p></div>
          </div>

      // Kick off async mount after the DOM settles.
      setTimeout(() => _taAttMount(classKey), 0);
