      justify-content: center;
      border-radius: 50%;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.12s;
    }
    .modal-close:hover { background: var(--surface2); }

    /* Screen-reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* Login screen */
    .login-screen {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-4);
      background: linear-gradient(160deg, var(--primary) 0%, #0d2640 55%, #1a1a2e 100%);
    }

    .login-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--sp-5) var(--sp-5);
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }

    .login-logo {
      text-align: center;
      margin-block-end: var(--sp-5);
    }
    .login-logo-mark {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 auto var(--sp-3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary);
    }
    .login-app-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 1px;
    }
    .login-tagline {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-block-start: 4px;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }


    /* ════════════════════════════════════════════════════════════════════
       DESKTOP BREAKPOINT  ≥ 768px
       - Sidebar becomes visible and static
       - Bottom nav hides
       - Main content offsets left
       - Nav role badge appears
       - Grid cols expand
    ════════════════════════════════════════════════════════════════════ */
    @media (min-width: 768px) {

      /* Show sidebar, hide overlay mechanism */
      #sidebar {
        transform: translateX(0);
        box-shadow: none;
      }
      #sidebar-overlay { display: none !important; }

      /* Main shifts right past sidebar */
      #main {
        margin-inline-start: var(--sidebar-w);
        margin-block-end: 0; /* no bottom nav on desktop */
        padding: var(--sp-5);
      }

      /* Hide bottom nav entirely */
      .bottom-nav { display: none; }

      /* Show role badge in nav */
      #nav-role { display: inline-flex; }

      /* Page title larger */
      .page-title { font-size: 1.5rem; }

      /* Grids expand */
      .grid-2 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(3, 1fr); }
      .grid-4 { grid-template-columns: repeat(4, 1fr); }

      /* Toast anchors above page bottom, not above bottom nav */
      #toasts { inset-block-end: var(--sp-4); }

      /* Attendance grid — up to 8 per row on wider screens */
      .att-grid {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      }
    }

    @media (min-width: 1024px) {
      #main { padding: var(--sp-5) var(--sp-6); }
    }

    /* ════════════════════════════════════════════════════════════════════
       ADMIN USER MANAGEMENT — #/admin/users
    ════════════════════════════════════════════════════════════════════ */

    /* ── Toolbar (search + filter + add button) ─────────────────────── */
    .um-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-3);
      align-items: center;
      margin-block-end: var(--sp-4);
    }
    .um-toolbar .search-bar { flex: 1 1 200px; }
    .um-role-filter {
      flex: 0 1 160px;
      min-width: 140px;
    }

    /* ── User table ─────────────────────────────────────────────────── */
    .um-table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .um-table {
      width: 100%;
      font-size: 0.85rem;
      min-width: 640px;
    }
    .um-table th {
      padding: 10px var(--sp-3);
      background: var(--surface2);
      text-align: start;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-block-end: 1px solid var(--border);
      white-space: nowrap;
    }
    .um-table td {
      padding: 10px var(--sp-3);
      border-block-end: 1px solid var(--border);
      vertical-align: middle;
      color: var(--text);
    }
    .um-table tr:last-child td { border-block-end: none; }
    .um-table tbody tr { transition: background 0.1s; }
    .um-table tbody tr:hover { background: var(--primary-xlight); }
    .um-table .um-actions { white-space: nowrap; }
    .um-table .um-actions .btn { margin-inline-end: var(--sp-1); }
    .um-name-line { font-weight: 600; color: var(--primary); }
    .um-name-am   { font-size: 0.78rem; color: var(--text-muted); }
    .um-email     { font-size: 0.8rem; color: var(--text-muted); }

    /* status dot */
    .um-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .um-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .um-status.active   .um-status-dot { background: var(--success); }
    .um-status.inactive .um-status-dot { background: var(--text-muted); }
    .um-status.active   { color: var(--success); }
    .um-status.inactive { color: var(--text-muted); }

    /* ── Inline form panel ──────────────────────────────────────────── */
    .um-form-panel {
      background: var(--surface);
      border: 1.5px solid var(--primary-light);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      margin-block-end: var(--sp-4);
      box-shadow: 0 4px 20px rgba(26,60,94,0.12);
    }
    .um-form-panel .um-form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-block-end: var(--sp-4);
      gap: var(--sp-3);
    }
    .um-form-panel .um-form-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .um-form-grid {
      display: grid;
      gap: var(--sp-3);
      grid-template-columns: 1fr;
    }
    @media (min-width: 600px) {
      .um-form-grid { grid-template-columns: 1fr 1fr; }
    }
    .um-form-grid .span-2 { grid-column: 1 / -1; }
    .um-form-notice {
      background: var(--warning-light);
      border: 1px solid rgba(243,156,18,0.4);
      border-radius: var(--radius);
      padding: var(--sp-3) var(--sp-4);
      font-size: 0.82rem;
      color: #7a4f00;
      margin-block-end: var(--sp-4);
      line-height: 1.5;
    }
    .um-form-notice strong { color: #5a3800; }
    .um-form-actions {
      display: flex;
      gap: var(--sp-2);
      flex-wrap: wrap;
      margin-block-start: var(--sp-4);
    }

    /* ── Spark limitation modal ─────────────────────────────────────── */
    .um-spark-modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      width: min(540px, 100%);
      max-height: 90svh;
      overflow-y: auto;
      animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .um-spark-modal-icon { font-size: 2.2rem; text-align: center; margin-block-end: var(--sp-3); }
    .um-spark-modal h2   { font-size: 1.05rem; font-weight: 800; color: var(--primary); margin-block-end: var(--sp-3); }
    .um-spark-modal p    { font-size: 0.875rem; color: var(--text); margin-block-end: var(--sp-3); line-height: 1.55; }
    .um-spark-modal ol   { padding-inline-start: 1.4em; margin-block-end: var(--sp-4); font-size: 0.875rem; line-height: 1.65; color: var(--text); }
    .um-spark-modal code {
      background: var(--primary-xlight);
      color: var(--primary);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.82em;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .um-invite-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-3) var(--sp-4);
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.8rem;
      word-break: break-all;
      color: var(--text-muted);
      margin-block-end: var(--sp-3);
    }

    /* ── Deactivate confirmation modal ──────────────────────────────── */
    .um-confirm-modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      width: min(400px, 100%);
      animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .um-confirm-modal h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--danger);
      margin-block-end: var(--sp-3);
    }
    .um-confirm-modal p {
      font-size: 0.875rem;
      color: var(--text);
      margin-block-end: var(--sp-4);
      line-height: 1.5;
    }
    .um-confirm-actions { display: flex; gap: var(--sp-2); flex-wrap: wrap; }

    /* ── Empty / loading states ─────────────────────────────────────── */
    .um-loading {
      text-align: center;
      padding: var(--sp-6) var(--sp-4);
      color: var(--text-muted);
    }
    .um-empty {
      text-align: center;
      padding: var(--sp-6) var(--sp-4);
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .um-count-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 700;
      background: var(--primary-xlight);
      color: var(--primary);
      margin-inline-start: var(--sp-2);
    }

    /* ══════════════════════════════════════════════════════════════════
       TEACHER ASSIGNMENT MATRIX  (#/admin/teachers/:uid)
    ══════════════════════════════════════════════════════════════════ */

    /* Scrollable wrapper for the checkbox grid */
    .ta-matrix-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-block-end: var(--sp-4);
    }

    .ta-matrix {
      width: 100%;
      font-size: 0.8rem;
      border-collapse: collapse;
    }

    /* Sticky first column — class name */
    .ta-matrix th.ta-class-col,
    .ta-matrix td.ta-class-col {
      position: sticky;
      inset-inline-start: 0;
      background: var(--surface);
      z-index: 2;
      min-width: 110px;
      max-width: 140px;
      white-space: nowrap;
      font-weight: 700;
      color: var(--primary);
      border-inline-end: 2px solid var(--border);
      padding: 8px var(--sp-3);
    }

    .ta-matrix thead th {
      background: var(--surface2);
      padding: 8px var(--sp-2);
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-block-end: 1px solid var(--border);
      white-space: nowrap;
    }

    .ta-matrix thead th.ta-class-col {
      text-align: start;
      z-index: 3;
      background: var(--surface2);
    }

    /* Homeroom column sticky header */
    .ta-matrix th.ta-homeroom-col {
      background: var(--accent-light);
      color: var(--accent);
      border-inline-start: 2px solid rgba(200,169,110,0.4);
    }

    .ta-matrix td {
      padding: 6px var(--sp-2);
      text-align: center;
      border-block-end: 1px solid var(--border);
      vertical-align: middle;
    }

    .ta-matrix td.ta-homeroom-col {
      background: var(--accent-light);
      border-inline-start: 2px solid rgba(200,169,110,0.25);
    }

    .ta-matrix tbody tr:hover td { background: var(--primary-xlight); }
    .ta-matrix tbody tr:hover td.ta-homeroom-col { background: rgba(200,169,110,0.22); }
    .ta-matrix tbody tr:hover td.ta-class-col { background: var(--primary-xlight); }
    .ta-matrix tbody tr:last-child td { border-block-end: none; }

    /* Checkboxes in matrix cells */
    .ta-matrix input[type="checkbox"],
    .ta-matrix input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .ta-matrix input[type="radio"] {
      accent-color: var(--accent);
    }

    /* Assignment preview box */
    .ta-preview {
      background: var(--primary-xlight);
      border: 1px solid rgba(26,60,94,0.15);
      border-radius: var(--radius);
      padding: var(--sp-3) var(--sp-4);
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--primary);
      min-height: 60px;
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Composite key pill styles for the validation preview panel */
    .ta-preview-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 40px;
      align-content: flex-start;
    }

    .ta-key-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-all;
      white-space: normal;
      cursor: default;
      transition: opacity 0.1s;
    }

    .ta-key-pill.valid {
      background: var(--success-light);
      color: #1a6b38;
      border: 1px solid rgba(39,174,96,0.35);
    }

    .ta-key-pill.invalid {
      background: var(--danger-light);
      color: #8b1a14;
      border: 1px solid rgba(192,57,43,0.35);
      text-decoration: line-through;
      opacity: 0.85;
    }

    .ta-key-pill.checking {
      background: var(--warning-light);
      color: #7a4f00;
      border: 1px solid rgba(243,156,18,0.35);
    }

    /* Validation preview panel header row */
    .ta-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-2);
      margin-block-end: var(--sp-2);
      flex-wrap: wrap;
    }

    .ta-preview-legend {
      display: flex;
      gap: var(--sp-3);
      font-size: 0.72rem;
      color: var(--text-muted);
      align-items: center;
      flex-wrap: wrap;
    }

    .ta-preview-legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .ta-legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .ta-legend-dot.valid   { background: var(--success); }
    .ta-legend-dot.invalid { background: var(--danger); }
    .ta-legend-dot.checking{ background: var(--warning); }

    /* Spinner inside preview while checking */
    .ta-preview-checking {
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-2) 0;
    }

    .ta-teacher-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-3) var(--sp-4);
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin-block-end: var(--sp-4);
    }

    .ta-teacher-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .ta-teacher-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--primary);
    }

    .ta-teacher-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }


    /* ══════════════════════════════════════════════════════════════════
       SUBJECTS / CURRICULUM VIEW  (#/admin/subjects)
    ══════════════════════════════════════════════════════════════════ */

    .subj-form-panel {
      background: var(--surface);
      border: 1.5px solid var(--primary-light);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      margin-block-end: var(--sp-4);
      box-shadow: 0 4px 20px rgba(26,60,94,0.1);
    }

    .subj-form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-block-end: var(--sp-4);
      gap: var(--sp-3);
    }

    .subj-form-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }

    .subj-form-grid {
      display: grid;
      gap: var(--sp-3);
      grid-template-columns: 1fr;
    }

    @media (min-width: 600px) {
      .subj-form-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (min-width: 900px) {
      .subj-form-grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    .subj-form-grid .span-2 { grid-column: 1 / -1; }

    .subj-active-toggle {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: 8px 0;
    }

    /* Active toggle pill */
    .subj-toggle-pill {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .subj-toggle-pill input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .subj-toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--border);
      border-radius: 100px;
      transition: background 0.2s;
    }

    .subj-toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      inset-block: 3px;
      inset-inline-start: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .subj-toggle-pill input:checked + .subj-toggle-slider {
      background: var(--success);
    }

    .subj-toggle-pill input:checked + .subj-toggle-slider::before {
      transform: translateX(18px);
    }

    /* Subject table */
    .subj-table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .subj-table {
      width: 100%;
      font-size: 0.85rem;
    }

    .subj-table th {
      padding: 10px var(--sp-3);
      background: var(--surface2);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-block-end: 1px solid var(--border);
      white-space: nowrap;
    }

    .subj-table td {
      padding: 10px var(--sp-3);
      border-block-end: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    .subj-table tr:last-child td { border-block-end: none; }
    .subj-table tbody tr:hover { background: var(--primary-xlight); }

    .subj-id-chip {
      display: inline-block;
      padding: 2px 8px;
      background: var(--primary-xlight);
      color: var(--primary);
      border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .subj-grade-range {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }


    /* ══════════════════════════════════════════════════════════════════
       CLASSES VIEW  (#/admin/classes)
    ══════════════════════════════════════════════════════════════════ */

    .cls-grid {
      display: grid;
      gap: var(--sp-3);
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      margin-block-end: var(--sp-4);
    }

    .cls-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .cls-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--primary-light);
    }

    .cls-card-key {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary);
    }

    .cls-card-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cls-homeroom-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      padding: 2px 8px;
      background: var(--accent-light);
      border-radius: 100px;
      border: 1px solid rgba(200,169,110,0.3);
      margin-block-start: var(--sp-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cls-form-panel {
      background: var(--surface);
      border: 1.5px solid var(--primary-light);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      margin-block-end: var(--sp-4);
      box-shadow: 0 4px 20px rgba(26,60,94,0.1);
    }

    .cls-key-preview {
      display: inline-block;
      padding: 4px 12px;
      background: var(--primary-xlight);
      border: 1px solid rgba(26,60,94,0.15);
      border-radius: var(--radius);
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.5px;
      min-width: 80px;
    }

    /* ── Promotion Runner (#/admin/promotion) ──────────────────────────── */
    .promo-status-card {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      flex-wrap: wrap;
    }
    .promo-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-full, 999px);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .promo-status-badge.not-started { background: var(--surface2); color: var(--text-muted); }
    .promo-status-badge.running     { background: var(--accent-light, rgba(230,162,60,0.15)); color: var(--accent, #b4790a); }
    .promo-status-badge.complete    { background: var(--success-light); color: var(--success); }

    .promo-progress-track {
      width: 100%;
      height: 10px;
      border-radius: var(--radius-full, 999px);
      background: var(--surface2);
      overflow: hidden;
      margin-block: var(--sp-2);
    }
    .promo-progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: var(--radius-full, 999px);
      transition: width 0.3s ease;
    }
    .promo-progress-fill.is-complete { background: var(--success); }

    .promo-log {
      width: 100%;
      max-height: 280px;
      overflow-y: auto;
      background: #0d1b2a;
      color: #d7e6f0;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      padding: var(--sp-3);
      border-radius: var(--radius);
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .promo-class-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 220px;
      overflow-y: auto;
      padding: var(--sp-2);
      background: var(--surface2);
      border-radius: var(--radius);
    }
    .promo-class-row {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: 0.85rem;
      padding: 3px 4px;
    }
    .promo-class-row .promo-check { color: var(--success); font-weight: 700; width: 16px; flex-shrink: 0; }
    .promo-class-row .promo-pending { color: var(--text-muted); width: 16px; flex-shrink: 0; }
    .promo-class-row.is-done span.promo-class-key { color: var(--text-muted); text-decoration: line-through; }

    .promo-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: var(--sp-3);
      margin-block: var(--sp-3);
    }
    .promo-summary-tile {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: var(--sp-3);
      text-align: center;
    }
    .promo-summary-tile .num { font-size: 1.6rem; font-weight: 800; color: var(--primary); display: block; }
    .promo-summary-tile.is-danger .num { color: var(--danger); }
    .promo-summary-tile .lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }

    .promo-confirm-input {
      width: 100%;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .promo-danger-zone {
      margin-block-start: var(--sp-5);
      padding-block-start: var(--sp-4);
      border-top: 1px dashed var(--danger);
    }

    /* ══════════════════════════════════════════════════════════════════
       REGISTRAR STUDENT REGISTRY  (#/registrar/students)
    ══════════════════════════════════════════════════════════════════ */

    /* ── Tab strip ──────────────────────────────────────────────────── */
    .reg-tabs {
      display: flex;
      gap: var(--sp-2);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-block-end: var(--sp-5);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .reg-tabs::-webkit-scrollbar { display: none; }

    .reg-tab {
      flex-shrink: 0;
      padding: 9px var(--sp-4);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      background: transparent;
      border: none;
      transition: background var(--t-fast) var(--ease-out), color var(--t-fast), box-shadow var(--t-fast);
      white-space: nowrap;
    }
    .reg-tab:hover {
      background: var(--surface);
      color: var(--text);
    }
    .reg-tab.active {
      background: var(--surface);
      color: var(--primary);
      font-weight: 700;
      box-shadow: var(--shadow-xs);
    }
    .reg-tab-panel { display: none; }
    .reg-tab-panel.active { display: block; }

    /* ── Student table ──────────────────────────────────────────────── */
    .reg-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-3);
      align-items: center;
      margin-block-end: var(--sp-4);
    }
    .reg-toolbar .search-bar { flex: 1 1 200px; }

    .reg-table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .reg-table {
      width: 100%;
      font-size: 0.85rem;
      min-width: 700px;
    }
    .reg-table th {
      padding: 10px var(--sp-3);
      background: var(--surface2);
      text-align: start;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-block-end: 1px solid var(--border);
      white-space: nowrap;
    }
    .reg-table td {
      padding: 10px var(--sp-3);
      border-block-end: 1px solid var(--border);
      vertical-align: middle;
      color: var(--text);
    }
    .reg-table tr:last-child td { border-block-end: none; }
    .reg-table tbody tr { cursor: pointer; transition: background 0.1s; }
    .reg-table tbody tr:hover { background: var(--primary-xlight); }
    .reg-table .reg-actions { white-space: nowrap; }
    .reg-table .reg-actions .btn { margin-inline-end: var(--sp-1); }

    /* Student photo placeholder */
    .reg-photo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary-xlight);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--primary);
      flex-shrink: 0;
      overflow: hidden;
    }
    .reg-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .reg-name-line  { font-weight: 600; color: var(--primary); }
    .reg-name-am    { font-size: 0.78rem; color: var(--text-muted); }
    .reg-id-chip {
      display: inline-block;
      padding: 1px 7px;
      background: var(--primary-xlight);
      color: var(--primary);
      border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Tuition color coding */
    .reg-tuition-owed  { color: var(--danger);  font-weight: 700; }
    .reg-tuition-clear { color: var(--success); font-weight: 600; }

    /* ── Registrar Tuition Payments view (#/registrar/payments) ──────── */
    .rp-search-results {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      margin-block-end: var(--sp-2);
    }
    .rp-search-result {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      padding: var(--sp-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .rp-search-result:hover {
      background: var(--primary-xlight);
      border-color: var(--primary-light);
    }
    .rp-balance-owed  { color: var(--danger);  }
    .rp-balance-clear { color: var(--success); }

    /* ── Student detail panel (slide-in card) ───────────────────────── */
    .reg-detail-panel {
      background: var(--surface);
      border: 1.5px solid var(--primary-light);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      margin-block-end: var(--sp-4);
      box-shadow: 0 4px 20px rgba(26,60,94,0.12);
      animation: slideUp 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    .reg-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      margin-block-end: var(--sp-4);
      padding-block-end: var(--sp-3);
      border-block-end: 1px solid var(--border);
    }
    .reg-detail-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary);
    }
    .reg-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-3) var(--sp-5);
    }
    @media (max-width: 599px) {
      .reg-detail-grid { grid-template-columns: 1fr; }
    }
    .reg-detail-item {}
    .reg-detail-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-muted);
      margin-block-end: 2px;
    }
    .reg-detail-value {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 500;
    }
    .reg-detail-value.span-full { grid-column: 1 / -1; }

    /* ── Multi-step registration form ───────────────────────────────── */
    .reg-steps {
      display: flex;
      gap: 0;
      align-items: center;
      margin-block-end: var(--sp-5);
      overflow-x: auto;
    }
    .reg-step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 64px;
      position: relative;
    }
    .reg-step-item:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 14px;
      inset-inline-start: 50%;
      width: 100%;
      height: 2px;
      background: var(--border);
      z-index: 0;
    }
    .reg-step-item.done::after { background: var(--primary); }
    .reg-step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      background: var(--surface2);
      color: var(--text-muted);
      border: 2px solid var(--border);
      z-index: 1;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .reg-step-item.active .reg-step-num {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .reg-step-item.done .reg-step-num {
      background: var(--success);
      color: #fff;
      border-color: var(--success);
    }
    .reg-step-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
    }
    .reg-step-item.active .reg-step-label { color: var(--primary); }
    .reg-step-item.done   .reg-step-label { color: var(--success); }

    .reg-form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      margin-block-end: var(--sp-4);
      box-shadow: var(--shadow);
    }
    .reg-form-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      margin-block-end: var(--sp-4);
      padding-block-end: var(--sp-3);
      border-block-end: 1px solid var(--border);
    }
    .reg-form-grid {
      display: grid;
      gap: var(--sp-3);
      grid-template-columns: 1fr;
    }
    @media (min-width: 600px) {
      .reg-form-grid { grid-template-columns: 1fr 1fr; }
    }
    .reg-form-grid .span-2 { grid-column: 1 / -1; }

    .reg-form-actions {
      display: flex;
      gap: var(--sp-3);
      flex-wrap: wrap;
      margin-block-start: var(--sp-4);
      padding-block-start: var(--sp-4);
      border-block-start: 1px solid var(--border);
    }

    /* Parent search results */
    .reg-parent-results {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 200px;
      overflow-y: auto;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .reg-parent-result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-2) var(--sp-3);
      border-block-end: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      gap: var(--sp-3);
    }
    .reg-parent-result-item:last-child { border-block-end: none; }
    .reg-parent-result-item:hover { background: var(--primary-xlight); }
    .reg-parent-result-name { font-weight: 600; font-size: 0.875rem; color: var(--primary); }
    .reg-parent-result-email { font-size: 0.78rem; color: var(--text-muted); }

    .reg-parent-selected {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3);
      background: var(--success-light);
      border: 1px solid rgba(39,174,96,0.3);
      border-radius: var(--radius);
      gap: var(--sp-3);
      margin-block-end: var(--sp-3);
    }
    .reg-parent-selected-name { font-weight: 600; color: #1a7a40; }
    .reg-parent-selected-email { font-size: 0.78rem; color: var(--text-muted); }

    /* Review step */
    .reg-review-section {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: var(--sp-4);
      margin-block-end: var(--sp-3);
    }
    .reg-review-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-muted);
      margin-block-end: var(--sp-2);
    }
    .reg-review-row {
      display: flex;
      gap: var(--sp-2);
      font-size: 0.875rem;
      margin-block-end: 4px;
    }
    .reg-review-key { color: var(--text-muted); flex-shrink: 0; min-width: 120px; }
    .reg-review-val { color: var(--text); font-weight: 500; }

    /* Spark notice reuse for registrar */
    .reg-notice {
      background: var(--warning-light);
      border: 1px solid rgba(243,156,18,0.4);
      border-radius: var(--radius);
      padding: var(--sp-3) var(--sp-4);
      font-size: 0.82rem;
      color: #7a4f00;
      margin-block-end: var(--sp-4);
      line-height: 1.5;
    }
    .reg-notice strong { color: #5a3800; }

    /* Loading / empty */
    .reg-loading {
      text-align: center;
      padding: var(--sp-6) var(--sp-4);
      color: var(--text-muted);
    }
    .reg-empty {
      text-align: center;
      padding: var(--sp-5) var(--sp-4);
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* ══════════════════════════════════════════════════════════════════
       PARENT DASHBOARD  (#/parent/dashboard)
    ══════════════════════════════════════════════════════════════════ */

    /* Child switcher reuses .reg-tabs / .reg-tab from the registrar
       registry view above — no separate tab-strip rules needed here. */

    /* Summary card balance coloring — same convention as
       .rp-balance-owed / .rp-balance-clear in the registrar payments view. */
    .pd-owed  { color: var(--danger);  }
    .pd-clear { color: var(--success); }

    /* 7-day attendance strip */
    .pd-att-strip {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--sp-2);
      padding-block: var(--sp-2);
    }
    .pd-att-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: var(--sp-3) 4px;
      border-radius: var(--radius-md);
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: transform var(--t-fast) var(--ease-spring), box-shadow var(--t-base);
    }
    .pd-att-day:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm, 0 2px 8px rgba(0,0,0,0.10));
    }
    .pd-att-day-label {
      font-size: 0.60rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
      white-space: nowrap;
    }
    .pd-att-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.70rem;
      flex-shrink: 0;
      font-weight: 800;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }
    .pd-att-dot.present {
      background: linear-gradient(135deg, var(--success) 0%, #27B87A 100%);
      color: #fff;
    }
    .pd-att-dot.absent {
      background: linear-gradient(135deg, var(--danger) 0%, #C94040 100%);
      color: #fff;
    }
    .pd-att-dot.late {
      background: linear-gradient(135deg, var(--warning) 0%, #D4920A 100%);
      color: #fff;
    }
    .pd-att-dot.none {
      background: var(--surface);
      border: 2px dashed var(--border-strong);
      color: var(--text-placeholder);
      box-shadow: none;
    }
    .pd-att-day-num {
      font-size: 0.65rem;
      color: var(--text-muted);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* Latest grades card grid */
    .pd-grade-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--sp-4);
      background: var(--surface2);
      position: relative;
      overflow: hidden;
      transition: transform var(--t-fast) var(--ease-spring), box-shadow var(--t-base);
    }
    .pd-grade-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--border);
    }
    .pd-grade-card.grade-high::before { background: linear-gradient(90deg, var(--success), #27B87A); }
    .pd-grade-card.grade-mid::before  { background: linear-gradient(90deg, var(--warning), #D4920A); }
    .pd-grade-card.grade-low::before  { background: linear-gradient(90deg, var(--danger),  #C94040); }
    .pd-grade-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .pd-grade-subject {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text);
      margin-block-end: var(--sp-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pd-grade-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--sp-2);
    }
    .pd-grade-score {
      font-size: var(--text-2xl);
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .pd-grade-letter {
      font-size: var(--text-sm);
      font-weight: 800;
      padding: 3px 10px;
      border-radius: var(--radius-full);
    }
    .pd-grade-letter.g-A { background: var(--success-light); color: #1a7a40; }
    .pd-grade-letter.g-B { background: var(--success-light); color: #1a7a40; }
    .pd-grade-letter.g-C { background: var(--warning-light); color: #9c640c; }
    .pd-grade-letter.g-D { background: var(--warning-light); color: #9c640c; }
    .pd-grade-letter.g-F { background: var(--danger-light);  color: #922b21; }

    /* Homework due — grouped by EC due date */
    .pd-hw-group-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-muted);
      margin-block: var(--sp-3) var(--sp-2);
    }
    .pd-hw-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-3);
      margin-block-end: var(--sp-2);
    }
    .pd-hw-item-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--primary);
    }

    /* ══════════════════════════════════════════════════════════════════
       PARENT ATTENDANCE DETAIL VIEW  (#/parent/attendance/:studentId)
    ══════════════════════════════════════════════════════════════════ */

    /* ── Read-aloud EC month-nav header (pa-nav) — reuses the
       .ec-picker-header/.ec-picker-nav visual language from Step 27's
       ecDatePicker() component, but as a static nav strip (no popup —
       this view's calendar grid IS the popup) plus a speaker button. ── */
    .pa-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4);
      background: var(--primary);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      color: #fff;
    }
    .pa-nav-arrow {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 1.1rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    .pa-nav-arrow:hover:not(:disabled)  { background: rgba(255,255,255,0.28); }
    .pa-nav-arrow:disabled { opacity: 0.35; cursor: not-allowed; }
    .pa-nav-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      flex: 1;
      min-width: 0;
    }
    .pa-nav-label {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pa-nav-speak {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s, transform 0.12s;
    }
    .pa-nav-speak:hover { background: rgba(255,255,255,0.28); }
    .pa-nav-speak.is-speaking { animation: paSpeakPulse 0.9s ease-in-out infinite; }
    @keyframes paSpeakPulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }

    /* ── Calendar grid (heatmap) ──────────────────────────────────────── */
    .pa-cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .pa-cal-weekday {
      text-align: center;
      padding: var(--sp-2) 0;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .pa-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: var(--sp-3);
      background: var(--surface);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }
    .pa-cal-cell {
      aspect-ratio: 1;
      min-height: 38px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      position: relative;
      border: 1.5px solid transparent;
    }
    .pa-cal-cell.is-empty { visibility: hidden; }
    .pa-cal-cell.is-today { border-color: var(--accent); }
    .pa-cal-cell.is-future {
      background: var(--surface2);
      color: var(--text-muted);
      opacity: 0.5;
    }
    .pa-cal-cell.st-present { background: var(--success); color: #fff; }
    .pa-cal-cell.st-absent  { background: var(--danger);  color: #fff; }
    .pa-cal-cell.st-late    { background: var(--warning); color: #fff; }
    .pa-cal-cell.st-none {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1.5px dashed var(--border);
    }
    .pa-cal-daynum { line-height: 1; }
    .pa-cal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      margin-block-start: 2px;
      opacity: 0.85;
    }

    /* ── Legend ────────────────────────────────────────────────────────── */
    .pa-legend {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      font-size: 0.78rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    .pa-legend-item { display: flex; align-items: center; gap: 6px; }
    .pa-legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .pa-legend-swatch.present { background: var(--success); }
    .pa-legend-swatch.absent  { background: var(--danger); }
    .pa-legend-swatch.late    { background: var(--warning); }

    /* ── Monthly summary row ──────────────────────────────────────────── */
    .pa-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-3);
    }
    .pa-summary-stat {
      text-align: center;
      padding: var(--sp-3);
      border-radius: var(--radius);
      background: var(--surface2);
    }
    .pa-summary-stat .pa-summary-num {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.1;
    }
    .pa-summary-stat .pa-summary-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-muted);
      margin-block-start: 2px;
    }
    .pa-summary-stat.present .pa-summary-num { color: var(--success); }
    .pa-summary-stat.absent  .pa-summary-num { color: var(--danger); }
    .pa-summary-stat.late    .pa-summary-num { color: var(--warning); }

    @media (max-width: 480px) {
      .pa-cal-cell  { min-height: 32px; font-size: 0.72rem; }
      .pa-nav-label { font-size: 0.88rem; }
    }

    /* ══════════════════════════════════════════════════════════════════
       PARENT SEMESTER HISTORY VIEW  (#/parent/history/:studentId)
    ══════════════════════════════════════════════════════════════════ */

    /* ── Semester tabs ──────────────────────────────────────────────── */
    .ph-sem-tabs {
      display: flex;
      gap: var(--sp-2);
      flex-wrap: wrap;
      margin-block-end: var(--sp-4);
    }
    .ph-sem-tab {
      padding: 7px 18px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .ph-sem-tab:hover {
      border-color: var(--primary-light);
      color: var(--primary);
      background: var(--primary-xlight);
    }
    .ph-sem-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ── Summary stat row ───────────────────────────────────────────── */
    .ph-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: var(--sp-3);
      margin-block-end: var(--sp-4);
    }
    .ph-stat-tile {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-3);
      text-align: center;

    .ph-stat-tile .ph-stat-val {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      display: block;
      line-height: 1.1;

    .ph-stat-tile .ph-stat-lbl {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-block-start: 4px;
    }
    .ph-stat-tile.is-accent .ph-stat-val  { color: var(--accent); }
    .ph-stat-tile.is-success .ph-stat-val { color: var(--success); }
    .ph-stat-tile.is-danger  .ph-stat-val { color: var(--danger);  }

    /* ── Subject results table ──────────────────────────────────────── */
    .ph-subjects-table th { white-space: nowrap; }
    .ph-grade-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.82rem;
      font-weight: 800;
    }
    .ph-grade-A { background: var(--success-light); color: #1a7a40; }
    .ph-grade-B { background: var(--primary-xlight); color: var(--primary); }
    .ph-grade-C { background: var(--warning-light); color: #9c640c; }
    .ph-grade-D { background: var(--warning-light); color: #7a5200; }
    .ph-grade-F { background: var(--danger-light);  color: #922b21; }
    .ph-grade-dash { background: var(--surface2); color: var(--text-muted); }

    .ph-att-row {
      display: flex;
      gap: var(--sp-3);
      flex-wrap: wrap;
      padding: var(--sp-3) 0;
    }
    .ph-att-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 600;
      border: 1px solid;
    }
    .ph-att-chip.present { background: var(--success-light); color: #1a7a40; border-color: rgba(39,174,96,0.3); }
    .ph-att-chip.absent  { background: var(--danger-light);  color: #922b21; border-color: rgba(192,57,43,0.25); }
    .ph-att-chip.late    { background: var(--warning-light); color: #9c640c; border-color: rgba(243,156,18,0.3); }
    .ph-att-chip.total   { background: var(--surface2);      color: var(--text-muted); border-color: var(--border); }

    /* ── Canvas charts ──────────────────────────────────────────────── */
    .ph-chart-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .ph-canvas {
      display: block;
      max-width: 100%;
    }

    /* ── Compare button / panel ─────────────────────────────────────── */
    .ph-compare-panel {
      margin-block-start: var(--sp-4);
    }
    .ph-trend-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-block-start: var(--sp-2);
      text-align: center;
    }

       REPORT CARD VIEW  (#/report-card/:studentId/:ecYear/:semester)
    ══════════════════════════════════════════════════════════════════ */

    #report-card-print {
      display: none; /* hidden on-screen by default; print CSS reveals it */
    }

    /* Screen preview wrapper */
    .rc-screen-wrapper {
      max-width: 820px;
      margin: 0 auto;
    }

    .rc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--sp-5);
      box-shadow: 0 4px 24px rgba(26,60,94,0.10);
    }

    /* ── School header ──────────────────────────────────────────────── */
    .rc-school-header {
      text-align: center;
      padding-block-end: var(--sp-4);
      border-block-end: 3px solid var(--accent);
      margin-block-end: var(--sp-4);
    }
    .rc-school-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 0.5px;
    }
    .rc-school-name-am {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      margin-block-start: 2px;
    }
    .rc-report-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;

    .rc-meta-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-block-end: 2px;
    }
    .rc-meta-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--primary);
    }

    /* ── Results table ──────────────────────────────────────────────── */
    .rc-table-wrap {
      width: 100%;
      overflow-x: auto;
      margin-block-end: var(--sp-4);

      font-size: 0.85rem;
      border-collapse: collapse;
      page-break-inside: avoid;

      padding: 8px 10px;
      background: var(--primary);
      color: #fff;
      font-size: 0.72rem;

    .rc-table td.num { text-align: end; font-variant-numeric: tabular-nums; }
    .rc-table tbody tr:nth-child(even) { background: var(--surface2); }
    .rc-table .rc-grade-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 0.78rem;
      font-weight: 800;
    }
    .rc-grade-A { background: var(--success-light); color: #1a7a40; }
    .rc-grade-B { background: var(--primary-xlight); color: var(--primary); }
    .rc-grade-C { background: var(--warning-light); color: #9c640c; }
    .rc-grade-D { background: var(--warning-light); color: #7a5200; }
    .rc-grade-F { background: var(--danger-light);  color: #922b21; }
    .rc-grade-na { background: var(--surface2); color: var(--text-muted); }

    /* Summary / totals row */
    .rc-table .rc-summary-row td {
      font-weight: 700;
      background: var(--accent-light);
      border-top: 2px solid var(--accent);
    }

    /* ── Attendance summary strip ───────────────────────────────────── */
    .rc-att-strip {
      display: flex;
      gap: var(--sp-3);
      flex-wrap: wrap;
      margin-block-end: var(--sp-4);
    }
    .rc-att-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .rc-att-chip.present { background: var(--success-light); color: #1a7a40; }
    .rc-att-chip.absent  { background: var(--danger-light);  color: #922b21; }
    .rc-att-chip.late    { background: var(--warning-light); color: #9c640c; }

    /* ── Remarks box ────────────────────────────────────────────────── */
    .rc-remarks-box {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-3) var(--sp-4);
      min-height: 72px;
      margin-block-end: var(--sp-4);
      background: var(--surface2);
    }
    .rc-remarks-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-block-end: var(--sp-2);
    }
    .rc-remarks-text {
      font-size: 0.9rem;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* ── Signature row ──────────────────────────────────────────────── */
    .rc-sig-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-4);
      margin-block-end: var(--sp-4);
    }
    @media (max-width: 540px) { .rc-sig-row { grid-template-columns: 1fr; } }
    .rc-sig-item {
      text-align: center;
    }
    .rc-sig-line {
      width: 100%;
      border-block-end: 1.5px solid var(--primary);
      margin-block-end: 6px;
      height: 36px;
    }
    .rc-sig-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-muted);
    }
    .rc-sig-label-am {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-block-start: 2px;
    }

    /* ── Print footer ───────────────────────────────────────────────── */
    .rc-footer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding-block-start: var(--sp-3);
      border-block-start: 1px solid var(--border);
      margin-block-start: var(--sp-4);
    }

    /* ── Print-all / bulk view ──────────────────────────────────────── */
    .rc-bulk-separator {
      page-break-after: always;
    }

    /* ── Action bar (no-print) ──────────────────────────────────────── */
    .rc-action-bar {
      display: flex;
      gap: var(--sp-3);
      flex-wrap: wrap;
      margin-block-end: var(--sp-4);
      align-items: center;
    }

    /* ── Keyboard navigation: visible focus ring ─────────────────────── */
    :focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
      border-radius: 3px;
    }
    /* Ensure div-buttons feel clickable */
    [role="button"] { cursor: pointer; user-select: none; }
    [role="button"]:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>

  <!-- ── PWA: Update available banner ──────────────────────────────────────

  <!-- ── Read-budget warning banner (admin-relevant, but shown to whoever
       is signed in since it reflects the whole school's quota usage) ──────
       Hidden by default; toggled by window.__budgetSyncUI() — see § BUDGET
       UI in the module script below — once today's reads cross 80% of
       DAL_DAILY_READ_LIMIT. Switches to the .is-critical (red) style and a
       different message at 95%, the same threshold that disables list reads.
  ──────────────────────────────────────────────────────────────────────── -->
  <div id="budget-warning-banner" role="status" aria-live="polite">
    <span id="budget-warning-banner-text">Approaching daily read limit</span>
  </div>


  <div id="app">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#1a3c5e;">
      <span style="color:#fff;font-weight:600;font-size:1rem;">SchoolOS</span>
      <button
        id="lang-toggle"
        onclick="window.__setLang && window.__setLang(document.documentElement.lang === 'am' ? 'en' : 'am')"
        style="color:#fff;font-size:0.85rem;padding:4px 10px;border:1px solid rgba(255,255,255,0.5);border-radius:4px;background:transparent;cursor:pointer;"
        aria-label="Toggle language">
        EN / አማ
      </button>
    </div>
    <p id="loading-text" style="padding:24px 16px;color:#1a3c5e;font-size:1rem;">Loading…</p>
  </div>

  <!-- ── Read-budget floating pill + detail modal mount point ──────────────
       Built and shown/hidden by window.__budgetSyncUI() (§ BUDGET UI) once
       store.userDoc.role === 'admin'. Lives outside #app so it survives
       #app's innerHTML being replaced wholesale on every route change.
  ──────────────────────────────────────────────────────────────────────── -->
  <button id="budget-pill" type="button" aria-haspopup="dialog" onclick="window.__budgetOpenModal && window.__budgetOpenModal()"></button>
  <div id="budget-modal-mount"></div>

  <!-- ── Firebase v10 SDK (CDN, ES Module) ─────────────────────────────────── -->
  <!-- ── TEMP DIAGNOSTICS — remove once the Acode loading issue is solved ──
       No devtools console is available in Acode's preview, so this writes
       any module-load error or auth/Firestore hang directly onto the page
       (into #loading-text) so the failure is visible without a console.
  ──────────────────────────────────────────────────────────────────────── -->
  <script>
    window.addEventListener('error', function (e) {
      var el = document.getElementById('loading-text');
      if (el) el.textContent = 'DIAG ERROR: ' + (e.message || e.error || e);
    });
    window.addEventListener('unhandledrejection', function (e) {
      var el = document.getElementById('loading-text');
      var msg = (e.reason && (e.reason.message || e.reason.code)) || e.reason || 'unknown';
      if (el) el.textContent = 'DIAG REJECTION: ' + msg;
    });
    // Watchdog: if nothing has replaced the loading text within 8s, the
    // module script either never ran (blocked file:// module load) or a
    // Firestore/Auth call is hanging silently with no error/rejection.
    setTimeout(function () {
      var el = document.getElementById('loading-text');
      if (el && el.textContent.indexOf('Loading') !== -1) {
        el.textContent = 'DIAG: still loading after 8s — module script likely did not run, or a network call to Firebase is hanging (no error thrown).';
      }
    }, 8000);
  </script>

  <script type="module">
    import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp,
      collection, query, where, orderBy, getDocs, limit, writeBatch, Timestamp,
      runTransaction, increment, arrayUnion,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth, onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut as _firebaseSignOut,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // ── CONFIG ──────────────────────────────────────────────────────────────
    // Firebase project credentials.
    // Do NOT commit real keys to a public repository; use environment-injected
    // values or a build-time substitution step for production.
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyCE8RR4PyS_BRZeAMKwEUOdIocOP_yYgOw",
      authDomain:        "school-erp-et-2479c.firebaseapp.com",
      projectId:         "school-erp-et-2479c",
      storageBucket:     "school-erp-et-2479c.firebasestorage.app",
      messagingSenderId: "848272359896",
      appId:             "1:848272359896:web:9aaa7f01ed58058d3a72ad",
    };

    // App metadata
    const APP_VERSION  = "1.0.0";
    const APP_NAME     = "SchoolOS";
    const DEFAULT_LANG = "am"; // Amharic; also supports "ti" (Tigrigna), "en"

    // Role constants – used throughout the permission model
    const ROLES = Object.freeze({
      ADMIN:            "admin",
      REGISTRAR:        "registrar",
      TEACHER:          "teacher",
      HOMEROOM_TEACHER: "homeroom_teacher",
      PARENT:           "parent",
      STUDENT:          "student",
    });
    // ── END CONFIG ───────────────────────────────────────────────────────────


    // ── FIREBASE ─────────────────────────────────────────────────────────────
    // Initialise the Firebase app and expose the core service handles.
    // All other modules import { db, auth } from here via the module-scope
    // variables below – no secondary initializeApp() calls elsewhere.
    const app  = initializeApp(FIREBASE_CONFIG);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    // ── END FIREBASE ─────────────────────────────────────────────────────────


    // ── SECURITY RULES DEPLOYMENT GATE ───────────────────────────────────────
    // Runs once on app boot, immediately after Firebase is initialised and
    // before onAuthStateChanged is registered (see § AUTH below). Probes
    // whether Firestore security rules are actually enforced by attempting
    // a read that should be denied for an unauthenticated client under any
    // production-shaped ruleset (a lookup of a /users doc that doesn't
    // exist, by a request with no auth context).
    //
    //   • Rules deployed & correct  → the read throws 'permission-denied'
    //     (Firestore evaluates the rule before it even checks existence)
    //     → store.rulesDeployed = true.
    //   • Rules still in open/test mode ("allow read, write: if true") →
    //     the read resolves successfully (a miss, snap.exists() === false,
    //     but no error) → store.rulesDeployed = false.
    //
    // checkRulesDeployed() itself only touches db/doc/getDoc — it must not
    // depend on dal, t(), or showToast(), because it is invoked below
    // before the rest of the module (where those are defined) has finished
    // evaluating. The await inside it suspends at a real network/SDK
    // boundary, so by the time its continuation runs, the rest of this
    // <script type="module"> — including dal.exportSecurityRules() near
    // the bottom of the file — has already finished executing.
    async function checkRulesDeployed() {
      try {
        await getDoc(doc(db, 'users', 'probe_nonexistent_uid_000'));
        // No error thrown → an unauthenticated read was allowed through.
        return false;
      } catch (e) {
        // permission-denied → rules ARE deployed and blocking the probe (good).
        // Any other code (unavailable, failed-precondition, network-request-failed,
        // offline / webview sandbox without real internet) → we cannot determine
        // rules state, so treat it as deployed to avoid blocking the UI in
        // environments like Acode that report no network during local preview.
        if (e.code === 'permission-denied') return true;
        console.warn('[checkRulesDeployed] probe error (treating as deployed):', e.code ?? e.message);
        return true;
      }
    }

    // renderRulesGate()
    //   Builds and mounts the full-screen blocking modal warning that
    //   Firestore security rules are not deployed. Appended directly to
    //   <body> (not #app) so it sits above the entire app regardless of
    //   what #app currently contains, at z-index 9999 (see CSS
    //   .rules-gate-backdrop). Safe to call multiple times — it removes
    //   any existing instance first.
    function renderRulesGate() {
      // Avoid stacking duplicates if called more than once.
      document.getElementById('rules-gate-backdrop')?.remove();

      const isLocalhost = window.location.hostname === 'localhost';
      let rulesText;
      try {
        rulesText = dal.exportSecurityRules();
      } catch (err) {
        rulesText = '// Failed to generate rules text: ' + err.message;
      }

      // Minimal local escaper — the rules text is our own source, not
      // user input, but this keeps the <pre> block byte-for-byte safe
      // regardless of stray angle brackets or ampersands.
      const escapeHtml = (str) => String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Always show the Dismiss button — not just on localhost.
      // In environments like Acode (local file / sandboxed webview) the
      // rules probe can't reach Firestore, so the gate fires even though
      // rules may be correctly deployed. The admin can dismiss and proceed.
      const dismissRow = `
          <div class="rules-gate-dismiss-row">
            <button id="rules-gate-dismiss" class="btn btn-ghost btn-sm" type="button">
              ${isLocalhost ? 'Dismiss (Dev Only)' : 'Dismiss — I have deployed the rules'}
            </button>
          </div>`;

      const wrapper = document.createElement('div');
      wrapper.id = 'rules-gate-backdrop';
      wrapper.className = 'rules-gate-backdrop';
      wrapper.innerHTML = `
        <div class="rules-gate-modal" role="alertdialog" aria-labelledby="rules-gate-title">
          <h2 id="rules-gate-title" class="rules-gate-title">⚠️ Security Rules Not Deployed</h2>
          <p>
            This Firestore project is currently accepting reads/writes from
            <strong>any</strong> client — the rules below have not been
            deployed yet. Anyone can read or modify your data until this is
            fixed.
          </p>
          <pre class="rules-gate-pre" id="rules-gate-pre-text">${escapeHtml(rulesText)}</pre>
          <ol>
            <li>Install Firebase CLI: <code>npm install -g firebase-tools</code></li>
            <li>Run <code>firebase login</code></li>
            <li>Save the rules above as <code>firestore.rules</code> in your project folder</li>
            <li>Run <code>firebase deploy --only firestore:rules</code></li>
            <li>Reload this page</li>
          </ol>
          <div class="rules-gate-actions">
            <button id="rules-gate-copy" class="btn btn-ghost" type="button">
              📋 Copy Rules to Clipboard
            </button>
            <button id="rules-gate-recheck" class="btn btn-primary" type="button">
              ✅ I have deployed the rules — Re-check
            </button>
          </div>
          ${dismissRow}
        </div>`;

      document.body.appendChild(wrapper);

      // Copy button.
      document.getElementById('rules-gate-copy')?.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(rulesText);
          const btn = document.getElementById('rules-gate-copy');
          if (btn) {
            const original = btn.textContent;
            btn.textContent = '✅ Copied!';
            setTimeout(() => { btn.textContent = original; }, 2000);
          }
        } catch (_) {
          // Clipboard API unavailable/blocked — fall back to manual select.
          const pre = document.getElementById('rules-gate-pre-text');
          if (pre && window.getSelection) {
            const range = document.createRange();
            range.selectNodeContents(pre);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
          }
        }
      });

      // Re-check button — re-runs the probe; closes the modal only if
      // rules are now actively enforced.
      document.getElementById('rules-gate-recheck')?.addEventListener('click', async (e) => {
        const btn = e.currentTarget;
        btn.disabled = true;
        btn.textContent = 'Checking…';
        const deployed = await checkRulesDeployed();
        store.rulesDeployed = deployed;
        if (deployed) {
          document.getElementById('rules-gate-backdrop')?.remove();
        } else {
          btn.disabled = false;
          btn.textContent = '✅ I have deployed the rules — Re-check';
        }
        updateRulesNavIndicator();
      });

      // Dismiss button — localhost-only escape hatch. Hides the modal but
      // does NOT clear store.rulesDeployed, so the nav red-dot persists.
      document.getElementById('rules-gate-dismiss')?.addEventListener('click', () => {
        localStorage.setItem('schoolos_rules_dismissed', '1');
        document.getElementById('rules-gate-backdrop')?.remove();
        updateRulesNavIndicator();
      });
    }

    // updateRulesNavIndicator()
    //   Toggles the persistent red-dot warning in the nav bar based on
    //   store.rulesDeployed. Called directly (not just left to render(),
    //   which only rebuilds the nav once per shell mount) so the dot
    //   updates immediately even if the shell was already mounted before
    //   the rules check resolved.
    function updateRulesNavIndicator() {
      const el = document.getElementById('nav-rules-warning');
      if (!el) return;
      el.classList.toggle('is-visible', store.rulesDeployed === false);
    }
    window.__updateRulesNavIndicator = updateRulesNavIndicator;

    // window.__showRulesGate — lets the nav-bar red dot re-open the modal
    // on demand even after it was dismissed.
    window.__showRulesGate = function __showRulesGate() {
      renderRulesGate();
    };

    // Kick off the probe immediately. The await below suspends at the
    // Firestore SDK's network boundary, so the rest of this module
    // (STORE, I18N, COMPONENTS, AUTH, DAL, INIT) finishes evaluating
    // synchronously before this continuation runs — meaning dal, t(),
    // showToast, and store are all fully defined by the time we get here.
    (async () => {
      const skipModal = localStorage.getItem('schoolos_rules_dismissed') === '1'
        && window.location.hostname === 'localhost';

      const deployed = await checkRulesDeployed();
      store.rulesDeployed = deployed;
      updateRulesNavIndicator();

      if (!deployed && !skipModal) {
        renderRulesGate();
      }
    })();
    // ── END SECURITY RULES DEPLOYMENT GATE ───────────────────────────────────


    // ── STORE ─────────────────────────────────────────────────────────────────
    // Central reactive state container (no external library).
    // Pattern: Proxy trap on set → calls render() after every state mutation.
    // Usage:
    //   store.user = firebaseUser;   // triggers render()
    //   store.lang = 'am';           // triggers render()
    //
    // Shape of the global state:
    // {
    //   user:           null,  // Firebase Auth user object | null
    //   userDoc:        null,  // Firestore user document { role, schoolId, … } | null
    //   config:         null,  // school-level config document | null
    //   lang:           'en',  // active UI language: 'en' | 'am' | 'ti'
    //   announcements:  [],    // cached announcement docs
    //   examSchedules:  [],    // cached exam-schedule docs
    //   gradebookCache: {},    // { [subjectKey]: gradebookDoc } — cache for whichever
    //                          // class's gradebooks are currently in view (see § DAL)
    //   listeners:      [],    // active Firestore onSnapshot unsubscribe fns
    //   readCount:      0,     // cumulative Firestore reads TODAY, TOTAL BILLED
    //                          // (explicit reads + me() security-rule overhead —
    //                          // see ME_READS_PER_DOC_ACCESS, § DAL) — persisted
    //   meOverheadCount: 0,    // cumulative me() overhead portion of readCount
    //                          // TODAY — explicit reads = readCount - meOverheadCount
    //   writeCount:     0,     // cumulative Firestore writes TODAY (DAL budget; persisted)
    //   budgetDate:     '',    // 'YYYY-MM-DD' the counts above belong to — daily reset key
    //   budgetLog:      [],    // last 200 { op, reads, writes, docCount, meOverhead, timestamp } entries (DAL budget)
    //   _budgetModalOpen: false, // whether the admin budget detail modal is mounted
    //   rulesDeployed:  null,  // null = not yet checked | true | false (DAL security gate)
    //   _rulesTestState:   'idle',  // 'idle' | 'running' | 'done' (#/admin/rules-test view)
    //   _rulesTestResults: [],     // last dal.runRulesTests() result array
    //   _rulesTestAutoRan: false,  // one-shot guard so the suite auto-runs only on first visit
    //   _classDocCache:    {},     // { [classKey]: classDoc|null } — per-doc cache for dal.getClass
    //   _subjectDocCache:  {},     // { [subjectId]: subjectDoc|null } — per-doc cache for dal.getSubject
    // }

    function createStore(initialState) {
      // render() will be defined in the COMPONENTS / INIT section;
      // guard against calling it before it exists.
      const render = () => {
        if (typeof window.__render === 'function') window.__render();
      };

      return new Proxy({ ...initialState }, {
        set(target, prop, value) {
          target[prop] = value;
          render();
          return true; // required by Proxy spec; omitting throws a TypeError
        },
      });
    }

    const store = createStore({
      user:           null,
      userDoc:        null,
      config:         null,
      lang:           'en',
      announcements:  [],
      examSchedules:  [],
      gradebookCache: {},
      listeners:      [],
      readCount:      0,
      meOverheadCount: 0,
      writeCount:     0,
      budgetDate:     '',
      budgetLog:      [],
      _budgetModalOpen: false,
      rulesDeployed:  null,
      _selfTestState:   'idle', // 'idle' | 'running' | 'done' (#/admin/dashboard System Check)
      _selfTestResults: [],     // last dal.runSelfTest() result array
      subjectsCache:  [],   // cached from dal.getAllSubjects()
      classesCache:   [],   // cached from dal.listClasses()
      _classDocCache:   {}, // { [classKey]: classDoc | null } — per-doc cache for dal.getClass
      _subjectDocCache: {}, // { [subjectId]: subjectDoc | null } — per-doc cache for dal.getSubject
      childCache:       {}, // { [studentId]: { student, attendance, academicYear, homework, loadedAt } }
                             // — per-child cache for the parent dashboard (#/parent/dashboard)
      // ── PWA / connectivity ───────────────────────────────────────────
      isOffline:        false,               // true when window is offline
      deferredInstall:  null,               // BeforeInstallPromptEvent | null
      installDismissed: !!localStorage.getItem('schoolos-install-dismissed'), // persisted flag

    // ── NUMERIC FORMATTING ───────────────────────────────────────────────────────
    // fmtNum(n) — numeric display helper used throughout the UI for
    // counts/amounts/scores. Always renders plain Western (Arabic)

    // convention, including for Amharic-language UI.
    function fmtNum(n) {
      if (typeof n !== 'number' || isNaN(n)) return '—';
      return Math.round(n).toLocaleString('en-US');
