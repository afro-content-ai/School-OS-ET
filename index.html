              <button class="btn btn-ghost mt-4" onclick="history.back()">← Back</button>
            </div>
          </div>`;
        showToast('Bulk report card error: ' + err.message, 'error');
      }
    }

    // ── END REPORT CARD VIEWS ────────────────────────────────────────────────


    // ── END REGISTRAR TUITION PAYMENTS VIEW ──────────────────────────────────


    // ── INIT ─────────────────────────────────────────────────────────────────
    // Application bootstrap – runs once on module load.
    //
    // Steps:
    //   0. Hydrate the read-budget counters from localStorage (must happen
    //      before the first dal.budgetTrack() call from any Firestore op
    //      below, or a reload would silently lose today's running counts).
    //   1. Register the service worker (PWA offline support).
    //   2. Expose render() on window so the Store Proxy can call it.
    //   3. The Auth listener (above) fires and triggers render() via the store.
    //   4. render() mounts the correct view based on auth + userDoc state.
    //
    // Service-worker registration (to be created at /sw.js):
    //   if ("serviceWorker" in navigator) {
    //     navigator.serviceWorker.register("/sw.js");
    //   }

    dal.budgetLoad();

    // render() — called by the store Proxy on every state mutation.
    //
    // State machine:
    //   ┌──────────────────────────────────────────────────────────┐
    //   │ store.user === null                                       │
    //   │   → render LoginComponent into #app                      │
    //   │   → attach login form submit handler                      │
    //   ├──────────────────────────────────────────────────────────┤
    //   │ store.user !== null && store.userDoc === null             │
    //   │   → render loading spinner into #app                      │
    //   │   (waiting for Firestore user document to load)           │
    //   ├──────────────────────────────────────────────────────────┤
    //   │ store.user !== null && store.userDoc !== null             │
    //   │   → render full app shell (nav + sidebar + main + bottom) │
    //   │   → navigate to current hash or role's default route      │
    //   └──────────────────────────────────────────────────────────┘
    //
    // render() is idempotent for the shell: once the shell is already
    // mounted (#main exists), subsequent calls only re-navigate to sync
    // the nav active states — they do not re-render the entire chrome.

    // Track whether the app shell has already been inserted.
    let _shellMounted = false;

    function render() {
      const app = document.getElementById('app');
      if (!app) return;

      try {
      // ── State: public route, reachable WITHOUT a session ──
      // #/accept-invite/:inviteId/:token must work for a visitor who has
      // never signed in (that's the entire point of the parent-invite
      // flow — see acceptInviteView() and dal.createParentInvite() above).
      // Gated on !store.user specifically: if someone is ALREADY signed in
      // (e.g. a registrar previewing their own invite link in the same
      // tab) and this fired anyway, submitting the form would call
      // createUserWithEmailAndPassword() and silently replace their
      // current session with a brand-new one — exactly the kind of
      // surprise session-loss this whole flow exists to avoid for the
      // *registrar* side (see the Step 3 architecture comment). An
      // already-authenticated visitor instead falls through to the normal
      // authenticated routes below; #/accept-invite/... has no entry in
      // the authenticated route table, so it resolves to the ordinary 404,
      // which is the right outcome — they should sign out first if they
      // actually want to accept the invite as a different person. It
      // mounts straight into #app rather than going through
      // router._dispatch()/#main — #main only exists once buildAppShell()
      // has run, which requires an authenticated session, so the normal
      // authenticated-route dispatch path is unavailable here by
      // construction anyway.
      if (!store.user && window.location.hash.startsWith('#/accept-invite/')) {
        _shellMounted = false;
        const hash = window.location.hash;
        const match = hash.match(/^#\/accept-invite\/([^/]+)\/([^/]+)$/);
        if (match) {
          app.innerHTML = acceptInviteView({ inviteId: match[1], token: match[2] });
        } else {
          app.innerHTML = _aiInviteErrorCard('This invite link is malformed.');
        }
        return;
      }

      // ── State: no authenticated user ──
      if (!store.user) {
        _shellMounted = false;
        LoginComponent.mount(app);

        // Attach login form handler after mount.
        const submitBtn = document.getElementById('login-submit');
        const emailEl   = document.getElementById('login-email');
        const passEl    = document.getElementById('login-password');
        const errorEl   = document.getElementById('login-error');

        // window.__loginSubmit — invoked by the submit button's onclick
        // (see loginView()) and by the Enter-key handler below. Calls the
        // signIn() free function (§ AUTH), which already reports errors
        // via showToast(); this handler additionally mirrors the message
        // into the inline error div for in-context visibility.
        window.__loginSubmit = async () => {
          const email    = emailEl?.value.trim() ?? '';
          const password = passEl?.value ?? '';
          if (!email || !password) {
            if (errorEl) errorEl.textContent = 'Please enter your email and password.';
            return;
          }
          submitBtn.disabled = true;
          submitBtn.textContent = t('loading');
          if (errorEl) errorEl.textContent = '';
          try {
            await signIn(email, password);
            // onAuthStateChanged will fire → store.user will be set → render()
          } catch (err) {
            if (errorEl) errorEl.textContent = err.message;
            submitBtn.disabled = false;
            submitBtn.textContent = t('signIn');
          }
        };

        if (submitBtn) {
          // Allow Enter key to submit.
          [emailEl, passEl].forEach(el => {
            el?.addEventListener('keydown', e => {
              if (e.key === 'Enter') submitBtn.click();
            });
          });
        }
        return;
      }

      // ── State: user authenticated, userDoc still loading ──
      if (!store.userDoc) {
        _shellMounted = false;
        app.innerHTML = Spinner(t('loading'));
        return;
      }

      // ── State: fully authenticated ──
      // Build the shell only once; subsequent renders just re-navigate.
      if (!_shellMounted) {
        app.innerHTML = buildAppShell();
        _shellMounted = true;

        // Sync the rules-not-deployed red dot now that #nav exists — the
        // markup from buildNavBar() already reflects store.rulesDeployed
        // at build time, but this covers the dot if that value changes
        // between this mount and the next full shell rebuild.
        if (typeof updateRulesNavIndicator === 'function') updateRulesNavIndicator();

        // Wire up sign-out button (now inside #nav inside #app).
        const signOutBtn = document.getElementById('btn-signout');
        if (signOutBtn) {
          signOutBtn.addEventListener('click', async () => {
            try {
              await Auth.signOut();
              // onAuthStateChanged clears store.user → render() shows login.
            } catch (_) {
              // signOut() already reports the error via showToast().
            }
          });
        }

        // Wire up mobile sidebar overlay (tap outside to close).
        const overlay = document.getElementById('sidebar-overlay');
        if (overlay) {
          overlay.addEventListener('click', () => {
            document.getElementById('sidebar')?.classList.remove('is-open');
            overlay.classList.remove('is-visible');
          });
        }
      }

      // Navigate: use the current hash, or fall back to the role's default.
      // Guard against a stale '#/login' hash left over from before sign-in —
      // that route belongs to the unauthenticated state, not to #main.
      const role        = store.userDoc.role;
      const currentHash = window.location.hash;
      const targetHash  = (currentHash && currentHash !== '#/login')
        ? currentHash
        : (ROLE_DEFAULT_ROUTES[role] || '#/admin/dashboard');

      // If no hash is set yet, push the default route.
      if (window.location.hash !== targetHash) {
        window.location.hash = targetHash;
      }

      router.current = targetHash;
      router._dispatch(targetHash);

      } catch (renderErr) {
        // ── Catastrophic render failure — show a recoverable error card ──
        console.error('[SchoolOS] render() crashed:', renderErr);
        _shellMounted = false; // allow re-mount after reload
        try {
          if (typeof showToast === 'function') {
            showToast('UI render failed: ' + (renderErr?.message ?? renderErr), 'error');
          }
        } catch (_) { /* showToast itself may be unavailable */ }
        app.innerHTML = `
          <div class="render-error-card">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.8" fill="#c0392b" stroke="none"/></svg>
            <h2>Something went wrong</h2>
            <p style="color:var(--text-muted);font-size:0.88rem;">SchoolOS encountered an unexpected error while rendering.<br>Your data is safe — try reloading the page.</p>
            <pre>${String(renderErr?.stack ?? renderErr?.message ?? renderErr).slice(0, 600)}</pre>
            <button class="btn btn-primary" onclick="window.location.reload()">⟳ Reload</button>
          </div>`;
      }
    }

    // Bridge module-scoped globals onto window so the classic (non-module)
    // <script> blocks further down the page — PWA install/offline banner,
    // Service Worker controller listener — can see them. A <script
    // type="module"> has its own private top-level scope; const/function
    // declarations inside it (store, t, showToast) are NEVER visible to a
    // separate classic <script> tag, even later in the same document. This
    // bridge must run after store/t/showToast are defined above and before
    // any classic script runs (it does — classic scripts execute in source
    // order after this point).
    window.store     = store;
    window.t         = t;
    window.showToast = showToast;

    // Expose render() on window so the Store Proxy can invoke it before the
    // module scope finishes evaluating.
    // Wrap it so PWA banner i18n text stays in sync whenever render() fires
    // (e.g. on language toggle) — __syncInstallBanner is defined in the PWA
    // script block below; guard with typeof so order-of-evaluation is safe.
    const _coreRender = render;
    window.__render = function () {
      _coreRender();
      // Re-label banners in the new language if they are visible.
      if (typeof window.__syncInstallBanner === 'function') {
        window.__syncInstallBanner();
      }
      // Reflect store.isOffline on the offline banner (handles edge cases
      // where render() fires before the PWA script has run).
      const offBanner = document.getElementById('offline-banner');
      const offText   = document.getElementById('offline-banner-text');
      if (offBanner && offText) {
        if (store.isOffline) {
          offText.textContent = t('offline');
          offBanner.classList.add('is-visible');
          document.body.classList.add('is-offline');
        }
      }
      // Sync the read-budget pill/banner/modal — covers role changes
      // (sign-in/out) and any reads that happened during this render pass.
      if (typeof window.__budgetSyncUI === 'function') window.__budgetSyncUI();
    };

    // Run an initial sync immediately so the pill/banner reflect whatever
    // dal.budgetLoad() just hydrated from localStorage, even before the
    // first store mutation (and therefore the first render()) happens.
    if (typeof window.__budgetSyncUI === 'function') window.__budgetSyncUI();

    // ── Ethiopian Calendar sanity check ──────────────────────────────────────
    console.log('[SchoolOS] EC today (EN):', EC.formatEc(new Date()));
    console.log('[SchoolOS] EC today (AM):', EC.formatEcAm(new Date()));
    console.log('[SchoolOS] Router registered routes:', Object.keys(router.routes));

    // ── Global init self-check ────────────────────────────────────────────────
    //   Final sanity pass before SchoolOS hands off to the user: confirms
    //   every critical global the rest of the app assumes exists actually
    //   does, in this exact load. This is intentionally separate from
    //   dal.runSelfTest() (which is an on-demand, admin-only, async suite
    //   covering live Firestore/auth/router/SW state) — this check is
    //   synchronous, runs unconditionally for every session regardless of
    //   role, and exists purely to catch "the file was truncated or a
    //   global got dropped" before anything else runs.
    (function schoolOsInitSelfCheck() {
      const requiredGlobals = {
        EC:     typeof EC     !== 'undefined' && !!EC,
        dal:    typeof dal    !== 'undefined' && !!dal,
        store:  typeof store  !== 'undefined' && !!store,
        router: typeof router !== 'undefined' && !!router,
        t:      typeof t      === 'function',
      };
      const missing = Object.keys(requiredGlobals).filter(k => !requiredGlobals[k]);
      if (missing.length === 0) {
        console.log(`[SchoolOS] ✅ SchoolOS initialized successfully (v${APP_VERSION})`);
      } else {
        console.error('[SchoolOS] ❌ SchoolOS init incomplete — missing globals:', missing);
      }
    })();

    // ── Global error boundary ─────────────────────────────────────────────────
    // Catches unhandled Promise rejections (e.g. Firebase calls that escape
    // try/catch, lazy-import failures) and surfaces them as error toasts.
    window.addEventListener('unhandledrejection', (e) => {
      const reason = e.reason;
      const msg    = reason?.message ?? String(reason) ?? 'Unknown async error';
      console.error('[SchoolOS] Unhandled rejection:', reason);
      if (typeof showToast === 'function') {
        showToast('Unexpected error: ' + msg, 'error');
      }
      // Do not re-throw — browser already logs it; suppression prevents noise
      // in the console from double-reporting in some environments.
    });

    // Catches synchronous script errors across the page.
    window.onerror = function schoolOsGlobalError(msg, src, line, col, err) {
      console.error('[SchoolOS] Script error:', msg, { src, line, col, err });
      if (typeof showToast === 'function') {
        showToast('Script error: ' + (err?.message ?? msg), 'error');
      }
      // Return false so the browser still logs the error in DevTools.
      return false;
    };
    // ── END INIT ─────────────────────────────────────────────────────────────

    // ── DEFERRED VIEW REGISTRY ────────────────────────────────────────────────
    // Tier 2 views are registered here via requestIdleCallback so they don't
    // block the initial parse/paint. loadViewChunk() polls window.views until
    // the idle callback has fired and the view is available.
    //
    // Tier 1 (eager — always available): loginView, parentDashboardView,
    //   studentDashboardView, registrarStudentsView, teacherExamScheduleView
    //   (used as teacherDashboardView), comingSoon placeholder routes.
    //
    // Tier 2 (deferred — registered below via rIC):
    //   adminUsersView, adminAnnouncementsView, adminExamScheduleView,
    //   adminExamSchedulesView, adminTeacherAssignView, adminSubjectsView,
    //   adminClassesView, adminPromotionView, adminSettingsView,
    //   adminRulesTestView, teacherAttendanceListView, teacherAttendanceView,
    //   teacherGradebookPickerView, teacherGradebookView, teacherHomeworkView,
    //   parentSemesterHistoryView, parentAttendanceDetailView,
    //   studentExamScheduleView, studentGradesView, studentAttendanceView,
    //   registrarPaymentsView, reportCardView, reportCardBulkView.

    window.views = window.views || {};

    // loadViewChunk(fnName)
    //   Since all code is in one file there is no true network lazy-loading.
    //   Instead we wait for the requestIdleCallback below to fire and register
    //   all Tier 2 view functions into window.views. This function polls every
    //   100 ms (up to 3 s) for the view to appear, then resolves or rejects.
    function loadViewChunk(fnName) {
      return new Promise((resolve, reject) => {
        // Already available — resolve immediately (fast path).
        if (window.views && typeof window.views[fnName] === 'function') {
          resolve(window.views[fnName]);
          return;
        }
        const MAX_MS  = 3000;
        const POLL_MS = 100;
        let elapsed   = 0;
        function poll() {
          if (window.views && typeof window.views[fnName] === 'function') {
            resolve(window.views[fnName]);
          } else if (elapsed >= MAX_MS) {
            reject(`View not available: ${fnName} (timed out after ${MAX_MS} ms)`);
          } else {
            elapsed += POLL_MS;
            setTimeout(poll, POLL_MS);
          }
        }
        setTimeout(poll, POLL_MS);
      });
    }

    // Register all Tier 2 views during browser idle time so startup is not
    // blocked. The guard wraps each function in a role-check closure identical
    // to guardRoute() so deferred views behave exactly like eager ones —
    // returning the rendered HTML string after the role is confirmed.
    (function scheduleViewRegistry() {
      function _registerViews() {
        const v = window.views;

        // ── Admin ──
        v['adminUsersView']          = guardRoute(() => adminUsersView(),          'admin');
        v['adminAnnouncementsView']  = guardRoute(() => adminAnnouncementsView(),  'admin', 'registrar');
        v['adminExamScheduleView']   = guardRoute(() => adminExamScheduleView(),   'admin');
        v['adminExamSchedulesView']  = guardRoute(() => adminExamSchedulesView(),  'admin');
        v['adminTeacherAssignView']  = guardRoute((p) => adminTeacherAssignView(p),'admin');
        v['adminSubjectsView']       = guardRoute(() => adminSubjectsView(),       'admin');
        v['adminClassesView']        = guardRoute(() => adminClassesView(),        'admin');
        v['adminPromotionView']      = guardRoute(() => adminPromotionView(),      'admin');
        v['adminSettingsView']       = guardRoute(() => adminSettingsView(),       'admin');
        v['adminRulesTestView']      = guardRoute(() => adminRulesTestView(),      'admin');
        v['adminChecklistView']      = guardRoute(() => adminChecklistView(),      'admin');

        // ── Teacher ──
        v['teacherAttendanceListView']  = guardRoute(() => teacherAttendanceListView(),   'teacher', 'homeroom_teacher');
        v['teacherAttendanceView']      = guardRoute((p) => teacherAttendanceView(p),     'teacher', 'homeroom_teacher');
        v['teacherGradebookPickerView'] = guardRoute(() => teacherGradebookPickerView(),  'teacher', 'homeroom_teacher');
        v['teacherGradebookView']       = guardRoute((p) => teacherGradebookView(p),      'teacher', 'homeroom_teacher');
        v['teacherHomeworkView']        = guardRoute(() => teacherHomeworkView(),          'teacher', 'homeroom_teacher');

        // ── Parent ──
        v['parentSemesterHistoryView']  = guardRoute((p) => parentSemesterHistoryView(p), 'parent');
        v['parentAttendanceDetailView'] = guardRoute((p) => parentAttendanceDetailView(p),'parent');

        // ── Student ──
        v['studentExamScheduleView']    = guardRoute(() => studentExamScheduleView(),     'student');
        v['studentGradesView']          = guardRoute(() => studentGradesView(),            'student');
        v['studentAttendanceView']      = guardRoute(() => studentAttendanceView(),        'student');

        // ── Registrar ──
        v['registrarPaymentsView']      = guardRoute(() => registrarPaymentsView(), 'admin', 'registrar');

        // ── Report Cards ──
        v['reportCardView']             = guardRoute((p) => reportCardView(p),      'admin', 'registrar', 'teacher');
        v['reportCardBulkView']         = guardRoute((p) => reportCardBulkView(p),  'admin', 'registrar');

        console.log('[SchoolOS] Tier 2 views registered:', Object.keys(v).length, 'views ready in window.views');
      }

      if ('requestIdleCallback' in window) {
        requestIdleCallback(_registerViews, { timeout: 2000 });
      } else {
        // Safari fallback — rIC not available; use a short setTimeout.
        setTimeout(_registerViews, 200);
      }
    })();

    // ── PERFORMANCE UTILITIES ─────────────────────────────────────────────────

    // measureFileSize()
    //   Logs the current document HTML size and script block size to the console.
    //   Called once on init and exposed on window so the admin can call it too.
    //   Results are stored in window.__perfMetrics for the Performance section
    //   in adminSettingsView and the budget modal.
    function measureFileSize() {
      try {
        const htmlBytes   = document.documentElement.outerHTML.length;
        const htmlKB      = (htmlBytes / 1024).toFixed(1);

        // Find the main app module script (the large inline script block).
        const scripts     = Array.from(document.querySelectorAll('script:not([src])'));
        const mainScript  = scripts.reduce((longest, s) =>
          s.textContent.length > longest.textContent.length ? s : longest, scripts[0] || { textContent: '' });
        const scriptBytes = mainScript.textContent.length;
        const scriptKB    = (scriptBytes / 1024).toFixed(1);

        const tier1Count  = 6;  // loginView, adminDashboard(comingSoon), teacherDashboardView,
                                //   parentDashboardView, studentDashboardView, registrarStudentsView
        const tier2Count  = Object.keys(window.views || {}).length || 22;
        const parseTime3G = (htmlBytes / 1024 / 50).toFixed(1); // 50 KB/s estimate for 3G parse

        const metrics = { htmlKB, scriptKB, htmlBytes, scriptBytes, tier1Count, tier2Count, parseTime3G };
        window.__perfMetrics = metrics;

        console.log(`[SchoolOS] 📐 File size: ${htmlKB} KB total HTML, ${scriptKB} KB script`);
        console.log(`[SchoolOS] 📐 Tier 1 (eager): ${tier1Count} views  |  Tier 2 (deferred): ${tier2Count} views`);
        console.log(`[SchoolOS] 📐 Estimated 3G parse time: ${parseTime3G} s`);

        return metrics;
      } catch (e) {
        console.warn('[SchoolOS] measureFileSize error:', e.message);
        return null;
      }
    }

    // minifyInlineStrings()
    //   Scans DICT.en and DICT.am for keys where en === am (byte-identical
    //   strings that require no translation). Logs the count and approximate
    //   saving — useful for identifying reduction opportunities.
    function minifyInlineStrings() {
      try {
        const en = DICT.en || {};
        const am = DICT.am || {};
        const identical = [];
        for (const key of Object.keys(en)) {
          if (en[key] === am[key]) identical.push(key);
        }
        const totalKeys = Object.keys(en).length;
        const savedBytes = identical.reduce((sum, k) => sum + (en[k] ? en[k].length : 0), 0);
        console.log(`[SchoolOS] minifyInlineStrings: ${identical.length}/${totalKeys} keys are identical in en+am`);
        console.log(`[SchoolOS] minifyInlineStrings: ~${savedBytes} bytes could be deduplicated`);
        console.log(`[SchoolOS] minifyInlineStrings: identical keys →`, identical);
        return { identical, savedBytes, totalKeys };
      } catch (e) {
        console.warn('[SchoolOS] minifyInlineStrings error:', e.message);
        return null;
      }
    }

    // Run measureFileSize() on startup so the admin modal has numbers
    // immediately without waiting for a user to open the settings page.
    // Wrapped in rIC so it doesn't compete with the first paint.
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => {
        measureFileSize();
        minifyInlineStrings();
      }, { timeout: 3000 });
    } else {
      setTimeout(() => { measureFileSize(); minifyInlineStrings(); }, 500);
    }

    // Expose utilities globally so console debugging and admin views can call them.
    window.measureFileSize     = measureFileSize;
    window.minifyInlineStrings = minifyInlineStrings;
    window.loadViewChunk       = loadViewChunk;

  </script>

  <!-- ════════════════════════════════════════════════════════════════════════
       PWA FEATURES — Offline detection · Install prompt · Update banner
       Lives in its own <script> block so it runs after all app globals
       (store, t, showToast, render) are available.
  ════════════════════════════════════════════════════════════════════════ -->
  <script>
    (function () {
      // ── Helpers ─────────────────────────────────────────────────────────────

      /** Toggle the offline sticky banner and body class. */
      function _setOfflineUI(isOffline) {
        const banner = document.getElementById('offline-banner');
        const textEl = document.getElementById('offline-banner-text');
        if (banner) {
          if (isOffline) {
            if (textEl) textEl.textContent = t('offline');
            banner.classList.add('is-visible');
          } else {
            banner.classList.remove('is-visible');
          }
        }
        if (isOffline) {
          document.body.classList.add('is-offline');
        } else {
          document.body.classList.remove('is-offline');
        }
        // Disable / re-enable all form submit buttons site-wide.
        document.querySelectorAll('button[type="submit"], input[type="submit"]')
          .forEach(btn => { btn.disabled = isOffline; });
      }

      /** Show / hide the install prompt banner. */
      function _syncInstallBanner() {
        const banner = document.getElementById('install-banner');
        if (!banner) return;
        const titleEl = document.getElementById('install-banner-title');
        const descEl  = document.getElementById('install-banner-desc');
        if (titleEl) titleEl.textContent = t('install_app');
        if (descEl)  descEl.textContent  = t('install_app_desc');

        const show = !!store.deferredInstall && !store.installDismissed;
        if (show) {
          banner.classList.add('is-visible');
          document.body.classList.add('has-install-banner');
        } else {
          banner.classList.remove('is-visible');
          document.body.classList.remove('has-install-banner');
        }
      }

      /** Show the update banner. */
      function _showUpdateBanner() {
        const banner = document.getElementById('update-banner');
        const textEl = document.getElementById('update-banner-text');
        if (!banner) return;
        if (textEl) textEl.textContent = t('update_available') + ' — ' + t('update_refresh');
        banner.classList.add('is-visible');
        document.body.classList.add('has-update-banner');
      }

      // ── (1) OFFLINE DETECTION ────────────────────────────────────────────────
      // Initialise from current navigator state (handles refresh-while-offline).
      // Exception: local file:// or blob:// contexts (e.g. Acode mobile IDE)
      // always report navigator.onLine === false even when the device has
      // internet. Skip the offline UI in those cases so the app is usable.
      const _isLocalFileContext = (
        window.location.protocol === 'file:' ||
        window.location.protocol === 'blob:' ||
        window.location.hostname === ''
      );
      if (!navigator.onLine && !_isLocalFileContext) {
        store.isOffline = true;
        _setOfflineUI(true);
      }

      // Only wire online/offline events when we're not in a local file context.
      // In file:// / blob:// contexts these events fire spuriously and the
      // offline state cannot be trusted (Acode webview always appears offline).
      if (!_isLocalFileContext) {
        window.addEventListener('offline', () => {
          store.isOffline = true;
          _setOfflineUI(true);
        });
      }

      window.addEventListener('online', () => {
        if (_isLocalFileContext) return; // ignore in local file context
        store.isOffline = false;
        _setOfflineUI(false);
        // Brief success toast.
        if (typeof showToast === 'function') {
          showToast(t('back_online'), 'success');
        }
      });

      // ── (2) PWA INSTALL PROMPT (A2HS) ────────────────────────────────────────
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();              // stop the mini-infobar on Chrome Android
        store.deferredInstall = e;       // stash for our own button
        _syncInstallBanner();
      });

      // Wire Install button.
      const installBtn = document.getElementById('install-banner-btn');
      if (installBtn) {
        installBtn.addEventListener('click', async () => {
          if (!store.deferredInstall) return;
          try {
            await store.deferredInstall.prompt();
            const { outcome } = await store.deferredInstall.userChoice;
            console.log('[SchoolOS A2HS] User choice:', outcome);
          } catch (err) {
            console.warn('[SchoolOS A2HS] Prompt error:', err);
          } finally {
            store.deferredInstall = null;
            _syncInstallBanner();
          }
        });
      }

      // Wire Dismiss (×) button — persist decision to localStorage.
      const dismissBtn = document.getElementById('install-banner-dismiss');
      if (dismissBtn) {
        dismissBtn.addEventListener('click', () => {
          store.installDismissed = true;
          localStorage.setItem('schoolos-install-dismissed', '1');
          _syncInstallBanner();
        });
      }

      // Hide banner once the app is actually installed.
      window.addEventListener('appinstalled', () => {
        store.deferredInstall = null;
        _syncInstallBanner();
        console.log('[SchoolOS A2HS] App installed');
      });

      // Re-sync banner text whenever the language changes (render() fires).
      // We patch store's Proxy setter to call _syncInstallBanner when lang changes.
      // Instead of patching the store, use a MutationObserver on the #install-banner
      // text node OR simply expose the sync function globally for render() to call.
      window.__syncInstallBanner = _syncInstallBanner;

      // ── (3) UPDATE BANNER (controllerchange + SW message) ───────────────────
      // We listen for controllerchange fired when a new SW takes over — this is
      // the clearest signal that an update happened and a reload is worthwhile.
      if ('serviceWorker' in navigator) {
        // controllerchange fires when a new SW claims the page.
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          // Guard: only show once per page load (controllerchange can fire twice
          // on some browsers during the first install as well).
          if (window.__swUpdateShown) return;
          window.__swUpdateShown = true;
          _showUpdateBanner();
        });

        // Also listen for explicit UPDATE_AVAILABLE message from the SW.
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data && event.data.type === 'UPDATE_AVAILABLE') {
            if (window.__swUpdateShown) return;
            window.__swUpdateShown = true;
            _showUpdateBanner();
          }
        });
      }

      // Wire Refresh button (already in HTML; also set here for completeness).
      const refreshBtn = document.getElementById('update-banner-refresh');
      if (refreshBtn) {
        refreshBtn.addEventListener('click', () => window.location.reload());
      }

    })();
  </script>

  <!-- ════════════════════════════════════════════════════════════════════════
       SERVICE WORKER — Offline caching strategy
         • Firebase API calls (Firestore / Identity Toolkit) → Network-first
           (always try the network; fall back to cache only if offline).
         • Same-origin requests (this HTML file + any relative assets) →
           Cache-first (serve from cache instantly; revalidate in background).
         • Cross-origin non-Firebase requests → Network-only (pass through).
  ════════════════════════════════════════════════════════════════════════ -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;

      // ── Register the Service Worker from a real same-origin file ───────────
      // navigator.serviceWorker.register() requires an http:/https: same-
      // origin (or relative) script URL — blob: URLs are rejected by every
      // browser ("The URL protocol of the script ('blob:...') is not
      // supported."). The SW source now lives in its own file, sw.js,
      // deployed at the site root alongside index.html.
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then((registration) => {
          console.log('[SchoolOS SW] Registered. Scope:', registration.scope);

          // Check for updates when the page becomes visible again.
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
              registration.update().catch(() => {});
            }
          });
        })
        .catch((err) => {
          console.warn('[SchoolOS SW] Registration failed (non-fatal):', err.message);
        });
    })();
  </script>

</body>
