# ─────────────────────────────────────────────────────────────────────────────
# netlify.toml — SchoolOS Netlify configuration
# Single-file SPA: index.html is both the publish root and the only asset.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # The entire site lives in index.html at the repository root.
  publish = "."

# ── SPA redirect rule ────────────────────────────────────────────────────────
# All routes (including deep-links like #/parent/dashboard) must resolve to
# index.html. The hash-based router handles the rest client-side.
# Status 200 (not 301) means Netlify serves index.html *without* changing the
# browser URL, which is exactly what a client-side router needs.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── HTTP headers ─────────────────────────────────────────────────────────────

# index.html — never cache.
# The app is a single file; if this is cached stale the whole app is stale.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# Root path also resolves to index.html — same no-cache treatment.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# Static assets — long cache (fingerprint filenames before deploying).
[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Security headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
